<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - 챕터</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link rel="icon" href="assets/icon-192.svg">
  <style>
    .video-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(30,41,59,0.85);
      border-radius: var(--radius);
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .video-item:hover { transform: translateY(-1px); }
    .video-item.completed { border-left: 3px solid var(--success); }

    .video-thumb {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--primary-light);
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; flex-shrink: 0;
    }
    .video-item.completed .video-thumb {
      background: rgba(16,185,129,0.15); color: var(--success);
    }

    .video-info { flex: 1; }
    .video-info h4 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .video-info p { font-size: 13px; color: var(--gray-500); }

    .video-player-wrapper {
      position: relative;
      width: 100%; padding-top: 56.25%;
      background: #000; border-radius: var(--radius);
      overflow: hidden; margin-bottom: 16px;
    }
    .video-player-wrapper iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: none;
    }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--gray-500); text-decoration: none; font-size: 14px;
      padding: 8px 0;
    }

    .quiz-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid var(--gray-200);
    }

    .chapter-test-banner {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: white; border-radius: var(--radius);
      padding: 24px; text-align: center; margin-top: 20px;
    }
    .chapter-test-banner h3 { font-size: 18px; margin-bottom: 8px; }
    .chapter-test-banner p { font-size: 14px; opacity: 0.9; margin-bottom: 16px; }
    .chapter-test-banner button {
      background: white; color: var(--primary);
      border: none; border-radius: 8px;
      padding: 12px 32px; font-size: 16px; font-weight: 700;
      cursor: pointer;
    }

    /* ===== Chapter Final Exam Styles ===== */
    .exam-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 2px solid var(--primary);
    }
    .exam-header h3 { font-size: 18px; font-weight: 700; color: var(--primary); margin: 0; }
    .exam-counter { font-size: 14px; color: var(--gray-500); font-weight: 600; }

    .exam-progress-bar {
      width: 100%; height: 8px; background: var(--gray-100);
      border-radius: 4px; margin-bottom: 20px; overflow: hidden;
    }
    .exam-progress-bar .fill {
      height: 100%; background: var(--primary);
      border-radius: 4px; transition: width 0.3s ease;
    }

    .exam-type-badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 12px; font-weight: 700; margin-bottom: 12px;
    }
    .exam-type-badge.mc { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .exam-type-badge.sa { background: rgba(245,158,11,0.2); color: #F59E0B; }

    .exam-question-text {
      font-size: 17px; font-weight: 600; line-height: 1.6;
      color: var(--gray-900); margin-bottom: 20px;
    }

    .exam-option {
      display: block; width: 100%; text-align: left;
      padding: 14px 16px; margin-bottom: 10px;
      background: rgba(30,41,59,0.85); border: 2px solid rgba(148,163,184,0.12);
      border-radius: 10px; font-size: 15px; cursor: pointer; color: #F1F5F9;
      transition: all 0.15s;
    }
    .exam-option:hover { border-color: var(--primary); background: var(--primary-light); }
    .exam-option.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 600; }

    .exam-sa-input {
      width: 100%; padding: 14px 16px; border: 2px solid rgba(148,163,184,0.12);
      border-radius: 10px; font-size: 15px; line-height: 1.6;
      resize: vertical; min-height: 100px; box-sizing: border-box;
      transition: border-color 0.15s; background: rgba(30,41,59,0.85); color: #F1F5F9;
    }
    .exam-sa-input:focus { outline: none; border-color: var(--primary); }

    .exam-nav {
      display: flex; gap: 10px; margin-top: 24px;
    }
    .exam-nav button {
      flex: 1; padding: 14px; border-radius: 10px; font-size: 15px;
      font-weight: 700; cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .exam-nav .btn-prev { background: var(--gray-100); color: var(--gray-600); }
    .exam-nav .btn-next { background: var(--primary); color: white; }
    .exam-nav .btn-submit { background: #059669; color: white; }
    .exam-nav button:disabled { opacity: 0.4; cursor: not-allowed; }

    .exam-question-dots {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
    }
    .exam-question-dots .dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; cursor: pointer;
      border: 2px solid rgba(148,163,184,0.12); background: rgba(30,41,59,0.85); color: #94A3B8;
      transition: all 0.15s;
    }
    .exam-question-dots .dot.answered { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .exam-question-dots .dot.current { border-color: var(--primary); background: var(--primary); color: white; }

    /* Exam result styles */
    .grade-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100px; height: 100px; border-radius: 50%;
      font-size: 48px; font-weight: 900; margin: 0 auto 16px;
    }
    .grade-S { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; box-shadow: 0 0 30px rgba(245,158,11,0.4); }
    .grade-A { background: linear-gradient(135deg, #34d399, #059669); color: white; box-shadow: 0 0 20px rgba(5,150,105,0.3); }
    .grade-B { background: linear-gradient(135deg, #60a5fa, #10B981); color: white; box-shadow: 0 0 20px rgba(16,185,129,0.3); }
    .grade-C { background: linear-gradient(135deg, #a78bfa, #F59E0B); color: white; }
    .grade-D { background: linear-gradient(135deg, #fb923c, #ea580c); color: white; }
    .grade-F { background: linear-gradient(135deg, #f87171, #dc2626); color: white; }

    .exam-score-breakdown {
      display: flex; gap: 12px; justify-content: center; margin: 16px 0;
    }
    .exam-score-breakdown .score-box {
      flex: 1; max-width: 160px; padding: 14px; border-radius: 12px;
      text-align: center; background: var(--gray-50);
    }
    .exam-score-breakdown .score-box .label { font-size: 12px; color: var(--gray-500); margin-bottom: 4px; }
    .exam-score-breakdown .score-box .value { font-size: 24px; font-weight: 800; }

    .exam-wrong-list {
      text-align: left; margin-top: 20px;
    }
    .exam-wrong-item {
      padding: 14px; margin-bottom: 10px; border-radius: 10px;
      background: rgba(239,68,68,0.1); border-left: 4px solid #ef4444;
    }
    .exam-wrong-item .q-num { font-size: 12px; color: #fca5a5; font-weight: 700; margin-bottom: 4px; }
    .exam-wrong-item .q-text { font-size: 14px; color: var(--gray-900); margin-bottom: 6px; }
    .exam-wrong-item .q-answer { font-size: 13px; color: #86efac; }
    .exam-wrong-item .q-yours { font-size: 13px; color: #fca5a5; margin-bottom: 2px; }

    .exam-grade-inline {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 13px; font-weight: 800; vertical-align: middle;
    }

    .exam-start-btn {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white; border: none; border-radius: 8px;
      padding: 12px 32px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 12px;
    }
    .mini-quiz-card { background: rgba(30,41,59,0.85); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
    .mini-quiz-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-200); }
    .mini-quiz-header .icon { font-size: 24px; }
    .mini-quiz-header h3 { font-size: 16px; font-weight: 700; flex: 1; margin: 0; }
    .mini-quiz-header .mq-progress { font-size: 13px; color: var(--gray-500); font-weight: 600; }
    .mq-question { font-size: 15px; font-weight: 600; line-height: 1.6; margin-bottom: 14px; color: var(--gray-900); }
    .mq-option { display: block; width: 100%; text-align: left; padding: 12px 14px; margin-bottom: 8px; border: 1.5px solid rgba(148,163,184,0.12); border-radius: 10px; background: rgba(30,41,59,0.85); font-size: 14px; color: #F1F5F9; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .mq-option:hover { border-color: var(--primary); background: var(--primary-light); }
    .mq-option.mq-correct { border-color: var(--success); background: rgba(16,185,129,0.15); pointer-events: none; }
    .mq-option.mq-wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); pointer-events: none; }
    .mq-option.mq-disabled { pointer-events: none; opacity: 0.6; }
    .mq-feedback { margin-top: 10px; padding: 12px; border-radius: 10px; font-size: 14px; line-height: 1.5; }
    .mq-feedback.correct { background: rgba(16,185,129,0.15); color: #86efac; }
    .mq-feedback.wrong { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .mq-next-btn { margin-top: 14px; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; display: none; background: var(--primary); color: white; }
    .mq-result-card { text-align: center; padding: 30px 20px; background: rgba(30,41,59,0.85); border-radius: var(--radius); box-shadow: var(--shadow); }
    .mq-result-card .mq-score-icon { font-size: 48px; margin-bottom: 8px; }
    .mq-result-card h3 { font-size: 20px; margin-bottom: 4px; }
    .mq-result-card p { font-size: 14px; color: var(--gray-500); margin-bottom: 16px; }
    .mq-result-card button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; background: var(--success); color: white; }
    .mq-loading { text-align: center; padding: 40px 20px; }
    .mq-loading .spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: mqspin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes mqspin { to { transform: rotate(360deg); } }
    /* Slide player launch button */
    .sp-launch-btn {
      width: 100%; padding: 14px 20px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white; font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 14px rgba(99,102,241,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .sp-launch-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99,102,241,0.45);
    }
  </style>
</head>
<body>

  <div class="bottom-nav">
    <a href="app.html">
      <span class="nav-icon">&#127968;</span> <span class="nav-label-home">홈</span>
    </a>
    <a href="tasks.html">
      <span class="nav-icon">&#9989;</span> <span class="nav-label-tasks">미션</span>
    </a>
    <a href="praise.html">
      <span class="nav-icon">&#128588;</span> <span class="nav-label-praise">부스트</span>
    </a>
    <a href="my-results.html">
      <span class="nav-icon">&#128100;</span> <span class="nav-label-results">내 프로필</span>
    </a>
  </div>

  <div class="app-container">

    <!-- ===== 1. 비디오 목록 뷰 ===== -->
    <div id="videoListView">
      <a href="app.html" class="back-btn" id="backHomeBtn">&#8592; 홈으로</a>

      <h2 style="margin-bottom:4px;" id="chapterTitle">챕터</h2>
      <p style="color:var(--gray-500); font-size:14px; margin-bottom:20px;" id="chapterDesc"></p>

      <!-- 진행률 카드 -->
      <div class="card" style="margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
          <span style="font-size:14px; font-weight:600;" id="videoProgressLabel">비디오 진행률</span>
          <span style="font-size:14px; color:var(--gray-500);" id="videoProgressText">0/0</span>
        </div>
        <div class="progress-bar">
          <div class="fill" id="videoProgressBar" style="width:0%"></div>
        </div>
      </div>

      <div id="videoList"></div>

      <!-- 챕터 테스트 영역 -->
      <div id="chapterTestArea"></div>
    </div>

    <!-- ===== 2. 비디오/나레이션 플레이어 뷰 ===== -->
    <div id="videoPlayerView" style="display:none;">
      <a href="#" class="back-btn" id="backToListBtn">&#8592; <span id="backToListLabel">목록으로</span></a>

      <h3 id="videoTitle" style="margin-bottom:12px;"></h3>

      <!-- 비디오 영역 (URL 있을 때) -->
      <div class="video-player-wrapper" id="videoWrapper" style="display:none;">
        <iframe id="videoPlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <!-- 동기 재생용 비디오 컨테이너 (muted video + TTS) -->
      <div id="syncedVideoContainer" style="display:none;"></div>
      <div id="subtitleBar" style="display:none;background:#000;color:#fff;text-align:center;padding:8px;font-size:14px;border-radius:0 0 8px 8px;"></div>

      <!-- 나레이션 텍스트 (비디오 URL 없을 때 — AI 생성 스크립트 표시) -->
      <div id="narrationCard" class="card" style="display:none;">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
          <span style="font-size:20px;">&#127908;</span>
          <span style="font-size:13px; color:var(--primary); font-weight:600;" id="aiScriptLabel">AI 생성 스크립트</span>
        </div>
        <p id="narrationText" style="font-size:16px; line-height:1.8; color:var(--gray-900);"></p>
        <div style="margin-top:10px; display:flex; gap:8px;">
          <button id="ttsPlayBtn" onclick="playTTS()" style="display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border:1px solid rgba(148,163,184,0.12); border-radius:8px; background:rgba(30,41,59,0.85); cursor:pointer; font-size:13px; color:var(--primary); font-weight:600;">
            &#128266; 읽어주기
          </button>
          <button id="ttsStopBtn" onclick="stopTTS()" style="display:none; align-items:center; gap:6px; padding:8px 16px; border:1px solid #ef4444; border-radius:8px; background:rgba(239,68,68,0.15); cursor:pointer; font-size:13px; color:#ef4444; font-weight:600;">
            &#9724; 멈추기
          </button>
        </div>
        <div id="visualNote" style="margin-top:12px; padding:10px; background:var(--gray-50); border-radius:8px; font-size:13px; color:var(--gray-500); font-style:italic;"></div>
      </div>

      <div class="card" style="text-align:center;">
        <p style="color:var(--gray-500); font-size:14px; margin-bottom:12px;" id="readThenClickMsg">
          내용을 읽은 후 아래 버튼을 눌러주세요
        </p>
        <button class="btn btn-success" style="width:100%;" id="completeVideoBtn">
          &#9989; <span id="completeBtnLabel">학습 완료</span>
        </button>
      </div>
    </div>

    <!-- ===== 2.5 미니 퀴즈 뷰 (per-video) ===== -->
    <div id="miniQuizView" style="display:none;">
      <div id="miniQuizContent"></div>
    </div>

    <!-- ===== 3. 퀴즈 뷰 ===== -->
    <div id="quizView" style="display:none;">
      <div class="quiz-header">
        <span id="quizLabel" style="font-size:14px; font-weight:600; color:var(--primary);"></span>
        <span style="font-size:14px; color:var(--gray-500);" id="quizProgress">1/3</span>
      </div>

      <p class="quiz-question" id="quizQuestion"></p>

      <div id="quizOptions"></div>

      <button class="btn btn-primary" id="quizNextBtn" style="margin-top:16px; display:none;"></button>
    </div>

    <!-- ===== 4. 결과 뷰 ===== -->
    <div id="resultView" style="display:none; text-align:center; padding:40px 0;">
      <div class="result-circle" id="resultCircle">
        <span id="resultScore">0%</span>
      </div>
      <h2 id="resultTitle" style="margin-bottom:8px;"></h2>
      <p style="color:var(--gray-500); margin-bottom:8px;" id="resultMsg"></p>
      <p style="color:var(--gray-500); font-size:13px; margin-bottom:24px;" id="resultDetail"></p>
      <button class="btn btn-primary" id="resultBackBtn"></button>
      <button class="btn btn-outline" id="resultRetryBtn" style="margin-top:8px; width:100%; display:none;"></button>
      <button class="btn exam-start-btn" id="resultExamBtn" style="margin-top:8px; width:100%; display:none;"></button>
    </div>

    <!-- ===== 5. 챕터 종합시험 뷰 ===== -->
    <div id="chapterExamView" style="display:none;">
      <div class="exam-header">
        <h3 id="examTitle">챕터 종합시험</h3>
        <div style="display:flex;align-items:center;gap:10px;">
          <span id="examTimer" style="display:none;font-size:14px;font-weight:700;padding:4px 10px;border-radius:8px;background:rgba(99,102,241,0.15);color:#6366f1;border:1px solid rgba(99,102,241,0.3);">⏱ 60:00</span>
          <span class="exam-counter" id="examCounter">1 / 20</span>
        </div>
      </div>

      <div class="exam-progress-bar">
        <div class="fill" id="examProgressFill" style="width:0%"></div>
      </div>

      <div class="exam-question-dots" id="examDots"></div>

      <div id="examQuestionArea">
        <span class="exam-type-badge mc" id="examTypeBadge">객관식</span>
        <p class="exam-question-text" id="examQuestionText"></p>
        <div id="examOptionsArea"></div>
      </div>

      <div class="exam-nav">
        <button class="btn-prev" id="examPrevBtn" onclick="examNavigate(-1)">← </button>
        <button class="btn-next" id="examNextBtn" onclick="examNavigate(1)">→ </button>
      </div>
    </div>

    <!-- ===== 6. 종합시험 결과 뷰 ===== -->
    <div id="examResultView" style="display:none; text-align:center; padding:30px 0;">
      <div class="grade-badge" id="examGradeBadge">S</div>
      <h2 id="examResultTitle" style="margin-bottom:4px;"></h2>
      <p style="color:var(--gray-500); font-size: 15px; margin-bottom: 4px;" id="examResultScore"></p>
      <p style="color:var(--gray-500); font-size: 13px; margin-bottom: 16px;" id="examResultGradeText"></p>

      <div class="exam-score-breakdown" id="examScoreBreakdown">
        <div class="score-box">
          <div class="label" id="examMCLabel">객관식</div>
          <div class="value" id="examMCScore" style="color:var(--primary);">0%</div>
        </div>
        <div class="score-box">
          <div class="label" id="examSALabel">주관식</div>
          <div class="value" id="examSAScore" style="color:#F59E0B;">0%</div>
        </div>
      </div>

      <div class="exam-wrong-list" id="examWrongList"></div>

      <button class="btn btn-primary" id="examResultBackBtn" style="margin-top:20px; width:100%;"></button>
      <button class="btn btn-outline" id="examRetryBtn" style="margin-top:8px; width:100%; display:none;"></button>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/scene-prompts.js"></script>

  <script src="js/sop-content-kids.js"></script>
  <script src="js/demo-data.js"></script>
  <script src="js/i18n-helper.js"></script>
  <script src="js/xp-system.js"></script>
  <script src="js/xp-ui.js"></script>

  <script>
    // ===== 다국어 텍스트 =====
    const T = {
      ko: {
        home: '홈', tasks: '미션', myResults: '내 프로필',
        backHome: '홈으로', backToList: '목록으로', chapter: '챕터',
        chapterDesc: '동영상을 순서대로 시청하고 퀴즈를 풀어주세요',
        videoProgress: '비디오 진행률', completed: '완료',
        scene: '씬', aiScript: 'AI 생성 스크립트',

    };
    const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
    const t = T[lang] || T.ko;

    if (document.querySelector('.nav-label-tasks')) document.querySelector('.nav-label-tasks').textContent = t.tasks || (lang === 'en' ? 'Tasks' : lang === 'vi' ? 'Nhiệm vụ' : '미션');

    document.getElementById('ttsStopBtn').innerHTML = t.ttsStop;
    document.getElementById('resultBackBtn').textContent = t.backToListBtn;
    document.getElementById('resultRetryBtn').textContent = t.retryBtn;

    // ===== 로그인 확인 =====
    const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
    const loginTime = parseInt(localStorage.getItem('sop_login_time') || '0');
    if (Date.now() - loginTime > 24 * 60 * 60 * 1000) {
      localStorage.removeItem('sop_user');
      localStorage.removeItem('sop_login_time');
      window.location.href = 'index.html';
    }
    if (!user) { window.location.href = 'index.html'; }

    // ===== URL에서 챕터(SOP) ID 가져오기 =====
    const params = new URLSearchParams(window.location.search);
    const chapterId = params.get('id');
    const isExamMode = params.get('exam') === 'true'; // 챕터 종합시험 모드
    let sop = SopStore.getById(chapterId);
    let chapter = sop ? { id: sop.id, title: sop.title, title_en: sop.title_en, title_vn: sop.title_vn, doc_type: sop.doc_type } : null;
    let videos = SopStore.getVideos(chapterId);
    let chapterQuizzes = SopStore.getQuizzes(chapterId);

    // 첫 로그인 race condition: localStorage 비어있으면 Supabase sync 대기 후 재시도
    if (!chapter) {
      console.warn('[Chapter] 로컬에 챕터 없음 — Supabase sync 대기 중...', chapterId);
      // 로딩 UI 표시
      document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:#94A3B8;">
        <div style="width:48px;height:48px;border:4px solid rgba(16,185,129,0.3);border-top-color:#10B981;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <div>챕터 데이터 불러오는 중...</div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      </div>`;

      (async () => {
        // Supabase에서 직접 fetch (10초 타임아웃)
        try {
          await Promise.race([
            SupabaseMode.init().then(() => SupabaseMode.syncSops()),
            new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000)),
          ]);
          sop = SopStore.getById(chapterId);
          if (sop) {
            // 데이터 도착 → 페이지 새로고침하여 정상 플로우로
            window.location.reload();
          } else {
            // 진짜 없음 → 홈으로
            console.warn('[Chapter] Supabase에도 없음 — 홈으로 이동');
            window.location.href = 'app.html';
          }
        } catch (e) {
          console.warn('[Chapter] sync 타임아웃:', e.message);
          window.location.href = 'app.html';
        }
      })();
      // 아래 스크립트 중단 (chapter 없는 상태로 계속 실행하면 에러)
      throw new Error('Waiting for chapter sync');
    }

    // === 챕터 종합시험 모드 (대챕터 → 30문제 시험) ===
    if (chapter && isExamMode && sop.doc_type === 'chapter') {
      const examQuizzes = SopStore.getExamQuizzes(chapterId);
      if (examQuizzes.length > 0) {
        // 종합시험 전용 UI 바로 실행
        setTimeout(() => _startChapterFinalExam(examQuizzes, chapter), 100);
      } else {
        alert('종합시험 문제가 아직 생성되지 않았습니다.');
        window.location.href = 'app.html';
      }
    }

    // ===== 다음 챕터/섹션 찾기 =====
    function getNextChapter() {
      // 대챕터 내 섹션이면 → 같은 챕터의 다음 섹션
      if (sop.parent_id) {
        const siblings = SopStore.getSections(sop.parent_id);
        const myIdx = siblings.findIndex(s => s.id === chapterId);
        if (myIdx >= 0 && myIdx < siblings.length - 1) {
          return { id: siblings[myIdx + 1].id, title: siblings[myIdx + 1].title };
        }
        // 마지막 섹션이면 → 챕터 종합시험으로 이동
        const parentChapter = SopStore.getById(sop.parent_id);
        if (parentChapter?.exam_quizzes?.length > 0) {
          return { id: sop.parent_id, title: parentChapter.title + ' 종합시험', isExam: true };
        }
        return null;
      }
      // 독립 섹션이면 기존 로직
      const chapterData = SopStore.getChapters();
      const allFlat = [...(chapterData.chapters || []), ...(chapterData.orphanSections || [])];
      // 플랫 목록에서 찾기
      const flat = [];
      allFlat.forEach(item => {
        if (item.sections) { item.sections.forEach(s => flat.push(s)); }
        else flat.push(item);
      });
      const currentIdx = flat.findIndex(c => c.id === chapterId);
      if (currentIdx >= 0 && currentIdx < flat.length - 1) return flat[currentIdx + 1];
      return null;
    }

    function renderNextChapterBtn() {
      const next = getNextChapter();
      if (next) {
        const href = next.isExam ? `chapter.html?id=${next.id}&exam=true` : `chapter.html?id=${next.id}`;
        return `

    // ===== 비디오 목록 렌더링 =====
    function renderVideoList() {
      document.getElementById('chapterTitle').textContent = getLocalizedText(chapter, 'title');

      const container = document.getElementById('videoList');
      container.innerHTML = '';

      // "Play All Slides" button at top
      if (videos.length > 0) {

              ${t.playAllSlides}
            </button>
          </div>
        `;
      }

      let completedCount = 0;

      videos.forEach((video, i) => {
        const completed = Progress.isVideoCompleted(video.id);
        if (completed) completedCount++;

        // 나레이션 미리보기 (다국어 지원)
        const preview = (getLocalizedText(video, 'title_full') || getLocalizedText(video, 'title') || video.title_full || video.title || '').slice(0, 50);
        const _mqEmail = (JSON.parse(localStorage.getItem('sop_user') || '{}').email || 'demo');
        const mqScoreData = localStorage.getItem('sop_miniquiz_score_' + _mqEmail + '_' + video.id);

    async function generateMiniQuiz(videoId) {
      const video = videos.find(v => v.id === videoId);
      if (!video) return [];
      const narration = getLocalizedText(video, 'title_full') || getLocalizedText(video, 'title') || video.title_full || video.title || '';
      if (narration.length < 20) return [];

      // Try AI generation first
      const provider = AI_CONFIG.quizProvider || AI_CONFIG.scriptProvider;
      if (provider && provider !== 'local' && provider !== 'none') {
        try {
          const prompt = `아래 교육 내용을 기반으로 간단한 확인 퀴즈 2문제를 JSON 배열로 생성하세요.
각 항목 형식: { "question": "질문", "options": ["A","B","C","D"], "correct": 정답인덱스(0-3), "explanation": "간단설명" }

교육 내용:
${narration.slice(0, 1500)}

규칙:
- 정확히 2문제
- 핵심 내용 확인 문제
- 4지선다
- JSON 배열만 출력`;
          const result = await AI._callLLM(provider, prompt);
          const parsed = JSON.parse(result.match(/\[[\s\S]*\]/)?.[0] || '[]');
          if (parsed.length >= 2) return parsed.slice(0, 2);
        } catch(e) {
          console.warn('Mini quiz AI generation failed, using fallback:', e.message);
        }
      }

      // Fallback: extract key facts from narration
      return generateLocalMiniQuiz(narration);
    }

    function generateLocalMiniQuiz(narration) {
      const sentences = narration.replace(/\n/g, '. ').split(/[.!?。]+/).map(s => s.trim()).filter(s => s.length > 8);
      if (sentences.length < 2) return [];

      const questions = [];
      // Pick up to 2 key sentences
      const picks = sentences.length <= 4 ? [0, Math.min(1, sentences.length - 1)] :
        [Math.floor(sentences.length * 0.25), Math.floor(sentences.length * 0.7)];

      picks.forEach((idx, qi) => {
        if (qi >= 2) return;
        const sentence = sentences[idx];
        // Extract a keyword (longest word or phrase)
        const words = sentence.split(/[\s,]+/).filter(w => w.length > 1);
        if (words.length < 2) return;

        const keyIdx = words.reduce((best, w, i) => w.length > words[best].length ? i : best, 0);
        const keyword = words[keyIdx];

        // Create a fill-in-the-blank style question
        const q = {
          question: lang === 'en' ? `Which is correct about the content?`
            : lang === 'vi' ? `Nội dung nào đúng?`
            : `다음 중 내용과 일치하는 것은?`,
          options: [],
          correct: 0,
          explanation: sentence.slice(0, 60)
        };

        // Correct answer = original sentence (truncated)
        q.options.push(sentence.slice(0, 50) + (sentence.length > 50 ? '...' : ''));

        // Generate 3 wrong options by modifying the sentence
        const wrongPrefixes = lang === 'en'
          ? ['Always avoid ', 'Never do ', 'It is optional to ']
          : lang === 'vi'
          ? ['Luôn tránh ', 'Không bao giờ ', 'Tùy chọn: ']
          : ['항상 피해야 하는 ', '절대 하면 안 되는 ', '선택 사항인 '];

        for (let i = 0; i < 3; i++) {
          const otherIdx = (idx + i + 1) % sentences.length;
          const otherSentence = sentences[otherIdx] || (wrongPrefixes[i] + keyword);
          const wrong = otherSentence.slice(0, 50) + (otherSentence.length > 50 ? '...' : '');
          if (wrong !== q.options[0]) {
            q.options.push(wrong);
          } else {
            q.options.push(wrongPrefixes[i] + keyword);
          }
        }

        // Shuffle options and track correct
        const correctText = q.options[0];
        for (let i = q.options.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
        }
        q.correct = q.options.indexOf(correctText);

        questions.push(q);
      });

      return questions.slice(0, 2);
    }

    function renderMiniQuizQuestion() {
      const container = document.getElementById('miniQuizContent');
      const q = mqQuestions[mqIndex];

      container.innerHTML = `
        <div class="mini-quiz-card">

    // ===== 퀴즈 문제 렌더링 =====
    function renderQuestion() {
      const q = currentQuiz[quizIndex];
      document.getElementById('quizProgress').textContent =
        `${quizIndex + 1} / ${currentQuiz.length}`;
      document.getElementById('quizQuestion').textContent =
        getLocalizedText(q, 'question') || q.question;

      const optionsDiv = document.getElementById('quizOptions');
      optionsDiv.innerHTML = '';

      const existingExplanation = document.getElementById('quizExplanation');
      if (existingExplanation) existingExplanation.remove();

      const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
      const options = (lang === 'en' && q.options_en) ? q.options_en
        : (lang === 'vi' && q.options_vn) ? q.options_vn
        : q.options;

      options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.addEventListener('click', () => handleAnswer(i, q.correct));
        optionsDiv.appendChild(btn);
      });

      document.getElementById('quizNextBtn').style.display = 'none';
    }

    function handleAnswer(selected, correct) {
      const options = document.querySelectorAll('.quiz-option');
      const q = currentQuiz[quizIndex];
      options.forEach((opt, i) => {
        opt.style.pointerEvents = 'none';
        if (i === correct) {
          opt.classList.add('correct');
        }
        if (i === selected && i !== correct) {
          opt.classList.add('wrong');
        }
      });

      if (selected === correct) {
        quizCorrect++;
      } else {
        // 오답 수집 (재도전 힌트용)

    // ===== 챕터 종합시험 =====
    var examQuestions = [], examAnswers = [], examCurrentIndex = 0, examLoading = false;

    function getExamResult(chId) { const _email = (JSON.parse(localStorage.getItem('sop_user') || '{}').email || 'demo'); try { return JSON.parse(localStorage.getItem('sop_exam_results_' + _email + '_' + chId) || 'null'); } catch(e) { return null; } }
    function saveExamResult(chId, r) { const _email = (JSON.parse(localStorage.getItem('sop_user') || '{}').email || 'demo'); localStorage.setItem('sop_exam_results_' + _email + '_' + chId, JSON.stringify(r)); }
    function calcGrade(s) { return s>=95?'S':s>=90?'A':s>=80?'B':s>=70?'C':s>=60?'D':'F'; }

    function extractKeywords(html) {
      if (!html) return [];
      var txt = html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');
      var words = txt.match(/[가-힣]{2,}|[a-zA-Z]{3,}/g) || [];
      var stop = {그리고:1,하고:1,에서:1,으로:1,부터:1,까지:1,이상:1,이하:1,대한:1,위해:1,통해:1,있습니다:1,합니다:1,됩니다:1,않습니다:1,the:1,and:1,for:1,are:1,with:1,that:1,this:1,from:1,will:1,have:1,been:1,your:1,all:1};
      var freq = {};
      words.forEach(function(w){ var lw=w.toLowerCase(); if(!stop[lw]) freq[lw]=(freq[lw]||0)+1; });
      return Object.keys(freq).sort(function(a,b){return freq[b]-freq[a];}).slice(0,40);
    }

    async function generateChapterExam(chId) {
      var sd = SopStore.getById(chId); if(!sd) return [];
      var ct = sd.content ? sd.content.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim() : '';
      var kws = extractKeywords(sd.content), eq = SopStore.getQuizzes(chId);
      try {
        var prov = CONFIG.AI && CONFIG.AI.quizProvider;
        if (prov && prov !== 'local' && typeof AI !== 'undefined' && AI._callLLM) {
          var p = '당신은 직원 교육 종합시험 출제 전문가입니다.\n\n아래 SOP 문서를 기반으로 종합시험 문제를 JSON 배열로 생성하세요.\n\n총 20문제:\n- 처음 15개: 객관식 (4지선다)\n  형식: { "type": "mc", "question": "문제", "options": ["A","B","C","D"], "correct": 정답인덱스(0~3), "explanation": "설명" }\n- 마지막 5개: 주관식 (단답형)\n  형식: { "type": "sa", "question": "문제", "keywords": ["핵심단어1","핵심단어2","핵심단어3"], "sampleAnswer": "모범답안" }\n\nSOP 제목: '+sd.title+'\nSOP 내용:\n'+ct.slice(0,3000)+'\n\n규칙:\n- SOP의 핵심 절차, 안전 수칙, 주의사항을 골고루 출제\n- 객관식 정답은 0~3 골고루 분포\n- 주관식 keywords는 채점 시 답에 포함되어야 할 핵심 단어 3~5개\n- JSON 배열만 출력';
          var res = await AI._callLLM(prov, p);
          var m = res.match(/\[[\s\S]*\]/);
          var arr = JSON.parse((m&&m[0])||'[]');
          if(arr.length>=15) return arr.slice(0,20);
        }
      } catch(e) { console.warn('AI exam fail, fallback:', e.message); }
      return generateFallbackExam(eq, ct, kws, sd.title);
    }

    function generateFallbackExam(eq, ct, kws, title) {
      var qs=[], sh=eq.slice().sort(function(){return Math.random()-0.5;});
      for(var i=0;i<15;i++){
        if(i<sh.length){
          var q=sh[i], opts=(q.options||[]).slice(), cTxt=opts[q.correct];
          var so=opts.slice().sort(function(){return Math.random()-0.5;}), nc=so.indexOf(cTxt);
          qs.push({type:'mc',question:getLocalizedText(q,'question')||q.question,options:so,correct:nc,explanation:q.explanation||''});
        } else {
          var ki=i%Math.max(kws.length,1), kw=kws[ki]||'SOP';
          var wp=kws.filter(function(k){return k!==kw;}), wo=[];
          while(wo.length<3&&wp.length>0){var ri=Math.floor(Math.random()*wp.length);wo.push(wp.splice(ri,1)[0]);}
          while(wo.length<3) wo.push('N/A');
          var ao=[kw].concat(wo).sort(function(){return Math.random()-0.5;});
          var qt=lang==='en'?'Which term is related to the correct procedure: "'+kw+'"?':lang==='vi'?'Thuat ngu nao lien quan den quy trinh dung: "'+kw+'"?':'이 SOP에서 올바른 절차와 관련된 용어는: "'+kw+'"?';
          qs.push({type:'mc',question:qt,options:ao,correct:ao.indexOf(kw),explanation:''});
        }
      }
      var st=lang==='en'?[
        function(t){return 'Describe the most important safety rules in "'+t+'" SOP.';},
        function(t){return 'Briefly describe the correct order of procedures in "'+t+'".';},
        function(t){return 'What is the proper response when an issue is found during "'+t+'"?';},
        function(t){return 'What must be checked before starting "'+t+'"?';},
        function(t){return 'Explain the key hygiene rules in "'+t+'" procedure.';}
      ]:lang==='vi'?[
        function(t){return 'Mo ta quy tac an toan quan trong nhat trong SOP "'+t+'".';},
        function(t){return 'Mo ta ngan gon thu tu dung cua quy trinh "'+t+'".';},
        function(t){return 'Phai xu ly the nao khi phat hien bat thuong trong "'+t+'"?';},
        function(t){return 'Can kiem tra gi truoc khi bat dau quy trinh "'+t+'"?';},
        function(t){return 'Giai thich cac quy tac ve sinh chinh trong "'+t+'".';}
      ]:[
        function(t){return '"'+t+'" SOP에서 가장 중요한 안전 수칙을 설명하세요.';},
        function(t){return t+' 절차의 올바른 순서를 간략히 서술하세요.';},
        function(t){return t+'에서 이상 발견 시 올바른 대처 방법은?';},
        function(t){return t+' 업무 시작 전 반드시 확인해야 할 사항을 적으세요.';},
        function(t){return t+' 절차에서 위생 관련 주요 규칙을 설명하세요.';}
      ];
      for(var j=0;j<5;j++){
        var rk=kws.slice(j*5,j*5+5); if(rk.length===0) rk=kws.slice(0,3); if(rk.length===0) rk=['SOP'];
        qs.push({type:'sa',question:st[j](title),keywords:rk,sampleAnswer:rk.join(', ')});
      }
      return qs;
    }

    // E7: 문항+보기 랜덤화 (correct 인덱스 같이 이동)
    function _shuffleExamQuestions(questions) {
      // 1) 전체 문항 순서 shuffle (Fisher-Yates)
      const arr = questions.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      // 2) 각 문항의 options 셔플 + correct 재매핑 (객관식만)
      return arr.map(q => {
        if (q.type !== 'mc' || !Array.isArray(q.options) || q.options.length < 2) return q;
        const opts = q.options.map((opt, idx) => ({ opt, origIdx: idx }));
        for (let i = opts.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.origIdx === q.correct);
        return { ...q, options: opts.map(o => o.opt), correct: newCorrect >= 0 ? newCorrect : 0 };
      });
    }

    // E4: 60분 카운트다운 타이머 (자동 제출)
    var _examTimerId = null;
    var _examEndTime = 0;
    function _startExamTimer(minutes) {
      const el = document.getElementById('examTimer');
      if (!el) return;
      _examEndTime = Date.now() + minutes * 60 * 1000;
      el.style.display = 'inline-block';
      const tick = () => {
        const remainMs = _examEndTime - Date.now();
        if (remainMs <= 0) {
          el.textContent = '⏱ 00:00';
          el.style.background = 'rgba(239,68,68,0.2)';
          el.style.color = '#ef4444';
          clearInterval(_examTimerId); _examTimerId = null;
          // 자동 제출
          if (typeof submitExam === 'function' && document.getElementById('chapterExamView')?.style.display !== 'none') {
            alert(lang==='en'?'Time is up. Exam auto-submitted.':lang==='vi'?'Hết giờ. Bài thi tự động nộp.':'시간 종료 — 시험이 자동 제출됩니다.');
            submitExam();
          }
          return;
        }
        const m = Math.floor(remainMs / 60000);
        const s = Math.floor((remainMs % 60000) / 1000);
        el.textContent = `⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        // 5분 남으면 경고 색상
        if (remainMs < 5 * 60 * 1000) {
          el.style.background = 'rgba(245,158,11,0.2)';
          el.style.color = '#f59e0b';
        }
      };
      tick();
      _examTimerId = setInterval(tick, 1000);
    }
    function _stopExamTimer() {
      if (_examTimerId) { clearInterval(_examTimerId); _examTimerId = null; }
      const el = document.getElementById('examTimer');
      if (el) el.style.display = 'none';

      }
      toast.remove(); examLoading=false;
      // E7: 랜덤화 적용
      examQuestions = _shuffleExamQuestions(examQuestions);
      examAnswers=new Array(examQuestions.length).fill(null); examCurrentIndex=0;
      document.getElementById('examTitle').textContent=t.examTitle;
      document.getElementById('examPrevBtn').textContent=t.examPrev;

      // E4: 60분 타이머 시작

    function renderExamQuestion(idx) {
      examCurrentIndex=idx; var q=examQuestions[idx]; if(!q) return;
      document.getElementById('examCounter').textContent=(idx+1)+' / '+examQuestions.length;
      var ans=examAnswers.filter(function(a){return a!==null;}).length;
      document.getElementById('examProgressFill').style.width=Math.round((ans/examQuestions.length)*100)+'%';

      var dd=document.getElementById('examDots'); dd.innerHTML='';
      for(var di=0;di<examQuestions.length;di++){(function(i){
        var d=document.createElement('span');
        d.className='dot'+(examAnswers[i]!==null?' answered':'')+(i===idx?' current':'');
        d.textContent=i+1; d.onclick=function(){renderExamQuestion(i);}; dd.appendChild(d);
      })(di);}

      var bg=document.getElementById('examTypeBadge');
      if(q.type==='mc'){bg.className='exam-type-badge mc';bg.textContent=t.examMC;}
      else{bg.className='exam-type-badge sa';bg.textContent=t.examSA;}

      var ar=document.getElementById('examOptionsArea'); ar.innerHTML='';

        for(var oi=0;oi<q.options.length;oi++){(function(oidx){
          var b=document.createElement('button');
          b.className='exam-option'+(examAnswers[idx]===oidx?' selected':'');
          b.textContent=q.options[oidx];
          b.onclick=function(){examAnswers[idx]=oidx;renderExamQuestion(idx);};
          ar.appendChild(b);
        })(oi);}
      } else {
        var ta=document.createElement('textarea'); ta.className='exam-sa-input';
        ta.placeholder=lang==='en'?'Type your answer here...':lang==='vi'?'Nhap cau tra loi o day...':'답변을 입력하세요...';
        ta.value=examAnswers[idx]||'';
        ta.oninput=function(){examAnswers[idx]=ta.value.trim()||null; updateExamDots(); updateExamProgress();};
        ar.appendChild(ta);
      }

      document.getElementById('examPrevBtn').disabled=(idx===0);
      var nb=document.getElementById('examNextBtn');

      else{nb.className='btn-next';nb.textContent=t.examNext;nb.onclick=function(){examNavigate(1);};}

    function updateExamDots(){
      var ds=document.querySelectorAll('.exam-question-dots .dot');
      for(var i=0;i<ds.length;i++) ds[i].className='dot'+(examAnswers[i]!==null?' answered':'')+(i===examCurrentIndex?' current':'');
    }
    function updateExamProgress(){
      var a=examAnswers.filter(function(x){return x!==null;}).length;
      document.getElementById('examProgressFill').style.width=Math.round((a/examQuestions.length)*100)+'%';
    }
    function examNavigate(dir){var ni=examCurrentIndex+dir;if(ni>=0&&ni<examQuestions.length)renderExamQuestion(ni);}

    function submitExam(){
      var un=examAnswers.filter(function(a){return a===null;}).length;
      if(un>0&&!confirm(t.examConfirmSubmit)) return;
      _stopExamTimer(); // E4: 제출 시 타이머 정지
      var mcC=0,mcT=0,saS=0,saT=0;
      var da=examQuestions.map(function(q,i){
        var ua=examAnswers[i];
        if(q.type==='mc'){
          mcT++;var ic=ua===q.correct;if(ic)mcC++;
          return{index:i,type:'mc',question:q.question,userAnswer:ua!==null?q.options[ua]:null,correctAnswer:q.options[q.correct],isCorrect:ic,explanation:q.explanation||''};
        }else{
          saT++;var kw=q.keywords||[],mt=0;
          if(ua&&typeof ua==='string'&&ua.length>0){var al=ua.toLowerCase();kw.forEach(function(k){if(al.includes(k.toLowerCase()))mt++;});}
          var ks=kw.length>0?Math.round((mt/kw.length)*100):0; saS+=ks;
          return{index:i,type:'sa',question:q.question,userAnswer:ua||'',keywords:kw,matchedKeywords:mt,totalKeywords:kw.length,score:ks,sampleAnswer:q.sampleAnswer||kw.join(', '),isCorrect:ks>=60};
        }
      });
      var mp=mcT>0?Math.round((mcC/mcT)*100):0, sp=saT>0?Math.round(saS/saT):0;
      var os;
      if(saT===0) os=mp;
      else if(mcT===0) os=sp;
      else os=Math.round(mp*0.7+sp*0.3);
      var gr=calcGrade(os);
      saveExamResult(chapterId,{score:os,mcScore:mp,saScore:sp,answers:da,completedAt:new Date().toISOString(),grade:gr});
      showExamResults(os,mp,sp,gr,da);
    }

    function showExamResults(score,mcPct,saPct,grade,answers){
      var be=document.getElementById('examGradeBadge');be.textContent=grade;be.className='grade-badge grade-'+grade;
      var ep=grade!=='F';
      document.getElementById('examResultTitle').textContent=ep?t.examPassed:t.examFailed;
      document.getElementById('examResultScore').textContent=t.examOverallScore+': '+score+'%';
      document.getElementById('examResultGradeText').textContent=t.examGradeText(grade);
      document.getElementById('examMCLabel').textContent=t.examMC;
      document.getElementById('examSALabel').textContent=t.examSA;
      document.getElementById('examMCScore').textContent=mcPct+'%';
      document.getElementById('examSAScore').textContent=saPct+'%';

      var wd=document.getElementById('examWrongList');
      var wa=answers.filter(function(a){return!a.isCorrect;});
      if(wa.length>0){
        var h='<h4 style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--gray-700);">'+t.examWrongTitle+' ('+wa.length+')</h4>';
        wa.forEach(function(a){
          if(a.type==='mc') h+='<div class="exam-wrong-item"><div class="q-num">Q'+(a.index+1)+' &middot; '+t.examMC+'</div><div class="q-text">'+a.question+'</div><div class="q-yours">'+t.examYourAnswer+': '+(a.userAnswer||t.examNoAnswer)+'</div><div class="q-answer">'+t.examCorrectAnswer+': '+a.correctAnswer+'</div></div>';
          else h+='<div class="exam-wrong-item"><div class="q-num">Q'+(a.index+1)+' &middot; '+t.examSA+' ('+a.score+'%)</div><div class="q-text">'+a.question+'</div><div class="q-yours">'+t.examYourAnswer+': '+(a.userAnswer||t.examNoAnswer)+'</div><div class="q-answer">'+t.examKeywords+': '+a.keywords.join(', ')+'</div></div>';
        });
        wd.innerHTML=h;
      } else {
        wd.innerHTML='<p style="color:var(--success);font-weight:600;">&#127881; '+(lang==='en'?'Perfect score!':lang==='vi'?'Diem tuyet doi!':'만점입니다!')+'</p>';
      }
      document.getElementById('examResultBackBtn').textContent=t.examBackToList;
      document.getElementById('examResultBackBtn').onclick=function(){showView('videoListView');renderVideoList();};
      var rb=document.getElementById('examRetryBtn');
      if(!ep){rb.style.display='block';rb.textContent=t.examRetry;rb.onclick=function(){startChapterExam();};}
      else rb.style.display='none';

      // 다음 챕터 버튼 (종합시험 뷰)
      var enb=document.getElementById('examNextChapterBtn');
      if(!enb){enb=document.createElement('div');enb.id='examNextChapterBtn';document.getElementById('examResultView').appendChild(enb);}
      enb.innerHTML=renderNextChapterBtn();
      enb.style.display='block';

      showView('examResultView');
    }

    // ===== 챕터 종합시험 (대챕터 exam_quizzes 20문제, E2) =====
    function _startChapterFinalExam(examQs, chapterInfo) {
      // 기존 exam 인프라 재활용 — 모든 문항을 객관식으로 통일 (E3 제외)
      examQuestions = examQs.map(q => ({
        type: 'mc',
        question: (lang === 'en' ? q.question_en : lang === 'vi' ? q.question_vn : q.question) || q.question,
        options: (lang === 'en' ? q.options_en : lang === 'vi' ? q.options_vn : q.options) || q.options || [],
        correct: q.correct,
        explanation: q.explanation || '',
      }));
      // E7: 랜덤화
      examQuestions = _shuffleExamQuestions(examQuestions);
      examAnswers = new Array(examQuestions.length).fill(null);
      examCurrentIndex = 0;

      const title = (lang === 'en' ? 'Final Exam: ' : lang === 'vi' ? 'Thi tổng hợp: ' : '종합시험: ') + getLocalizedText(chapterInfo, 'title');
      document.getElementById('examTitle').textContent = title;
      document.getElementById('examPrevBtn').textContent = t.examPrev;
      showView('chapterExamView');
      renderExamQuestion(0);
      // E4: 60분 타이머
      var mins = (typeof CONFIG !== 'undefined' && CONFIG.CHAPTER_EXAM_MINUTES) || 60;
      _startExamTimer(mins);
    }

    // ===== 초기 렌더링 =====
    if (chapter && !isExamMode) {
      renderVideoList();

      // Auto-resume: scroll to last watched video
      const lastVideo = localStorage.getItem('sop_last_video_' + chapterId);
      if (lastVideo) {
        const items = document.querySelectorAll('.video-item');
        const idx = videos.findIndex(v => v.id === lastVideo);
        if (idx >= 0 && items[idx]) {
          items[idx].style.boxShadow = '0 0 0 2px var(--primary)';
          items[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
    }
  </script>
