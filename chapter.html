<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - 챕터</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="assets/icon-192.svg">
  <style>
    .video-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: white;
      border-radius: var(--radius);
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .video-item:hover { transform: translateY(-1px); }
    .video-item.completed { border-left: 3px solid var(--success); }

    .video-thumb {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--primary-light);
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; flex-shrink: 0;
    }
    .video-item.completed .video-thumb {
      background: #dcfce7; color: var(--success);
    }

    .video-info { flex: 1; }
    .video-info h4 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .video-info p { font-size: 13px; color: var(--gray-500); }

    .video-player-wrapper {
      position: relative;
      width: 100%; padding-top: 56.25%;
      background: #000; border-radius: var(--radius);
      overflow: hidden; margin-bottom: 16px;
    }
    .video-player-wrapper iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: none;
    }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--gray-500); text-decoration: none; font-size: 14px;
      padding: 8px 0;
    }

    .quiz-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid var(--gray-200);
    }

    .chapter-test-banner {
      background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
      color: white; border-radius: var(--radius);
      padding: 24px; text-align: center; margin-top: 20px;
    }
    .chapter-test-banner h3 { font-size: 18px; margin-bottom: 8px; }
    .chapter-test-banner p { font-size: 14px; opacity: 0.9; margin-bottom: 16px; }
    .chapter-test-banner button {
      background: white; color: var(--primary);
      border: none; border-radius: 8px;
      padding: 12px 32px; font-size: 16px; font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="bottom-nav">
    <a href="app.html">
      <span class="nav-icon">&#127968;</span> 홈
    </a>
    <a href="ai-chat.html">
      <span class="nav-icon">&#129302;</span> AI 질문
    </a>
    <a href="my-results.html">
      <span class="nav-icon">&#127942;</span> 내 결과
    </a>
  </div>

  <div class="app-container">

    <!-- ===== 1. 비디오 목록 뷰 ===== -->
    <div id="videoListView">
      <a href="app.html" class="back-btn">&#8592; 홈으로</a>

      <h2 style="margin-bottom:4px;" id="chapterTitle">챕터</h2>
      <p style="color:var(--gray-500); font-size:14px; margin-bottom:20px;" id="chapterDesc">
        동영상을 순서대로 시청하고 퀴즈를 풀어주세요
      </p>

      <!-- 진행률 카드 -->
      <div class="card" style="margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
          <span style="font-size:14px; font-weight:600;">비디오 진행률</span>
          <span style="font-size:14px; color:var(--gray-500);" id="videoProgressText">0/0</span>
        </div>
        <div class="progress-bar">
          <div class="fill" id="videoProgressBar" style="width:0%"></div>
        </div>
      </div>

      <div id="videoList"></div>

      <!-- 챕터 테스트 영역 -->
      <div id="chapterTestArea"></div>
    </div>

    <!-- ===== 2. 비디오/나레이션 플레이어 뷰 ===== -->
    <div id="videoPlayerView" style="display:none;">
      <a href="#" class="back-btn" id="backToListBtn">&#8592; 목록으로</a>

      <h3 id="videoTitle" style="margin-bottom:12px;">영상 제목</h3>

      <!-- 비디오 영역 (URL 있을 때) -->
      <div class="video-player-wrapper" id="videoWrapper" style="display:none;">
        <iframe id="videoPlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>

      <!-- 나레이션 텍스트 (비디오 URL 없을 때 — AI 생성 스크립트 표시) -->
      <div id="narrationCard" class="card" style="display:none;">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
          <span style="font-size:20px;">&#127908;</span>
          <span style="font-size:13px; color:var(--primary); font-weight:600;">AI 생성 스크립트</span>
        </div>
        <p id="narrationText" style="font-size:16px; line-height:1.8; color:var(--gray-900);"></p>
        <div id="visualNote" style="margin-top:12px; padding:10px; background:var(--gray-50); border-radius:8px; font-size:13px; color:var(--gray-500); font-style:italic;"></div>
      </div>

      <div class="card" style="text-align:center;">
        <p style="color:var(--gray-500); font-size:14px; margin-bottom:12px;">
          내용을 읽은 후 아래 버튼을 눌러주세요
        </p>
        <button class="btn btn-success" style="width:100%;" id="completeVideoBtn">
          &#9989; 학습 완료
        </button>
      </div>
    </div>

    <!-- ===== 3. 퀴즈 뷰 ===== -->
    <div id="quizView" style="display:none;">
      <div class="quiz-header">
        <span id="quizLabel" style="font-size:14px; font-weight:600; color:var(--primary);">비디오 퀴즈</span>
        <span style="font-size:14px; color:var(--gray-500);" id="quizProgress">1/3</span>
      </div>

      <p class="quiz-question" id="quizQuestion"></p>

      <div id="quizOptions"></div>

      <button class="btn btn-primary" id="quizNextBtn" style="margin-top:16px; display:none;">
        다음 문제
      </button>
    </div>

    <!-- ===== 4. 결과 뷰 ===== -->
    <div id="resultView" style="display:none; text-align:center; padding:40px 0;">
      <div class="result-circle" id="resultCircle">
        <span id="resultScore">0%</span>
      </div>
      <h2 id="resultTitle" style="margin-bottom:8px;"></h2>
      <p style="color:var(--gray-500); margin-bottom:8px;" id="resultMsg"></p>
      <p style="color:var(--gray-500); font-size:13px; margin-bottom:24px;" id="resultDetail"></p>
      <button class="btn btn-primary" id="resultBackBtn">목록으로 돌아가기</button>
      <button class="btn btn-outline" id="resultRetryBtn" style="margin-top:8px; width:100%; display:none;">
        다시 도전하기
      </button>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ai-provider.js"></script>
  <script src="js/sop-content-kids.js"></script>
  <script src="js/demo-data.js"></script>
  <script>
    // ===== 로그인 확인 =====
    const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
    if (!user) { window.location.href = 'index.html'; }

    // ===== URL에서 챕터(SOP) ID 가져오기 =====
    const params = new URLSearchParams(window.location.search);
    const chapterId = params.get('id');
    const sop = SopStore.getById(chapterId);
    const chapter = sop ? { id: sop.id, title: sop.title, title_en: sop.title_en, title_vn: sop.title_vn } : null;
    const videos = SopStore.getVideos(chapterId);
    const chapterQuizzes = SopStore.getQuizzes(chapterId);

    if (!chapter) {
      alert('챕터를 찾을 수 없습니다.');
      window.location.href = 'app.html';
    }

    // ===== 상태 변수 =====
    let currentVideoId = null;
    let currentQuiz = [];
    let quizIndex = 0;
    let quizCorrect = 0;
    let isChapterTest = false;

    // ===== 뷰 전환 =====
    function showView(viewId) {
      ['videoListView', 'videoPlayerView', 'quizView', 'resultView'].forEach(id => {
        document.getElementById(id).style.display = id === viewId ? 'block' : 'none';
      });
      window.scrollTo(0, 0);
    }

    // ===== 비디오 목록 렌더링 =====
    function renderVideoList() {
      document.getElementById('chapterTitle').textContent = getLocalizedText(chapter, 'title');

      const container = document.getElementById('videoList');
      container.innerHTML = '';

      let completedCount = 0;

      videos.forEach((video, i) => {
        const completed = Progress.isVideoCompleted(video.id);
        if (completed) completedCount++;

        // 나레이션 미리보기 (처음 40자)
        const preview = (video.title_full || video.title || '').slice(0, 50);
        container.innerHTML += `
          <div class="video-item ${completed ? 'completed' : ''}" onclick="openVideo('${video.id}')">
            <div class="video-thumb">${completed ? '&#10003;' : (i + 1)}</div>
            <div class="video-info">
              <h4>씬 ${i + 1}</h4>
              <p style="color:var(--gray-500); font-size:13px;">${preview}...</p>
            </div>
            <span style="color:${completed ? 'var(--success)' : 'var(--gray-300)'}; font-size:18px;">
              ${completed ? '&#9989;' : '&#9654;'}
            </span>
          </div>
        `;
      });

      // 진행률
      const pct = videos.length > 0 ? Math.round((completedCount / videos.length) * 100) : 0;
      document.getElementById('videoProgressText').textContent = `${completedCount}/${videos.length} 완료`;
      document.getElementById('videoProgressBar').style.width = pct + '%';
      if (pct >= 100) document.getElementById('videoProgressBar').classList.add('success');

      // 챕터 테스트 영역
      renderChapterTestArea(completedCount >= videos.length);
    }

    function renderChapterTestArea(allComplete) {
      const area = document.getElementById('chapterTestArea');
      const passed = Progress.isChapterPassed(chapterId);
      const result = Progress.getAllResults().chapterResults[chapterId];

      if (passed) {
        area.innerHTML = `
          <div class="card" style="text-align:center; border: 2px solid var(--success); margin-top:20px;">
            <span style="font-size:40px;">&#127942;</span>
            <h3 style="color:var(--success); margin:8px 0 4px;">챕터 테스트 통과!</h3>
            <p style="color:var(--gray-500);">점수: ${result?.score || 0}점</p>
          </div>
        `;
      } else if (allComplete) {
        area.innerHTML = `
          <div class="chapter-test-banner">
            <h3>&#128221; 모든 영상을 시청했습니다!</h3>
            <p>챕터 테스트를 통과하면 다음 챕터가 열립니다<br>합격 기준: ${CONFIG.CHAPTER_PASS_SCORE}점 이상</p>
            <button onclick="startChapterTest()">챕터 테스트 시작</button>
          </div>
        `;
      } else {
        area.innerHTML = `
          <div class="card" style="text-align:center; opacity:0.5; margin-top:20px;">
            <span style="font-size:24px;">&#128274;</span>
            <p style="margin-top:8px; font-size:14px; color:var(--gray-500);">
              모든 영상을 시청하면 챕터 테스트를 풀 수 있습니다
            </p>
          </div>
        `;
      }
    }

    // ===== 비디오 열기 =====
    function openVideo(videoId) {
      currentVideoId = videoId;
      const video = videos.find(v => v.id === videoId);
      if (!video) return;

      document.getElementById('videoTitle').textContent = `씬 ${video.order_num}`;

      const hasVideo = video.video_url && video.video_url.startsWith('http');

      if (hasVideo) {
        document.getElementById('videoWrapper').style.display = 'block';
        document.getElementById('narrationCard').style.display = 'none';
        document.getElementById('videoPlayer').src = video.video_url;
      } else {
        // 비디오 없으면 나레이션 텍스트 표시
        document.getElementById('videoWrapper').style.display = 'none';
        document.getElementById('narrationCard').style.display = 'block';
        document.getElementById('narrationText').textContent = video.title_full || video.title;
        document.getElementById('visualNote').textContent = video.visual ? '영상 가이드: ' + video.visual : '';
      }

      document.getElementById('completeVideoBtn').textContent = '✅ 학습 완료';

      showView('videoPlayerView');
    }

    // 목록으로 돌아가기
    document.getElementById('backToListBtn').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('videoPlayer').src = '';
      showView('videoListView');
    });

    // ===== 시청 완료 =====
    document.getElementById('completeVideoBtn').addEventListener('click', () => {
      Progress.completeVideo(currentVideoId);
      document.getElementById('videoPlayer').src = '';
      showView('videoListView');
      renderVideoList();
    });

    // ===== 챕터 퀴즈 시작 (SOP에서 생성된 퀴즈) =====
    function startChapterTest() {
      if (!chapterQuizzes || chapterQuizzes.length === 0) {
        // 퀴즈가 없으면 바로 통과
        Progress.saveChapterResult(chapterId, 100, true);
        renderVideoList();
        return;
      }

      isChapterTest = true;
      currentQuiz = chapterQuizzes;
      quizIndex = 0;
      quizCorrect = 0;
      document.getElementById('quizLabel').textContent =
        `챕터 퀴즈 — ${getLocalizedText(chapter, 'title')}`;
      showView('quizView');
      renderQuestion();
    }

    // ===== 퀴즈 문제 렌더링 =====
    function renderQuestion() {
      const q = currentQuiz[quizIndex];
      document.getElementById('quizProgress').textContent =
        `${quizIndex + 1} / ${currentQuiz.length}`;
      document.getElementById('quizQuestion').textContent =
        getLocalizedText(q, 'question') || q.question;

      const optionsDiv = document.getElementById('quizOptions');
      optionsDiv.innerHTML = '';

      const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
      const options = (lang === 'en' && q.options_en) ? q.options_en
        : (lang === 'vi' && q.options_vn) ? q.options_vn
        : q.options;

      options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.addEventListener('click', () => handleAnswer(i, q.correct, options.length));
        optionsDiv.appendChild(btn);
      });

      document.getElementById('quizNextBtn').style.display = 'none';
    }

    function handleAnswer(selected, correct) {
      const options = document.querySelectorAll('.quiz-option');
      options.forEach((opt, i) => {
        // 클릭 비활성화
        opt.style.pointerEvents = 'none';
        if (i === correct) {
          opt.classList.add('correct');
        }
        if (i === selected && i !== correct) {
          opt.classList.add('wrong');
        }
      });

      if (selected === correct) quizCorrect++;

      const nextBtn = document.getElementById('quizNextBtn');
      nextBtn.style.display = 'block';
      nextBtn.textContent = quizIndex < currentQuiz.length - 1 ? '다음 문제 →' : '결과 보기';
    }

    // 다음 문제 / 결과
    document.getElementById('quizNextBtn').addEventListener('click', () => {
      quizIndex++;
      if (quizIndex < currentQuiz.length) {
        renderQuestion();
      } else {
        showResult();
      }
    });

    // ===== 결과 표시 =====
    function showResult() {
      const score = Math.round((quizCorrect / currentQuiz.length) * 100);
      const passScore = isChapterTest ? CONFIG.CHAPTER_PASS_SCORE : CONFIG.QUIZ_PASS_SCORE;
      const passed = score >= passScore;

      // 결과 저장
      if (isChapterTest) {
        Progress.saveChapterResult(chapterId, score, passed);
      } else {
        Progress.completeVideo(currentVideoId);
        Progress.saveQuizScore(currentVideoId, score);
      }

      // UI 업데이트
      const circle = document.getElementById('resultCircle');
      circle.className = 'result-circle ' + (passed ? 'pass' : 'fail');
      document.getElementById('resultScore').textContent = score + '%';

      if (isChapterTest && passed) {
        document.getElementById('resultTitle').textContent = '🎉 챕터 테스트 통과!';
        document.getElementById('resultMsg').textContent = '다음 챕터가 열렸습니다';
      } else if (passed) {
        document.getElementById('resultTitle').textContent = '잘 했어요!';
        document.getElementById('resultMsg').textContent = '퀴즈를 통과했습니다';
      } else {
        document.getElementById('resultTitle').textContent = '아쉬워요 😔';
        document.getElementById('resultMsg').textContent = `${passScore}% 이상이어야 통과합니다`;
      }

      document.getElementById('resultDetail').textContent =
        `${currentQuiz.length}문제 중 ${quizCorrect}개 정답 (${score}점)`;

      // 재도전 버튼
      const retryBtn = document.getElementById('resultRetryBtn');
      retryBtn.style.display = (!passed && isChapterTest) ? 'block' : 'none';

      showView('resultView');
    }

    // 결과에서 돌아가기
    document.getElementById('resultBackBtn').addEventListener('click', () => {
      showView('videoListView');
      renderVideoList();
    });

    // 재도전
    document.getElementById('resultRetryBtn').addEventListener('click', () => {
      startChapterTest();
    });

    // ===== 초기 렌더링 =====
    renderVideoList();
  </script>

</body>
</html>
