<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - 직원 가입</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link rel="icon" href="assets/icon-192.svg">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">📋</div>
      <h1 id="regPageTitle">직원 가입</h1>
      <p class="subtitle" id="inviteInfo"></p>

      <div id="errorMsg" class="alert alert-error" style="display:none;"></div>

      <form id="registerForm" style="display:none;">
        <div class="form-group">
          <label for="regName" id="labelName">이름</label>
          <input type="text" id="regName" placeholder="" required>
        </div>
        <div class="form-group">
          <label for="regEmail" id="labelEmail">이메일</label>
          <input type="email" id="regEmail" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
          <label for="regPassword" id="labelPassword">비밀번호</label>
          <input type="password" id="regPassword" placeholder="" required minlength="4">
        </div>

        <!-- 초대 모드: readonly 지점 -->
        <div class="form-group" id="branchGroupReadonly" style="display:none;">
          <label id="labelBranch">지점</label>
          <input type="text" id="regBranch" readonly style="background:var(--gray-50);color:var(--gray-700);">
        </div>

        <!-- 자유 가입: 지점 선택 드롭다운 -->
        <div class="form-group" id="branchGroupSelect" style="display:none;">
          <label id="labelBranchSelect">지점</label>
          <select id="regBranchSelect" style="padding:10px;border:1px solid rgba(148,163,184,0.12);border-radius:8px;font-size:14px;width:100%;background:rgba(30,41,59,0.85);color:#F1F5F9;">
          </select>
        </div>

        <!-- 팀 선택 -->
        <div class="form-group" id="teamGroup" style="display:none;">
          <label id="labelTeam">팀</label>
          <select id="regTeam" style="padding:10px;border:1px solid rgba(148,163,184,0.12);border-radius:8px;font-size:14px;width:100%;background:rgba(30,41,59,0.85);color:#F1F5F9;">
          </select>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">가입하기</button>
      </form>

      <div id="invalidMsg" style="display:none; text-align:center; padding:20px;">
        <p style="font-size:48px; margin-bottom:12px;">🚫</p>
        <p style="font-size:16px; font-weight:600; margin-bottom:8px;" id="invalidTitle">유효하지 않은 초대 링크입니다</p>
        <p style="font-size:14px; color:var(--gray-500);" id="invalidDesc">관리자에게 새 초대 링크를 요청하세요</p>
        <div style="margin-top:16px; padding:14px; background:rgba(59,130,246,0.08); border:1px solid rgba(59,130,246,0.2); border-radius:10px; text-align:left;">
          <p style="font-size:13px; font-weight:600; color:#3B82F6; margin-bottom:6px;" id="invalidHelpTitle">🆘 도움이 필요하세요?</p>
          <p style="font-size:13px; color:var(--gray-400); line-height:1.6;" id="invalidHelp">1. 관리자에게 카카오톡/슬랙으로 연락<br>2. 새 초대 링크 요청<br>3. 링크 클릭 시 <strong>전체 복사-붙여넣기</strong> 확인 (잘림 방지)</p>
        </div>
        <div style="display:flex; gap:8px; margin-top:16px;">
          <a href="index.html" class="btn btn-outline" style="flex:1; display:inline-block;" id="goLoginBtn">로그인 페이지</a>
          <button onclick="location.reload()" class="btn btn-primary" style="flex:1;" id="retryBtn">🔄 다시 시도</button>
        </div>
      </div>

      <div id="successMsg" style="display:none; text-align:center; padding:20px;">
        <p style="font-size:48px; margin-bottom:12px;">🎉</p>
        <p style="font-size:16px; font-weight:600; margin-bottom:8px;" id="successTitle">가입이 완료되었습니다!</p>
        <p style="font-size:14px; color:var(--gray-500);" id="successDesc">로그인하여 교육을 시작하세요</p>
        <a href="index.html" class="btn btn-primary" style="margin-top:16px; display:inline-block; padding:12px 32px;" id="loginBtn">로그인 하기</a>
      </div>

      <div style="text-align:center; margin-top:24px;">
        <a href="index.html" style="color:var(--gray-500); font-size:13px; text-decoration:none;" id="alreadyHaveAccount">이미 계정이 있나요? 로그인</a>
      </div>

      <!-- 언어 전환 -->
      <div style="text-align:center; margin-top:16px;">
        <button onclick="switchLang('ko')" class="btn btn-outline" style="padding:6px 14px; font-size:12px;">한국어</button>
        <button onclick="switchLang('en')" class="btn btn-outline" style="padding:6px 14px; font-size:12px;">English</button>
        <button onclick="switchLang('vi')" class="btn btn-outline" style="padding:6px 14px; font-size:12px;">Tiếng Việt</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/demo-data.js"></script>
  <script src="js/pwa-install.js" defer></script>
  <script>
    // ===== 다국어 텍스트 =====
    const T = {
      ko: {
        pageTitle: '직원 가입', checkingInvite: '확인 중...',
        freeRegistration: '직원 가입',
        staffRegistration: (branch) => `${branch} 직원 가입`,
        name: '이름', namePlaceholder: '홍길동',
        email: '이메일', password: '비밀번호', passwordPlaceholder: '4자리 이상',
        branch: '지점', selectBranch: '지점을 선택하세요', submit: '가입하기',
        invalidInvite: '유효하지 않은 초대 링크입니다',
        invalidDesc: '관리자에게 새 초대 링크를 요청하세요',
        goLogin: '로그인 페이지로',
        successTitle: '가입이 완료되었습니다!',
        successDesc: '로그인하여 교육을 시작하세요',
        loginBtn: '로그인 하기',
        alreadyHaveAccount: '이미 계정이 있나요? 로그인',
        team: '팀', selectTeam: '팀을 선택하세요',
        fillAllFields: '모든 필드를 올바르게 입력하세요',
        emailExists: '이미 등록된 이메일입니다',
        expired: '초대 코드가 만료되었습니다',
        selectTeamRequired: '팀을 선택해주세요',
        selectBranchRequired: '지점을 선택해주세요',
        networkError: '가입에 실패했습니다. 다시 시도해주세요.',
      },
      en: {
        pageTitle: 'Staff Registration', checkingInvite: 'Loading...',
        freeRegistration: 'Staff Registration',
        staffRegistration: (branch) => `${branch} — Staff Registration`,
        name: 'Name', namePlaceholder: 'John Doe',
        email: 'Email', password: 'Password', passwordPlaceholder: 'At least 4 characters',
        branch: 'Branch', selectBranch: 'Select your branch', team: 'Team', selectTeam: 'Select your team', submit: 'Register',
        invalidInvite: 'Invalid invitation link',
        selectTeamRequired: 'Please select a team',
        selectBranchRequired: 'Please select a branch',
        invalidDesc: 'Please request a new invitation link from your admin',
        goLogin: 'Go to Login',
        successTitle: 'Registration complete!',
        successDesc: 'Log in to start your training',
        loginBtn: 'Log In',
        alreadyHaveAccount: 'Already have an account? Log in',
        fillAllFields: 'Please fill in all fields correctly',
        emailExists: 'This email is already registered',
        expired: 'Invitation code has expired',
        networkError: 'Registration failed. Please try again.',
      },
      vi: {
        pageTitle: 'Đăng ký nhân viên', checkingInvite: 'Đang tải...',
        freeRegistration: 'Đăng ký nhân viên',
        staffRegistration: (branch) => `Đăng ký nhân viên ${branch}`,
        name: 'Họ tên', namePlaceholder: 'Nguyễn Văn A',
        email: 'Email', password: 'Mật khẩu', passwordPlaceholder: 'Ít nhất 4 ký tự',
        branch: 'Chi nhánh', selectBranch: 'Chọn chi nhánh', team: 'Nhóm', selectTeam: 'Chọn nhóm của bạn', submit: 'Đăng ký',
        invalidInvite: 'Liên kết mời không hợp lệ',
        selectTeamRequired: 'Vui lòng chọn nhóm',
        selectBranchRequired: 'Vui lòng chọn chi nhánh',
        invalidDesc: 'Vui lòng yêu cầu quản trị viên gửi liên kết mời mới',
        goLogin: 'Đến trang đăng nhập',
        successTitle: 'Đăng ký thành công!',
        successDesc: 'Đăng nhập để bắt đầu đào tạo',
        loginBtn: 'Đăng nhập',
        alreadyHaveAccount: 'Đã có tài khoản? Đăng nhập',
        fillAllFields: 'Vui lòng điền đầy đủ thông tin',
        emailExists: 'Email này đã được đăng ký',
        expired: 'Mã mời đã hết hạn',
        networkError: 'Đăng ký thất bại. Vui lòng thử lại.',
      }
    };
    const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
    const t = T[lang] || T.ko;

    // Apply static labels
    document.getElementById('regPageTitle').textContent = t.pageTitle;
    document.getElementById('inviteInfo').textContent = t.checkingInvite;
    document.getElementById('labelName').textContent = t.name;
    document.getElementById('regName').placeholder = t.namePlaceholder;
    document.getElementById('labelEmail').textContent = t.email;
    document.getElementById('labelPassword').textContent = t.password;
    document.getElementById('regPassword').placeholder = t.passwordPlaceholder;
    document.getElementById('labelBranch').textContent = t.branch;
    document.getElementById('submitBtn').textContent = t.submit;
    document.getElementById('invalidTitle').textContent = t.invalidInvite;
    document.getElementById('invalidDesc').textContent = t.invalidDesc;
    document.getElementById('goLoginBtn').textContent = t.goLogin;
    document.getElementById('successTitle').textContent = t.successTitle;
    document.getElementById('successDesc').textContent = t.successDesc;
    document.getElementById('loginBtn').textContent = t.loginBtn;
    document.getElementById('alreadyHaveAccount').textContent = t.alreadyHaveAccount;

    const urlParams = new URLSearchParams(window.location.search);
    const inviteCode = urlParams.get('code');
    let currentInvite = null;
    let freeMode = false;
    let _branchTeams = {}; // 전역 보관용

    // ===== Supabase에서 지점/팀 데이터 직접 가져오기 =====
    async function fetchBranchTeamsFromDB() {
      const result = {};

      if (!SupabaseMode._ready) return result;

      // 1) branch_teams 테이블
      try {
        const { data, error } = await SupabaseMode.client
          .from('branch_teams')
          .select('*')
          .order('created_at');
        if (error) console.warn('[Register] branch_teams 에러:', error.message);
        if (data && data.length > 0) {
          data.forEach(row => {
            if (!result[row.branch]) result[row.branch] = [];
            if (row.team && !result[row.branch].includes(row.team)) {
              result[row.branch].push(row.team);
            }
          });
          return result;
        }
      } catch(e) { console.log('[Register] branch_teams 에러:', e.message); }

      // 2) branch_teams가 비어있으면 → employees에서 고유 지점/팀 추출
      try {
        const { data: emps, error } = await SupabaseMode.client
          .from('employees')
          .select('branch, team');
        if (error) console.warn('[Register] employees 에러:', error.message);
        if (emps && emps.length > 0) {
          emps.forEach(emp => {
            if (emp.branch) {
              if (!result[emp.branch]) result[emp.branch] = [];
              if (emp.team && !result[emp.branch].includes(emp.team)) {
                result[emp.branch].push(emp.team);
              }
            }
          });
        }
      } catch(e) { console.log('[Register] employees 에러:', e.message); }

      return result;
    }

    // ===== 메인 초기화 =====
    async function init() {
      // Supabase 초기화
      await SupabaseMode.init();

      // 초대 코드가 있으면 기존 초대 플로우
      if (inviteCode) {
        await initWithInvite();
        return;
      }

      // ===== 자유 가입 모드 =====
      freeMode = true;
      document.getElementById('inviteInfo').textContent = t.freeRegistration;

      // Supabase에서 지점/팀 직접 가져오기
      _branchTeams = await fetchBranchTeamsFromDB();

      // DB에서 못 가져왔으면 localStorage 체크
      if (Object.keys(_branchTeams).length === 0) {
        _branchTeams = JSON.parse(localStorage.getItem('sop_branch_teams') || '{}');
      }

      const branches = Object.keys(_branchTeams);

      // 지점이 있으면 드롭다운 표시
      if (branches.length > 0) {
        document.getElementById('branchGroupReadonly').style.display = 'none';
        document.getElementById('branchGroupSelect').style.display = 'block';
        document.getElementById('labelBranchSelect').textContent = t.branch;

        const branchSelect = document.getElementById('regBranchSelect');
        branchSelect.innerHTML = `<option value="">${t.selectBranch}</option>` +
          branches.map(b => `<option value="${b}">${b}</option>`).join('');

        // 지점 선택 시 팀 자동 로드
        branchSelect.addEventListener('change', function() {
          const sel = this.value;
          const teamGroup = document.getElementById('teamGroup');
          const teamSelect = document.getElementById('regTeam');
          document.getElementById('labelTeam').textContent = t.team;

          if (!sel) { teamGroup.style.display = 'none'; return; }

          const teams = _branchTeams[sel] || [];
          if (teams.length > 0) {
            teamGroup.style.display = 'block';
            teamSelect.disabled = false;
            teamSelect.style.background = 'rgba(30,41,59,0.85)';
            teamSelect.innerHTML = `<option value="">${t.selectTeam}</option>` +
              teams.map(tm => `<option value="${tm}">${tm}</option>`).join('');
          } else {
            teamGroup.style.display = 'none';
          }
        });

        // 지점이 1개뿐이면 자동 선택
        if (branches.length === 1) {
          document.getElementById('regBranchSelect').value = branches[0];
          document.getElementById('regBranchSelect').dispatchEvent(new Event('change'));
        }
      } else {
        // 지점 데이터가 아예 없으면 → 직접 입력 모드
        console.log('[Register] 지점 데이터 없음 → 직접 입력 모드');
        document.getElementById('branchGroupReadonly').style.display = 'block';
        document.getElementById('branchGroupSelect').style.display = 'none';
        const branchInput = document.getElementById('regBranch');
        branchInput.readOnly = false;
        branchInput.style.background = 'rgba(30,41,59,0.85)';
        branchInput.placeholder = t.branch;
      }

      document.getElementById('registerForm').style.display = 'block';
    }

    // ===== 초대 코드 모드 =====
    async function initWithInvite() {
      // Supabase 동기화
      if (SupabaseMode._ready) {
        try { await SupabaseMode.syncBranchTeams(); } catch(e) {}
      }

      let invite = null;

      // 1) Supabase에서 확인
      if (SupabaseMode._ready) {
        try {
          const { data } = await SupabaseMode.client
            .from('invitations')
            .select('*')
            .eq('code', inviteCode)
            .single();
          if (data && data.used_count < data.max_uses) {
            if (data.expires_at && new Date(data.expires_at) < new Date()) {
              showExpired(); return;
            }
            invite = {
              code: data.code, branch: data.branch,
              maxUses: data.max_uses, usedCount: data.used_count,
              expiresAt: data.expires_at
            };
          }
        } catch(e) { console.log('Supabase invite check:', e); }
      }

      // 2) localStorage 폴백
      if (!invite) {
        const invites = JSON.parse(localStorage.getItem('sop_invitations') || '[]');
        const local = invites.find(i => i.code === inviteCode && i.usedCount < i.maxUses);
        if (local) {
          if (local.expiresAt && new Date(local.expiresAt) < new Date()) {
            showExpired(); return;
          }
          invite = local;
        }
      }

      if (!invite) { showInvalid(); return; }

      currentInvite = invite;
      document.getElementById('inviteInfo').textContent = t.staffRegistration(invite.branch);
      document.getElementById('branchGroupReadonly').style.display = 'block';
      document.getElementById('regBranch').value = invite.branch;

      // 팀 처리
      const teamGroup = document.getElementById('teamGroup');
      const teamSelect = document.getElementById('regTeam');
      document.getElementById('labelTeam').textContent = t.team;

      if (invite.team) {
        teamGroup.style.display = 'block';
        teamSelect.innerHTML = `<option value="${invite.team}">${invite.team}</option>`;
        teamSelect.disabled = true;
        teamSelect.style.background = 'var(--gray-50)';
      } else {
        const branchTeams = JSON.parse(localStorage.getItem('sop_branch_teams') || '{}');
        const teams = branchTeams[invite.branch] || [];
        if (teams.length > 0) {
          teamGroup.style.display = 'block';
          teamSelect.innerHTML = `<option value="">${t.selectTeam}</option>` +
            teams.map(tm => `<option value="${tm}">${tm}</option>`).join('');
        }
      }

      document.getElementById('registerForm').style.display = 'block';
    }

    function showInvalid() {
      document.getElementById('inviteInfo').style.display = 'none';
      document.getElementById('invalidMsg').style.display = 'block';
    }

    function showExpired() {
      document.getElementById('inviteInfo').style.display = 'none';
      document.getElementById('errorMsg').textContent = t.expired;
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('invalidMsg').style.display = 'block';
      document.getElementById('invalidTitle').textContent = t.expired;
    }

    // ===== 가입 처리 =====
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      document.getElementById('errorMsg').style.display = 'none';

      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      if (!name || !email || password.length < 4) {
        document.getElementById('errorMsg').textContent = t.fillAllFields;
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }

      // 지점 결정
      let branch = '';
      if (freeMode) {
        const branchSelect = document.getElementById('regBranchSelect');
        const branchInput = document.getElementById('regBranch');
        // 드롭다운이 보이면 드롭다운에서, 아니면 직접 입력에서
        if (document.getElementById('branchGroupSelect').style.display !== 'none') {
          branch = branchSelect.value;
        } else {
          branch = branchInput.value.trim();
        }
        if (!branch) {
          document.getElementById('errorMsg').textContent = t.selectBranchRequired;
          document.getElementById('errorMsg').style.display = 'block';
          return;
        }
      } else {
        branch = currentInvite.branch;
      }

      // 팀 선택 체크
      const teamSelect = document.getElementById('regTeam');
      const teamGroup = document.getElementById('teamGroup');
      const team = teamSelect?.value || '';
      if (teamGroup.style.display !== 'none' && !teamSelect.disabled && !team) {
        document.getElementById('errorMsg').textContent = t.selectTeamRequired;
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }

      // 버튼 로딩 상태
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';

      // Supabase 이메일 중복 체크
      if (SupabaseMode._ready && SupabaseMode._client) {
        try {
          const { data: existingSupa } = await SupabaseMode._client
            .from('employees')
            .select('id')
            .eq('email', email)
            .single();
          if (existingSupa) {
            document.getElementById('errorMsg').textContent = t.emailExists;
            document.getElementById('errorMsg').style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = t.submit;
            return;
          }
        } catch (e) {
          // .single() throws when no match - OK
        }
      }

      // localStorage 중복 체크
      const existing = EmployeeStore.getAll();
      if (existing.find(e => e.email === email)) {
        document.getElementById('errorMsg').textContent = t.emailExists;
        document.getElementById('errorMsg').style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = t.submit;
        return;
      }

      // 직원 등록
      const newEmp = {
        id: 'emp-' + Date.now(),
        name, email, branch, team,
        role: 'staff',
        created: new Date().toISOString().slice(0, 10)
      };

      existing.push(newEmp);
      EmployeeStore.save(existing);

      // Supabase Auth + employees 원자적 생성 (서버 API)
      if (SupabaseMode._ready) {
        try {
          const regRes = await fetch('/api/auth', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'register',
              email, password, name, branch, team, role: 'staff'
            })
          });
          const regData = await regRes.json();
          if (!regRes.ok || !regData.registered) {
            throw new Error(regData.error || 'Register API failed');
          }
          // 서버에서 생성된 실제 employees.id로 localStorage 업데이트
          if (regData.employeeId) {
            newEmp.id = regData.employeeId;
            const emps = EmployeeStore.getAll();
            const idx = emps.findIndex(e => e.email === email);
            if (idx !== -1) emps[idx].id = regData.employeeId;
            EmployeeStore.save(emps);
          }

          // 초대 모드일 때만 사용 횟수 증가
          if (currentInvite) {
            await SupabaseMode.client.from('invitations')
              .update({ used_count: currentInvite.usedCount + 1 })
              .eq('code', currentInvite.code);
          }
        } catch(e) {
          console.error('Supabase register error:', e);
          const emps = EmployeeStore.getAll();
          EmployeeStore.save(emps.filter(emp => emp.id !== newEmp.id));
          const msg = /already exists/i.test(e.message) ? t.emailExists : t.networkError;
          document.getElementById('errorMsg').textContent = msg;
          document.getElementById('errorMsg').style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = t.submit;
          return;
        }
      }

      // 초대 사용 횟수 업데이트
      if (currentInvite) {
        const invites = JSON.parse(localStorage.getItem('sop_invitations') || '[]');
        const idx = invites.findIndex(i => i.code === currentInvite.code);
        if (idx !== -1) {
          invites[idx].usedCount++;
          localStorage.setItem('sop_invitations', JSON.stringify(invites));
        }
      }

      // 성공
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('inviteInfo').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    });

    function switchLang(newLang) {
      localStorage.setItem('sop_lang', newLang);
      window.location.reload();
    }

    init();
  </script>
</body>
</html>
