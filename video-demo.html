<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AION KINDER · 등원 맞이</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #10B981;
  --accent-dim: #047857;
  --highlight: #FBBF24;
  --danger: #EF4444;
  --bg: #0A0A0A;
  --fg: #FAFAFA;
}
html, body { background: var(--bg); color: var(--fg); overflow: hidden; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
  min-height: 100vh;
  font-feature-settings: 'ss01', 'cv01';
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  overflow: hidden;
}

/* ====================================================
 *  공통 씬 스테이지 (모든 씬 타입 여기 렌더)
 * ==================================================== */
.scene-stage {
  position: absolute;
  inset: 0;
  overflow: hidden;
  background: var(--bg);
}

/* 비디오 백그라운드 (Ken Burns + 어두운 그라데이션) */
.bg-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: kenburns 12s ease-out forwards;
}
.bg-video.active { opacity: 1; transition: opacity 0.8s ease; }
@keyframes kenburns {
  0%   { transform: scale(1.05); }
  100% { transform: scale(1.15); }
}

.bg-dim {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.4) 0%,
    rgba(0,0,0,0.1) 35%,
    rgba(0,0,0,0.55) 75%,
    rgba(0,0,0,0.9) 100%
  );
  pointer-events: none;
}

/* ====================================================
 *  씬 타입 1: 풀 비디오 + 자막 (현재 기본)
 * ==================================================== */
.scene-video-focus { /* 스테이지 전체 */ }
.scene-video-focus .caption {
  position: absolute;
  bottom: 130px;
  left: 24px;
  right: 24px;
  text-align: center;
}
.scene-video-focus .caption-text {
  display: inline-block;
  font-size: 20px;
  font-weight: 700;
  line-height: 1.5;
  padding: 14px 22px;
  background: rgba(0,0,0,0.65);
  border-radius: 14px;
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
  max-width: 100%;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.7s 0.3s forwards;
}
.scene-video-focus .tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--accent);
  padding: 6px 12px;
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.4);
  border-radius: 4px;
  margin-bottom: 14px;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.5s 0.1s forwards;
}

/* ====================================================
 *  씬 타입 2: 타이포그래피 포커스 (넷플릭스 스타일)
 * ==================================================== */
.scene-typography {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 32px;
  background: var(--bg);
}
.scene-typography .bg-video {
  opacity: 0.25 !important;
}
.scene-typography .bg-dim {
  background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.8));
}
.typo-label {
  position: relative;
  z-index: 2;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 4px;
  color: var(--accent);
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeIn 0.5s 0.2s forwards;
}
.typo-main {
  position: relative;
  z-index: 2;
  font-size: 48px;
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  color: #fff;
  opacity: 0;
  transform: translateY(24px);
  animation: slideUpBig 0.9s 0.4s forwards;
}
.typo-main .hl {
  color: var(--highlight);
  display: inline-block;
  animation: hlPop 1s 1.2s both;
}
@keyframes hlPop {
  0% { transform: scale(1); color: inherit; }
  40% { transform: scale(1.1); color: var(--highlight); }
  100% { transform: scale(1); color: var(--highlight); }
}
.typo-sub {
  position: relative;
  z-index: 2;
  font-size: 18px;
  font-weight: 500;
  line-height: 1.5;
  color: rgba(255,255,255,0.75);
  max-width: 380px;
  opacity: 0;
  animation: fadeIn 0.7s 1s forwards;
}

/* ====================================================
 *  씬 타입 3: 빅 스탯 (큰 숫자 강조)
 * ==================================================== */
.scene-stat {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px;
  background: radial-gradient(ellipse at center, #0F172A 0%, #000 80%);
}
.scene-stat .bg-video {
  opacity: 0.15 !important;
  filter: blur(2px);
}
.stat-tag {
  position: relative;
  z-index: 2;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 24px;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.5s 0.3s forwards;
}
.stat-number {
  position: relative;
  z-index: 2;
  font-size: 120px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -0.04em;
  background: linear-gradient(180deg, #fff 0%, #888 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  opacity: 0;
  transform: scale(0.6);
  animation: popScale 1.1s 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.stat-unit {
  position: relative;
  z-index: 2;
  font-size: 24px;
  font-weight: 700;
  color: var(--highlight);
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeIn 0.6s 0.9s forwards;
}
.stat-context {
  position: relative;
  z-index: 2;
  font-size: 17px;
  font-weight: 500;
  text-align: center;
  line-height: 1.5;
  color: rgba(255,255,255,0.8);
  max-width: 340px;
  opacity: 0;
  animation: fadeIn 0.7s 1.1s forwards;
}

/* ====================================================
 *  씬 타입 4: 인포그래픽 (3스텝 체크리스트 등)
 * ==================================================== */
.scene-infographic {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px 28px;
  background: linear-gradient(135deg, #0A0A0A 0%, #1E293B 100%);
}
.info-header {
  position: relative;
  z-index: 2;
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeIn 0.5s 0.2s forwards;
}
.info-header-tag {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 8px;
}
.info-header-title {
  font-size: 28px;
  font-weight: 900;
  line-height: 1.2;
  color: #fff;
}
.info-steps {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.info-step {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-left: 4px solid var(--accent);
  border-radius: 10px;
  opacity: 0;
  transform: translateX(-24px);
}
.info-step:nth-child(1) { animation: slideRight 0.6s 0.5s forwards; }
.info-step:nth-child(2) { animation: slideRight 0.6s 0.8s forwards; }
.info-step:nth-child(3) { animation: slideRight 0.6s 1.1s forwards; }
.info-step:nth-child(4) { animation: slideRight 0.6s 1.4s forwards; }
.info-step-num {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-dim));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 900;
  color: #fff;
  box-shadow: 0 4px 16px rgba(16,185,129,0.35);
}
.info-step-text {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  line-height: 1.4;
}
.info-step-text span { color: var(--highlight); font-weight: 800; }

/* ====================================================
 *  씬 타입 5: 타이틀 카드 (넷플릭스 오프닝 느낌)
 * ==================================================== */
.scene-title-card {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px;
  background: #000;
}
.title-card-chapter {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 6px;
  color: var(--accent);
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeIn 0.6s 0.3s forwards;
}
.title-card-main {
  font-size: 56px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -0.04em;
  text-align: center;
  color: #fff;
  margin-bottom: 20px;
  opacity: 0;
  transform: scale(0.8);
  animation: popIn 0.8s 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.title-card-main .accent { color: var(--accent); }
.title-card-line {
  width: 60px;
  height: 3px;
  background: var(--accent);
  margin-bottom: 20px;
  opacity: 0;
  animation: expandLine 0.6s 1.3s forwards;
}
@keyframes expandLine {
  from { width: 0; opacity: 0; }
  to { width: 60px; opacity: 1; }
}
.title-card-sub {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.6s 1.5s forwards;
}

/* ====================================================
 *  공통 애니메이션
 * ==================================================== */
@keyframes fadeIn { to { opacity: 1; } }
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUpBig {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideRight {
  to { opacity: 1; transform: translateX(0); }
}
@keyframes popIn {
  to { opacity: 1; transform: scale(1); }
}
@keyframes popScale {
  to { opacity: 1; transform: scale(1); }
}

/* ====================================================
 *  상단 HUD
 * ==================================================== */
.top-hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 18px 20px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 50;
  pointer-events: none;
}
.hud-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.85);
  padding: 6px 12px;
  background: rgba(0,0,0,0.5);
  border-radius: 3px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
}
.hud-counter {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  padding: 5px 12px;
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.4);
  border-radius: 3px;
  backdrop-filter: blur(10px);
}

/* 진행률 (상단 얇은 바) */
.top-progress {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  z-index: 51;
}
.top-progress-fill {
  height: 100%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  transition: width 0.3s linear;
  width: 0%;
}

/* ====================================================
 *  하단 컨트롤
 * ==================================================== */
.bottom-controls {
  position: absolute;
  bottom: 24px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  z-index: 60;
}
.ctrl {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  backdrop-filter: blur(14px);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.ctrl:hover { background: rgba(255,255,255,0.18); }
.ctrl-main {
  width: 58px;
  height: 58px;
  background: var(--accent);
  border: none;
  font-size: 22px;
  box-shadow: 0 8px 24px rgba(16,185,129,0.4);
}
.ctrl-main:hover { background: #0EA572; transform: scale(1.04); }

.credit {
  position: absolute;
  bottom: 4px;
  right: 10px;
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  z-index: 5;
  letter-spacing: 0.5px;
}

/* 로딩 */
.loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  z-index: 90;
  background: #000;
}
.loading.hidden { display: none; }
.spinner {
  width: 48px;
  height: 48px;
  border: 3px solid rgba(16,185,129,0.25);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 시작 화면 */
.start-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  background: radial-gradient(ellipse at top, #0F172A 0%, #000 70%);
  z-index: 100;
  padding: 40px;
  text-align: center;
}
.start-screen.hidden { display: none; }
.start-kicker {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 5px;
  color: var(--accent);
  text-transform: uppercase;
}
.start-title {
  font-size: 42px;
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.03em;
  max-width: 360px;
}
.start-title span { color: var(--accent); }
.start-line {
  width: 40px;
  height: 2px;
  background: var(--accent);
}
.start-meta {
  display: flex;
  gap: 20px;
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
}
.start-meta span {
  padding: 0 8px;
  border-left: 1px solid rgba(255,255,255,0.15);
}
.start-meta span:first-child { border-left: none; padding-left: 0; }
.start-btn {
  margin-top: 12px;
  padding: 16px 42px;
  border-radius: 2px;
  border: none;
  background: #fff;
  color: #000;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.start-btn:hover { background: var(--accent); color: #fff; }
.start-btn:active { transform: scale(0.97); }

/* 완료 */
.completion {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  background: radial-gradient(ellipse at center, #0F172A 0%, #000 80%);
  z-index: 80;
  padding: 40px;
  text-align: center;
}
.completion.active { display: flex; }
.completion-kicker {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 5px;
  color: var(--accent);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.6s 0.2s forwards;
}
.completion-title {
  font-size: 44px;
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -0.03em;
  color: #fff;
  margin: 8px 0;
  opacity: 0;
  transform: translateY(20px);
  animation: slideUpBig 0.8s 0.5s forwards;
}
.completion-msg {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
  max-width: 300px;
  opacity: 0;
  animation: fadeIn 0.6s 1s forwards;
}
.completion-btn {
  margin-top: 24px;
  padding: 14px 40px;
  border-radius: 2px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  cursor: pointer;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.6s 1.3s forwards;
}
</style>
</head>
<body>

<div class="container">

  <!-- 시작 화면 -->
  <div class="start-screen" id="startScreen">
    <div class="start-kicker">Aion Kinder · Training</div>
    <h1 class="start-title">등원 <span>맞이</span>의<br>3가지 원칙</h1>
    <div class="start-line"></div>
    <div class="start-meta">
      <span>약 60초</span>
      <span>9개 씬</span>
      <span>🔊 소리 켜세요</span>
    </div>
    <button class="start-btn" onclick="startDemo()">▶ 시작</button>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">PREPARING</div>
  </div>

  <!-- 씬 스테이지 (동적 렌더) -->
  <div class="scene-stage" id="sceneStage"></div>

  <!-- 진행률 -->
  <div class="top-progress"><div class="top-progress-fill" id="progressFill"></div></div>

  <!-- 상단 HUD -->
  <div class="top-hud">
    <div class="hud-label">AION KINDER</div>
    <div class="hud-counter" id="sceneCounter">1 / 9</div>
  </div>

  <!-- 컨트롤 -->
  <div class="bottom-controls">
    <button class="ctrl" onclick="prevScene()">‹</button>
    <button class="ctrl ctrl-main" id="playBtn" onclick="togglePlay()">⏸</button>
    <button class="ctrl" onclick="nextScene()">›</button>
  </div>

  <div class="credit" id="credit">VIDEOS · PEXELS</div>

  <!-- 완료 -->
  <div class="completion" id="completion">
    <div class="completion-kicker">Chapter Complete</div>
    <h2 class="completion-title">학습 완료!</h2>
    <p class="completion-msg">3가지 원칙을 배우셨습니다.<br>이제 퀴즈로 확인해볼까요?</p>
    <button class="completion-btn" onclick="location.reload()">다시 보기</button>
  </div>
</div>

<script>
/* ========================================================
 * 씬 구성 — Netflix 다큐 + 인포그래픽 스타일
 * 다양한 타입 교차로 지루함 방지
 * ======================================================== */

const SCENES = [
  {
    type: 'title_card',
    kicker: 'Episode 01',
    titleMain: '등원 <span class="accent">맞이</span>',
    titleSub: 'Morning Welcome Protocol',
    narration: '아이온 킨더. 오늘의 주제는 등원 맞이입니다',
    duration: 5,
  },
  {
    type: 'video_focus',
    searchQuery: 'kindergarten entrance morning children',
    tag: 'SCENE',
    caption: '월요일 아침 <b>아홉 시</b>. 첫 등원이 시작됩니다',
    narration: '월요일 아침 아홉 시, 서준이의 첫 등원이 시작됩니다',
    duration: 7,
  },
  {
    type: 'stat',
    tag: 'RESEARCH',
    number: '72',
    unit: '%',
    context: '첫 등원 경험이<br>1년의 유치원 생활을 결정합니다',
    narration: '연구에 따르면, 첫 등원 경험이 유치원 생활의 칠십 이 퍼센트를 결정합니다',
    duration: 7,
  },
  {
    type: 'video_focus',
    searchQuery: 'child crying preschool separation anxiety',
    tag: 'MOMENT',
    caption: '처음 온 아이. <b>불안</b>한 부모.',
    narration: '처음인 서준이는 눈물 가득, 어머니도 걱정스러운 표정입니다',
    duration: 6,
  },
  {
    type: 'typography',
    searchQuery: 'teacher kneeling comforting child',
    label: 'PRINCIPLE 1',
    main: '눈<span class="hl">높이</span>를<br>맞추세요',
    sub: '서서 인사하지 마세요. 아이 시선에 앉아야 신뢰가 시작됩니다.',
    narration: '첫 번째 원칙, 눈높이를 맞추세요. 서서 인사하지 마세요',
    duration: 8,
  },
  {
    type: 'video_focus',
    searchQuery: 'parent teacher conversation kindergarten',
    tag: 'ACTION',
    caption: '부모님께 <b>따뜻한 인사</b> 한 마디',
    narration: '부모님과의 짧은 인사 한 마디. 이것이 신뢰 관계의 시작입니다',
    duration: 6,
  },
  {
    type: 'infographic',
    headerTag: 'CHECKLIST',
    headerTitle: '등원 맞이<br>3가지 필수',
    steps: [
      '아이 <span>눈높이</span>에 앉기',
      '<span>따뜻한 미소</span>로 이름 부르기',
      '부모님과 <span>30초 소통</span>',
    ],
    narration: '꼭 기억하세요. 눈높이, 따뜻한 미소, 30초 부모 소통. 세 가지입니다',
    duration: 9,
  },
  {
    type: 'video_focus',
    searchQuery: 'happy children kindergarten classroom play',
    tag: 'OUTCOME',
    caption: '세 가지가 <b>하루</b>를 바꿉니다',
    narration: '이 세 가지 원칙이 서준이의 하루를, 일년을 바꿉니다',
    duration: 7,
  },
  {
    type: 'title_card',
    kicker: 'Next Up',
    titleMain: '퀴즈<span class="accent">로</span><br>확인',
    titleSub: 'Test Your Knowledge',
    narration: '이제, 배운 내용을 퀴즈로 확인해봅시다',
    duration: 5,
  },
];

let currentIndex = 0;
let isPlaying = true;
let currentAudio = null;
let audioElements = [];
let videoCache = {};
let advanceTimer = null;

/* ========================================================
 * 시작
 * ======================================================== */
async function startDemo() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');

  document.getElementById('loadingText').textContent = 'SEARCHING VIDEOS';
  await loadAllVideos();

  document.getElementById('loadingText').textContent = 'GENERATING NARRATION';
  await loadAllNarrations();

  document.getElementById('loading').classList.add('hidden');
  currentIndex = 0;
  playScene(0);
}

async function loadAllVideos() {
  const uniqueQueries = [...new Set(SCENES.filter(s => s.searchQuery).map(s => s.searchQuery))];
  await Promise.all(uniqueQueries.map(async q => {
    try {
      const res = await fetch('/api/video-search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q, count: 1, minDuration: 4, maxDuration: 20 })
      });
      const data = await res.json();
      if (data.results?.[0]) videoCache[q] = data.results[0];
    } catch (e) { console.warn('Video search failed:', q, e.message); }
  }));
}

async function loadAllNarrations() {
  audioElements = [];
  await Promise.all(SCENES.map(async (scene, idx) => {
    try {
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: scene.narration, lang: 'ko-KR', gender: 'female' })
      });
      if (!res.ok) throw new Error('TTS HTTP ' + res.status);
      const blob = await res.blob();
      audioElements[idx] = new Audio(URL.createObjectURL(blob));
      audioElements[idx].preload = 'auto';
    } catch (e) {
      console.warn(`Scene ${idx} TTS failed:`, e.message);
      audioElements[idx] = null;
    }
  }));
}

/* ========================================================
 * 씬 렌더링 (타입별 레이아웃)
 * ======================================================== */
function renderScene(scene) {
  const stage = document.getElementById('sceneStage');
  const videoData = scene.searchQuery ? videoCache[scene.searchQuery] : null;

  // 공통: 배경 영상 (있으면)
  const bgVideoHtml = videoData ? `
    <video class="bg-video active" src="${videoData.url}" autoplay muted playsinline loop></video>
    <div class="bg-dim"></div>
  ` : '<div class="bg-dim"></div>';

  if (scene.type === 'title_card') {
    stage.innerHTML = `
      <div class="scene-title-card">
        <div class="title-card-chapter">${scene.kicker}</div>
        <h1 class="title-card-main">${scene.titleMain}</h1>
        <div class="title-card-line"></div>
        <div class="title-card-sub">${scene.titleSub}</div>
      </div>
    `;
  } else if (scene.type === 'video_focus') {
    stage.innerHTML = `
      ${bgVideoHtml}
      <div class="scene-video-focus">
        <div class="caption">
          ${scene.tag ? `<div class="tag">${scene.tag}</div><br>` : ''}
          <span class="caption-text">${scene.caption}</span>
        </div>
      </div>
    `;
  } else if (scene.type === 'stat') {
    stage.innerHTML = `
      ${bgVideoHtml}
      <div class="scene-stat">
        <div class="stat-tag">${scene.tag || 'DATA'}</div>
        <div class="stat-number">${scene.number}</div>
        ${scene.unit ? `<div class="stat-unit">${scene.unit}</div>` : ''}
        <div class="stat-context">${scene.context}</div>
      </div>
    `;
  } else if (scene.type === 'typography') {
    stage.innerHTML = `
      ${bgVideoHtml}
      <div class="scene-typography">
        <div class="typo-label">${scene.label}</div>
        <h2 class="typo-main">${scene.main}</h2>
        <p class="typo-sub">${scene.sub}</p>
      </div>
    `;
  } else if (scene.type === 'infographic') {
    stage.innerHTML = `
      <div class="scene-infographic">
        <div class="info-header">
          <div class="info-header-tag">${scene.headerTag}</div>
          <h2 class="info-header-title">${scene.headerTitle}</h2>
        </div>
        <div class="info-steps">
          ${scene.steps.map((s, i) => `
            <div class="info-step">
              <div class="info-step-num">${i+1}</div>
              <div class="info-step-text">${s}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // 크레딧 업데이트
  if (videoData?.author) {
    document.getElementById('credit').textContent = `VIDEO · ${videoData.author.toUpperCase()} / PEXELS`;
  } else {
    document.getElementById('credit').textContent = 'AION KINDER ACADEMY';
  }
}

/* ========================================================
 * 씬 재생
 * ======================================================== */
function playScene(idx) {
  if (idx < 0 || idx >= SCENES.length) return;

  // 정리
  audioElements.forEach(a => { if (a) { a.pause(); a.currentTime = 0; } });
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }

  currentIndex = idx;
  const scene = SCENES[idx];

  // UI 업데이트
  document.getElementById('sceneCounter').textContent = `${String(idx+1).padStart(2,'0')} · ${SCENES.length}`;
  document.getElementById('progressFill').style.width = `${((idx+1)/SCENES.length)*100}%`;

  // 렌더
  renderScene(scene);

  // 오디오 재생
  currentAudio = audioElements[idx];
  let audioDuration = scene.duration;
  if (isPlaying && currentAudio) {
    try {
      currentAudio.currentTime = 0;
      currentAudio.play().catch(e => console.warn('Audio:', e.message));
      currentAudio.onloadedmetadata = () => {
        const audioDur = currentAudio.duration;
        if (audioDur > audioDuration) {
          audioDuration = audioDur + 0.7; // 오디오 끝난 후 약간 여유
          if (advanceTimer) clearTimeout(advanceTimer);
          advanceTimer = setTimeout(() => {
            idx === SCENES.length - 1 ? showCompletion() : playScene(idx + 1);
          }, audioDuration * 1000);
        }
      };
    } catch (e) { console.warn('Audio play error:', e); }
  } else if (isPlaying && 'speechSynthesis' in window) {
    const utter = new SpeechSynthesisUtterance(scene.narration);
    utter.lang = 'ko-KR';
    const voices = speechSynthesis.getVoices();
    const krVoice = voices.find(v => v.lang.startsWith('ko'));
    if (krVoice) utter.voice = krVoice;
    speechSynthesis.speak(utter);
  }

  // 자동 전환
  if (isPlaying) {
    advanceTimer = setTimeout(() => {
      idx === SCENES.length - 1 ? showCompletion() : playScene(idx + 1);
    }, audioDuration * 1000);
  }
}

/* ========================================================
 * 컨트롤
 * ======================================================== */
function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    playScene(currentIndex);
  } else {
    audioElements.forEach(a => { if (a) a.pause(); });
    document.querySelectorAll('.bg-video').forEach(v => v.pause());
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  }
}

function prevScene() { if (currentIndex > 0) playScene(currentIndex - 1); }
function nextScene() {
  if (currentIndex < SCENES.length - 1) playScene(currentIndex + 1);
  else showCompletion();
}

function showCompletion() {
  audioElements.forEach(a => { if (a) a.pause(); });
  document.querySelectorAll('.bg-video').forEach(v => v.pause());
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  document.getElementById('completion').classList.add('active');
}

if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
