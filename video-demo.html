<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실사 영상 교육 데모 — 키우자 히어로즈</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  background: #000;
  overflow: hidden;
}

/* 영상 영역 */
.video-stage {
  position: relative;
  width: 100%;
  height: 100%;
  background: #0F172A;
}
.scene-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.scene-video.active {
  opacity: 1;
}

/* 영상 위 어두운 그라데이션 (자막 가독성) */
.overlay-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.6) 0%,
    rgba(0,0,0,0.1) 30%,
    rgba(0,0,0,0.1) 70%,
    rgba(0,0,0,0.85) 100%
  );
  pointer-events: none;
}

/* 상단 헤더 */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}
.chapter-label {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  background: rgba(0,0,0,0.4);
  padding: 6px 14px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}
.scene-counter {
  font-size: 12px;
  color: rgba(255,255,255,0.8);
  background: rgba(16,185,129,0.3);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid rgba(16,185,129,0.5);
  font-weight: 600;
  backdrop-filter: blur(10px);
}

/* 진행률 바 */
.progress-bar {
  position: absolute;
  top: 60px;
  left: 20px;
  right: 20px;
  height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  overflow: hidden;
  z-index: 10;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #10B981, #3B82F6);
  border-radius: 2px;
  transition: width 0.3s linear;
}

/* 타이틀 (슬라이드 위) */
.scene-title {
  position: absolute;
  top: 100px;
  left: 24px;
  right: 24px;
  z-index: 10;
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  line-height: 1.3;
  opacity: 0;
  transform: translateY(20px);
  animation: slideUp 0.8s 0.3s forwards;
}
@keyframes slideUp {
  to { opacity: 1; transform: translateY(0); }
}

/* 자막 (하단) */
.subtitle-area {
  position: absolute;
  bottom: 120px;
  left: 20px;
  right: 20px;
  z-index: 10;
  text-align: center;
}
.subtitle-text {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.5;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  padding: 16px;
  background: rgba(0,0,0,0.35);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}
.keyword {
  color: #FBBF24;
  font-weight: 800;
  display: inline-block;
  transform-origin: center;
  animation: pop 0.5s ease;
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); color: #FCD34D; }
  100% { transform: scale(1); color: #FBBF24; }
}

/* 컨트롤 */
.controls {
  position: absolute;
  bottom: 24px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  z-index: 10;
}
.ctrl-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ctrl-btn:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.05);
}
.ctrl-btn.play {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #10B981, #3B82F6);
  font-size: 24px;
}

/* 크레딧 (작게) */
.credit {
  position: absolute;
  bottom: 4px;
  right: 8px;
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  z-index: 5;
}

/* 로딩 */
.loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 20;
  background: rgba(0,0,0,0.7);
}
.loading.hidden { display: none; }
.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid rgba(16,185,129,0.3);
  border-top-color: #10B981;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 완료 화면 */
.completion {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  background: linear-gradient(135deg, #0F172A, #1E293B);
  z-index: 30;
  padding: 40px;
  text-align: center;
}
.completion.active { display: flex; }
.completion-icon { font-size: 80px; }
.completion-title {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #10B981, #3B82F6);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.completion-msg {
  font-size: 15px;
  color: #94A3B8;
  line-height: 1.6;
}
.completion-btn {
  margin-top: 20px;
  padding: 14px 32px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #10B981, #3B82F6);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}

/* 시작 화면 */
.start-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #334155 100%);
  z-index: 40;
  padding: 40px;
  text-align: center;
}
.start-screen.hidden { display: none; }
.start-logo { font-size: 72px; }
.start-title {
  font-size: 26px;
  font-weight: 800;
  background: linear-gradient(135deg, #10B981, #3B82F6);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.start-subtitle {
  font-size: 14px;
  color: #94A3B8;
  line-height: 1.7;
  max-width: 340px;
}
.start-chapter-info {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 14px 20px;
  border-radius: 12px;
  display: flex;
  gap: 20px;
  font-size: 13px;
  color: #cbd5e1;
}
.start-btn {
  padding: 16px 40px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #10B981, #3B82F6);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(16,185,129,0.4);
  transition: transform 0.15s;
}
.start-btn:active { transform: scale(0.97); }

.note {
  position: fixed;
  bottom: 8px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  z-index: 50;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="container">

  <!-- 시작 화면 -->
  <div class="start-screen" id="startScreen">
    <div class="start-logo">🏫</div>
    <h1 class="start-title">유치원 · 등원 맞이</h1>
    <p class="start-subtitle">
      실사 영상 + 자연스러운 AI 나레이션으로 학습하는<br>
      새로운 교육 방식 데모<br>
      <span style="color:#FCD34D;">🔊 음소거 해제하고 보세요</span>
    </p>
    <div class="start-chapter-info">
      <div>⏱️ 약 40초</div>
      <div>·</div>
      <div>🎬 5개 씬</div>
    </div>
    <button class="start-btn" onclick="startDemo()">
      시작하기 ▶
    </button>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font-size:14px; color:#94A3B8;">영상 준비 중...</div>
  </div>

  <!-- 영상 스테이지 -->
  <div class="video-stage" id="videoStage">
    <!-- 동적으로 video 요소 삽입됨 -->
  </div>
  <div class="overlay-gradient"></div>

  <!-- 상단 -->
  <div class="top-bar">
    <div class="chapter-label">🏫 유치원 · 등원 맞이</div>
    <div class="scene-counter" id="sceneCounter">1 / 5</div>
  </div>

  <!-- 진행률 -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <!-- 타이틀 -->
  <div class="scene-title" id="sceneTitle"></div>

  <!-- 자막 -->
  <div class="subtitle-area">
    <div class="subtitle-text" id="subtitleText"></div>
  </div>

  <!-- 컨트롤 -->
  <div class="controls">
    <button class="ctrl-btn" onclick="prevScene()" title="이전">‹</button>
    <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()" title="재생">⏸</button>
    <button class="ctrl-btn" onclick="nextScene()" title="다음">›</button>
  </div>

  <!-- 크레딧 -->
  <div class="credit" id="credit">Videos: Pexels</div>

  <!-- 완료 화면 -->
  <div class="completion" id="completion">
    <div class="completion-icon">🎓</div>
    <h2 class="completion-title">학습 완료!</h2>
    <p class="completion-msg">
      등원 맞이의 핵심을 배우셨어요.<br>
      이제 퀴즈로 확인해볼까요?
    </p>
    <button class="completion-btn" onclick="location.reload()">다시 보기</button>
  </div>

</div>

<div class="note">이 데모는 시나리오 예시입니다. 실제 우리 회사 규정에 맞게 조정됩니다.</div>

<script>
// ===================================================
// 샘플 시나리오: 유치원 "등원 맞이" 챕터
// ===================================================
// 각 씬은 Pexels에서 실사 영상을 자동 검색해 배치
// 제공되는 나레이션은 스크립트 예시 (실제 교재 기반으로 대체)
// ===================================================

const SCENES = [
  {
    title: "월요일 아침 9시",
    subtitle: "첫 등원이 시작되는 <span class='keyword'>긴장의 순간</span>",
    searchQuery: "kindergarten entrance morning",
    duration: 7,
    narration: "월요일 아침 아홉 시, 서준이의 첫 등원이 시작됩니다"
  },
  {
    title: "눈물 가득한 서준",
    subtitle: "처음 유치원에 온 아이의 <span class='keyword'>불안감</span>",
    searchQuery: "sad child crying preschool",
    duration: 7,
    narration: "처음인 서준이는 눈물 가득. 어머니도 걱정스러운 표정입니다"
  },
  {
    title: "눈높이를 맞추세요",
    subtitle: "선생님은 아이의 <span class='keyword'>눈높이</span>에 앉아주세요",
    searchQuery: "teacher kneeling child comfort",
    duration: 8,
    narration: "민지 선생님은 서서 인사하지 않습니다. 서준이 눈높이에 앉아 따뜻하게 인사했어요"
  },
  {
    title: "안전한 연결 만들기",
    subtitle: "어머니와 <span class='keyword'>따뜻한 인사</span>도 잊지 마세요",
    searchQuery: "parent teacher conversation school",
    duration: 8,
    narration: "부모님과의 짧은 인사 한 마디. 이게 신뢰 관계의 시작입니다"
  },
  {
    title: "첫 번째 등원의 완성",
    subtitle: "오늘 배운 <span class='keyword'>3가지</span>를 기억하세요",
    searchQuery: "happy children kindergarten classroom",
    duration: 7,
    narration: "눈높이, 따뜻한 미소, 부모와의 짧은 인사. 이 세 가지가 첫 등원을 바꿉니다"
  }
];

// ===================================================
// 플레이어 상태
// ===================================================
let currentIndex = 0;
let isPlaying = true;
let currentAudio = null;
let videoElements = [];
let audioElements = []; // 미리 생성한 오디오
let advanceTimer = null;

// ===================================================
// 시작
// ===================================================
async function startDemo() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');

  // 모든 씬의 영상 + 나레이션 오디오 미리 생성
  document.querySelector('#loading div:last-child').textContent = '영상 검색 중...';
  await loadAllVideos();

  document.querySelector('#loading div:last-child').textContent = '자연스러운 나레이션 생성 중...';
  await loadAllNarrations();

  document.getElementById('loading').classList.add('hidden');
  currentIndex = 0;
  playScene(0);
}

// Edge TTS API로 각 씬 나레이션 생성 (MP3 Blob URL 반환)
async function loadAllNarrations() {
  audioElements = [];
  const promises = SCENES.map(async (scene, idx) => {
    try {
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: scene.narration,
          lang: 'ko-KR',
          gender: 'female',
        })
      });
      if (!res.ok) throw new Error('TTS HTTP ' + res.status);
      const blob = await res.blob();
      const audioUrl = URL.createObjectURL(blob);
      audioElements[idx] = new Audio(audioUrl);
      audioElements[idx].preload = 'auto';
    } catch (e) {
      console.warn(`씬 ${idx} TTS 실패, Web Speech 폴백:`, e.message);
      audioElements[idx] = null; // 폴백 처리
    }
  });
  await Promise.all(promises);
}

async function loadAllVideos() {
  // 각 씬에 대해 Pexels 영상 검색
  const promises = SCENES.map(async (scene, idx) => {
    try {
      const res = await fetch('/api/video-search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: scene.searchQuery,
          count: 3,
          minDuration: 4,
          maxDuration: 20
        })
      });
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        scene.videoUrl = data.results[0].url;
        scene.thumbnail = data.results[0].thumbnail;
        scene.author = data.results[0].author;
      }
    } catch (e) {
      console.warn(`씬 ${idx} 영상 검색 실패:`, e.message);
    }
  });
  await Promise.all(promises);

  // 영상 태그 미리 생성 (프리로드)
  const stage = document.getElementById('videoStage');
  stage.innerHTML = '';
  videoElements = SCENES.map((scene, idx) => {
    const v = document.createElement('video');
    v.className = 'scene-video';
    v.src = scene.videoUrl || '';
    v.muted = true;
    v.playsInline = true;
    v.loop = true;
    v.preload = idx < 2 ? 'auto' : 'metadata'; // 처음 2개만 auto 프리로드
    stage.appendChild(v);
    return v;
  });
}

// ===================================================
// 씬 재생
// ===================================================
function playScene(idx) {
  if (idx < 0 || idx >= SCENES.length) return;

  // 이전 영상 숨김 + 오디오 정지
  videoElements.forEach(v => {
    v.classList.remove('active');
    v.pause();
  });
  audioElements.forEach(a => { if (a) { a.pause(); a.currentTime = 0; } });
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }

  currentIndex = idx;
  const scene = SCENES[idx];

  // UI 업데이트
  document.getElementById('sceneCounter').textContent = `${idx+1} / ${SCENES.length}`;
  document.getElementById('progressFill').style.width = `${((idx+1)/SCENES.length)*100}%`;
  document.getElementById('sceneTitle').textContent = scene.title;
  document.getElementById('subtitleText').innerHTML = scene.subtitle;
  document.getElementById('credit').textContent = scene.author ? `Video: ${scene.author} / Pexels` : 'Videos: Pexels';

  // 타이틀 애니메이션 재시작
  const titleEl = document.getElementById('sceneTitle');
  titleEl.style.animation = 'none';
  titleEl.offsetHeight;
  titleEl.style.animation = 'slideUp 0.8s 0.3s forwards';

  // 영상 재생
  const videoEl = videoElements[idx];
  if (videoEl && videoEl.src) {
    videoEl.classList.add('active');
    videoEl.currentTime = 0;
    videoEl.play().catch(() => {});
  }

  // 나레이션 재생 — Edge TTS (Microsoft Azure 고품질 음성) 우선
  currentAudio = audioElements[idx];
  let audioDuration = scene.duration; // 기본값
  if (isPlaying && currentAudio) {
    try {
      currentAudio.currentTime = 0;
      currentAudio.play().catch(e => console.warn('Audio play:', e.message));
      // 오디오 길이에 맞춰 duration 조정 (최소 scene.duration 보장)
      currentAudio.onloadedmetadata = () => {
        const audioDur = currentAudio.duration;
        if (audioDur > audioDuration) {
          audioDuration = audioDur + 0.5;
          // 타이머 재설정
          if (advanceTimer) clearTimeout(advanceTimer);
          advanceTimer = setTimeout(() => {
            if (idx === SCENES.length - 1) showCompletion();
            else playScene(idx + 1);
          }, audioDuration * 1000);
        }
      };
    } catch (e) { console.warn('Audio play error:', e); }
  } else if (isPlaying && 'speechSynthesis' in window) {
    // 폴백: 브라우저 내장 TTS
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(scene.narration);
    utter.lang = 'ko-KR';
    const voices = speechSynthesis.getVoices();
    const krVoice = voices.find(v => v.lang.startsWith('ko'));
    if (krVoice) utter.voice = krVoice;
    speechSynthesis.speak(utter);
  }

  // 자동 다음 씬 (audioDuration초 후)
  if (isPlaying) {
    advanceTimer = setTimeout(() => {
      if (idx === SCENES.length - 1) {
        showCompletion();
      } else {
        playScene(idx + 1);
      }
    }, audioDuration * 1000);
  }
}

// ===================================================
// 컨트롤
// ===================================================
function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';

  if (isPlaying) {
    playScene(currentIndex);
  } else {
    videoElements.forEach(v => v.pause());
    audioElements.forEach(a => { if (a) { a.pause(); a.currentTime = 0; } });
    if (currentAudio) currentAudio.pause();
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  }
}

function prevScene() {
  if (currentIndex > 0) playScene(currentIndex - 1);
}
function nextScene() {
  if (currentIndex < SCENES.length - 1) {
    playScene(currentIndex + 1);
  } else {
    showCompletion();
  }
}

function showCompletion() {
  videoElements.forEach(v => v.pause());
  audioElements.forEach(a => { if (a) a.pause(); });
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  document.getElementById('completion').classList.add('active');
}

// speechSynthesis 음성 로딩 대기 (일부 브라우저에서 비동기)
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => {};
}
</script>
</body>
</html>
