<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>AION KINDER · 등원 맞이 프로토콜 (v5)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #10B981;
  --accent-dim: #047857;
  --highlight: #FBBF24;
  --danger: #EF4444;
  --bg: #0A0A0A;
  --fg: #FAFAFA;
}
html, body {
  background: #000;
  color: var(--fg);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  margin: 0;
  padding: 0;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
  font-feature-settings: 'ss01', 'cv01';
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
}

/* ====================================================
 *  컨테이너 — 항상 9:16 세로형 (모바일 우선)
 *  PC에서도 핸드폰 비율로 가운데 세로 박스
 * ==================================================== */
.container {
  position: relative !important;
  aspect-ratio: 9 / 16;
  height: 100vh !important;
  max-height: 100vh;
  width: auto !important;
  max-width: min(420px, 100vw);
  background: #000;
  overflow: hidden;
  box-shadow: 0 20px 80px rgba(0,0,0,0.6);
}
/* 모바일 (좁은 화면)에서는 풀 화면 */
@media (max-width: 480px) {
  .container {
    width: 100vw !important;
    height: 100vh !important;
    aspect-ratio: auto;
    max-width: none;
  }
}
/* 매우 짧은 화면 (가로 모드)에서도 세로 비율 유지 */
@media (max-aspect-ratio: 9/16) {
  .container {
    width: 100vw !important;
    height: auto !important;
    aspect-ratio: 9 / 16;
  }
}

/* ====================================================
 *  씬 스테이지 — 절대 전체 채움
 * ==================================================== */
.scene-stage {
  position: absolute;
  inset: 0;
  overflow: hidden;
  background: #000;
}

/* 비디오 백그라운드 */
.bg-video, .bg-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
}
.bg-video.active, .bg-image.active {
  opacity: 1;
  transition: opacity 0.9s ease;
  animation: kenburns 14s ease-out forwards;
}
@keyframes kenburns {
  0%   { transform: scale(1.04) translate(0, 0); }
  100% { transform: scale(1.18) translate(-2%, -1%); }
}

.bg-dim {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.4) 0%,
    rgba(0,0,0,0.15) 35%,
    rgba(0,0,0,0.55) 75%,
    rgba(0,0,0,0.9) 100%
  );
  pointer-events: none;
}

/* ====================================================
 *  씬 타입 1: 풀 비디오 + 자막 (사진은 얼굴이 크게)
 * ==================================================== */
.scene-video-focus .caption {
  position: absolute;
  bottom: 16vh;
  left: clamp(20px, 5vw, 60px);
  right: clamp(20px, 5vw, 60px);
  text-align: center;
}
.scene-video-focus .tag {
  display: inline-block;
  font-size: clamp(10px, 1vw, 13px);
  font-weight: 800;
  letter-spacing: 3px;
  color: var(--accent);
  padding: 6px 14px;
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.4);
  border-radius: 4px;
  margin-bottom: 18px;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.5s 0.2s forwards;
}
.scene-video-focus .caption-text {
  display: inline-block;
  font-size: 19px;
  font-weight: 700;
  line-height: 1.45;
  padding: 14px 22px;
  background: rgba(0,0,0,0.7);
  border-radius: 14px;
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
  max-width: 100%;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.7s 0.4s forwards;
}
.scene-video-focus .caption-text b { color: var(--highlight); }

/* ====================================================
 *  씬 타입 2: 타이포그래피 포커스 (풀스크린 큰 글자)
 * ==================================================== */
.scene-typography {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 6vh clamp(24px, 6vw, 80px);
  text-align: center;
}
.scene-typography .bg-video,
.scene-typography .bg-image {
  opacity: 0.25 !important;
}
.typo-label {
  position: relative;
  z-index: 2;
  font-size: clamp(10px, 1vw, 14px);
  font-weight: 800;
  letter-spacing: 5px;
  color: var(--accent);
  margin-bottom: clamp(20px, 3vh, 40px);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.5s 0.2s forwards;
}
.typo-main {
  position: relative;
  z-index: 2;
  font-size: 44px;
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.03em;
  margin-bottom: 22px;
  color: #fff;
  opacity: 0;
  transform: translateY(24px);
  animation: slideUpBig 0.9s 0.4s forwards;
}
.typo-main .hl {
  color: var(--highlight);
  display: inline-block;
  animation: hlPop 1s 1.2s both;
}
.typo-main .accent { color: var(--accent); }
@keyframes hlPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.12); }
  100% { transform: scale(1); }
}
.typo-sub {
  position: relative;
  z-index: 2;
  font-size: 16px;
  font-weight: 500;
  line-height: 1.6;
  color: rgba(255,255,255,0.8);
  max-width: 360px;
  opacity: 0;
  animation: fadeIn 0.7s 1s forwards;
}

/* ====================================================
 *  씬 타입 3: 빅 스탯
 * ==================================================== */
.scene-stat {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 6vh 4vw;
  background: radial-gradient(ellipse at center, #0F172A 0%, #000 80%);
  text-align: center;
}
.scene-stat .bg-video,
.scene-stat .bg-image {
  opacity: 0.15 !important;
  filter: blur(3px);
}
.stat-tag {
  position: relative;
  z-index: 2;
  font-size: clamp(10px, 1vw, 14px);
  font-weight: 800;
  letter-spacing: 4px;
  color: var(--accent);
  margin-bottom: clamp(24px, 3vh, 48px);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.5s 0.3s forwards;
}
.stat-number {
  position: relative;
  z-index: 2;
  font-size: 140px;
  font-weight: 900;
  line-height: 0.85;
  letter-spacing: -0.05em;
  background: linear-gradient(180deg, #fff 0%, #777 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
  opacity: 0;
  transform: scale(0.5);
  animation: popScale 1.2s 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.stat-unit {
  position: relative;
  z-index: 2;
  font-size: clamp(22px, 3vw, 40px);
  font-weight: 700;
  color: var(--highlight);
  margin-bottom: clamp(20px, 3vh, 40px);
  opacity: 0;
  animation: fadeIn 0.6s 1s forwards;
}
.stat-context {
  position: relative;
  z-index: 2;
  font-size: clamp(16px, 1.8vw, 22px);
  font-weight: 500;
  line-height: 1.5;
  color: rgba(255,255,255,0.85);
  max-width: 640px;
  opacity: 0;
  animation: fadeIn 0.7s 1.2s forwards;
}
.stat-source {
  position: relative;
  z-index: 2;
  margin-top: 24px;
  font-size: clamp(11px, 1vw, 14px);
  color: rgba(255,255,255,0.4);
  opacity: 0;
  animation: fadeIn 0.6s 1.6s forwards;
}

/* ====================================================
 *  씬 타입 4: 인포그래픽 (풀 화면 활용)
 * ==================================================== */
.scene-infographic {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 8vh clamp(24px, 6vw, 100px);
  background: linear-gradient(135deg, #0A0A0A 0%, #1E293B 80%, #0A0A0A 100%);
}
.info-header {
  position: relative;
  z-index: 2;
  margin-bottom: clamp(28px, 4vh, 60px);
  opacity: 0;
  animation: fadeIn 0.5s 0.2s forwards;
}
.info-header-tag {
  font-size: clamp(11px, 1vw, 14px);
  font-weight: 800;
  letter-spacing: 4px;
  color: var(--accent);
  margin-bottom: 10px;
  text-transform: uppercase;
}
.info-header-title {
  font-size: 32px;
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: #fff;
}
.info-steps {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: clamp(10px, 1.5vh, 18px);
  max-width: 860px;
}
.info-step {
  display: flex;
  align-items: center;
  gap: clamp(16px, 2vw, 24px);
  padding: clamp(14px, 2vh, 22px) clamp(18px, 2.5vw, 28px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-left: 4px solid var(--accent);
  border-radius: 12px;
  opacity: 0;
  transform: translateX(-32px);
}
.info-step:nth-child(1) { animation: slideRight 0.6s 0.5s forwards; }
.info-step:nth-child(2) { animation: slideRight 0.6s 0.9s forwards; }
.info-step:nth-child(3) { animation: slideRight 0.6s 1.3s forwards; }
.info-step:nth-child(4) { animation: slideRight 0.6s 1.7s forwards; }
.info-step-num {
  flex-shrink: 0;
  width: clamp(36px, 4vw, 48px);
  height: clamp(36px, 4vw, 48px);
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-dim));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(16px, 1.6vw, 20px);
  font-weight: 900;
  color: #fff;
  box-shadow: 0 6px 20px rgba(16,185,129,0.35);
}
.info-step-text {
  flex: 1;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  line-height: 1.45;
}
.info-step-text span.hl { color: var(--highlight); font-weight: 800; }
.info-step-text span.danger { color: var(--danger); font-weight: 800; }

/* ====================================================
 *  씬 타입 5: 타이틀 카드
 * ==================================================== */
.scene-title-card {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px;
  background: #000;
  text-align: center;
}
.title-card-chapter {
  font-size: clamp(11px, 1vw, 14px);
  font-weight: 800;
  letter-spacing: 7px;
  color: var(--accent);
  margin-bottom: clamp(24px, 3vh, 40px);
  opacity: 0;
  animation: fadeIn 0.6s 0.3s forwards;
  text-transform: uppercase;
}
.title-card-main {
  font-size: 64px;
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.04em;
  color: #fff;
  margin-bottom: 28px;
  opacity: 0;
  transform: scale(0.75);
  animation: popIn 0.9s 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.title-card-main .accent { color: var(--accent); }
.title-card-line {
  width: 80px;
  height: 3px;
  background: var(--accent);
  margin-bottom: clamp(20px, 3vh, 32px);
  opacity: 0;
  animation: expandLine 0.7s 1.4s forwards;
}
@keyframes expandLine {
  from { width: 0; opacity: 0; }
  to { width: 80px; opacity: 1; }
}
.title-card-sub {
  font-size: clamp(14px, 1.4vw, 18px);
  font-weight: 500;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.6s 1.6s forwards;
}

/* ====================================================
 *  씬 타입 6: 2단 비교 (올바른/잘못된)
 * ==================================================== */
/* 세로형이므로 비교 씬은 위/아래로 분할 */
.scene-comparison {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: 1fr 1fr;
  gap: 4px;
  background: #000;
}
.comp-side {
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: clamp(24px, 4vw, 56px);
}
.comp-wrong { background: rgba(239,68,68,0.08); }
.comp-right { background: rgba(16,185,129,0.08); }
.comp-side .bg-image,
.comp-side .bg-video {
  opacity: 0.55 !important;
}
.comp-side-label {
  position: relative;
  z-index: 2;
  font-size: clamp(11px, 1vw, 14px);
  font-weight: 800;
  letter-spacing: 3px;
  padding: 6px 12px;
  border-radius: 4px;
  display: inline-block;
  margin-bottom: 14px;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.5s 0.3s forwards;
  align-self: flex-start;
}
.comp-wrong .comp-side-label {
  background: rgba(239,68,68,0.2);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.5);
}
.comp-right .comp-side-label {
  background: rgba(16,185,129,0.2);
  color: var(--accent);
  border: 1px solid rgba(16,185,129,0.5);
}
.comp-side-text {
  position: relative;
  z-index: 2;
  font-size: clamp(18px, 2.2vw, 28px);
  font-weight: 700;
  line-height: 1.3;
  color: #fff;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.7s 0.6s forwards;
}

/* ====================================================
 *  공통 애니메이션
 * ==================================================== */
@keyframes fadeIn { to { opacity: 1; } }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
@keyframes slideUpBig { to { opacity: 1; transform: translateY(0); } }
@keyframes slideRight { to { opacity: 1; transform: translateX(0); } }
@keyframes popIn { to { opacity: 1; transform: scale(1); } }
@keyframes popScale { to { opacity: 1; transform: scale(1); } }

/* ====================================================
 *  상단 HUD
 * ==================================================== */
.top-hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: clamp(14px, 2vh, 22px) clamp(18px, 3vw, 32px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 50;
  pointer-events: none;
}
.hud-label {
  font-size: clamp(10px, 0.9vw, 12px);
  font-weight: 800;
  letter-spacing: 2.5px;
  color: rgba(255,255,255,0.9);
  padding: 7px 14px;
  background: rgba(0,0,0,0.5);
  border-radius: 3px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}
.hud-counter {
  font-size: clamp(10px, 0.9vw, 12px);
  font-weight: 800;
  color: var(--accent);
  padding: 6px 14px;
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.4);
  border-radius: 3px;
  backdrop-filter: blur(10px);
}
.top-progress {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  z-index: 51;
}
.top-progress-fill {
  height: 100%;
  background: var(--accent);
  box-shadow: 0 0 14px var(--accent);
  transition: width 0.3s linear;
  width: 0%;
}

/* ====================================================
 *  하단 컨트롤
 * ==================================================== */
.bottom-controls {
  position: absolute;
  bottom: clamp(20px, 3vh, 36px);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: clamp(14px, 1.5vw, 20px);
  z-index: 60;
}
.ctrl {
  width: clamp(44px, 5vw, 52px);
  height: clamp(44px, 5vw, 52px);
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: #fff;
  font-size: clamp(18px, 1.8vw, 22px);
  cursor: pointer;
  backdrop-filter: blur(14px);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.ctrl:hover { background: rgba(255,255,255,0.18); }
.ctrl-main {
  width: clamp(58px, 6.5vw, 70px);
  height: clamp(58px, 6.5vw, 70px);
  background: var(--accent);
  border: none;
  font-size: clamp(22px, 2.4vw, 28px);
  box-shadow: 0 10px 32px rgba(16,185,129,0.4);
}
.ctrl-main:hover { background: #0EA572; transform: scale(1.04); }

.credit {
  position: absolute;
  bottom: 4px; right: 10px;
  font-size: clamp(9px, 0.7vw, 11px);
  color: rgba(255,255,255,0.35);
  z-index: 5;
  letter-spacing: 0.5px;
}

/* 로딩 */
.loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 24px;
  z-index: 90; background: #000;
}
.loading.hidden { display: none; }
.spinner {
  width: 48px; height: 48px;
  border: 3px solid rgba(16,185,129,0.25);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 600;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 시작 화면 */
.start-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: clamp(18px, 2.5vh, 30px);
  background: radial-gradient(ellipse at top, #0F172A 0%, #000 70%);
  z-index: 100;
  padding: 40px;
  text-align: center;
}
.start-screen.hidden { display: none; }
.start-kicker {
  font-size: clamp(11px, 1vw, 14px);
  font-weight: 800;
  letter-spacing: 7px;
  color: var(--accent);
  text-transform: uppercase;
}
.start-title {
  font-size: 56px;
  font-weight: 900;
  line-height: 1.0;
  letter-spacing: -0.03em;
}
.start-title .accent { color: var(--accent); }
.start-line { width: 50px; height: 2px; background: var(--accent); }
.start-meta {
  display: flex;
  gap: clamp(14px, 2vw, 24px);
  font-size: clamp(12px, 1.1vw, 14px);
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1.5px;
}
.start-meta span:not(:first-child) {
  padding-left: clamp(14px, 2vw, 24px);
  border-left: 1px solid rgba(255,255,255,0.15);
}
.start-btn {
  margin-top: 8px;
  padding: clamp(14px, 1.8vh, 18px) clamp(36px, 4vw, 56px);
  border-radius: 2px;
  border: none;
  background: #fff;
  color: #000;
  font-size: clamp(13px, 1.1vw, 15px);
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.start-btn:hover { background: var(--accent); color: #fff; }

/* 완료 */
.completion {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: clamp(14px, 2vh, 24px);
  background: radial-gradient(ellipse at center, #0F172A 0%, #000 80%);
  z-index: 80;
  padding: 40px; text-align: center;
}
.completion.active { display: flex; }
.completion-kicker {
  font-size: clamp(11px, 1vw, 14px);
  font-weight: 800;
  letter-spacing: 6px;
  color: var(--accent);
  text-transform: uppercase;
  opacity: 0; animation: fadeIn 0.6s 0.2s forwards;
}
.completion-title {
  font-size: 52px;
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.03em;
  color: #fff;
  opacity: 0; transform: translateY(20px);
  animation: slideUpBig 0.8s 0.5s forwards;
}
.completion-msg {
  font-size: clamp(15px, 1.5vw, 18px);
  color: rgba(255,255,255,0.65);
  line-height: 1.6;
  max-width: 420px;
  opacity: 0; animation: fadeIn 0.6s 1s forwards;
}
.completion-btn {
  margin-top: 20px;
  padding: 14px 44px;
  border-radius: 2px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 13px; font-weight: 800;
  letter-spacing: 2.5px;
  cursor: pointer;
  text-transform: uppercase;
  opacity: 0; animation: fadeIn 0.6s 1.3s forwards;
}
</style>
</head>
<body>

<div class="container">

  <!-- 시작 화면 -->
  <div class="start-screen" id="startScreen">
    <div class="start-kicker">Aion Kinder · Protocol 01</div>
    <h1 class="start-title">등원 <span class="accent">맞이</span><br>표준 절차</h1>
    <div class="start-line"></div>
    <div class="start-meta">
      <span>약 90초</span>
      <span>11개 씬</span>
      <span>🔊 소리 켜세요</span>
    </div>
    <button class="start-btn" onclick="startDemo()">▶ Begin</button>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">PREPARING</div>
  </div>

  <!-- 씬 스테이지 -->
  <div class="scene-stage" id="sceneStage"></div>

  <!-- 진행률 -->
  <div class="top-progress"><div class="top-progress-fill" id="progressFill"></div></div>

  <!-- 상단 HUD -->
  <div class="top-hud">
    <div class="hud-label">AION KINDER</div>
    <div class="hud-counter" id="sceneCounter">01 · 11</div>
  </div>

  <!-- 컨트롤 -->
  <div class="bottom-controls">
    <button class="ctrl" onclick="prevScene()">‹</button>
    <button class="ctrl ctrl-main" id="playBtn" onclick="togglePlay()">⏸</button>
    <button class="ctrl" onclick="nextScene()">›</button>
  </div>

  <div class="credit" id="credit">AION KINDER ACADEMY</div>

  <!-- 완료 -->
  <div class="completion" id="completion">
    <div class="completion-kicker">Protocol Complete</div>
    <h2 class="completion-title">학습 완료</h2>
    <p class="completion-msg">등원 맞이 5단계를 모두 배우셨습니다.<br>이제 실전 시나리오 퀴즈로 확인해봅시다.</p>
    <button class="completion-btn" onclick="location.reload()">Replay</button>
  </div>
</div>

<script>
/* ========================================================
 * 씬 구성 — 실제 교육 SOP 내용 기반
 * (진짜 유치원 등원 맞이 절차를 반영)
 * ======================================================== */

const SCENES = [
  // 1. 타이틀 카드
  {
    type: 'title_card',
    kicker: 'Protocol 01 · Morning Welcome',
    titleMain: '등원 <span class="accent">맞이</span>',
    titleSub: 'Standard Operating Procedure',
    narration: '프로토콜 01. 등원 맞이 표준 절차입니다',
    duration: 5,
  },

  // 2. 왜 중요한가 (통계)
  {
    type: 'stat',
    tag: 'WHY IT MATTERS',
    number: '90',
    unit: 'SECONDS',
    context: '아이가 유치원을 좋아할지, 싫어할지<br>결정되는 시간',
    source: 'MOE Childhood Development Study, 2023',
    searchQueries: ['kindergarten morning entrance child', 'preschool welcome scene'],
    narration: '아이의 첫 90초. 이 짧은 시간이 하루 전체 정서를 결정합니다',
    duration: 8,
  },

  // 3. 첫 단계: 체온 체크
  {
    type: 'video_focus',
    searchQueries: ['teacher checking child temperature forehead', 'health check kindergarten'],
    tag: 'STEP 01',
    caption: '도착 즉시 <b>체온 측정</b>. 37.5도 이상이면 격리',
    narration: '첫 번째 단계. 도착 즉시 체온을 측정하세요. 섭씨 37.5도 이상이면 즉시 격리실로 안내합니다',
    duration: 8,
  },

  // 4. 절차 인포그래픽
  {
    type: 'infographic',
    headerTag: 'Health Screening',
    headerTitle: '체온 체크 <span style="color:var(--highlight)">3단계</span>',
    steps: [
      '비접촉 체온계로 이마 중앙 <span class="hl">3회 측정</span>',
      '평균값이 <span class="danger">37.5도 이상</span>이면 격리실 안내',
      '보호자에게 즉시 연락 · 원아 기록부 작성',
    ],
    narration: '체온 체크 3단계. 이마 중앙 3회 측정, 평균 37.5도 이상이면 격리, 보호자 즉시 연락',
    duration: 11,
  },

  // 5. 두 번째 단계: 눈높이 인사 (타이포)
  {
    type: 'typography',
    searchQueries: ['teacher kneeling child eye level preschool', 'teacher crouching comforting kid'],
    label: 'Step 02 · The Principle',
    main: '항상 <span class="hl">무릎을</span><br>꿇으세요',
    sub: '서서 내려다보지 마세요. 아이 시선에 맞춰야 심리적 안정이 만들어집니다. 이것은 선택이 아닌 원칙입니다.',
    narration: '두 번째 단계. 항상 무릎을 꿇어 아이 눈높이에 맞추세요. 서서 내려다보면 아이는 위협을 느낍니다',
    duration: 9,
  },

  // 6. 비교 (잘못된 vs 올바른)
  {
    type: 'comparison',
    tag: 'DO NOT VS DO',
    leftSearchQueries: ['adult looking down at child angry', 'standing tall over child'],
    rightSearchQueries: ['teacher kneeling eye level child smile', 'adult squatting talking to kid'],
    leftLabel: '잘못된 방식',
    leftText: '서서 인사하며<br>"왜 울어?" 라고 묻기',
    rightLabel: '올바른 방식',
    rightText: '무릎을 꿇고 눈 맞추며<br>"선생님이 도와줄게"',
    narration: '잘못된 방식은 서서 왜 우냐고 묻는 것, 올바른 방식은 무릎 꿇고 도와주겠다고 말하는 것입니다',
    duration: 10,
  },

  // 7. 세 번째 단계: 부모와의 30초
  {
    type: 'video_focus',
    searchQueries: ['parent teacher conversation handoff preschool', 'mother handing child to teacher'],
    tag: 'STEP 03',
    caption: '보호자와 <b>30초 이내</b> 필수 소통',
    narration: '세 번째 단계. 보호자와 반드시 30초 이내 소통하세요. 컨디션, 식사, 특이사항 3가지를 확인합니다',
    duration: 8,
  },

  // 8. 3가지 질문 인포그래픽
  {
    type: 'infographic',
    headerTag: 'Parent Handoff',
    headerTitle: '부모 대화 <span style="color:var(--highlight)">3문장</span>',
    steps: [
      '"<span class="hl">밤새 컨디션</span>은 어떠셨어요?"',
      '"<span class="hl">아침 식사</span>는 하셨나요?"',
      '"<span class="hl">특별히 전달</span>하실 내용 있으세요?"',
    ],
    narration: '3문장만 기억하세요. 밤새 컨디션, 아침 식사, 특이사항. 이걸 놓치면 아이 하루가 꼬입니다',
    duration: 11,
  },

  // 9. 경고 - 절대 하지 말 것
  {
    type: 'typography',
    searchQueries: ['sad crying child alone preschool', 'worried child first day school'],
    label: '⚠ NEVER',
    main: '"<span class="hl">울지마</span>"<br>라고 말하지 마세요',
    sub: '감정 부정은 신뢰 파괴입니다. "많이 무서웠구나"라고 감정을 먼저 인정해주세요.',
    narration: '절대 울지마라는 말은 하지 마세요. 감정을 부정하는 대신, 많이 무서웠구나라고 먼저 인정해주세요',
    duration: 9,
  },

  // 10. 전체 체크리스트
  {
    type: 'infographic',
    headerTag: 'Daily Checklist',
    headerTitle: '등원 맞이 <span style="color:var(--highlight)">완성</span>',
    steps: [
      '체온 측정 · 37.5도 미만 확인',
      '무릎 꿇고 이름 불러 인사',
      '부모 3문장 소통 · 30초 이내',
      '감정 인정 · "괜찮아" 대신 "그랬구나"',
    ],
    narration: '최종 체크리스트. 체온 측정, 무릎 꿇고 인사, 부모 3문장 소통, 감정 인정. 이 4가지가 프로토콜입니다',
    duration: 13,
  },

  // 11. 마무리 타이틀
  {
    type: 'title_card',
    kicker: 'Coming Up',
    titleMain: '실전 <span class="accent">퀴즈</span>',
    titleSub: 'Scenario-based Assessment',
    narration: '이제, 실제 상황 퀴즈로 확인해봅시다',
    duration: 5,
  },
];

let currentIndex = 0;
let isPlaying = true;
let currentAudio = null;
let audioElements = [];
let videoCache = {}; // query → result
let advanceTimer = null;

/* ========================================================
 * 시작
 * ======================================================== */
async function startDemo() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');

  document.getElementById('loadingText').textContent = 'Searching scenes';
  await loadAllVideos();

  document.getElementById('loadingText').textContent = 'Generating narration';
  await loadAllNarrations();

  document.getElementById('loading').classList.add('hidden');
  currentIndex = 0;
  playScene(0);
}

// 각 씬이 필요로 하는 모든 query를 모아 병렬 검색
// 여러 query 중 첫 번째 성공만 캐싱
async function loadAllVideos() {
  const allQueries = new Set();
  SCENES.forEach(s => {
    (s.searchQueries || []).forEach(q => allQueries.add(q));
    (s.leftSearchQueries || []).forEach(q => allQueries.add(q));
    (s.rightSearchQueries || []).forEach(q => allQueries.add(q));
  });

  await Promise.all([...allQueries].map(async q => {
    try {
      const res = await fetch('/api/video-search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q, count: 1, minDuration: 4, maxDuration: 20 })
      });
      const data = await res.json();
      if (data.results?.[0]) videoCache[q] = data.results[0];
    } catch (e) {
      console.warn('Video search failed:', q);
    }
  }));
}

// 여러 검색어 중 첫 번째 매치 반환
function getVideoForQueries(queries) {
  if (!queries || queries.length === 0) return null;
  for (const q of queries) {
    if (videoCache[q]) return videoCache[q];
  }
  return null;
}

async function loadAllNarrations() {
  audioElements = [];
  await Promise.all(SCENES.map(async (scene, idx) => {
    try {
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: scene.narration, lang: 'ko-KR', gender: 'female' })
      });
      if (!res.ok) throw new Error('TTS HTTP ' + res.status);
      const blob = await res.blob();
      audioElements[idx] = new Audio(URL.createObjectURL(blob));
      audioElements[idx].preload = 'auto';
    } catch (e) {
      console.warn(`Scene ${idx} TTS failed:`, e.message);
      audioElements[idx] = null;
    }
  }));
}

/* ========================================================
 * 렌더링
 * ======================================================== */
function renderScene(scene) {
  const stage = document.getElementById('sceneStage');

  // 공통 비디오 URL
  const mainVideo = getVideoForQueries(scene.searchQueries);
  const bgVideoHtml = mainVideo ? `
    <video class="bg-video active" src="${mainVideo.url}" autoplay muted playsinline loop></video>
    <div class="bg-dim"></div>
  ` : '<div class="bg-dim"></div>';

  if (scene.type === 'title_card') {
    stage.innerHTML = `
      <div class="scene-title-card">
        <div class="title-card-chapter">${scene.kicker}</div>
        <h1 class="title-card-main">${scene.titleMain}</h1>
        <div class="title-card-line"></div>
        <div class="title-card-sub">${scene.titleSub}</div>
      </div>
    `;
  } else if (scene.type === 'video_focus') {
    stage.innerHTML = `
      ${bgVideoHtml}
      <div class="scene-video-focus" style="position:absolute;inset:0;">
        <div class="caption">
          ${scene.tag ? `<div class="tag">${scene.tag}</div><br>` : ''}
          <span class="caption-text">${scene.caption}</span>
        </div>
      </div>
    `;
  } else if (scene.type === 'stat') {
    stage.innerHTML = `
      ${bgVideoHtml}
      <div class="scene-stat">
        <div class="stat-tag">${scene.tag || 'DATA'}</div>
        <div class="stat-number">${scene.number}</div>
        ${scene.unit ? `<div class="stat-unit">${scene.unit}</div>` : ''}
        <div class="stat-context">${scene.context}</div>
        ${scene.source ? `<div class="stat-source">— ${scene.source}</div>` : ''}
      </div>
    `;
  } else if (scene.type === 'typography') {
    stage.innerHTML = `
      ${bgVideoHtml}
      <div class="scene-typography">
        <div class="typo-label">${scene.label}</div>
        <h2 class="typo-main">${scene.main}</h2>
        <p class="typo-sub">${scene.sub}</p>
      </div>
    `;
  } else if (scene.type === 'infographic') {
    stage.innerHTML = `
      <div class="scene-infographic">
        <div class="info-header">
          <div class="info-header-tag">${scene.headerTag}</div>
          <h2 class="info-header-title">${scene.headerTitle}</h2>
        </div>
        <div class="info-steps">
          ${scene.steps.map((s, i) => `
            <div class="info-step">
              <div class="info-step-num">${i+1}</div>
              <div class="info-step-text">${s}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else if (scene.type === 'comparison') {
    const leftV = getVideoForQueries(scene.leftSearchQueries);
    const rightV = getVideoForQueries(scene.rightSearchQueries);
    stage.innerHTML = `
      <div class="scene-comparison">
        <div class="comp-side comp-wrong">
          ${leftV ? `<video class="bg-video active" src="${leftV.url}" autoplay muted playsinline loop></video>` : ''}
          <div class="bg-dim"></div>
          <div class="comp-side-label">✕ ${scene.leftLabel}</div>
          <div class="comp-side-text">${scene.leftText}</div>
        </div>
        <div class="comp-side comp-right">
          ${rightV ? `<video class="bg-video active" src="${rightV.url}" autoplay muted playsinline loop></video>` : ''}
          <div class="bg-dim"></div>
          <div class="comp-side-label">✓ ${scene.rightLabel}</div>
          <div class="comp-side-text">${scene.rightText}</div>
        </div>
      </div>
    `;
  }

  // 크레딧
  const cred = mainVideo?.author ? `VIDEO · ${mainVideo.author.toUpperCase()} / PEXELS` : 'AION KINDER ACADEMY';
  document.getElementById('credit').textContent = cred;
}

/* ========================================================
 * 씬 재생
 * ======================================================== */
function playScene(idx) {
  if (idx < 0 || idx >= SCENES.length) return;

  audioElements.forEach(a => { if (a) { a.pause(); a.currentTime = 0; } });
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }

  currentIndex = idx;
  const scene = SCENES[idx];

  document.getElementById('sceneCounter').textContent = `${String(idx+1).padStart(2,'0')} · ${SCENES.length}`;
  document.getElementById('progressFill').style.width = `${((idx+1)/SCENES.length)*100}%`;

  renderScene(scene);

  currentAudio = audioElements[idx];
  let audioDuration = scene.duration;
  if (isPlaying && currentAudio) {
    try {
      currentAudio.currentTime = 0;
      currentAudio.play().catch(() => {});
      currentAudio.onloadedmetadata = () => {
        const audioDur = currentAudio.duration;
        if (audioDur > audioDuration) {
          audioDuration = audioDur + 0.8;
          if (advanceTimer) clearTimeout(advanceTimer);
          advanceTimer = setTimeout(() => {
            idx === SCENES.length - 1 ? showCompletion() : playScene(idx + 1);
          }, audioDuration * 1000);
        }
      };
    } catch (e) { console.warn('Audio error:', e); }
  } else if (isPlaying && 'speechSynthesis' in window) {
    const utter = new SpeechSynthesisUtterance(scene.narration);
    utter.lang = 'ko-KR';
    const voices = speechSynthesis.getVoices();
    const krVoice = voices.find(v => v.lang.startsWith('ko'));
    if (krVoice) utter.voice = krVoice;
    speechSynthesis.speak(utter);
  }

  if (isPlaying) {
    advanceTimer = setTimeout(() => {
      idx === SCENES.length - 1 ? showCompletion() : playScene(idx + 1);
    }, audioDuration * 1000);
  }
}

/* ========================================================
 * 컨트롤
 * ======================================================== */
function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    playScene(currentIndex);
  } else {
    audioElements.forEach(a => { if (a) a.pause(); });
    document.querySelectorAll('.bg-video').forEach(v => v.pause());
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  }
}
function prevScene() { if (currentIndex > 0) playScene(currentIndex - 1); }
function nextScene() {
  if (currentIndex < SCENES.length - 1) playScene(currentIndex + 1);
  else showCompletion();
}
function showCompletion() {
  audioElements.forEach(a => { if (a) a.pause(); });
  document.querySelectorAll('.bg-video').forEach(v => v.pause());
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  document.getElementById('completion').classList.add('active');
}
if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
