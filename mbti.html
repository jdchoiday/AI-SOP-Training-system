<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - MBTI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link rel="icon" href="assets/icon-192.svg">
  <style>
    /* ===== MBTI Test Styles ===== */
    .mbti-container { padding-bottom: 100px; }

    /* Welcome Screen */
    .mbti-welcome { text-align: center; padding: 20px 0; }
    .mbti-welcome .hero-icon { font-size: 72px; margin-bottom: 16px; }
    .mbti-welcome h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .mbti-welcome p { color: var(--gray-500); font-size: 14px; line-height: 1.7; margin-bottom: 16px; }
    .mbti-welcome .feature-list {
      text-align: left; background: var(--bg-card); border-radius: var(--radius);
      padding: 16px 20px; margin: 16px 0; box-shadow: var(--shadow);
    }
    .mbti-welcome .feature-list li {
      list-style: none; padding: 8px 0; font-size: 14px; color: var(--gray-700);
      border-bottom: 1px solid var(--gray-100);
    }
    .mbti-welcome .feature-list li:last-child { border-bottom: none; }
    .mbti-welcome .feature-list li::before { content: ''; margin-right: 8px; }

    .btn-start-mbti {
      display: inline-block; background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; border: none; padding: 16px 48px; border-radius: 50px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-start-mbti:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.5); }

    /* Progress Bar */
    .mbti-progress-wrap {
      background: var(--gray-200); border-radius: 20px; height: 8px;
      margin-bottom: 20px; overflow: hidden;
    }
    .mbti-progress-fill {
      height: 100%; border-radius: 20px;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      transition: width 0.4s ease;
    }
    .mbti-progress-text {
      display: flex; justify-content: space-between; margin-bottom: 8px;
      font-size: 13px; color: var(--gray-500); font-weight: 600;
    }

    /* Question Screen */
    .mbti-question-screen { display: none; }
    .mbti-question-screen.active { display: block; }
    .mbti-dimension-badge {
      display: inline-block; background: var(--primary-light); color: var(--primary);
      font-size: 12px; font-weight: 700; padding: 4px 12px;
      border-radius: 20px; margin-bottom: 12px;
    }
    .mbti-question-text {
      font-size: 18px; font-weight: 700; color: var(--gray-900);
      line-height: 1.6; margin-bottom: 24px; min-height: 60px;
    }
    .mbti-options { display: flex; flex-direction: column; gap: 14px; }
    .mbti-option-btn {
      display: flex; align-items: center; gap: 14px;
      background: var(--bg-card); border: 2px solid var(--gray-200);
      border-radius: var(--radius); padding: 18px 20px;
      font-size: 15px; color: var(--gray-700); cursor: pointer;
      transition: all 0.25s ease; text-align: left; line-height: 1.5;
    }
    .mbti-option-btn:hover { border-color: #6366f1; background: rgba(99,102,241,0.15); }
    .mbti-option-btn.selected {
      border-color: #6366f1; background: rgba(99,102,241,0.2); color: #a78bfa; font-weight: 600;
    }
    .mbti-option-label {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; min-width: 36px;
      border-radius: 50%; background: var(--gray-100);
      font-weight: 700; font-size: 15px; color: var(--gray-500);
      transition: all 0.25s;
    }
    .mbti-option-btn.selected .mbti-option-label {
      background: #6366f1; color: white;
    }

    /* Navigation */
    .mbti-nav-row {
      display: flex; gap: 12px; margin-top: 24px; justify-content: space-between;
    }
    .mbti-nav-btn {
      flex: 1; padding: 14px; border-radius: 10px; font-size: 15px;
      font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
    }
    .mbti-nav-btn.prev { background: var(--gray-100); color: var(--gray-700); }
    .mbti-nav-btn.next {
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white;
      box-shadow: 0 2px 8px rgba(99,102,241,0.3);
    }
    .mbti-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Result Screen */
    .mbti-result-screen { display: none; text-align: center; }
    .mbti-result-screen.active { display: block; }

    .mbti-reveal-anim {
      animation: mbtiReveal 0.8s ease-out;
    }
    @keyframes mbtiReveal {
      0% { opacity: 0; transform: scale(0.7) translateY(30px); }
      50% { transform: scale(1.05) translateY(-5px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(60px) rotate(360deg); opacity: 0; }
    }

    .mbti-type-badge {
      display: inline-block; font-size: 48px; font-weight: 900;
      background: linear-gradient(135deg, #6366f1, #a78bfa, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin: 16px 0 4px; letter-spacing: 4px;
    }
    .mbti-type-icon { font-size: 64px; margin-bottom: 8px; }
    .mbti-type-name {
      font-size: 18px; font-weight: 700; color: var(--gray-700); margin-bottom: 20px;
    }

    .mbti-result-card {
      background: var(--bg-card); border-radius: var(--radius); padding: 20px;
      margin-bottom: 16px; box-shadow: var(--shadow); text-align: left;
    }
    .mbti-result-card h4 {
      font-size: 14px; font-weight: 700; color: #6366f1;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .mbti-result-card p, .mbti-result-card li {
      font-size: 14px; color: var(--gray-700); line-height: 1.7;
    }
    .mbti-result-card ul { padding-left: 20px; }
    .mbti-result-card li { margin-bottom: 4px; }

    /* Score Bars */
    .mbti-score-bars { margin-top: 8px; }
    .mbti-score-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .mbti-score-label {
      font-size: 13px; font-weight: 700; width: 22px; text-align: center;
    }
    .mbti-score-label.active-dim { color: #6366f1; }
    .mbti-score-bar-bg {
      flex: 1; height: 10px; background: var(--gray-100);
      border-radius: 10px; overflow: hidden; position: relative;
    }
    .mbti-score-bar-fill {
      height: 100%; border-radius: 10px;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      transition: width 1s ease;
    }
    .mbti-score-pct {
      font-size: 12px; font-weight: 600; color: var(--gray-500); width: 36px;
      text-align: right;
    }

    .btn-home {
      display: inline-block; background: var(--gray-100); color: var(--gray-700);
      border: none; padding: 14px 36px; border-radius: 50px;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-home:hover { background: var(--gray-200); }

    .btn-retake {
      display: inline-block; background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; border: none; padding: 14px 36px; border-radius: 50px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,0.3); margin-top: 8px;
      transition: transform 0.2s;
    }
    .btn-retake:hover { transform: translateY(-1px); }

    /* Confetti overlay */
    .confetti-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9999; overflow: hidden;
    }
    .confetti-piece {
      position: absolute; width: 10px; height: 10px; border-radius: 2px;
      animation: confettiFall 2s ease-out forwards;
    }

    /* Previous result banner */
    .mbti-prev-result {
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(59,130,246,0.15));
      border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
      text-align: center;
    }
    .mbti-prev-result .prev-type {
      font-size: 28px; font-weight: 900; color: #6366f1; letter-spacing: 2px;
    }
    .mbti-prev-result .prev-date {
      font-size: 12px; color: var(--gray-500); margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="app.html">
      <span class="nav-icon">&#127968;</span> <span class="nav-label-home"></span>
    </a>
    <a href="tasks.html">
      <span class="nav-icon">&#9989;</span> <span class="nav-label-tasks"></span>
    </a>
    <a href="my-results.html">
      <span class="nav-icon">&#127942;</span> <span class="nav-label-results"></span>
    </a>
  </div>

  <div class="app-container mbti-container">

    <!-- Header -->
    <div class="app-header">
      <div style="display:flex; align-items:center; gap:8px;">
        <a href="app.html" style="color:var(--gray-500); text-decoration:none; font-size:20px;">&larr;</a>
        <h2 id="pageTitle">MBTI</h2>
      </div>
      <div class="user-avatar" id="userAvatar" title="">?</div>
    </div>

    <!-- ===== SCREEN 1: Welcome ===== -->
    <div id="welcomeScreen" class="mbti-welcome">
      <div class="hero-icon">&#129504;</div>
      <h2 id="welcomeTitle"></h2>
      <p id="welcomeDesc"></p>

      <!-- Previous result -->
      <div id="prevResultBanner" class="mbti-prev-result" style="display:none;">
        <div id="prevResultLabel" style="font-size:13px; color:var(--gray-500); margin-bottom:4px;"></div>
        <div class="prev-type" id="prevResultType"></div>
        <div class="prev-date" id="prevResultDate"></div>
      </div>

      <div class="feature-list">
        <ul id="featureList"></ul>
      </div>
      <p style="font-size:13px; color:var(--gray-500); margin-bottom:24px;" id="timeEstimate"></p>
      <button class="btn-start-mbti" id="btnStart"></button>
    </div>

    <!-- ===== SCREEN 2: Questions ===== -->
    <div id="questionScreen" style="display:none;">
      <div class="mbti-progress-text">
        <span id="qProgress"></span>
        <span id="qDimension"></span>
      </div>
      <div class="mbti-progress-wrap">
        <div class="mbti-progress-fill" id="progressFill" style="width:0%"></div>
      </div>

      <div class="card" style="padding:24px;">
        <div class="mbti-dimension-badge" id="dimBadge"></div>
        <div class="mbti-question-text" id="qText"></div>
        <div class="mbti-options">
          <button class="mbti-option-btn" id="optA" onclick="selectOption('A')">
            <span class="mbti-option-label">A</span>
            <span id="optAText"></span>
          </button>
          <button class="mbti-option-btn" id="optB" onclick="selectOption('B')">
            <span class="mbti-option-label">B</span>
            <span id="optBText"></span>
          </button>
        </div>
      </div>

      <div class="mbti-nav-row">
        <button class="mbti-nav-btn prev" id="btnPrev" onclick="prevQuestion()"></button>
        <button class="mbti-nav-btn next" id="btnNext" onclick="nextQuestion()"></button>
      </div>
    </div>

    <!-- ===== SCREEN 3: Result ===== -->
    <div id="resultScreen" class="mbti-result-screen">
      <div class="mbti-reveal-anim">
        <div class="mbti-type-icon" id="resultIcon"></div>
        <div class="mbti-type-badge" id="resultType"></div>
        <div class="mbti-type-name" id="resultName"></div>
      </div>

      <!-- Description -->
      <div class="mbti-result-card" id="cardDesc">
        <h4 id="cardDescTitle"></h4>
        <p id="resultDesc"></p>
      </div>

      <!-- Score Bars -->
      <div class="mbti-result-card">
        <h4 id="cardScoreTitle"></h4>
        <div class="mbti-score-bars" id="scoreBars"></div>
      </div>

      <!-- Work Style -->
      <div class="mbti-result-card" id="cardWork">
        <h4 id="cardWorkTitle"></h4>
        <ul id="resultWork"></ul>
      </div>

      <!-- Communication Tips -->
      <div class="mbti-result-card" id="cardComm">
        <h4 id="cardCommTitle"></h4>
        <ul id="resultComm"></ul>
      </div>

      <!-- Buttons -->
      <div style="margin-top:24px; display:flex; flex-direction:column; gap:10px; align-items:center;">
        <button class="btn-retake" id="btnRetake" onclick="retakeTest()"></button>
        <button class="btn-home" id="btnGoHome" onclick="location.href='app.html'"></button>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/demo-data.js"></script>
  <script>
  // ===== Multi-language =====
  const MBTI_T = {
    ko: {
      home: '홈', aiChat: 'AI 질문', myResults: '내 결과',
      pageTitle: 'MBTI 성격유형 검사',
      welcomeTitle: '나의 업무 성격유형은?',
      welcomeDesc: 'MBTI 검사를 통해 나의 성격유형을 알아보고,\n팀에서 나의 강점과 소통 방식을 발견해보세요.',
      features: [
        '20개 문항, 약 5분 소요',
        '서비스업 맞춤 질문으로 구성',
        '나의 업무 스타일 & 강점 분석',
        '팀 소통 팁 제공'
      ],
      timeEstimate: '약 5분 소요 | 총 20문항',
      btnStart: '검사 시작하기',
      prevResult: '이전 검사 결과',
      qOf: (c, t) => `${c} / ${t}`,
      dimensions: { EI: 'E/I 외향·내향', SN: 'S/N 감각·직관', TF: 'T/F 사고·감정', JP: 'J/P 판단·인식' },
      btnPrev: '이전',
      btnNext: '다음',
      btnSubmit: '결과 보기',
      selectFirst: '답변을 선택해주세요',
      cardDesc: '&#128218; 성격유형 설명',
      cardScore: '&#128202; 성향 점수',
      cardWork: '&#128188; 업무 스타일 강점',
      cardComm: '&#128172; 소통 팁 (매니저용)',
      btnRetake: '다시 검사하기',
      btnGoHome: '홈으로 돌아가기',
    },
    en: {
      home: 'Home', aiChat: 'AI Q&A', myResults: 'Results',
      pageTitle: 'MBTI Personality Test',
      welcomeTitle: 'What is your work personality?',
      welcomeDesc: 'Discover your MBTI personality type\nand find your strengths and communication style at work.',
      features: [
        '20 questions, about 5 minutes',
        'Tailored for service industry',
        'Work style & strength analysis',
        'Team communication tips'
      ],
      timeEstimate: 'About 5 min | 20 questions',
      btnStart: 'Start Test',
      prevResult: 'Previous Result',
      qOf: (c, t) => `${c} / ${t}`,
      dimensions: { EI: 'E/I Extraversion·Introversion', SN: 'S/N Sensing·Intuition', TF: 'T/F Thinking·Feeling', JP: 'J/P Judging·Perceiving' },
      btnPrev: 'Previous',
      btnNext: 'Next',
      btnSubmit: 'See Results',
      selectFirst: 'Please select an answer',
      cardDesc: '&#128218; Personality Description',
      cardScore: '&#128202; Dimension Scores',
      cardWork: '&#128188; Work Style Strengths',
      cardComm: '&#128172; Communication Tips (for Managers)',
      btnRetake: 'Retake Test',
      btnGoHome: 'Back to Home',
    },
    vi: {
      home: 'Trang chu', aiChat: 'Hoi AI', myResults: 'Ket qua',
      pageTitle: 'Bai kiem tra MBTI',
      welcomeTitle: 'Tinh cach lam viec cua ban?',
      welcomeDesc: 'Kham pha loai tinh cach MBTI cua ban\nva tim ra diem manh va phong cach giao tiep tai noi lam viec.',
      features: [
        '20 cau hoi, khoang 5 phut',
        'Cau hoi danh cho nganh dich vu',
        'Phan tich phong cach & diem manh',
        'Meo giao tiep nhom'
      ],
      timeEstimate: 'Khoang 5 phut | 20 cau hoi',
      btnStart: 'Bat dau kiem tra',
      prevResult: 'Ket qua truoc',
      qOf: (c, t) => `${c} / ${t}`,
      dimensions: { EI: 'E/I Huong ngoai·Huong noi', SN: 'S/N Cam giac·Truc giac', TF: 'T/F Tu duy·Cam xuc', JP: 'J/P Phan doan·Nhan thuc' },
      btnPrev: 'Truoc',
      btnNext: 'Tiep',
      btnSubmit: 'Xem ket qua',
      selectFirst: 'Vui long chon cau tra loi',
      cardDesc: '&#128218; Mo ta tinh cach',
      cardScore: '&#128202; Diem cac chieu',
      cardWork: '&#128188; Diem manh cong viec',
      cardComm: '&#128172; Meo giao tiep (cho quan ly)',
      btnRetake: 'Lam lai',
      btnGoHome: 'Ve trang chu',
    }
  };

  const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
  const t = MBTI_T[lang] || MBTI_T.ko;

  // ===== Login check =====
  const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
  const loginTime = parseInt(localStorage.getItem('sop_login_time') || '0');
  if (Date.now() - loginTime > 24 * 60 * 60 * 1000) {
    localStorage.removeItem('sop_user');
    localStorage.removeItem('sop_login_time');
    window.location.href = 'index.html';
  }
  if (!user) { window.location.href = 'index.html'; }
  else { document.getElementById('userAvatar').textContent = (user.name || '?')[0]; }

  // ===== Nav labels =====
  document.querySelector('.nav-label-home').textContent = t.home;
  if (document.querySelector('.nav-label-tasks')) document.querySelector('.nav-label-tasks').textContent = lang === 'en' ? 'Tasks' : lang === 'vi' ? 'Nhiệm vụ' : '미션';
  document.querySelector('.nav-label-results').textContent = t.myResults;

  // ===== 20 MBTI Questions (service industry focused) =====
  const QUESTIONS = [
    // E/I (1-5)
    { dim: 'EI', a: 'E', b: 'I',
      ko: { q: '새로운 동료를 만났을 때 나는?', a: '먼저 반갑게 인사하고 말을 건다', b: '상대가 먼저 말해주길 기다린다' },
      en: { q: 'When meeting a new colleague, I...', a: 'Greet them first and start a conversation', b: 'Wait for them to approach me first' },
      vi: { q: 'Khi gap dong nghiep moi, toi...', a: 'Chao ho truoc va bat chuyen', b: 'Doi ho den noi chuyen truoc' }
    },
    { dim: 'EI', a: 'E', b: 'I',
      ko: { q: '바쁜 근무 중 에너지를 충전하는 방법은?', a: '동료들과 대화하며 활기를 찾는다', b: '잠시 조용한 곳에서 혼자 쉰다' },
      en: { q: 'How do you recharge during a busy shift?', a: 'Chat with coworkers to feel energized', b: 'Take a quiet break alone' },
      vi: { q: 'Ban nap nang luong the nao khi lam viec ban?', a: 'Noi chuyen voi dong nghiep', b: 'Nghi mot minh o noi yen tinh' }
    },
    { dim: 'EI', a: 'E', b: 'I',
      ko: { q: '팀 회의에서 나는?', a: '적극적으로 의견을 먼저 말한다', b: '다른 사람 의견을 듣고 정리 후 말한다' },
      en: { q: 'In team meetings, I tend to...', a: 'Speak up first with my ideas', b: 'Listen to others and share after organizing thoughts' },
      vi: { q: 'Trong cuoc hop nhom, toi...', a: 'Phat bieu y kien truoc', b: 'Lang nghe roi moi noi' }
    },
    { dim: 'EI', a: 'E', b: 'I',
      ko: { q: '고객이 많은 피크 시간에 나는?', a: '활기가 넘치고 더 집중된다', b: '빨리 끝나길 바라며 지친다' },
      en: { q: 'During peak hours with many customers, I feel...', a: 'Energized and more focused', b: 'Drained and hoping it ends soon' },
      vi: { q: 'Trong gio cao diem dong khach, toi cam thay...', a: 'Tran day nang luong', b: 'Met moi va muon het som' }
    },
    { dim: 'EI', a: 'E', b: 'I',
      ko: { q: '업무 후 퇴근할 때 선호하는 것은?', a: '동료들과 함께 식사나 모임', b: '집에서 혼자 조용히 보내기' },
      en: { q: 'After work, I prefer to...', a: 'Go out with coworkers for a meal', b: 'Go home and relax alone' },
      vi: { q: 'Sau gio lam, toi thich...', a: 'Di an voi dong nghiep', b: 'Ve nha nghi ngoi mot minh' }
    },
    // S/N (6-10)
    { dim: 'SN', a: 'S', b: 'N',
      ko: { q: '업무 지시를 받을 때 선호하는 방식은?', a: '구체적이고 단계별 지시', b: '전체 목표와 방향만 알려주면 된다' },
      en: { q: 'When receiving work instructions, I prefer...', a: 'Specific step-by-step directions', b: 'Just the overall goal and direction' },
      vi: { q: 'Khi nhan chi dan cong viec, toi thich...', a: 'Huong dan cu the tung buoc', b: 'Chi can biet muc tieu chung' }
    },

  // ===== State =====
  let currentQ = 0;
  let answers = new Array(20).fill(null); // 'A' or 'B'

  // ===== Init Page =====
  function initPage() {
    document.getElementById('pageTitle').textContent = t.pageTitle;
    document.getElementById('welcomeTitle').textContent = t.welcomeTitle;
    document.getElementById('welcomeDesc').textContent = t.welcomeDesc;
    document.getElementById('timeEstimate').textContent = t.timeEstimate;
    document.getElementById('btnStart').textContent = t.btnStart;

    const fl = document.getElementById('featureList');
    fl.innerHTML = t.features.map(f => `<li>${f}</li>`).join('');

    // Check previous result
    const prevKey = `sop_mbti_${user?.email || 'guest'}`;
    const prev = JSON.parse(localStorage.getItem(prevKey) || 'null');
    if (prev) {
      document.getElementById('prevResultBanner').style.display = 'block';
      document.getElementById('prevResultLabel').textContent = t.prevResult;
      document.getElementById('prevResultType').textContent = prev.type;
      const d = new Date(prev.completedAt);
      document.getElementById('prevResultDate').textContent = d.toLocaleDateString(lang === 'ko' ? 'ko-KR' : lang === 'vi' ? 'vi-VN' : 'en-US');
    }
  }
  initPage();

  // ===== Start Test =====
  document.getElementById('btnStart').addEventListener('click', () => {
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('questionScreen').style.display = 'block';
    answers = new Array(20).fill(null);
    currentQ = 0;
    renderQuestion();
  });

  // ===== Render Question =====
  function renderQuestion() {
    const q = QUESTIONS[currentQ];
    const ql = q[lang] || q.ko;
    const total = QUESTIONS.length;

    // Progress
    document.getElementById('qProgress').textContent = t.qOf(currentQ + 1, total);
    const dimKey = q.dim;
    document.getElementById('qDimension').textContent = t.dimensions[dimKey];
    document.getElementById('progressFill').style.width = ((currentQ + 1) / total * 100) + '%';
    document.getElementById('dimBadge').textContent = t.dimensions[dimKey];

    // Question text
    document.getElementById('qText').textContent = ql.q;
    document.getElementById('optAText').textContent = ql.a;
    document.getElementById('optBText').textContent = ql.b;

    // Selection state
    document.getElementById('optA').classList.toggle('selected', answers[currentQ] === 'A');
    document.getElementById('optB').classList.toggle('selected', answers[currentQ] === 'B');

    // Nav buttons
    document.getElementById('btnPrev').textContent = t.btnPrev;
    document.getElementById('btnPrev').style.display = currentQ === 0 ? 'none' : 'block';

    const isLast = currentQ === total - 1;
    document.getElementById('btnNext').textContent = isLast ? t.btnSubmit : t.btnNext;
  }

  function selectOption(opt) {
    answers[currentQ] = opt;
    document.getElementById('optA').classList.toggle('selected', opt === 'A');
    document.getElementById('optB').classList.toggle('selected', opt === 'B');
  }

  function prevQuestion() {
    if (currentQ > 0) { currentQ--; renderQuestion(); }
  }

  function nextQuestion() {
    if (answers[currentQ] === null) {
      alert(t.selectFirst);
      return;
    }
    if (currentQ < QUESTIONS.length - 1) {
      currentQ++;
      renderQuestion();
    } else {
      showResult();
    }
  }

  // ===== Calculate Result =====
  function calculateMBTI() {
    const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
    const dimCounts = { EI: 0, SN: 0, TF: 0, JP: 0 };

    QUESTIONS.forEach((q, i) => {
      const ans = answers[i];
      if (!ans) return;
      const chosen = ans === 'A' ? q.a : q.b;
      scores[chosen]++;
      dimCounts[q.dim]++;
    });

    // Convert to percentages
    const pct = {};
    [['E','I','EI'],['S','N','SN'],['T','F','TF'],['J','P','JP']].forEach(([a,b,dim]) => {
      const total = dimCounts[dim] || 1;
      pct[a] = Math.round((scores[a] / total) * 100);
      pct[b] = Math.round((scores[b] / total) * 100);
    });

    const type = (pct.E >= pct.I ? 'E' : 'I') +
                 (pct.S >= pct.N ? 'S' : 'N') +
                 (pct.T >= pct.F ? 'T' : 'F') +
                 (pct.J >= pct.P ? 'J' : 'P');

    return { type, scores: pct };
  }

  // ===== Show Result =====
  function showResult() {
    const { type, scores } = calculateMBTI();
    const td = TYPES[type];
    const tl = td[lang] || td.ko;

    document.getElementById('questionScreen').style.display = 'none';
    document.getElementById('resultScreen').classList.add('active');

    document.getElementById('resultIcon').innerHTML = td.icon;
    document.getElementById('resultType').textContent = type;
    document.getElementById('resultName').textContent = tl.name;

    document.getElementById('cardDescTitle').innerHTML = t.cardDesc;
    document.getElementById('resultDesc').textContent = tl.desc;

    document.getElementById('cardScoreTitle').innerHTML = t.cardScore;

    // Score bars
    const dims = [['E','I'],['S','N'],['T','F'],['J','P']];
    let barsHTML = '';
    dims.forEach(([a,b]) => {
      const aActive = scores[a] >= scores[b];
      barsHTML += `
        <div class="mbti-score-row">
          <span class="mbti-score-label ${aActive ? 'active-dim' : ''}">${a}</span>
          <div class="mbti-score-bar-bg">
            <div class="mbti-score-bar-fill" style="width:${scores[a]}%"></div>
          </div>
          <span class="mbti-score-pct">${scores[a]}%</span>
        </div>
        <div class="mbti-score-row" style="margin-bottom:16px;">
          <span class="mbti-score-label ${!aActive ? 'active-dim' : ''}">${b}</span>
          <div class="mbti-score-bar-bg">
            <div class="mbti-score-bar-fill" style="width:${scores[b]}%; background:linear-gradient(90deg, #a78bfa, #c084fc);"></div>
          </div>
          <span class="mbti-score-pct">${scores[b]}%</span>
        </div>`;
    });
    document.getElementById('scoreBars').innerHTML = barsHTML;

    document.getElementById('cardWorkTitle').innerHTML = t.cardWork;
    document.getElementById('resultWork').innerHTML = tl.work.map(w => `<li>${w}</li>`).join('');

    document.getElementById('cardCommTitle').innerHTML = t.cardComm;
    document.getElementById('resultComm').innerHTML = tl.comm.map(c => `<li>${c}</li>`).join('');

    document.getElementById('btnRetake').textContent = t.btnRetake;
    document.getElementById('btnGoHome').textContent = t.btnGoHome;

    // Confetti effect
    launchConfetti();

    // Save result
    saveResult(type, scores);
  }

  // ===== Save =====
  function saveResult(type, scores) {
    const result = {
      type,
      scores,
      answers: answers.slice(),
      completedAt: new Date().toISOString()
    };
    const key = `sop_mbti_${user?.email || 'guest'}`;
    localStorage.setItem(key, JSON.stringify(result));

    // Save to Supabase if available
    if (typeof SupabaseMode !== 'undefined' && SupabaseMode.isConnected && SupabaseMode.isConnected()) {
      try {
        const sb = SupabaseMode.getClient ? SupabaseMode.getClient() : null;
        if (sb && user?.email) {
          sb.from('employees').update({ mbti_result: JSON.stringify(result) })
            .eq('email', user.email)
            .then(() => console.log('MBTI saved to Supabase'))
            .catch(e => console.log('Supabase save failed:', e));
        }
      } catch(e) { /* silent */ }
    }
  }

  // ===== Retake =====
  function retakeTest() {
    document.getElementById('resultScreen').classList.remove('active');
    document.getElementById('questionScreen').style.display = 'block';
    answers = new Array(20).fill(null);
    currentQ = 0;
    renderQuestion();
  }

  // ===== Confetti =====
  function launchConfetti() {
    const container = document.createElement('div');
    container.className = 'confetti-container';
    document.body.appendChild(container);

    const colors = ['#6366f1','#a78bfa','#f59e0b','#10b981','#ec4899','#3b82f6','#f97316'];
    for (let i = 0; i < 50; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.top = '-10px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = Math.random() * 1.5 + 's';
      piece.style.animationDuration = (1.5 + Math.random()) + 's';
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      container.appendChild(piece);
    }
    setTimeout(() => container.remove(), 3500);
  }

      location.href = 'index.html';
    }
