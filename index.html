<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training System - 로그인</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="assets/icon-192.svg">
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <!-- 로고 영역 -->
      <div class="logo">&#128218;</div>
      <h1>SOP Training</h1>
      <p class="subtitle">직원 교육 시스템에 로그인하세요</p>

      <!-- 에러 메시지 (숨겨져 있다가 에러시 표시) -->
      <div id="errorMsg" class="alert alert-error" style="display:none;"></div>

      <!-- 로그인 폼 -->
      <form id="loginForm">
        <div class="form-group">
          <label for="email">이메일</label>
          <input
            type="email"
            id="email"
            placeholder="name@company.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            placeholder="비밀번호 입력"
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          로그인
        </button>
      </form>

      <!-- 비밀번호 찾기 -->
      <p style="text-align:center; margin-top:16px;">
        <a href="#" onclick="showPasswordReset(); return false;" style="color:var(--primary); font-size:13px; text-decoration:none;" id="forgotLink">비밀번호를 잊으셨나요?</a>
      </p>

      <!-- 비밀번호 재설정 폼 (숨김) -->
      <div id="resetForm" style="display:none; margin-top:16px; padding:16px; background:var(--gray-50); border-radius:10px;">
        <p style="font-size:14px; font-weight:600; margin-bottom:8px;" id="resetTitle">비밀번호 재설정</p>
        <p style="font-size:13px; color:var(--gray-500); margin-bottom:12px;" id="resetDesc">관리자에게 문의하거나 아래에서 이메일을 확인하세요</p>
        <input type="email" id="resetEmail" placeholder="가입한 이메일" style="width:100%;padding:10px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:8px;">
        <button onclick="handlePasswordReset()" class="btn btn-primary" style="width:100%;padding:10px;">확인</button>
        <p id="resetResult" style="font-size:13px; margin-top:8px; display:none;"></p>
      </div>

      <!-- 언어 전환 -->
      <div style="text-align:center; margin-top:24px;">
        <button onclick="setLang('ko')" class="btn btn-outline" style="padding:8px 16px; font-size:13px;">한국어</button>
        <button onclick="setLang('en')" class="btn btn-outline" style="padding:8px 16px; font-size:13px;">English</button>
        <button onclick="setLang('vi')" class="btn btn-outline" style="padding:8px 16px; font-size:13px;">Tiếng Việt</button>
      </div>
    </div>
  </div>

  <!-- PWA Service Worker -->
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <!-- 스크립트 -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // ===== 세션 타임아웃 체크 (24시간) =====
    const SESSION_HOURS = 24;
    const loginTime = localStorage.getItem('sop_login_time');
    if (loginTime && (Date.now() - parseInt(loginTime)) > SESSION_HOURS * 60 * 60 * 1000) {
      localStorage.removeItem('sop_user');
      localStorage.removeItem('sop_login_time');
    }

    // Supabase 초기화
    SupabaseMode.init().then(connected => {
      if (connected) {
        console.log('[Login] Supabase 모드 활성화');
      }
    });

    // ===== 다국어 텍스트 =====
    const TEXTS = {
      ko: {
        title: 'SOP Training',
        subtitle: '직원 교육 시스템에 로그인하세요',
        email: '이메일',
        password: '비밀번호',
        login: '로그인',
        emailPlaceholder: 'name@company.com',
        passwordPlaceholder: '비밀번호 입력',
        errorInvalid: '이메일 또는 비밀번호가 올바르지 않습니다.',
        errorNetwork: '네트워크 오류가 발생했습니다. 다시 시도해주세요.',
        forgotPassword: '비밀번호를 잊으셨나요?',
        resetTitle: '비밀번호 재설정',
        resetDesc: '관리자에게 문의하거나 아래에서 이메일을 확인하세요',
        resetPlaceholder: '가입한 이메일',
        resetBtn: '확인',
        resetEnterEmail: '이메일을 입력하세요',
        resetTempPw: '임시 비밀번호',
        resetTempPwSub: '이 비밀번호로 로그인 후 변경하세요',
        resetAccountIs: '계정입니다.',
        resetNotFound: '등록된 이메일이 아닙니다. 관리자에게 문의하세요.',
        admin: '관리자', staff: '직원',
      },
      en: {
        title: 'SOP Training',
        subtitle: 'Sign in to your training account',
        email: 'Email',
        password: 'Password',
        login: 'Sign In',
        emailPlaceholder: 'name@company.com',
        passwordPlaceholder: 'Enter password',
        errorInvalid: 'Invalid email or password.',
        errorNetwork: 'Network error. Please try again.',
        forgotPassword: 'Forgot your password?',
        resetTitle: 'Reset Password',
        resetDesc: 'Contact an admin or verify your email below',
        resetPlaceholder: 'Registered email',
        resetBtn: 'Confirm',
        resetEnterEmail: 'Please enter your email',
        resetTempPw: 'Temporary password',
        resetTempPwSub: 'Use this password to log in, then change it',
        resetAccountIs: 'account.',
        resetNotFound: 'Email not registered. Please contact an administrator.',
        admin: 'Admin', staff: 'Staff',
      },
      vi: {
        title: 'SOP Training',
        subtitle: 'Đăng nhập vào hệ thống đào tạo',
        email: 'Email',
        password: 'Mật khẩu',
        login: 'Đăng nhập',
        emailPlaceholder: 'name@company.com',
        passwordPlaceholder: 'Nhập mật khẩu',
        errorInvalid: 'Email hoặc mật khẩu không đúng.',
        errorNetwork: 'Lỗi mạng. Vui lòng thử lại.',
        forgotPassword: 'Quên mật khẩu?',
        resetTitle: 'Đặt lại mật khẩu',
        resetDesc: 'Liên hệ quản trị viên hoặc xác minh email bên dưới',
        resetPlaceholder: 'Email đã đăng ký',
        resetBtn: 'Xác nhận',
        resetEnterEmail: 'Vui lòng nhập email',
        resetTempPw: 'Mật khẩu tạm',
        resetTempPwSub: 'Đăng nhập bằng mật khẩu này rồi đổi lại',
        resetAccountIs: 'tài khoản.',
        resetNotFound: 'Email chưa đăng ký. Vui lòng liên hệ quản trị viên.',
        admin: 'Quản trị viên', staff: 'Nhân viên',
      }
    };

    let currentLang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('sop_lang', lang);
      updateTexts();
    }

    function updateTexts() {
      const t = TEXTS[currentLang];
      document.querySelector('.login-card h1').textContent = t.title;
      document.querySelector('.login-card .subtitle').textContent = t.subtitle;
      document.querySelector('label[for="email"]').textContent = t.email;
      document.querySelector('label[for="password"]').textContent = t.password;
      document.getElementById('email').placeholder = t.emailPlaceholder;
      document.getElementById('password').placeholder = t.passwordPlaceholder;
      document.getElementById('loginBtn').textContent = t.login;
      document.getElementById('forgotLink').textContent = t.forgotPassword;
      document.getElementById('resetTitle').textContent = t.resetTitle;
      document.getElementById('resetDesc').textContent = t.resetDesc;
      document.getElementById('resetEmail').placeholder = t.resetPlaceholder;
    }

    // 페이지 로드시 언어 적용
    updateTexts();

    // ===== 비밀번호 재설정 =====
    function showPasswordReset() {
      const form = document.getElementById('resetForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    async function handlePasswordReset() {
      const email = document.getElementById('resetEmail').value.trim();
      const result = document.getElementById('resetResult');
      const tx = TEXTS[currentLang];
      if (!email) { result.textContent = tx.resetEnterEmail; result.style.color = 'var(--danger)'; result.style.display = 'block'; return; }

      // Supabase에서 확인 후 임시 비밀번호 설정
      if (window.SupabaseMode && SupabaseMode._ready) {
        try {
          const { data, error } = await SupabaseMode.client
            .from('employees')
            .select('id, name')
            .eq('email', email)
            .single();

          if (data) {
            const tempPw = Math.random().toString(36).slice(-6);
            await SupabaseMode.client
              .from('employees')
              .update({ password_hash: tempPw })
              .eq('email', email);

            result.innerHTML = `✅ ${tx.resetTempPw}: <strong style="font-size:18px;color:var(--primary);">${tempPw}</strong><br><span style="font-size:12px;">${tx.resetTempPwSub}</span>`;
            result.style.color = 'var(--success)';
            result.style.display = 'block';
            return;
          }
        } catch(e) { console.error('Reset error:', e); }
      }

      // 데모 계정 체크 (폴백)
      const demoAccounts = {'admin@test.com': tx.admin, 'staff@test.com': tx.staff};
      if (demoAccounts[email]) {
        result.innerHTML = `✅ <strong>${demoAccounts[email]}</strong> ${tx.resetAccountIs}<br>${tx.password}: <strong style="font-size:18px;color:var(--primary);">1234</strong>`;
        result.style.color = 'var(--success)';
      } else {
        result.textContent = tx.resetNotFound;
        result.style.color = 'var(--danger)';
      }
      result.style.display = 'block';
    }

    // ===== 로그인 처리 =====
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('errorMsg');

      // 버튼 로딩 상태
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      errorDiv.style.display = 'none';

      try {
        let user = null;

        // Supabase 모드: DB에서 직원 조회
        if (SupabaseMode._ready) {
          user = await SupabaseMode.login(email, password);
        }

        // Supabase에서 못 찾으면 데모 로그인 시도
        if (!user) {
          if (email === 'admin@test.com' && password === '1234') {
            user = { id: 'demo-admin', email, role: 'admin', name: '관리자' };
          } else if (email === 'staff@test.com' && password === '1234') {
            user = { id: 'demo-staff', email, role: 'staff', name: '직원1' };
          }
        }

        if (!user) throw new Error('invalid');

        // 로그인 성공 → 세션 저장
        localStorage.setItem('sop_user', JSON.stringify(user));
        localStorage.setItem('sop_login_time', Date.now().toString());

        // Supabase에서 데이터 동기화
        if (SupabaseMode._ready) {
          await SupabaseMode.syncAll();
        }

        // 역할별 페이지 이동
        if (user.role === 'admin') {
          window.location.href = 'admin/index.html';
        } else {
          window.location.href = 'app.html';
        }

      } catch (err) {
        const t = TEXTS[currentLang];
        errorDiv.textContent = err.message === 'invalid'
          ? t.errorInvalid
          : t.errorNetwork;
        errorDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = TEXTS[currentLang].login;
      }
    });
  </script>

</body>
</html>
