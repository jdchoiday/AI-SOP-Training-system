<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training System - 로그인</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="assets/icon-192.svg">
</head>
<body>

  <!-- ===== 첫 방문 언어 선택 오버레이 (JS 실패 시 자동 숨김) ===== -->
  <noscript>
    <style>#langPickerOverlay { display: none !important; }</style>
  </noscript>
  <div id="langPickerOverlay" style="display:none; position:fixed; inset:0; background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%); z-index:10000; align-items:center; justify-content:center; padding:20px;">
    <div style="max-width:400px; width:100%; text-align:center;">
      <div style="font-size:80px; margin-bottom:16px;">🌍</div>
      <h1 style="font-size:28px; margin-bottom:8px; background:linear-gradient(135deg,#10B981,#3B82F6); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">Choose your language</h1>
      <p style="color:#94A3B8; font-size:14px; margin-bottom:32px;">언어를 선택해주세요 · Chọn ngôn ngữ</p>

      <button onclick="pickLang('ko')" style="display:flex; align-items:center; gap:16px; width:100%; padding:18px 20px; margin-bottom:12px; border:2px solid rgba(255,255,255,0.08); border-radius:16px; background:rgba(255,255,255,0.03); color:#F1F5F9; font-size:17px; font-weight:600; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.borderColor='#10B981';this.style.background='rgba(16,185,129,0.1)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.08)';this.style.background='rgba(255,255,255,0.03)'">
        <span style="font-size:32px;">🇰🇷</span>
        <div style="text-align:left; flex:1;">
          <div>한국어</div>
          <div style="font-size:12px; color:#94A3B8; font-weight:400;">Korean</div>
        </div>
        <span style="color:#10B981; font-size:20px;">→</span>
      </button>

      <button onclick="pickLang('en')" style="display:flex; align-items:center; gap:16px; width:100%; padding:18px 20px; margin-bottom:12px; border:2px solid rgba(255,255,255,0.08); border-radius:16px; background:rgba(255,255,255,0.03); color:#F1F5F9; font-size:17px; font-weight:600; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.borderColor='#3B82F6';this.style.background='rgba(59,130,246,0.1)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.08)';this.style.background='rgba(255,255,255,0.03)'">
        <span style="font-size:32px;">🇺🇸</span>
        <div style="text-align:left; flex:1;">
          <div>English</div>
          <div style="font-size:12px; color:#94A3B8; font-weight:400;">English</div>
        </div>
        <span style="color:#3B82F6; font-size:20px;">→</span>
      </button>

      <button onclick="pickLang('vi')" style="display:flex; align-items:center; gap:16px; width:100%; padding:18px 20px; margin-bottom:12px; border:2px solid rgba(255,255,255,0.08); border-radius:16px; background:rgba(255,255,255,0.03); color:#F1F5F9; font-size:17px; font-weight:600; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.borderColor='#F59E0B';this.style.background='rgba(245,158,11,0.1)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.08)';this.style.background='rgba(255,255,255,0.03)'">
        <span style="font-size:32px;">🇻🇳</span>
        <div style="text-align:left; flex:1;">
          <div>Tiếng Việt</div>
          <div style="font-size:12px; color:#94A3B8; font-weight:400;">Vietnamese</div>
        </div>
        <span style="color:#F59E0B; font-size:20px;">→</span>
      </button>

      <p style="margin-top:24px; font-size:11px; color:#64748B;">You can change this later in settings</p>
      <button onclick="document.getElementById('langPickerOverlay').style.display='none'" style="margin-top:8px;background:none;border:none;color:#64748B;font-size:11px;cursor:pointer;text-decoration:underline;">Skip / 건너뛰기</button>
    </div>
  </div>
  <script>
    // JS 실패 안전망: 8초 내 pickLang 함수가 정의 안 되면 오버레이 제거
    setTimeout(() => {
      if (typeof pickLang !== 'function') {
        const o = document.getElementById('langPickerOverlay');
        if (o) o.style.display = 'none';
        console.warn('[Safety] pickLang 미정의 — 오버레이 제거');
      }
    }, 8000);
  </script>

  <div class="login-container">
    <div class="login-card">
      <!-- 로고 영역 -->
      <div class="logo">&#128218;</div>
      <h1>SOP Training</h1>
      <p class="subtitle">직원 교육 시스템에 로그인하세요</p>

      <!-- 브랜드 선택 (멀티브랜드) — 회사가 2개 이상일 때만 노출 -->
      <div id="brandPicker" style="display:none; margin:16px 0 4px;">
        <p style="font-size:12px;color:var(--gray-500);margin-bottom:8px;" id="brandPickerLabel">브랜드 선택</p>
        <div id="brandChips" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;"></div>
      </div>

      <!-- 에러 메시지 (숨겨져 있다가 에러시 표시) -->
      <div id="errorMsg" class="alert alert-error" style="display:none;"></div>

      <!-- 로그인 폼 -->
      <form id="loginForm">
        <div class="form-group">
          <label for="email">이메일</label>
          <input
            type="email"
            id="email"
            placeholder="name@company.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            placeholder="비밀번호 입력"
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          로그인
        </button>
      </form>

      <!-- 비밀번호 찾기 -->
      <p style="text-align:center; margin-top:16px;">
        <a href="#" onclick="showPasswordReset(); return false;" style="color:var(--primary); font-size:13px; text-decoration:none;" id="forgotLink">비밀번호를 잊으셨나요?</a>
      </p>

      <!-- 비밀번호 재설정 안내 (숨김) -->
      <div id="resetForm" style="display:none; margin-top:16px; padding:16px; background:var(--gray-50); border-radius:10px; text-align:center;">
        <p style="font-size:32px; margin-bottom:8px;">🔒</p>
        <p style="font-size:14px; font-weight:600; margin-bottom:8px;" id="resetTitle">비밀번호 재설정</p>
        <p style="font-size:13px; color:var(--gray-600); line-height:1.5;" id="resetDesc">관리자에게 문의하여 비밀번호를 초기화하세요</p>
      </div>

      <!-- 회원가입 링크 -->
      <p style="text-align:center; margin-top:16px;">
        <a href="register.html" style="color:var(--primary); font-size:13px; text-decoration:none; font-weight:600;" id="registerLink">계정이 없나요? 회원가입</a>
      </p>

      <!-- 언어 전환 -->
      <div style="text-align:center; margin-top:24px;">
        <button onclick="setLang('ko')" class="btn btn-outline" style="padding:8px 16px; font-size:13px;">한국어</button>
        <button onclick="setLang('en')" class="btn btn-outline" style="padding:8px 16px; font-size:13px;">English</button>
        <button onclick="setLang('vi')" class="btn btn-outline" style="padding:8px 16px; font-size:13px;">Tiếng Việt</button>
      </div>
    </div>
  </div>

  <!-- 스크립트 -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <!-- PWA: Service Worker 등록 + 설치 유도 + iOS 안내 (pwa-install.js 안에서 모두 처리) -->
  <script src="js/pwa-install.js" defer></script>
  <script src="js/error-tracker.js" defer></script>
  <script>
    // ===== 세션 타임아웃 체크 (30일) — Supabase Auth refresh token 수명에 맞춤 =====
    // 베트남 직원 매장 환경에선 매번 로그인 부담 → 30일 유지
    // (Supabase Auth refresh token이 자동 갱신해주므로 안전)
    const SESSION_HOURS = 30 * 24;  // 30일
    const loginTime = parseInt(localStorage.getItem('sop_login_time') || '0');
    const now = Date.now();
    const diff = now - loginTime;
    if (loginTime > 0 && (loginTime > now || diff > SESSION_HOURS * 60 * 60 * 1000)) {
      localStorage.removeItem('sop_user');
      localStorage.removeItem('sop_login_time');
    }

    // Supabase 초기화 → 브랜드 선택 칩 로드
    SupabaseMode.init().then(() => { try { loadBrandPicker(); } catch (e) { console.warn('[Login] brandPicker:', e.message); } });

    // ===== 다국어 텍스트 =====
    const TEXTS = {
      ko: {
        title: 'SOP Training',
        subtitle: '직원 교육 시스템에 로그인하세요',
        email: '이메일',
        password: '비밀번호',
        login: '로그인',
        emailPlaceholder: 'name@company.com',
        passwordPlaceholder: '비밀번호 입력',
        errorInvalid: '이메일 또는 비밀번호가 올바르지 않습니다.',
        errorNetwork: '네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.',
        errorStorage: '브라우저 저장소를 사용할 수 없습니다. 시크릿/프라이빗 모드를 끄거나 브라우저 데이터를 삭제한 뒤 다시 시도해주세요.',
        errorNoProfile: '직원 프로필을 찾을 수 없습니다. 관리자에게 문의해주세요.',
        forgotPassword: '비밀번호를 잊으셨나요?',
        resetTitle: '비밀번호 재설정',
        resetDesc: '관리자에게 문의하여 비밀번호를 초기화하세요',
        admin: '관리자', staff: '직원',
        brandPicker: '브랜드 선택',
        registerLink: '계정이 없나요? 회원가입',
      },
      en: {
        title: 'SOP Training',
        subtitle: 'Sign in to your training account',
        email: 'Email',
        password: 'Password',
        login: 'Sign In',
        emailPlaceholder: 'name@company.com',
        passwordPlaceholder: 'Enter password',
        errorInvalid: 'Invalid email or password.',
        errorNetwork: 'Network error. Please try again in a moment.',
        errorStorage: 'Browser storage is unavailable. Turn off private mode or clear site data, then try again.',
        errorNoProfile: 'Employee profile not found. Please contact your administrator.',
        forgotPassword: 'Forgot your password?',
        resetTitle: 'Reset Password',
        resetDesc: 'Contact your administrator to reset your password',
        admin: 'Admin', staff: 'Staff',
        brandPicker: 'Select brand',
        registerLink: "Don't have an account? Register",
      },
      vi: {
        title: 'SOP Training',
        subtitle: 'Đăng nhập vào hệ thống đào tạo',
        email: 'Email',
        password: 'Mật khẩu',
        login: 'Đăng nhập',
        emailPlaceholder: 'name@company.com',
        passwordPlaceholder: 'Nhập mật khẩu',
        errorInvalid: 'Email hoặc mật khẩu không đúng.',
        errorNetwork: 'Lỗi mạng. Vui lòng thử lại sau giây lát.',
        errorStorage: 'Trình duyệt không thể lưu dữ liệu. Hãy tắt chế độ ẩn danh hoặc xóa dữ liệu trang web rồi thử lại.',
        errorNoProfile: 'Không tìm thấy hồ sơ nhân viên. Vui lòng liên hệ quản trị viên.',
        forgotPassword: 'Quên mật khẩu?',
        resetTitle: 'Đặt lại mật khẩu',
        resetDesc: 'Liên hệ quản trị viên để đặt lại mật khẩu',
        admin: 'Quản trị viên', staff: 'Nhân viên',
        brandPicker: 'Chọn thương hiệu',
        registerLink: 'Chưa có tài khoản? Đăng ký',
      }
    };

    // ── 저장소 견고화 헬퍼: 시크릿/용량초과/차단 환경에서도 로그인이 잘못된 오류로 죽지 않게 ──
    function _storageWritable() {
      try { const k = '__probe_' + Date.now(); localStorage.setItem(k, '1'); localStorage.removeItem(k); return true; }
      catch (_) { return false; }
    }
    function _persistUser(user) {
      // 필수 저장(sop_user). 용량초과면 큰 캐시를 비우고 1회 재시도, 그래도 실패면 'storage'.
      const payload = JSON.stringify(user);
      try { localStorage.setItem('sop_user', payload); return; }
      catch (e1) {
        try {
          ['sop_documents','sop_progress_v2','sop_branches','sop_branch_teams',
           'sop_learning_paths','sop_deadlines','sop_employees','sop_deleted_ids',
           'sop_pending_notifications'].forEach(k => { try { localStorage.removeItem(k); } catch (_) {} });
          localStorage.setItem('sop_user', payload); return;
        } catch (e2) { throw new Error('storage'); }
      }
    }

    let currentLang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;

    // 첫 방문자 언어 선택 오버레이 (sop_lang이 없을 때만)
    if (!localStorage.getItem('sop_lang')) {
      document.getElementById('langPickerOverlay').style.display = 'flex';
    }

    function pickLang(lang) {
      localStorage.setItem('sop_lang', lang);
      currentLang = lang;
      if (document.documentElement) document.documentElement.lang = lang;
      // 오버레이 페이드아웃
      const overlay = document.getElementById('langPickerOverlay');
      overlay.style.transition = 'opacity 0.3s';
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.style.display = 'none';
        updateTexts();
      }, 300);
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('sop_lang', lang);
      updateTexts();
    }

    function updateTexts() {
      const t = TEXTS[currentLang];
      document.querySelector('.login-card h1').textContent = t.title;
      document.querySelector('.login-card .subtitle').textContent = t.subtitle;
      document.querySelector('label[for="email"]').textContent = t.email;
      document.querySelector('label[for="password"]').textContent = t.password;
      document.getElementById('email').placeholder = t.emailPlaceholder;
      document.getElementById('password').placeholder = t.passwordPlaceholder;
      document.getElementById('loginBtn').textContent = t.login;
      document.getElementById('forgotLink').textContent = t.forgotPassword;
      document.getElementById('resetTitle').textContent = t.resetTitle;
      document.getElementById('resetDesc').textContent = t.resetDesc;
      document.getElementById('registerLink').textContent = t.registerLink;
      const bpl = document.getElementById('brandPickerLabel');
      if (bpl) bpl.textContent = t.brandPicker;
      if (typeof updateRegisterLink === 'function') updateRegisterLink();
    }

    // ===== 브랜드 선택 (멀티브랜드) =====
    function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    let _selectedBrand = localStorage.getItem('sop_brand') || '';
    function updateRegisterLink() {
      const link = document.getElementById('registerLink');
      if (link) link.href = _selectedBrand ? ('register.html?brand=' + encodeURIComponent(_selectedBrand)) : 'register.html';
    }
    window.selectBrand = function (id) {
      _selectedBrand = id;
      localStorage.setItem('sop_brand', id);
      // super_admin 학습앱 헤더에 표시할 브랜드명도 저장 (super_admin 은 company_name 이 없음)
      const _b = _brandList.find(c => c.id === id);
      if (_b && _b.name) localStorage.setItem('sop_brand_name', _b.name);
      renderBrandChips();
      updateRegisterLink();
    };
    let _brandList = [];
    function renderBrandChips() {
      const chips = document.getElementById('brandChips');
      if (!chips) return;
      chips.innerHTML = _brandList.map(c => {
        const on = (c.id === _selectedBrand || c.slug === _selectedBrand);
        const color = c.brand_color || '#10B981';
        return `<button type="button" onclick="selectBrand('${c.id}')" style="padding:8px 16px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid ${on?color:'rgba(148,163,184,0.35)'};background:${on?color:'transparent'};color:${on?'#fff':'var(--gray-400)'};transition:all .15s;">${escapeHtml(c.name)}</button>`;
      }).join('');
    }
    async function loadBrandPicker() {
      try {
        if (!SupabaseMode._ready || !SupabaseMode._client) return;
        const { data, error } = await SupabaseMode._client
          .from('companies').select('id, name, slug, brand_color').order('name');
        if (error || !data || data.length < 2) return; // 브랜드 1개뿐이면 선택 UI 숨김
        _brandList = data;
        document.getElementById('brandPicker').style.display = 'block';
        renderBrandChips();
        updateRegisterLink();
      } catch (e) { console.warn('[Login] 브랜드 로드 실패:', e.message); }
    }

    // 페이지 로드시 언어 적용
    updateTexts();

    // ===== 비밀번호 재설정 =====
    function showPasswordReset() {
      const form = document.getElementById('resetForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    // ===== 로그인 처리 =====
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('errorMsg');

      // 버튼 로딩 상태
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      errorDiv.style.display = 'none';

      try {
        // 0) 저장소 사전 점검 — 시크릿/용량초과/차단 즉시 감지 (잘못된 "네트워크 오류" 방지)
        if (!_storageWritable()) throw new Error('storage');

        let user = null;
        let supabaseAuthOk = false;

        // 1차: Supabase Auth 로그인 (성공 시 auth 세션 수립됨 → RLS 통과)
        if (SupabaseMode._ready) {
          user = await SupabaseMode.login(email, password);
          if (user) supabaseAuthOk = true;
          else if (SupabaseMode._lastLoginError === 'network') throw new Error('network');
          else if (SupabaseMode._lastLoginError === 'noprofile') throw new Error('noprofile');
        }

        // 2차 폴백: Supabase Auth 실패 시에만 데모 로그인 (세션 없음 → RLS 쓰기 실패)
        // 관리자 계정은 Supabase Auth 필수 — 데모 폴백 차단
        if (!user) {
          const isAdminEmail = email === 'admin@test.com' || email === 'manager@test.com';
          if (isAdminEmail && SupabaseMode._ready) {
            // 관리자는 반드시 Supabase Auth 통과해야 함. 폴백 금지.
            throw new Error('admin_auth_required');
          }
          // 데모 계정: CONFIG.DEMO_MODE 가 true 일 때만 허용 (프로덕션 false → 완전 차단)
          if (CONFIG.DEMO_MODE) {
            if (email === 'admin@test.com' && password === '1234') {
              user = { id: 'demo-admin', email, role: 'admin', name: '관리자', adminRole: 'superadmin' };
            } else if (email === 'manager@test.com' && password === '1234') {
              user = { id: 'demo-manager', email, role: 'admin', name: '강남점장', adminRole: 'branch_manager', adminBranch: '서울 강남점' };
            } else if (email === 'staff@test.com' && password === '1234') {
              user = { id: 'demo-staff', email, role: 'staff', name: '직원1' };
            }
          }
          // 데모 로그인이라도 Supabase에 해당 이메일의 직원이 있으면 실제 ID 사용
          if (user && user.role !== 'admin' && SupabaseMode._ready) {
            try {
              const { data: empData } = await SupabaseMode._client
                .from('employees').select('id, name, branch').eq('email', email).maybeSingle();
              if (empData) {
                user.id = empData.id;
                user.name = empData.name || user.name;
                user.branch = empData.branch || user.branch;
              }
            } catch (e) { /* ignore */ }
          }
        }

        if (!user) throw new Error('invalid');

        // 관리자 로그인 시 Supabase Auth 세션 확인 (RLS 쓰기 보호)
        if (user.role === 'admin' && SupabaseMode._ready && !supabaseAuthOk) {
          console.error('[Auth] ❌ 관리자 Supabase Auth 세션 없음 — RLS 쓰기 불가');
          throw new Error('admin_auth_required');
        }

        // 로그인 성공 → 세션 저장 (필수: sop_user. 용량초과 시 큰 캐시 비우고 재시도)
        _persistUser(user);
        try { localStorage.setItem('sop_login_time', Date.now().toString()); } catch (_) {}

        // 브랜드(회사)가 직전 로그인과 다르면 이전 브랜드 캐시 제거 — 교차-브랜드 누출 방지 (RC4)
        try { SupabaseMode.applyCompanyScope(user); } catch (_) {}

        // 데이터 동기화는 베스트에포트 — 실패/지연이 로그인 진행을 막지 않음 (app.html 에서 재동기화)
        if (SupabaseMode._ready) {
          try { await SupabaseMode.syncAll(); } catch (_) {}
        }

        // 역할별 페이지 이동
        if (user.role === 'admin') {
          window.location.href = 'admin/index.html';
        } else {
          window.location.href = 'app.html';
        }

      } catch (err) {
        const t = TEXTS[currentLang];
        let msg;
        if (err.message === 'invalid') {
          msg = t.errorInvalid;
        } else if (err.message === 'admin_auth_required') {
          msg = '관리자 계정은 Supabase Auth 로그인이 필요합니다. 비밀번호를 확인하거나 관리자에게 문의하세요.';
        } else if (err.message === 'storage') {
          msg = t.errorStorage;
        } else if (err.message === 'noprofile') {
          msg = t.errorNoProfile;
        } else {
          msg = t.errorNetwork;
        }
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = TEXTS[currentLang].login;
      }
    });
  </script>

</body>
</html>
