<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - 내 결과</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="assets/icon-192.svg">
  <style>
    .result-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .result-summary .mini-stat {
      background: white;
      border-radius: var(--radius);
      padding: 16px 12px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .mini-stat .num { font-size: 28px; font-weight: 700; line-height: 1; }
    .mini-stat .label { font-size: 11px; color: var(--gray-500); margin-top: 4px; }

    .chapter-result {
      background: white; border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
    }
    .chapter-result-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .chapter-result-header h4 { font-size: 15px; font-weight: 600; }
    .video-dots { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .video-dot {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .video-dot.done { background: #dcfce7; color: var(--success); }
    .video-dot.pending { background: var(--gray-100); color: var(--gray-500); }

    .certificate {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #7c3aed 100%);
      border-radius: 16px; padding: 40px 24px; text-align: center;
      color: white; margin: 24px 0; position: relative; overflow: hidden;
    }
    .certificate::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 20px);
    }
    .certificate * { position: relative; }
    .certificate .cert-icon { font-size: 48px; margin-bottom: 12px; }
    .certificate h2 { font-size: 22px; margin-bottom: 4px; }
    .certificate .cert-name {
      font-size: 28px; font-weight: 700; margin: 16px 0 4px; padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }
    .certificate .cert-detail { font-size: 13px; opacity: 0.8; margin-top: 12px; }
    .certificate .cert-date { font-size: 14px; margin-top: 16px; opacity: 0.9; }
  </style>
</head>
<body>

  <div class="bottom-nav">
    <a href="app.html"><span class="nav-icon">&#127968;</span> <span class="nav-label-home">홈</span></a>
    <a href="ai-chat.html"><span class="nav-icon">&#129302;</span> <span class="nav-label-chat">AI 질문</span></a>
    <a href="my-results.html" class="active"><span class="nav-icon">&#127942;</span> <span class="nav-label-results">내 결과</span></a>
  </div>

  <div class="app-container">
    <div class="app-header">
      <h2 id="pageTitle">내 결과</h2>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>

    <div class="result-summary">
      <div class="mini-stat">
        <p class="num" style="color:var(--primary);" id="statProgress">0%</p>
        <p class="label" id="labelProgress">전체 진행률</p>
      </div>
      <div class="mini-stat">
        <p class="num" style="color:var(--success);" id="statPassed">0</p>
        <p class="label" id="labelPassed">통과 챕터</p>
      </div>
      <div class="mini-stat">
        <p class="num" style="color:var(--warning);" id="statVideos">0</p>
        <p class="label" id="labelVideos">시청 완료</p>
      </div>
    </div>

    <div id="certificateArea"></div>

    <h3 style="margin-bottom:12px; font-size:16px; color:var(--gray-700);" id="chapterResultsTitle">챕터별 결과</h3>
    <div id="chapterResults"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ai-provider.js"></script>
  <script src="js/sop-content-kids.js"></script>
  <script src="js/demo-data.js"></script>
  <script>
    // ===== 다국어 텍스트 =====
    const T = {
      ko: {
        home: '홈', aiChat: 'AI 질문', myResults: '내 결과',
        pageTitle: '내 결과', overallProgress: '전체 진행률',
        passedChapters: '통과 챕터', videosCompleted: '시청 완료',
        chapterResults: '챕터별 결과',
        certificate: 'SOP Training 수료증', certSub: 'Certificate of Completion',
        certDesc: '위 사람은 SOP Training의 모든 과정을\n성공적으로 이수하였음을 증명합니다.',
        certDetail: (ch, vids, avg) => `총 ${ch}개 챕터 · ${vids}개 학습 · 평균 점수 ${avg}점`,
        saveCert: '📥 수료증 저장',
        passed: '통과', locked: '잠김', inProgress: '진행중', notStarted: '미시작',
        logoutConfirm: '로그아웃 하시겠습니까?',
        staff: '직원',
      },
      en: {
        home: 'Home', aiChat: 'AI Q&A', myResults: 'Results',
        pageTitle: 'My Results', overallProgress: 'Overall Progress',
        passedChapters: 'Passed', videosCompleted: 'Videos Done',
        chapterResults: 'Results by Chapter',
        certificate: 'SOP Training Certificate', certSub: 'Certificate of Completion',
        certDesc: 'This certifies that the above person\nhas successfully completed all SOP Training courses.',
        certDetail: (ch, vids, avg) => `${ch} chapters · ${vids} lessons · Avg. score ${avg}`,
        saveCert: '📥 Save Certificate',
        passed: 'Passed', locked: 'Locked', inProgress: 'In Progress', notStarted: 'Not Started',
        logoutConfirm: 'Are you sure you want to log out?',
        staff: 'Staff',
      },
      vi: {
        home: 'Trang chủ', aiChat: 'Hỏi AI', myResults: 'Kết quả',
        pageTitle: 'Kết quả của tôi', overallProgress: 'Tiến độ tổng thể',
        passedChapters: 'Chương đạt', videosCompleted: 'Video xong',
        chapterResults: 'Kết quả theo chương',
        certificate: 'Chứng chỉ đào tạo SOP', certSub: 'Certificate of Completion',
        certDesc: 'Chứng nhận người trên đã hoàn thành\ntất cả các khóa đào tạo SOP.',
        certDetail: (ch, vids, avg) => `${ch} chương · ${vids} bài học · Điểm TB ${avg}`,
        saveCert: '📥 Lưu chứng chỉ',
        passed: 'Đạt', locked: 'Khóa', inProgress: 'Đang học', notStarted: 'Chưa bắt đầu',
        logoutConfirm: 'Bạn có chắc muốn đăng xuất?',
        staff: 'Nhân viên',
      }
    };
    const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
    const t = T[lang] || T.ko;
    const dateLang = lang === 'en' ? 'en-US' : lang === 'vi' ? 'vi-VN' : 'ko-KR';

    // Apply static labels
    document.querySelector('.nav-label-home').textContent = t.home;
    document.querySelector('.nav-label-chat').textContent = t.aiChat;
    document.querySelector('.nav-label-results').textContent = t.myResults;
    document.getElementById('pageTitle').textContent = t.pageTitle;
    document.getElementById('labelProgress').textContent = t.overallProgress;
    document.getElementById('labelPassed').textContent = t.passedChapters;
    document.getElementById('labelVideos').textContent = t.videosCompleted;
    document.getElementById('chapterResultsTitle').textContent = t.chapterResults;

    const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
    if (!user) { window.location.href = 'index.html'; }
    document.getElementById('userAvatar').textContent = (user.name || '?')[0];

    const chapters = SopStore.getChapters();
    const allResults = Progress.getAllResults();
    const totalProgress = Progress.getTotalProgress();
    const passedChapters = chapters.filter(ch => Progress.isChapterPassed(ch.id));
    const completedVideoCount = allResults.completedVideos.length;

    document.getElementById('statProgress').textContent = totalProgress + '%';
    document.getElementById('statPassed').textContent = passedChapters.length;
    document.getElementById('statVideos').textContent = completedVideoCount;

    // 수료증
    if (totalProgress >= 100) {
      const lastDate = Object.values(allResults.chapterResults).map(r => r.date).sort().pop();
      const dateStr = lastDate
        ? new Date(lastDate).toLocaleDateString(dateLang, { year:'numeric', month:'long', day:'numeric' })
        : new Date().toLocaleDateString(dateLang);
      const scores = Object.values(allResults.chapterResults).map(r => r.score).filter(s => s > 0);
      const avg = scores.length > 0 ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) : 0;
      const totalVids = chapters.reduce((sum, ch) => sum + SopStore.getVideos(ch.id).length, 0);

      document.getElementById('certificateArea').innerHTML = `
        <div class="certificate">
          <div class="cert-icon">&#127942;</div>
          <h2>${t.certificate}</h2>
          <p style="opacity:0.8;">${t.certSub}</p>
          <p class="cert-name">${user.name || t.staff}</p>
          <p style="font-size:14px;">${t.certDesc.replace('\n', '<br>')}</p>
          <p class="cert-detail">${t.certDetail(chapters.length, totalVids, avg)}</p>
          <p class="cert-date">${dateStr}</p>
          <button onclick="downloadCertificate()" style="margin-top:20px; background:white; color:#2563eb; border:none; border-radius:8px; padding:12px 32px; font-size:15px; font-weight:700; cursor:pointer;">${t.saveCert}</button>
        </div>`;
    }

    // 챕터별 결과
    const container = document.getElementById('chapterResults');
    chapters.forEach((ch, index) => {
      const videos = SopStore.getVideos(ch.id);
      const passed = Progress.isChapterPassed(ch.id);
      const result = allResults.chapterResults[ch.id];
      const unlocked = Progress.isChapterUnlocked(index);

      let dotsHTML = videos.map(v => {
        const done = Progress.isVideoCompleted(v.id);
        return `<div class="video-dot ${done ? 'done' : 'pending'}">${done ? '✓' : v.order_num}</div>`;
      }).join('');

      let badge = '';
      if (passed) {
        badge = `<span class="badge badge-success">${t.passed} ${result?.score || 0}</span>`;
      } else if (!unlocked) {
        badge = `<span class="badge" style="background:var(--gray-100);color:var(--gray-500);">${t.locked}</span>`;
      } else {
        const pct = Progress.getChapterVideoProgress(ch.id);
        badge = pct > 0
          ? `<span class="badge badge-warning">${t.inProgress} ${pct}%</span>`
          : `<span class="badge" style="background:var(--gray-100);color:var(--gray-500);">${t.notStarted}</span>`;
      }

      container.innerHTML += `
        <div class="chapter-result" ${!unlocked ? 'style="opacity:0.5;"' : ''}>
          <div class="chapter-result-header">
            <h4>${index + 1}. ${getLocalizedText(ch, 'title')}</h4>
            ${badge}
          </div>
          <div class="video-dots">${dotsHTML}</div>
        </div>`;
    });

    // 수료증 이미지 저장
    function downloadCertificate() {
      const cert = document.querySelector('.certificate');
      if (!cert) return;

      // Create canvas from certificate
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 800;
      canvas.height = 500;

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, 800, 500);
      grad.addColorStop(0, '#1e3a5f');
      grad.addColorStop(0.5, '#2563eb');
      grad.addColorStop(1, '#7c3aed');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 800, 500);

      // Border
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.strokeRect(20, 20, 760, 460);
      ctx.strokeRect(30, 30, 740, 440);

      // Text
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';

      ctx.font = '40px serif';
      ctx.fillText('🏆', 400, 80);

      ctx.font = 'bold 28px sans-serif';
      ctx.fillText(t.certificate, 400, 130);

      ctx.font = '16px sans-serif';
      ctx.globalAlpha = 0.8;
      ctx.fillText(t.certSub, 400, 160);
      ctx.globalAlpha = 1;

      // Line
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(200, 200);
      ctx.lineTo(600, 200);
      ctx.stroke();

      // Name
      ctx.font = 'bold 36px sans-serif';
      ctx.fillText(user.name || t.staff, 400, 250);

      // Line
      ctx.beginPath();
      ctx.moveTo(200, 275);
      ctx.lineTo(600, 275);
      ctx.stroke();

      // Description
      const certLines = t.certDesc.split('\n');
      ctx.font = '16px sans-serif';
      ctx.fillText(certLines[0] || '', 400, 315);
      ctx.fillText(certLines[1] || '', 400, 340);

      // Stats
      const scores = Object.values(allResults.chapterResults).map(r => r.score).filter(s => s > 0);
      const avg = scores.length > 0 ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) : 0;
      const totalVids = chapters.reduce((sum, ch) => sum + SopStore.getVideos(ch.id).length, 0);
      ctx.font = '14px sans-serif';
      ctx.globalAlpha = 0.8;
      ctx.fillText(t.certDetail(chapters.length, totalVids, avg), 400, 385);
      ctx.globalAlpha = 1;

      // Date
      const lastDate = Object.values(allResults.chapterResults).map(r => r.date).sort().pop();
      const canvasDateStr = lastDate
        ? new Date(lastDate).toLocaleDateString(dateLang, { year:'numeric', month:'long', day:'numeric' })
        : new Date().toLocaleDateString(dateLang);
      ctx.font = '15px sans-serif';
      ctx.fillText(canvasDateStr, 400, 420);

      // Download
      const link = document.createElement('a');
      link.download = `SOP_Certificate_${user.name || t.staff}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // 로그아웃
    document.getElementById('userAvatar').addEventListener('click', () => {
      if (confirm(t.logoutConfirm)) {
        localStorage.removeItem('sop_user');
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
