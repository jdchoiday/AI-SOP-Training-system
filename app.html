<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - 내 학습</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="assets/icon-192.svg">
</head>
<body>

  <!-- PC에서는 상단 탭으로, 모바일에서는 하단 탭으로 표시 -->
  <div class="bottom-nav">
    <a href="app.html" class="active">
      <span class="nav-icon">&#127968;</span> <span class="nav-label-home">홈</span>
    </a>
    <a href="ai-chat.html">
      <span class="nav-icon">&#129302;</span> <span class="nav-label-chat">AI 질문</span>
    </a>
    <a href="my-results.html">
      <span class="nav-icon">&#127942;</span> <span class="nav-label-results">내 결과</span>
    </a>
  </div>

  <div class="app-container">

    <!-- ===== 상단 헤더 ===== -->
    <div class="app-header">
      <h2>SOP Training</h2>
      <div class="user-avatar" id="userAvatar" title="로그아웃">?</div>
    </div>

    <!-- ===== 환영 카드 ===== -->
    <div class="card">
      <h3 style="margin-bottom:4px;" id="welcomeMsg">안녕하세요!</h3>
      <p style="color:var(--gray-500); font-size:14px;" id="progressSummary"></p>
      <div class="progress-bar" style="margin-top:12px;">
        <div class="fill" id="totalProgress" style="width:0%"></div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:6px;">
        <span style="font-size:12px; color:var(--gray-500);" id="progressLabel"></span>
        <span style="font-size:12px; font-weight:600; color:var(--primary);" id="progressPercent">0%</span>
      </div>
    </div>

    <!-- ===== 오늘의 할 일 카드 ===== -->
    <div class="card" id="nextActionCard" style="border-left:3px solid var(--primary);">
      <p style="font-size:12px; color:var(--gray-500); margin-bottom:4px;" id="nextTodoLabel"></p>
      <p style="font-weight:600;" id="nextActionText"></p>
    </div>

    <!-- ===== 챕터 목록 ===== -->
    <h3 style="margin:20px 0 12px; font-size:16px; color:var(--gray-700);" id="chapterListTitle"></h3>

    <div id="chapterList">
      <!-- JS에서 동적 생성 -->
    </div>

    <!-- 모바일 하단 네비 중복은 CSS가 처리 -->

  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ai-provider.js"></script>
  <script src="js/sop-content-kids.js"></script>
  <script src="js/demo-data.js"></script>
  <script>
    // ===== 다국어 텍스트 =====
    const T = {
      ko: {
        home: '홈', aiChat: 'AI 질문', myResults: '내 결과',
        logout: '로그아웃', logoutConfirm: '로그아웃 하시겠습니까?',
        welcome: (name) => `안녕하세요, ${name || '직원'}님!`,
        startLearning: '학습을 시작해보세요',
        progressLabel: '전체 진행률',
        chapterProgress: (total, passed) => `${total}개 챕터 중 ${passed}개 완료`,
        nextTodo: '다음 할 일',
        startChapter: (n) => `챕터 ${n} 시작하기`,
        allComplete: '모든 학습을 완료했습니다!',
        completePrevious: '이전 챕터를 먼저 완료하세요',
        scenePrefix: '씬',
        quizChallenge: (title) => `${title} 퀴즈 도전!`,
        learningChapters: '학습 챕터',
        noSop: '아직 배포된 교육이 없습니다.',
        noSopSub: '관리자가 SOP를 배포하면 여기에 표시됩니다.',
        completePreviousChapter: '이전 챕터를 먼저 통과해야 합니다',
        completedScore: (score) => `완료! 점수: ${score}점`,
        scenesInfo: (scenes, mins) => `${scenes}개 씬 · 약 ${mins}분`,
      },
      en: {
        home: 'Home', aiChat: 'AI Q&A', myResults: 'Results',
        logout: 'Logout', logoutConfirm: 'Are you sure you want to log out?',
        welcome: (name) => `Hello, ${name || 'Staff'}!`,
        startLearning: 'Start your training',
        progressLabel: 'Overall progress',
        chapterProgress: (total, passed) => `${passed} of ${total} chapters completed`,
        nextTodo: 'Next to do',
        startChapter: (n) => `Start Chapter ${n}`,
        allComplete: 'All training completed!',
        completePrevious: 'Complete the previous chapter first',
        scenePrefix: 'Scene',
        quizChallenge: (title) => `${title} — Take Quiz!`,
        learningChapters: 'Training Chapters',
        noSop: 'No training materials published yet.',
        noSopSub: 'Courses will appear here once an admin publishes SOPs.',
        completePreviousChapter: 'You must pass the previous chapter first',
        completedScore: (score) => `Completed! Score: ${score}`,
        scenesInfo: (scenes, mins) => `${scenes} scenes · ~${mins} min`,
      },
      vi: {
        home: 'Trang chủ', aiChat: 'Hỏi AI', myResults: 'Kết quả',
        logout: 'Đăng xuất', logoutConfirm: 'Bạn có chắc muốn đăng xuất?',
        welcome: (name) => `Xin chào, ${name || 'Nhân viên'}!`,
        startLearning: 'Bắt đầu học tập',
        progressLabel: 'Tiến độ tổng thể',
        chapterProgress: (total, passed) => `Hoàn thành ${passed}/${total} chương`,
        nextTodo: 'Việc tiếp theo',
        startChapter: (n) => `Bắt đầu Chương ${n}`,
        allComplete: 'Đã hoàn thành tất cả bài học!',
        completePrevious: 'Hãy hoàn thành chương trước',
        scenePrefix: 'Cảnh',
        quizChallenge: (title) => `${title} — Làm bài kiểm tra!`,
        learningChapters: 'Các chương học tập',
        noSop: 'Chưa có tài liệu đào tạo nào.',
        noSopSub: 'Các khóa học sẽ hiển thị khi quản trị viên phát hành SOP.',
        completePreviousChapter: 'Bạn phải vượt qua chương trước',
        completedScore: (score) => `Hoàn thành! Điểm: ${score}`,
        scenesInfo: (scenes, mins) => `${scenes} cảnh · ~${mins} phút`,
      }
    };
    const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
    const t = T[lang] || T.ko;

    // ===== 로그인 확인 =====
    const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
    if (!user) {
      window.location.href = 'index.html';
    } else {
      document.getElementById('userAvatar').textContent = (user.name || '?')[0];
      document.getElementById('welcomeMsg').textContent = t.welcome(user.name);
    }

    // Supabase 초기화 (최초 1회만 동기화)
    if (!sessionStorage.getItem('sb_synced')) {
      SupabaseMode.init().then(connected => {
        if (connected) {
          SupabaseMode.syncAll().then(() => {
            sessionStorage.setItem('sb_synced', '1');
            location.reload();
          });
        }
      });
    }

    // ===== 챕터 데이터 (SOP에서 자동 생성, 학습 경로 필터 적용) =====
    const chapters = (() => {
      const allChapters = SopStore.getChapters();
      if (!user) return allChapters;
      // Get employee's branch
      const emp = typeof EmployeeStore !== 'undefined' ? EmployeeStore.getCurrentEmployee() : null;
      const branch = emp?.branch || user.branch;
      if (!branch) return allChapters;
      // Check learning path assignments
      const paths = JSON.parse(localStorage.getItem('sop_learning_paths') || '{}');
      const assigned = paths[branch]; // undefined = all SOPs
      if (!assigned) return allChapters; // no specific path = show all
      if (assigned.length === 0) return allChapters; // empty array = show all (fallback)
      return allChapters.filter(ch => assigned.includes(ch.id));
    })();

    // ===== 전체 진행률 =====
    function updateProgress() {
      const pct = Progress.getTotalProgress();
      document.getElementById('totalProgress').style.width = pct + '%';
      document.getElementById('progressPercent').textContent = pct + '%';

      const passedCount = chapters.filter(ch => Progress.isChapterPassed(ch.id)).length;
      document.getElementById('progressSummary').textContent =
        t.chapterProgress(chapters.length, passedCount);

      if (pct >= 100) {
        document.getElementById('totalProgress').classList.add('success');
      }
    }

    // ===== 다음 할 일 표시 =====
    function updateNextAction() {
      let nextText = t.allComplete;
      const card = document.getElementById('nextActionCard');

      for (let i = 0; i < chapters.length; i++) {
        const ch = chapters[i];
        if (!Progress.isChapterPassed(ch.id)) {
          if (!Progress.isChapterUnlocked(i)) {
            nextText = t.completePrevious;
          } else if (!Progress.isChapterAllVideosComplete(ch.id)) {
            const videos = SopStore.getVideos(ch.id);
            const nextVideo = videos.find(v => !Progress.isVideoCompleted(v.id));
            nextText = nextVideo
              ? `${getLocalizedText(ch, 'title')} → ${t.scenePrefix} ${nextVideo.order_num}`
              : t.quizChallenge(getLocalizedText(ch, 'title'));
          } else {
            nextText = t.quizChallenge(getLocalizedText(ch, 'title'));
          }
          card.style.borderLeftColor = 'var(--primary)';
          break;
        }
      }

      if (Progress.getTotalProgress() >= 100) {
        card.style.borderLeftColor = 'var(--success)';
        card.style.cursor = 'pointer';
        card.onclick = () => window.location.href = 'my-results.html';
      }

      document.getElementById('nextActionText').textContent = nextText;
    }

    // ===== 챕터 목록 렌더링 =====
    function renderChapters() {
      const container = document.getElementById('chapterList');
      container.innerHTML = '';
      container.className = 'chapter-grid';

      if (chapters.length === 0) {
        container.innerHTML = `<div class="card" style="text-align:center; color:var(--gray-500); padding:40px;"><p>${t.noSop}</p><p style="font-size:13px;">${t.noSopSub}</p></div>`;
        return;
      }

      chapters.forEach((ch, index) => {
        const unlocked = Progress.isChapterUnlocked(index);
        const passed = Progress.isChapterPassed(ch.id);
        const videoProgress = Progress.getChapterVideoProgress(ch.id);
        const videos = SopStore.getVideos(ch.id);
        const totalDuration = videos.reduce((sum, v) => sum + v.duration, 0);

        let statusClass = unlocked ? '' : 'locked';
        if (passed) statusClass = 'completed';

        let statusIcon = '';
        if (passed) {
          statusIcon = '<span style="color:var(--success);font-size:20px;">&#9989;</span>';
        } else if (!unlocked) {
          statusIcon = '<svg width="20" height="20" fill="none" stroke="var(--gray-300)" stroke-width="2"><path d="M10 2a4 4 0 014 4v2H6V6a4 4 0 014-4zM4 10h12v8a2 2 0 01-2 2H6a2 2 0 01-2-2v-8z"/></svg>';
        } else {
          statusIcon = '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4l8 8-8 8"/></svg>';
        }

        const subtitle = !unlocked
          ? t.completePrevious
          : passed
            ? t.completedScore(Progress.getAllResults().chapterResults[ch.id]?.score || 0)
            : t.scenesInfo(videos.length, ch.estimatedMinutes);

        const progressHTML = unlocked && !passed && videoProgress > 0
          ? `<div class="progress-bar" style="margin-top:8px;height:4px;"><div class="fill" style="width:${videoProgress}%"></div></div>`
          : '';

        const link = unlocked ? `chapter.html?id=${ch.id}` : '#';
        const lockMsg = t.completePreviousChapter.replace(/'/g, "\\'");

        container.innerHTML += `
          <a class="chapter-item ${statusClass}" href="${link}" ${!unlocked ? `onclick="showToast('${lockMsg}'); return false;"` : ''}>
            <div class="chapter-num">${index + 1}</div>
            <div class="chapter-info">
              <h3>${getLocalizedText(ch, 'title')}</h3>
              <p>${subtitle}</p>
              ${progressHTML}
            </div>
            ${statusIcon}
          </a>
        `;
      });
    }

    // Toast notification
    function showToast(msg) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:12px 24px; border-radius:10px; font-size:14px; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; text-align:center; max-width:80%;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    // ===== 다국어 적용 =====
    document.querySelector('.nav-label-home').textContent = t.home;
    document.querySelector('.nav-label-chat').textContent = t.aiChat;
    document.querySelector('.nav-label-results').textContent = t.myResults;
    document.getElementById('progressLabel').textContent = t.progressLabel;
    document.getElementById('progressSummary').textContent = t.startLearning;
    document.getElementById('nextTodoLabel').textContent = t.nextTodo;
    document.getElementById('chapterListTitle').textContent = t.learningChapters;
    document.getElementById('userAvatar').title = t.logout;

    // ===== MBTI 챕터 카드 추가 =====
    function renderMbtiCard() {
      const container = document.getElementById('chapterList');
      const email = user?.email || '';
      const mbtiData = JSON.parse(localStorage.getItem('sop_mbti_' + email) || 'null');
      const mbtiLabel = lang === 'en' ? 'Personality Test' : lang === 'vi' ? 'Trắc nghiệm tính cách' : 'MBTI 성격검사';
      const mbtiSub = mbtiData
        ? (lang === 'en' ? `Result: ${mbtiData.type}` : lang === 'vi' ? `Kết quả: ${mbtiData.type}` : `결과: ${mbtiData.type}`)
        : (lang === 'en' ? 'Discover your work style' : lang === 'vi' ? 'Khám phá phong cách làm việc' : '나의 업무 스타일 알아보기');
      const icon = mbtiData ? '&#9989;' : '&#129504;';
      container.innerHTML += `
        <a class="chapter-item ${mbtiData ? 'completed' : ''}" href="mbti.html" style="border-left:3px solid #7c3aed;">
          <div class="chapter-num" style="background:#f3e8ff; color:#7c3aed;">M</div>
          <div class="chapter-info">
            <h3>${mbtiLabel}</h3>
            <p>${mbtiSub}</p>
          </div>
          <span style="font-size:20px;">${icon}</span>
        </a>
      `;
    }

    // ===== 초기화 =====
    updateProgress();
    updateNextAction();
    renderChapters();
    renderMbtiCard();

    // 로그아웃
    document.getElementById('userAvatar').addEventListener('click', () => {
      if (confirm(t.logoutConfirm)) {
        localStorage.removeItem('sop_user');
        window.location.href = 'index.html';
      }
    });
  </script>

</body>
</html>
