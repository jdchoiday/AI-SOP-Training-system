  <style>
    /* ===== 오늘의 퀘스트 홈 (미니멀) ===== */
    .lvxp-header {
      padding: 14px 16px;
      margin-bottom: 18px;
      background: linear-gradient(135deg, rgba(16,185,129,0.10), rgba(245,158,11,0.08));
      border: 1px solid rgba(16,185,129,0.18);
    }
    .lvxp-row { display:flex; align-items:center; gap:14px; }
    .lv-badge {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-width: 54px; padding: 6px 10px;
      background: linear-gradient(135deg, #0F172A, #1E293B);
      border-radius: 12px; color: white;
      box-shadow: 0 4px 12px rgba(15,23,42,0.35);
    }
    .lv-label { font-size: 10px; letter-spacing: 1.5px; opacity: 0.8; font-weight: 700; }
    .lv-num { font-size: 22px; font-weight: 800; line-height: 1.1; color: #F59E0B; }
    .xp-info { flex: 1; min-width: 0; }
    .xp-top { display:flex; align-items:center; justify-content:space-between; margin-bottom: 6px; }
    .xp-name { font-size: 15px; font-weight: 700; color: var(--gray-700); }
    .streak-chip {
      padding: 2px 10px; border-radius: 999px;
      background: linear-gradient(135deg,#FF6B35,#FFD700);
      color: white; font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .xp-bar-wrap { display:flex; flex-direction: column; gap: 4px; }
    .xp-bar {
      height: 8px; background: rgba(0,0,0,0.08);
      border-radius: 999px; overflow: hidden;
    }
    .xp-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #10B981, #F59E0B);
      border-radius: 999px; transition: width 0.6s ease;
    }
    .xp-text { font-size: 11px; color: var(--gray-500); font-weight: 600; text-align: right; }

    .today-quest-section { margin-bottom: 20px; }
    .section-title {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 16px; font-weight: 800; color: var(--gray-700);
      margin: 0 4px 12px;
    }
    .today-date { font-size: 12px; font-weight: 500; color: var(--gray-500); }

    .quest-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; margin-bottom: 10px;
      background: var(--bg-card); border-radius: 16px;
      text-decoration: none; color: inherit;
      border: 1px solid var(--gray-200);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative; overflow: hidden;
    }
    .quest-card:active { transform: scale(0.98); }
    .quest-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--primary);
    }
    .quest-card.quest-priority-1::before { background: #F59E0B; }
    .quest-card.quest-priority-2::before { background: #10B981; }
    .quest-card.quest-priority-3::before { background: #3B82F6; }
    .quest-card.quest-done {
      opacity: 0.72; border-style: dashed;
    }
    .quest-card.quest-done::before { background: #10B981; }
    .quest-icon {
      font-size: 30px; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(245,158,11,0.10); border-radius: 12px;
      flex-shrink: 0;
    }
    .quest-body { flex: 1; min-width: 0; }
    .quest-title {
      font-size: 14px; font-weight: 700; color: var(--gray-700);
      margin-bottom: 2px;
    }
    .quest-subtitle {
      font-size: 13px; color: var(--gray-500);
      line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .quest-progress {
      margin-top: 6px; height: 4px;
      background: rgba(0,0,0,0.06); border-radius: 999px; overflow: hidden;
    }
    .quest-progress .fill {
      height: 100%;
      background: linear-gradient(90deg, #10B981, #F59E0B);
      border-radius: 999px; transition: width 0.6s ease;
    }
    .quest-reward {
      font-size: 12px; font-weight: 800; color: #F59E0B;
      padding: 4px 10px; background: rgba(245,158,11,0.10);
      border-radius: 999px; white-space: nowrap;
    }
    .quest-done .quest-reward { color: #10B981; background: rgba(16,185,129,0.10); }

    .all-learning-link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; margin-top: 8px;
      background: var(--bg-card); border: 1px solid var(--gray-200);
      border-radius: 14px;
      text-decoration: none; color: var(--gray-700);
      font-size: 14px; font-weight: 600;
    }
    .all-learning-link:active { background: var(--gray-50); }

    .quest-empty {
      padding: 32px 16px; text-align: center;
      background: var(--bg-card); border-radius: 16px;
      border: 2px dashed var(--gray-200);
    }
    .quest-empty-emoji { font-size: 48px; margin-bottom: 8px; }
    .quest-empty-title { font-size: 15px; font-weight: 700; color: var(--gray-700); margin-bottom: 4px; }
    .quest-empty-desc { font-size: 13px; color: var(--gray-500); line-height: 1.5; }
  </style>
</head>

      const flat = [];
      if (chapterData.chapters) {
        chapterData.chapters.forEach(ch => {
          // 대챕터 자체도 목록에 (+ sections 포함)
          flat.push(ch);
        });
      }
      if (chapterData.orphanSections) {
        chapterData.orphanSections.forEach(s => flat.push(s));
      }
      // 학습 경로 필터 — 팀 기반 우선, 없으면 지점 기반 폴백
      if (!user) return flat;
      const emp = typeof EmployeeStore !== 'undefined' ? EmployeeStore.getCurrentEmployee() : null;
      const branch = emp?.branch || user.branch;
      const team = emp?.team || user.team;
      let paths = {};
      try { paths = JSON.parse(localStorage.getItem('sop_learning_paths') || '{}'); } catch(e) {}

      // 1순위: 팀 기반 경로 (__team__{팀명})
      if (team) {
        const teamKey = '__team__' + team;
        const teamAssigned = paths[teamKey];
        if (teamAssigned && teamAssigned.length > 0) {
          return flat.filter(ch => teamAssigned.includes(ch.id));
        }
      }

      // 2순위: 지점 기반 경로 (하위 호환)
      if (branch) {
        const assigned = paths[branch];
        if (assigned && assigned.length > 0) {
          return flat.filter(ch => assigned.includes(ch.id));
        }
      }

      // 폴백: 전체 공개
      return flat;
    })();

    async function renderLvXpHeader() {
      const lvEl = document.getElementById('lvNum');
      const fillEl = document.getElementById('xpFill');
      const curEl = document.getElementById('xpCurrent');
      const nextEl = document.getElementById('xpNext');
      if (!lvEl || !fillEl) return;

      let totalXp = 0;
      try {
        const empId = await getEmployeeId();
        if (empId && window.sb) {
          const { data } = await window.sb.from('user_gamification')
            .select('total_xp').eq('employee_id', empId).maybeSingle();
          if (data) totalXp = data.total_xp || 0;
        }
      } catch (e) { /* Supabase 미연결 → 0 */ }

      const tier = calculateTier(totalXp);
      // Lv = tierIndex * 4 + (5 - subLevel) → 1~36 범위
      const level = tier.tierIndex * 4 + (5 - tier.subLevel);
      lvEl.textContent = level;
      fillEl.style.width = tier.progressPct + '%';

      const xpInTier = tier.currentXp - tier.tierStartXp;
      const tierSpan = tier.nextTierXp ? (tier.nextTierXp - tier.tierStartXp) : 15000;
      curEl.textContent = xpInTier.toLocaleString();
      nextEl.textContent = tierSpan.toLocaleString();
    }

    async function renderTodaysQuest() {
      const list = document.getElementById('todaysQuestList');
      const dateEl = document.getElementById('todayDate');
      if (!list) return;

      // 오늘 날짜 표시
      if (dateEl) {
        const d = new Date();
        const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
        const days = ['일','월','화','수','목','금','토'];
        dateEl.textContent = `${months[d.getMonth()]} ${d.getDate()}일 (${days[d.getDay()]})`;
      }

      const quests = [];

      // Quest 1: 다음 학습 액션 (기존 updateNextAction 로직 재사용)
      let nextChapter = null, nextVideo = null, nextType = 'start';
      for (let i = 0; i < chapters.length; i++) {
        const ch = chapters[i];
        if (Progress.isChapterPassed(ch.id)) continue;
        if (!Progress.isChapterUnlocked(i)) continue;
        nextChapter = ch;
        if (!Progress.isChapterAllVideosComplete(ch.id)) {
          const videos = SopStore.getVideos(ch.id);
          nextVideo = videos.find(v => !Progress.isVideoCompleted(v.id));
          nextType = nextVideo ? 'video' : 'quiz';
        } else {
          nextType = 'quiz';
        }
        break;
      }

      if (nextChapter) {
        const title = getLocalizedText(nextChapter, 'title');
        const link = nextVideo
          ? `chapter.html?id=${nextChapter.id}&video=${nextVideo.id}`
          : `chapter.html?id=${nextChapter.id}`;
        const subtitle = nextType === 'video'
          ? `${title} · ${t.scenePrefix} ${nextVideo.order_num}`
          : t.quizChallenge(title);
        quests.push({
          priority: 1,
          icon: nextType === 'video' ? '📺' : '🧠',
          title: nextType === 'video' ? '다음 학습' : '퀴즈 도전',
          subtitle,
          link,
          rewardXp: nextType === 'video' ? XP_CONFIG.CHAPTER_COMPLETE : XP_CONFIG.QUIZ_PERFECT_BONUS,
        });
      }

      // Quest 2: 진행 중 챕터 이어하기 (다음 액션과 다른 챕터)
      let inProgressChapter = null;
      for (let i = 0; i < chapters.length; i++) {
        const ch = chapters[i];
        if (nextChapter && ch.id === nextChapter.id) continue;
        if (Progress.isChapterPassed(ch.id)) continue;
        if (!Progress.isChapterUnlocked(i)) continue;
        const videos = SopStore.getVideos(ch.id);
        const started = videos.some(v => Progress.isVideoCompleted(v.id));
        if (started && !Progress.isChapterAllVideosComplete(ch.id)) {
          inProgressChapter = ch;
          break;
        }
      }
      if (inProgressChapter) {
        quests.push({
          priority: 2,
          icon: '▶️',
          title: '이어서 학습',
          subtitle: getLocalizedText(inProgressChapter, 'title'),
          link: `chapter.html?id=${inProgressChapter.id}`,
          rewardXp: XP_CONFIG.CHAPTER_COMPLETE,
        });
      }

      // Quest 3: 일일 XP 목표 (localStorage)
      const todayKey = 'sop_daily_xp_' + new Date().toISOString().slice(0, 10);
      const earned = parseInt(localStorage.getItem(todayKey) || '0');
      const target = 100;
      const pct = Math.min(100, Math.round((earned / target) * 100));
      const done = earned >= target;
      quests.push({
        priority: 3,
        icon: done ? '🏆' : '🔥',
        title: '일일 목표',
        subtitle: done ? `오늘 ${target} XP 달성! 내일 또 도전 💪` : `오늘 ${target} XP 획득 (${earned}/${target})`,
        link: done ? null : (nextChapter ? `chapter.html?id=${nextChapter.id}` : 'tasks.html'),
        rewardXp: 20,
        progress: pct,
        done,
      });

      // 빈 상태 처리
      if (quests.length === 0 || (!nextChapter && !inProgressChapter)) {
        list.innerHTML = `
          <div class="quest-empty">
            <div class="quest-empty-emoji">🎉</div>
            <div class="quest-empty-title">모든 학습을 완료했어요!</div>
            <div class="quest-empty-desc">새로운 교육이 배포되면 여기에 표시됩니다.</div>
          </div>`;
        return;
      }

      list.innerHTML = quests.slice(0, 3).map(q => {
        const pCls = `quest-priority-${q.priority}`;
        const doneCls = q.done ? ' quest-done' : '';
        const inner = `
          <div class="quest-icon">${q.icon}</div>
          <div class="quest-body">
            <div class="quest-title">${q.title}</div>
            <div class="quest-subtitle">${q.subtitle}</div>
            ${q.progress != null ? `<div class="quest-progress"><div class="fill" style="width:${q.progress}%"></div></div>` : ''}
          </div>
          <div class="quest-reward">+${q.rewardXp} XP</div>`;
        return q.link
          ? `<a href="${q.link}" class="quest-card ${pCls}${doneCls}">${inner}</a>`
          : `<div class="quest-card ${pCls}${doneCls}">${inner}</div>`;
      }).join('');
    }

    let _onboardIdx = 0;
    function showOnboarding() {
      const steps = _onboardSteps[lang] || _onboardSteps.ko;
      _onboardIdx = 0;
      const overlay = document.getElementById('onboardingOverlay');
      overlay.style.display = 'flex';
      _renderOnboardStep(steps);
    }
    function _renderOnboardStep(steps) {
      const s = steps[_onboardIdx];
      document.getElementById('onboardStep').textContent = s.icon;
      document.getElementById('onboardTitle').textContent = s.title;
      document.getElementById('onboardDesc').textContent = s.desc;
      document.getElementById('onboardDots').innerHTML = steps.map((_, i) =>
        `<div style="width:${i===_onboardIdx?'20px':'8px'};height:8px;border-radius:4px;background:${i===_onboardIdx?'var(--primary)':'var(--gray-200)'};transition:all 0.3s;"></div>`
      ).join('');
      const nextBtn = document.getElementById('onboardNext');
      const skipBtn = document.getElementById('onboardSkip');
      if (_onboardIdx === steps.length - 1) {
        nextBtn.textContent = lang === 'en' ? "Let's go!" : lang === 'vi' ? 'Bắt đầu!' : '시작하기!';
        skipBtn.style.display = 'none';
      } else {
        nextBtn.textContent = lang === 'en' ? 'Next' : lang === 'vi' ? 'Tiếp' : '다음';
        skipBtn.textContent = lang === 'en' ? 'Skip' : lang === 'vi' ? 'Bỏ qua' : '건너뛰기';
        skipBtn.style.display = 'block';
      }
    }
    function nextOnboardStep() {
      const steps = _onboardSteps[lang] || _onboardSteps.ko;
      _onboardIdx++;
      if (_onboardIdx >= steps.length) { closeOnboarding(); return; }
      _renderOnboardStep(steps);
    }
    function closeOnboarding() {
      document.getElementById('onboardingOverlay').style.display = 'none';
      localStorage.setItem('sop_onboarded', 'true');
    }

    // 첫 로그인 감지
    if (!localStorage.getItem('sop_onboarded')) {
      setTimeout(() => showOnboarding(), 800); // 페이지 로드 후 0.8초 뒤 표시
    }

    // ===== 초기화 (오늘의 퀘스트 미니멀 홈) =====
    try { renderLvXpHeader(); } catch(e) { console.warn('[Init] renderLvXpHeader:', e.message); }
    try { renderTodaysQuest(); } catch(e) { console.warn('[Init] renderTodaysQuest:', e.message); }
    // 스트릭 체크인
    try {
      const empId = user?.id;
      if (empId && typeof StreakService !== 'undefined') {
        StreakService.sync(empId).then(() => {
          const streak = StreakService.checkIn(empId);
          const badge = document.getElementById('streakBadge');
          if (badge && streak.current > 0) {
            badge.style.display = 'inline-block';
            badge.textContent = t.streakLabel ? t.streakLabel(streak.current) : `🔥 ${streak.current}`;
            if (streak.current >= 7) badge.style.background = 'linear-gradient(135deg,#EF4444,#FF6B35)';
            if (streak.current >= 30) badge.style.background = 'linear-gradient(135deg,#9B59B6,#EF4444)';
          }
        });
      }
    } catch(e) { console.warn('[Init] streak:', e.message); }
    // 전체 완주 XP (+200) — 과정 100% 달성 시 1회만 (DB UNIQUE 중복 방지)
    (async () => {
      try {
        if (Progress.getTotalProgress() < 100) return;
        const empId = await getEmployeeId();
        if (!empId) return;
        const xpResult = await XpService.addXp(empId, XP_CONFIG.COURSE_COMPLETE, 'course_complete', 'all');
        if (xpResult?.leveledUp && typeof showLevelUpCelebration === 'function') {
          showLevelUpCelebration(xpResult.oldTier, xpResult.newTier, lang);
        }
      } catch(e) { console.warn('[XP] 완주 XP 오류:', e.message); }
    })();

    function updateNotifUI() {
      const bell = document.getElementById('notifBell');
      bell.title = notifEnabled ? t.notifOn : t.notifOff;
      bell.style.opacity = notifEnabled ? '1' : '0.4';
    }

    function toggleNotifications() {
      if (!notifEnabled) {
        requestNotificationPermission();
      } else {
        notifEnabled = false;
        localStorage.setItem(notifKey, 'false');
        if (notifInterval) { clearInterval(notifInterval); notifInterval = null; }
        updateNotifUI();
        showToast(t.notifOff);
      }
    }

    async function requestNotificationPermission() {
      if (!('Notification' in window)) { showToast(lang === 'en' ? 'This browser does not support notifications' : lang === 'vi' ? 'Trình duyệt không hỗ trợ thông báo' : '이 브라우저는 알림을 지원하지 않습니다'); return; }
      let perm = Notification.permission;
      if (perm === 'default') perm = await Notification.requestPermission();
      if (perm === 'granted') {
        notifEnabled = true;
        localStorage.setItem(notifKey, 'true');
        updateNotifUI();
        showToast(t.notifOn);
        startNotifChecks();
      } else {
        showToast(t.notifOff);
      }
    }

    function showLocalNotification(title, body, url) {
      if (!notifEnabled || Notification.permission !== 'granted') return;
      if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(title, {
            body, icon: '/assets/icon-192.svg', badge: '/assets/icon-192.svg',
            data: { url: url || '/app.html' }
          });
        });
      } else {
        new Notification(title, { body, icon: '/assets/icon-192.svg' });
      }
    }

    function checkAndNotify() {
      if (!notifEnabled || !user) return;
      const now = Date.now();
      const lastCheck = parseInt(localStorage.getItem('sop_notif_last_' + user.email) || '0');
      if (now - lastCheck < 3600000) return; // 1시간에 1번만
      localStorage.setItem('sop_notif_last_' + user.email, '' + now);

      // 미완료 챕터 확인
      const incomplete = chapters.some(ch => !Progress.isChapterPassed(ch.id));
      if (incomplete) {
        showLocalNotification('SOP Training', t.notifIncomplete, '/app.html');
        return;
      }

      // 마감일 확인
      const deadlines = JSON.parse(localStorage.getItem('sop_deadlines') || '[]');
      for (const dl of deadlines) {
        const days = Math.ceil((new Date(dl.deadlineAt) - new Date()) / 86400000);
        if (days > 0 && days <= 3) {
          showLocalNotification('SOP Training', t.notifDeadline(days), '/app.html');
          return;
        }
      }
    }

    function startNotifChecks() {
      if (notifInterval) clearInterval(notifInterval);
      checkAndNotify();
      notifInterval = setInterval(checkAndNotify, 3600000); // 매 1시간
    }

    // 관리자가 보낸 대기 중 알림 확인
    function checkPendingNotifications() {
      if (!user) return;
      const pending = JSON.parse(localStorage.getItem('sop_pending_notifications') || '[]');
      const shown = JSON.parse(localStorage.getItem('sop_notif_shown_' + user.email) || '[]');
      const newNotifs = pending.filter(n => {
        if (shown.includes(n.id)) return false;
        if (n.target === 'all') return true;
        if (n.target === 'incomplete') return chapters.some(ch => !Progress.isChapterPassed(ch.id));
        if (n.target === 'specific' && n.targetEmails) return n.targetEmails.includes(user.email);
        return false;
      });
      newNotifs.forEach(n => {
        showLocalNotification(n.title || 'SOP Training', n.message, '/app.html');
        shown.push(n.id);
      });
      if (newNotifs.length > 0) {
        localStorage.setItem('sop_notif_shown_' + user.email, JSON.stringify(shown));
        document.getElementById('notifDot').style.display = 'block';
        setTimeout(() => { document.getElementById('notifDot').style.display = 'none'; }, 5000);
      }
    }

    // 초기화
    updateNotifUI();
    if (notifEnabled && Notification.permission === 'granted') {
      startNotifChecks();
    }
    checkPendingNotifications();

    // 로그아웃 (설정 아이콘 길게 클릭 or change-password에서 처리)
    // 아바타는 프로필 링크로 변경됨
  </script>

</body>
</html>
