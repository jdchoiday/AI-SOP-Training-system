  <div class="app-container">

    <!-- ===== 상단 헤더 ===== -->
    <div class="app-header">
      <h2>SOP Training</h2>
      <div style="display:flex; align-items:center; gap:10px;">
        <button id="notifBell" onclick="toggleNotifications()" title=""
          style="background:none; border:none; font-size:20px; cursor:pointer; position:relative; padding:4px;">
          &#128276;<span id="notifDot" style="display:none; position:absolute; top:2px; right:2px; width:8px; height:8px; background:var(--danger); border-radius:50%;"></span>
        </button>
        <a href="guide.html" title="사용 가이드" style="text-decoration:none; font-size:18px; line-height:1; padding:4px; cursor:pointer;">&#10068;</a>
        <a href="change-password.html" title="설정" style="text-decoration:none; font-size:20px; line-height:1; padding:4px; cursor:pointer;">&#9881;</a>
        <a href="profile.html" class="user-avatar" id="userAvatar" title="내 프로필" style="text-decoration:none; overflow:hidden;">?</a>
      </div>
    </div>

    <!-- ===== 환영 카드 ===== -->
    <div class="card">
      <h3 style="margin-bottom:4px;" id="welcomeMsg">안녕하세요!</h3>
      <p style="color:var(--gray-500); font-size:14px;" id="progressSummary"></p>
      <div class="progress-bar" style="margin-top:12px;">
        <div class="fill" id="totalProgress" style="width:0%"></div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:6px;">
        <span style="font-size:12px; color:var(--gray-500);" id="progressLabel"></span>
        <span style="font-size:12px; font-weight:600; color:var(--primary);" id="progressPercent">0%</span>
      </div>
    </div>

    <!-- ===== 신입 모험가 퀘스트 ===== -->
    <div id="rookieQuestCard"></div>

    <!-- ===== 3파트 스탯 카드 (MY STATS) ===== -->
    <div id="scoreCard"></div>

    <!-- ===== 오늘의 할 일 카드 ===== -->
    <div class="card" id="nextActionCard" style="border-left:3px solid var(--primary);">
      <p style="font-size:12px; color:var(--gray-500); margin-bottom:4px;" id="nextTodoLabel"></p>
      <p style="font-weight:600;" id="nextActionText"></p>
    </div>

    <!-- ===== 챕터 목록 ===== -->
    <h3 style="margin:20px 0 12px; font-size:16px; color:var(--gray-700);" id="chapterListTitle"></h3>

    <div id="chapterList">
      <!-- JS에서 동적 생성 -->
    </div>

    <!-- ===== 리더보드 (화려한 1등 게시판) ===== -->
    <div id="leaderboardSection" style="display:none; margin-top:20px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <h3 style="font-size:16px; color:var(--gray-700);" id="leaderboardTitle">🏆 XP 리더보드</h3>
        <button onclick="toggleLeaderboard()" id="lbToggle" style="background:none; border:none; font-size:13px; color:var(--primary); cursor:pointer; font-weight:600;">접기 ▲</button>
      </div>
      <div id="leaderboardContent">
        <!-- JS 동적 생성 -->
      </div>
    </div>

    <!-- ===== 경쟁 랭킹 (전국 / 지점 × 월간 / 일간) ===== -->
    <div id="competitiveSection" style="display:none; margin-top:20px;">
      <!-- 범위: 전국 / 우리 지점 -->
      <div style="display:flex; gap:8px; margin-bottom:8px;">
        <button onclick="switchRankScope('all')" id="rankScopeAll" style="flex:1; padding:10px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; border:2px solid #F59E0B; background:rgba(245,158,11,0.15); color:#F59E0B; transition:all 0.2s;">🌍 전국 랭킹</button>
        <button onclick="switchRankScope('branch')" id="rankScopeBranch" style="flex:1; padding:10px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; border:2px solid transparent; background:rgba(255,255,255,0.06); color:var(--gray-500); transition:all 0.2s;">🏠 우리 지점</button>
      </div>
      <!-- 기간: 월간 / 일간 -->
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <button onclick="switchRankPeriod('monthly')" id="rankPeriodMonthly" style="flex:1; padding:8px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:none; background:rgba(245,158,11,0.12); color:#F59E0B; transition:all 0.2s;">🔥 월간</button>
        <button onclick="switchRankPeriod('daily')" id="rankPeriodDaily" style="flex:1; padding:8px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:none; background:rgba(255,255,255,0.04); color:var(--gray-500); transition:all 0.2s;">⚡ 일간</button>
      </div>
      <div id="rankContent"></div>
    </div>

    <!-- ===== XP 혜택 (XP로 얻을 수 있는 보상) ===== -->
    <div id="xpRewardsCard" class="card" style="margin-top:16px; border:1px solid rgba(245,158,11,0.3); background:linear-gradient(135deg, rgba(245,158,11,0.05) 0%, rgba(16,185,129,0.05) 100%);">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <h3 style="font-size:15px; color:var(--gray-700);" id="xpRewardsTitle">🎁 XP 혜택</h3>
        <button onclick="toggleXpRewards()" id="xpRewardsToggle" style="background:none; border:none; font-size:13px; color:#F59E0B; cursor:pointer; font-weight:600;">접기 ▲</button>
      </div>
      <div id="xpRewardsBody">
        <!-- JS 동적 생성 -->
      </div>
    </div>

    <!-- ===== XP 가이드 (어떤 액션이 얼마의 XP?) ===== -->
    <div id="xpGuideCard" class="card" style="margin-top:16px; display:none; border:1px solid var(--primary-light); background:linear-gradient(135deg, #f0f7ff 0%, #fef9ef 100%);">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <h3 style="font-size:15px; color:var(--gray-700);" id="xpGuideTitle">💡 XP 획득 가이드</h3>
        <button onclick="toggleXpGuide()" id="xpGuideToggle" style="background:none; border:none; font-size:13px; color:var(--primary); cursor:pointer; font-weight:600;">접기 ▲</button>
      </div>
      <div id="xpGuideBody">
        <!-- JS 동적 생성 -->
      </div>
    </div>

    <!-- 모바일 하단 네비 중복은 CSS가 처리 -->

  </div>

          { id: 'profile', icon: '👤', title: 'Giới thiệu', desc: 'Thêm ảnh + mô tả ngắn', xp: 30, link: 'profile.html' },
          { id: 'video', icon: '📺', title: 'Bài đầu tiên', desc: 'Xem 1 video đào tạo', xp: 50, link: null },
          { id: 'quiz', icon: '🧠', title: 'Thử thách', desc: 'Vượt qua 1 bài kiểm tra', xp: 50, link: null },
          { id: 'praise', icon: '💬', title: 'Cổ vũ', desc: 'Gửi 1 lời khen cho đồng nghiệp', xp: 30, link: 'praise.html' },
          { id: 'team', icon: '🤝', title: 'Nhiệm vụ đầu', desc: 'Tham gia 1 thử thách', xp: 50, link: 'team-tasks.html' },
        ],
      }
    };
    const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
    const t = T[lang] || T.ko;

    // ===== 로그인 확인 =====
    const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
    const loginTime = parseInt(localStorage.getItem('sop_login_time') || '0');
    if (Date.now() - loginTime > 24 * 60 * 60 * 1000) {
      localStorage.removeItem('sop_user');
      localStorage.removeItem('sop_login_time');
      window.location.href = 'index.html';
    }
    if (!user) {
      window.location.href = 'index.html';
    } else {
      // 아바타 표시 (프로필 사진/이모지/이니셜)
      const avatarEl = document.getElementById('userAvatar');
      if (user.avatarType === 'photo' && user.avatarData) {
        avatarEl.innerHTML = `<img src="${user.avatarData}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;

        avatarEl.textContent = user.avatarData;
        avatarEl.style.fontSize = '20px';
      } else {
        avatarEl.textContent = (user.name || '?')[0];
      }
      document.getElementById('welcomeMsg').textContent = t.welcome(user.name);

    // Supabase 초기화 (매번 최신 데이터 동기화)
    SupabaseMode.init().then(connected => {
      if (connected) {
        SupabaseMode.syncAll().then(() => {
          // Supabase 동기화 후 UI 갱신 (reload 하지 않음 — 깜박임 방지)
          renderTierCard();
          renderPraiseMiniCard();
          renderTasksMiniCard();
          renderTeamTasksMiniCard();
          renderScoreCard();
          renderLeaderboard();
          renderCompetitiveRanking();
          renderXpRewards();

    // ===== 챕터 데이터 (SOP에서 자동 생성, 학습 경로 필터 적용) =====
    // 2단 계층: { chapters: [...], orphanSections: [...] }
    const chapterData = SopStore.getChapters();
    // 하위호환: orphanSections를 기존 chapters처럼 사용
    const chapters = (() => {
      // 대챕터가 있으면 대챕터 + 독립 섹션 순서로 플랫 목록 생성 (Progress 호환)
      const flat = [];
      if (chapterData.chapters) {
        chapterData.chapters.forEach(ch => {
          // 대챕터 자체도 목록에 (+ sections 포함)
          flat.push(ch);
        });
      }
      if (chapterData.orphanSections) {
        chapterData.orphanSections.forEach(s => flat.push(s));
      }
      // 학습 경로 필터
      if (!user) return flat;
      const emp = typeof EmployeeStore !== 'undefined' ? EmployeeStore.getCurrentEmployee() : null;
      const branch = emp?.branch || user.branch;
      if (!branch) return flat;
      const paths = JSON.parse(localStorage.getItem('sop_learning_paths') || '{}');
      const assigned = paths[branch];
      if (!assigned || assigned.length === 0) return flat;
      return flat.filter(ch => assigned.includes(ch.id));
    })();

    // ===== 전체 진행률 =====
    async function updateProgress() {
      const pct = Progress.getTotalProgress();
      document.getElementById('totalProgress').style.width = pct + '%';
      document.getElementById('progressPercent').textContent = pct + '%';

      const passedCount = chapters.filter(ch => Progress.isChapterPassed(ch.id)).length;
      const allResults = Progress.getAllResults();
      const videoDoneCount = allResults.completedVideos ? allResults.completedVideos.length : 0;
      document.getElementById('progressSummary').textContent =
        t.chapterProgress(chapters.length, passedCount, videoDoneCount);

      if (pct >= 100) {
        document.getElementById('totalProgress').classList.add('success');
        // 전체 완주 +200 XP (1회만, 중복 방지는 DB UNIQUE)
        const empId = await getEmployeeId();
        if (empId) {
          try {
            const xpResult = await XpService.addXp(empId, XP_CONFIG.COURSE_COMPLETE, 'course_complete', 'all');
            if (xpResult?.leveledUp) showLevelUpCelebration(xpResult.oldTier, xpResult.newTier, lang);
          } catch (e) { console.warn('[XP] 완주 XP 오류:', e); }
        }
      }
    }

    // ===== 다음 할 일 표시 =====
    function updateNextAction() {
      let nextText = t.allComplete;
      const card = document.getElementById('nextActionCard');

      for (let i = 0; i < chapters.length; i++) {
        const ch = chapters[i];
        if (!Progress.isChapterPassed(ch.id)) {
          if (!Progress.isChapterUnlocked(i)) {
            nextText = t.completePrevious;
          } else if (!Progress.isChapterAllVideosComplete(ch.id)) {
            const videos = SopStore.getVideos(ch.id);
            const nextVideo = videos.find(v => !Progress.isVideoCompleted(v.id));
            nextText = nextVideo
              ? `${getLocalizedText(ch, 'title')} → ${t.scenePrefix} ${nextVideo.order_num}`
              : t.quizChallenge(getLocalizedText(ch, 'title'));
          } else {
            nextText = t.quizChallenge(getLocalizedText(ch, 'title'));
          }
          card.style.borderLeftColor = 'var(--primary)';
          break;
        }
      }

      if (Progress.getTotalProgress() >= 100) {
        card.style.borderLeftColor = 'var(--success)';
        card.style.cursor = 'pointer';
        card.onclick = () => window.location.href = 'my-results.html';
      }

      document.getElementById('nextActionText').textContent = nextText;
    }

    // ===== 챕터 목록 렌더링 (2단 계층 지원) =====
    function renderChapters() {
      const container = document.getElementById('chapterList');
      container.innerHTML = '';
      container.className = 'chapter-grid';

      if (chapters.length === 0) {
        container.innerHTML = `<div class="card" style="text-align:center; color:var(--gray-500); padding:40px;"><p>${t.noSop}</p><p style="font-size:13px;">${t.noSopSub}</p></div>`;
        return;
      }

      const lockMsg = t.completePreviousChapter.replace(/'/g, "\\'");
      let globalIndex = 0; // 전체 순차 잠금용

      chapters.forEach((ch, index) => {
        if (ch.doc_type === 'chapter' && ch.sections?.length > 0) {
          // === 대챕터 (섹션 포함) ===
          const allSectionsPassed = ch.sections.every(s => Progress.isChapterPassed(s.id));
          const passedCount = ch.sections.filter(s => Progress.isChapterPassed(s.id)).length;
          const chapterProgress = ch.sections.length > 0 ? Math.round(passedCount / ch.sections.length * 100) : 0;

          container.innerHTML += `
            <div class="card" style="padding:0; overflow:hidden; margin-bottom:16px; border:1px solid ${allSectionsPassed ? 'var(--success)' : 'rgba(245,158,11,0.3)'};">
              <div style="padding:16px 20px; background:linear-gradient(135deg,#1a2744,#1E293B); display:flex; align-items:center; gap:12px; cursor:pointer;"
                   onclick="this.parentElement.querySelector('.ch-sections').classList.toggle('collapsed')">
                <span style="font-size:28px;">${allSectionsPassed ? '✅' : '📘'}</span>
                <div style="flex:1;">
                  <h3 style="font-size:16px; color:#f59e0b; margin-bottom:2px;">${getLocalizedText(ch, 'title')}</h3>
                  <p style="font-size:13px; color:var(--gray-400);">${ch.sections.length}개 섹션 · ${passedCount}/${ch.sections.length} 완료</p>
                </div>
                <div style="text-align:right;">
                  <div style="font-size:18px; font-weight:700; color:${allSectionsPassed ? 'var(--success)' : '#f59e0b'};">${chapterProgress}%</div>
                  <span style="font-size:12px; color:var(--gray-500);">▼ 펼치기</span>
                </div>
              </div>
              <div style="background:rgba(245,158,11,0.05); height:4px;">
                <div style="height:100%; background:linear-gradient(90deg,#f59e0b,#d97706); width:${chapterProgress}%; transition:width 0.3s;"></div>
              </div>
              <div class="ch-sections" style="padding:8px 12px;">
                ${ch.sections.map((sec, si) => {
                  const secUnlocked = si === 0 ? Progress.isChapterUnlocked(globalIndex) : Progress.isChapterPassed(ch.sections[si - 1].id);
                  const secPassed = Progress.isChapterPassed(sec.id);
                  const secVideoProgress = Progress.getChapterVideoProgress(sec.id);
                  const videos = SopStore.getVideos(sec.id);
                  globalIndex++;

                  let secIcon = secPassed ? '<span style="color:var(--success);font-size:18px;">✅</span>'
                    : !secUnlocked ? '<span style="color:var(--gray-400);">🔒</span>'
                    : '<span style="color:var(--primary);">▶</span>';

                  const secSubtitle = !secUnlocked ? t.completePrevious
                    : secPassed ? t.completedScore(Progress.getAllResults().chapterResults[sec.id]?.score || 0)
                    : t.scenesInfo(videos.length, sec.estimatedMinutes || 0);

                  const secProgressHTML = secUnlocked && !secPassed && secVideoProgress > 0
                    ? `<div class="progress-bar" style="margin-top:6px;height:3px;"><div class="fill" style="width:${secVideoProgress}%"></div></div>` : '';

                  return `
                    <a class="chapter-item ${secPassed ? 'completed' : !secUnlocked ? 'locked' : ''}"
                       href="${secUnlocked ? 'chapter.html?id=' + sec.id : '#'}"
                       ${!secUnlocked ? `onclick="showToast('${lockMsg}'); return false;"` : ''}
                       style="padding:12px 14px; margin-bottom:6px;">
                      <div class="chapter-num" style="width:28px; height:28px; font-size:13px;">${si + 1}</div>
                      <div class="chapter-info" style="flex:1;">
                        <h3 style="font-size:14px;">${getLocalizedText(sec, 'title')}</h3>
                        <p style="font-size:12px;">${secSubtitle}</p>
                        ${secProgressHTML}
                      </div>
                      ${secIcon}
                    </a>`;
                }).join('')}
                ${allSectionsPassed && ch.examQuizCount > 0 ? `
                  <a class="chapter-item" href="chapter.html?id=${ch.id}&exam=true"
                     style="padding:12px 14px; margin-top:8px; background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(217,119,6,0.1)); border:1px solid rgba(245,158,11,0.3);">
                    <div style="font-size:22px;">🎯</div>
                    <div class="chapter-info" style="flex:1;">
                      <h3 style="font-size:14px; color:#f59e0b;">챕터 종합시험</h3>
                      <p style="font-size:12px;">${ch.examQuizCount}문제 · 70% 이상 합격</p>
                    </div>
                    <span style="color:#f59e0b;">▶</span>
                  </a>
                ` : ''}
              </div>
            </div>
          `;
        } else {
          // === 독립 섹션 (기존 방식) ===
          const unlocked = Progress.isChapterUnlocked(globalIndex);
          const passed = Progress.isChapterPassed(ch.id);
          const videoProgress = Progress.getChapterVideoProgress(ch.id);
          const videos = SopStore.getVideos(ch.id);
          globalIndex++;

          let statusClass = unlocked ? '' : 'locked';
          if (passed) statusClass = 'completed';

          let statusIcon = passed
            ? '<span style="color:var(--success);font-size:20px;">&#9989;</span>'
            : !unlocked
              ? '<svg width="20" height="20" fill="none" stroke="var(--gray-300)" stroke-width="2"><path d="M10 2a4 4 0 014 4v2H6V6a4 4 0 014-4zM4 10h12v8a2 2 0 01-2 2H6a2 2 0 01-2-2v-8z"/></svg>'
              : '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4l8 8-8 8"/></svg>';

          const subtitle = !unlocked ? t.completePrevious
            : passed ? t.completedScore(Progress.getAllResults().chapterResults[ch.id]?.score || 0)
            : t.scenesInfo(videos.length, ch.estimatedMinutes || 0);

          const progressHTML = unlocked && !passed && videoProgress > 0
            ? `<div class="progress-bar" style="margin-top:8px;height:4px;"><div class="fill" style="width:${videoProgress}%"></div></div>` : '';

          const link = unlocked ? `chapter.html?id=${ch.id}` : '#';

          container.innerHTML += `
            <a class="chapter-item ${statusClass}" href="${link}" ${!unlocked ? `onclick="showToast('${lockMsg}'); return false;"` : ''}>
              <div class="chapter-num">${globalIndex}</div>
              <div class="chapter-info">
                <h3>${getLocalizedText(ch, 'title')}</h3>
                <p>${subtitle}</p>
                ${progressHTML}
              </div>
              ${statusIcon}
            </a>
          `;
        }
      });
    }

    // Toast notification
    function showToast(msg) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:12px 24px; border-radius:10px; font-size:14px; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; text-align:center; max-width:80%;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    // ===== 다국어 적용 =====

    // ===== MBTI 챕터 카드 추가 =====

    // ===== 직원 실제 ID 조회 헬퍼 (데모 로그인 대응) =====
    let _resolvedEmpId = null;
    async function getEmployeeId() {
      if (_resolvedEmpId) return _resolvedEmpId;
      if (!SupabaseMode._ready || !user?.id) return user?.id;
      const { data: d1 } = await SupabaseMode._client
        .from('employees').select('id').eq('id', user.id).maybeSingle();
      if (d1) { _resolvedEmpId = d1.id; return _resolvedEmpId; }
      if (user.email) {
        const { data: d2 } = await SupabaseMode._client
          .from('employees').select('id').eq('email', user.email).maybeSingle();
        if (d2) { _resolvedEmpId = d2.id; return _resolvedEmpId; }
      }
      return user.id;
    }

    // ===== 티어 카드 렌더링 (XP 시스템) =====
    async function renderTierCard() {
      const empId = await getEmployeeId();
      if (!empId || !SupabaseMode._ready) return;
      // 중복 렌더링 방지
      const existing = document.getElementById('xp-tier-card');
      if (existing) existing.remove();
      try {
        const totalXp = await XpService.getTotal(empId);
        const tier = calculateTier(totalXp);
        const container = document.getElementById('chapterList');
        const wrapper = document.createElement('div');
        wrapper.id = 'xp-tier-card';
        wrapper.innerHTML = createTierCardHTML(tier, lang);
        container.insertBefore(wrapper, container.firstChild);
      } catch (e) { console.warn('[XP] 티어 카드 오류:', e); }
    }

    // ===== 칭찬 미니 카드 (홈 화면) =====
    async function renderPraiseMiniCard() {
      const empId = await getEmployeeId();
      if (!empId || !SupabaseMode._ready) return;
      try {
        const stack = await PraiseService.getStackProgress(empId);
        const container = document.getElementById('chapterList');
        const needed = stack.needed;
        const current = stack.current;
        let dots = '';
        for (let i = 0; i < needed; i++) {
          dots += i < current ? '⭐' : '☆';
        }
        const remaining = needed - current;
        const subText = remaining > 0
          ? (lang === 'en' ? `${remaining} more to earn +${XP_CONFIG.PRAISE_XP_PER_STACK} XP!`
             : lang === 'vi' ? `Cần thêm ${remaining} để nhận +${XP_CONFIG.PRAISE_XP_PER_STACK} XP!`
             : `${remaining}개 더 받으면 +${XP_CONFIG.PRAISE_XP_PER_STACK} XP!`)
          : (lang === 'en' ? '🎉 XP conversion complete!' : lang === 'vi' ? '🎉 Đã chuyển đổi XP!' : '🎉 XP 전환 완료!');

        const praiseLabel = lang === 'en' ? 'Received Boosts' : lang === 'vi' ? 'Boost nhận được' : '받은 부스트';
        // 기존 카드 제거 후 재삽입 (중복 방지)
        const existingPraise = document.getElementById('praise-mini-card');
        if (existingPraise) existingPraise.remove();

        const card = document.createElement('a');
        card.href = 'praise.html';
        card.className = 'chapter-item';
        card.id = 'praise-mini-card';
        card.style.cssText = 'border-left:3px solid #f59e0b; text-decoration:none;';
        card.innerHTML = `
          <div class="chapter-num" style="background:#fef3c7; color:#f59e0b;">🤝</div>
          <div class="chapter-info">
            <h3>${praiseLabel}  ${dots}</h3>
            <p>${subText}</p>
          </div>
          <span style="font-size:16px;">→</span>
        `;
        // 티어 카드 다음에
        const tierCard = document.getElementById('xp-tier-card');
        if (tierCard && tierCard.nextSibling) {
          container.insertBefore(card, tierCard.nextSibling);
        } else {
          container.insertBefore(card, container.firstChild);
        }
      } catch (e) { console.warn('[Praise] 미니 카드 오류:', e); }
    }

    // ===== 성과제 미니 카드 (홈 화면) =====
    async function renderTasksMiniCard() {
      let empId = user?.id;
      if (!empId || !SupabaseMode._ready) return;
      try {
        // employees 테이블에서 실제 ID 확인 (데모 로그인 대응)
        const { data: empCheck } = await SupabaseMode._client
          .from('employees').select('id').eq('id', empId).maybeSingle();
        if (!empCheck && user.email) {
          const { data: byEmail } = await SupabaseMode._client
            .from('employees').select('id').eq('email', user.email).maybeSingle();
          if (byEmail) empId = byEmail.id;
        }

        const today = new Date();
        const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

        // 오늘 완료 ���
        const { data: logs } = await SupabaseMode._client
          .from('basic_task_logs')
          .select('id')
          .eq('employee_id', empId)
          .eq('completed_date', dateStr);

        // 전체 활성 템플릿 수
        const { data: tmpls } = await SupabaseMode._client
          .from('basic_task_templates')
          .select('id')
          .eq('is_active', true)
          .eq('category', 'daily');

        const done = logs?.length || 0;
        const total = tmpls?.length || 0;
        if (total === 0) return; // 성과제가 없으면 카드 안 보임

        // 포인트 조회
        const { data: empData } = await SupabaseMode._client
          .from('employees')
          .select('quarter_points')
          .eq('id', empId)
          .maybeSingle();
        const qp = empData?.quarter_points || 0;

        const taskLabel = lang === 'en' ? 'Today\'s Missions' : lang === 'vi' ? 'Nhiệm vụ hôm nay' : '오늘의 미션';
        const subText = `${done}/${total} ${lang === 'en' ? 'completed' : lang === 'vi' ? 'hoàn thành' : '완료'} · ${qp} P`;

        const container = document.getElementById('chapterList');
        // 기존 카드 제거 후 재삽입 (중복 방지)
        const existingTask = document.getElementById('tasks-mini-card');
        if (existingTask) existingTask.remove();

        const card = document.createElement('a');
        card.href = 'tasks.html';
        card.className = 'chapter-item';
        card.id = 'tasks-mini-card';
        card.style.cssText = 'border-left:3px solid var(--success); text-decoration:none;';
        card.innerHTML = `
          <div class="chapter-num" style="background:#dcfce7; color:var(--success);">&#9989;</div>
          <div class="chapter-info">
            <h3>${taskLabel}  ${done}/${total}</h3>
            <p>${subText}</p>
          </div>
          <span style="font-size:16px;">&#8594;</span>
        `;
        // 칭찬 카드 다음에
        const praiseCard = document.getElementById('praise-mini-card');
        if (praiseCard && praiseCard.nextSibling) {
          container.insertBefore(card, praiseCard.nextSibling);
        } else {
          const tierCard = document.getElementById('xp-tier-card');

          .from('team_tasks').select('id').eq('creator_id', empId);

    // ===== 3파트 스탯 카드 (MY STATS) =====
    async function renderScoreCard() {
      const container = document.getElementById('scoreCard');
      if (!container || !SupabaseMode._ready) return;
      const empId = await getEmployeeId();
      if (!empId) return;

      try {
        // Part 1: Attendance (daily_mission check-ins via xp_transactions) — max 40
        let part1 = 0;
        try {
          const now = new Date();
          const quarterStart = new Date(now.getFullYear(), Math.floor(now.getMonth() / 3) * 3, 1);
          const daysSinceStart = Math.max(1, Math.ceil((now - quarterStart) / 86400000));
          // 일일 미션 체크인 횟수 (dm_attendance_YYYY-MM-DD 패턴)
          const { data: dmLogs } = await SupabaseMode._client
            .from('xp_transactions').select('id')
            .eq('employee_id', empId).eq('source', 'daily_mission')
            .like('source_id', 'dm_attendance_%')
            .gte('created_at', quarterStart.toISOString());
          // 기존 basic_task_logs도 합산 (하위 호환)
          const { data: oldLogs } = await SupabaseMode._client
            .from('basic_task_logs').select('id').eq('employee_id', empId)
            .gte('completed_date', quarterStart.toISOString().slice(0, 10));
          const completedCount = (dmLogs?.length || 0) + (oldLogs?.length || 0);
          const maxTasks = daysSinceStart; // 하루 1회 체크인
          part1 = Math.min(40, Math.round((completedCount / maxTasks) * 40));
        } catch (e) {}

        // Part 2: Special Tasks (team_tasks) — max 30
        let part2 = 0;
        try {
          const { data: myMemberships } = await SupabaseMode._client
            .from('team_task_members').select('task_id, status').eq('employee_id', empId);
          const totalTasks = myMemberships?.length || 0;
          const completedTasks = myMemberships?.filter(m => m.status === 'completed').length || 0;
          const completionRate = totalTasks > 0 ? completedTasks / totalTasks : 0;
          let avgScore = 0.5;
          if (completedTasks > 0) {
            const taskIds = myMemberships.filter(m => m.status === 'completed').map(m => m.task_id);
            const { data: tasks } = await SupabaseMode._client
              .from('team_tasks').select('review_score').in('id', taskIds.slice(0, 50));
            const scores = (tasks || []).filter(tk => tk.review_score).map(tk => tk.review_score);
            avgScore = scores.length > 0 ? scores.reduce((a,b) => a+b, 0) / scores.length / 5 : 0.5;
          }
          part2 = Math.min(30, Math.round((completionRate * 0.6 + avgScore * 0.4) * 30));
        } catch (e) {}

        // Part 3: Education (chapter results) — max 30
        let part3 = 0;
        try {
          const totalChapters = chapters.length || 1;
          const passedChapters = chapters.filter(ch => Progress.isChapterPassed(ch.id)).length;
          const allResults = Progress.getAllResults();
          const scores = Object.values(allResults.chapterResults || {}).map(r => r.score || 0);
          const avgChapterScore = scores.length > 0 ? scores.reduce((a,b) => a+b, 0) / scores.length / 100 : 0;
          part3 = Math.min(30, Math.round((passedChapters / totalChapters * 0.5 + avgChapterScore * 0.5) * 30));
        } catch (e) {}

        const total = part1 + part2 + part3;
        let rankText = '';
        try {
          const { data: allGam } = await SupabaseMode._client.from('user_gamification').select('employee_id, total_xp').order('total_xp', { ascending: false });
          if (allGam) {
            const myIdx = allGam.findIndex(g => g.employee_id === empId);
            if (myIdx >= 0) rankText = `#${myIdx + 1} / ${allGam.length}`;
          }
        } catch (e) {}

        const scoreLabel = lang === 'en' ? 'MY STATS' : lang === 'vi' ? 'MY STATS' : 'MY STATS';
        const attendLabel = lang === 'en' ? 'Attendance' : lang === 'vi' ? 'Chuyen can' : '출석';
        const missionLabel = lang === 'en' ? 'Missions' : lang === 'vi' ? 'Nhiem vu' : '미션';
        const trainLabel = lang === 'en' ? 'Training' : lang === 'vi' ? 'Dao tao' : '트레이닝';
        const rankLabel = lang === 'en' ? 'Season Ranking' : lang === 'vi' ? 'Xep hang' : '시즌 랭킹';

        container.innerHTML = `
          <div class="stats-power-card">
            <div class="stats-power-header">
              <div class="stats-power-title">${scoreLabel}</div>
              <div class="stats-power-total">${total}<span style="font-size:14px;opacity:0.6;">/100</span></div>
            </div>
            <div class="stat-row">
              <div class="stat-icon" style="background:rgba(16,185,129,0.15);color:#10B981;">⚡</div>
              <div class="stat-bar-wrap">
                <div class="stat-label"><span class="stat-label-name">${attendLabel}</span><span class="stat-label-value">${part1}/40</span></div>
                <div class="stat-bar"><div class="stat-bar-fill attendance" style="width:${(part1/40)*100}%;"></div></div>
              </div>
            </div>
            <div class="stat-row">
              <div class="stat-icon" style="background:rgba(245,158,11,0.15);color:#F59E0B;">🎯</div>
              <div class="stat-bar-wrap">
                <div class="stat-label"><span class="stat-label-name">${missionLabel}</span><span class="stat-label-value">${part2}/30</span></div>
                <div class="stat-bar"><div class="stat-bar-fill mission" style="width:${(part2/30)*100}%;"></div></div>
              </div>
            </div>
            <div class="stat-row">
              <div class="stat-icon" style="background:rgba(56,189,248,0.15);color:#38BDF8;">📚</div>
              <div class="stat-bar-wrap">
                <div class="stat-label"><span class="stat-label-name">${trainLabel}</span><span class="stat-label-value">${part3}/30</span></div>
                <div class="stat-bar"><div class="stat-bar-fill training" style="width:${(part3/30)*100}%;"></div></div>
              </div>
            </div>
            ${rankText ? `<div class="stats-rank-row">${rankLabel} <strong>${rankText}</strong></div>` : ''}
          </div>`;
      } catch (e) { console.warn('[ScoreCard]', e); }
    }

    async function renderCompetitiveRanking() {
      if (!SupabaseMode._ready) return;
      const section = document.getElementById('competitiveSection');
      section.style.display = 'block';
      const container = document.getElementById('rankContent');
      const myId = _resolvedEmpId || user?.id;
      const myBranch = user?.branch || '';

      // 직원 매핑
      const emps = EmployeeStore.getAll();
      const empMap = {};
      emps.forEach(e => { empMap[e.id] = e; empMap[e.email] = e; });

      // 지점 필터용 직원 ID 세트
      const branchEmpIds = new Set();
      if (rankScope === 'branch' && myBranch) {
        emps.filter(e => e.branch === myBranch).forEach(e => branchEmpIds.add(e.id));
      }

      try {
        // 기간별 데이터 조회
        let startDate;
        if (rankPeriod === 'monthly') {
          const now = new Date();
          startDate = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
        } else {
          const todayStart = new Date();
          todayStart.setHours(0, 0, 0, 0);
          startDate = todayStart.toISOString();
        }

        const { data } = await SupabaseMode._client
          .from('xp_transactions').select('employee_id, amount')
          .gte('created_at', startDate);

        let ranked = [];
        if (data && data.length > 0) {
          const aggr = {};
          data.forEach(r => {
            // 지점 필터
            if (rankScope === 'branch' && branchEmpIds.size > 0 && !branchEmpIds.has(r.employee_id)) return;
            aggr[r.employee_id] = (aggr[r.employee_id] || 0) + (r.amount || 0);
          });
          ranked = Object.entries(aggr)
            .map(([id, xp]) => ({ employee_id: id, xp }))
            .sort((a, b) => b.xp - a.xp)
            .slice(0, 15);
        }

        if (ranked.length === 0) {
          container.innerHTML = '<div class="card" style="text-align:center; padding:24px; color:var(--gray-500); font-size:13px;">' + t.rankNoData + '</div>';
          return;
        }

        const isMonthly = rankPeriod === 'monthly';
        const isBranch = rankScope === 'branch';
        const accentColor = isMonthly ? '#F59E0B' : '#3B82F6';
        const scopeLabel = isBranch ? (myBranch || t.rankBranchTitle) : t.rankAllTitle;
        const periodLabel = isMonthly ? t.rankMonthLabel : t.rankTodayLabel;
        const headerLabel = scopeLabel + ' · ' + periodLabel;

        // 1등 그라디언트 색
        const grad = isBranch
          ? (isMonthly ? '#10B981, #34D399' : '#06b6d4, #67e8f9')
          : (isMonthly ? '#ff6b35, #ffd700' : '#3B82F6, #06b6d4');

        let html = '';

        // 1등 카드
        const top = ranked[0];
        const topEmp = empMap[top.employee_id] || {};
        const topName = topEmp.name || top.employee_id.slice(0, 8);
        const topIsMe = top.employee_id === myId;
        const topBranch = topEmp.branch || '';

        html += `
        <div style="
          background: linear-gradient(135deg, ${grad});
          border-radius:16px; padding:20px; text-align:center; margin-bottom:10px;
          box-shadow: 0 6px 24px ${shadowColor};
          position:relative; overflow:hidden;
        ">
          <div style="position:absolute; top:-15px; right:-15px; font-size:70px; opacity:0.1;">${bgIcon}</div>
          <div style="font-size:11px; color:rgba(255,255,255,0.7); margin-bottom:8px; font-weight:600;">${headerLabel} #1</div>
          <div style="
            width:56px; height:56px; border-radius:50%; background:rgba(30,41,59,0.8);
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 8px; font-size:22px; font-weight:bold;
            color:white; border:2.5px solid rgba(255,255,255,0.6);
          ">${topName[0] || '?'}</div>
          <div style="font-size:13px; color:rgba(255,255,255,0.7);">👑</div>
          <div style="font-size:18px; font-weight:800; color:white;">${topName}${topIsMe ? ' ★' : ''}</div>
          ${topBranch ? '<div style="font-size:11px; color:rgba(255,255,255,0.7); margin-top:2px;">' + topBranch + '</div>' : ''}
          <div style="
            display:inline-block; margin-top:10px;
            background:rgba(255,255,255,0.2); border-radius:16px;
            padding:5px 14px; font-size:16px; font-weight:800; color:white;
          ">${top.xp.toLocaleString()} ${t.rankXpUnit}</div>
        </div>`;

        // 내 순위 (TOP에 없을 때 표시)
        const myRankIdx = ranked.findIndex(r => r.employee_id === myId);
        if (myRankIdx < 0) {
          // 내가 리스트에 없으면 별도 표시
          const myXp = data ? data.filter(r => r.employee_id === myId).reduce((s, r) => s + (r.amount || 0), 0) : 0;
          if (myXp > 0) {
            const myEmp = empMap[myId] || {};
            const myName = myEmp.name || user?.name || '나';
            // 순위 계산
            let myPos = ranked.filter(r => r.xp > myXp).length + 1;
            html += `
            <div class="card" style="padding:10px 16px; margin-bottom:10px; border:1.5px solid var(--primary); background:rgba(16,185,129,0.06);">
              <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:26px; text-align:center; font-weight:800; font-size:13px; color:var(--primary);">${myPos}</div>
                <div style="width:32px; height:32px; border-radius:50%; background:var(--primary); color:white; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px;">${(myName[0] || '?')}</div>
                <div style="flex:1;">
                  <div style="font-weight:700; font-size:13px; color:var(--primary);">${myName} (${t.rankYou})</div>
                </div>
                <div style="font-weight:700; font-size:14px; color:${accentColor};">${myXp.toLocaleString()}</div>
                <div style="font-size:10px; color:var(--gray-500);">${t.rankXpUnit}</div>
              </div>
            </div>`;
          }
        }

        // 2등 이하
        if (ranked.length > 1) {
          html += '<div class="card" style="padding:0; overflow:hidden;">';
          for (let i = 1; i < ranked.length; i++) {
            const r = ranked[i];
            const emp = empMap[r.employee_id] || {};
            const name = emp.name || r.employee_id.slice(0, 8);
            const isMe = r.employee_id === myId;
            const medal = i === 1 ? '🥈' : i === 2 ? '🥉' : '';
            const border = i < ranked.length - 1 ? 'border-bottom:1px solid rgba(255,255,255,0.06);' : '';
            const bgMe = isMe ? 'rgba(16,185,129,0.06)' : 'transparent';

            html += `
            <div style="display:flex; align-items:center; padding:11px 16px; gap:10px; ${border} background:${bgMe};">
              <div style="width:26px; text-align:center; font-weight:800; font-size:${medal ? '16px' : '13px'}; color:${i <= 2 ? accentColor : 'var(--gray-500)'};">${medal || (i + 1)}</div>
              <div style="
                width:32px; height:32px; border-radius:50%;
                background:${isMe ? 'var(--primary)' : 'rgba(255,255,255,0.08)'};
                color:${isMe ? 'white' : 'var(--gray-400)'};
                display:flex; align-items:center; justify-content:center;
                font-weight:600; font-size:13px;
              ">${(name[0] || '?')}</div>
              <div style="flex:1; min-width:0;">
                <div style="font-weight:${isMe ? '700' : '500'}; font-size:13px; ${isMe ? 'color:var(--primary);' : 'color:var(--text-primary,#F1F5F9);'}">${name}${isMe ? ' (' + t.rankYou + ')' : ''}</div>
                ${(!isBranch && emp.branch) ? '<div style="font-size:10px; color:var(--gray-500);">' + emp.branch + '</div>' : ''}
              </div>
              <div style="font-weight:700; font-size:14px; color:${accentColor};">${r.xp.toLocaleString()}</div>
              <div style="font-size:10px; color:var(--gray-500);">${t.rankXpUnit}</div>
            </div>`;
          }
          html += '</div>';
        }

        container.innerHTML = html;
      } catch (e) {
        console.warn('[Rank] Error:', e);
        container.innerHTML = '<div class="card" style="text-align:center; padding:20px; color:var(--gray-500);">Error</div>';
      }
    }

    // ===== 동적 티어 퀘스트 시스템 =====
    let _myQuests = [];          // 현재 티어 퀘스트 목록
    let _myQuestCompletions = {}; // { quest_id: { completed, xp_claimed } }
    let _myTierBonusXp = 0;
    let _questTierLabel = '';

    async function loadAndRenderQuests() {
      const container = document.getElementById('rookieQuestCard');
      if (!container) return;
      if (!SupabaseMode._ready) {
        // Supabase 미연결 시 fallback: 하드코딩 신입 퀘스트
        _renderFallbackQuest(container);
        return;
      }

      try {
        const empId = await getEmployeeId();
        if (!empId) return;

        // 현재 XP → 티어 계산
        const { data: empData } = await SupabaseMode._client.from('employees')
          .select('total_xp').eq('id', empId).maybeSingle();
        const totalXp = empData?.total_xp || 0;
        const tier = calculateTier(totalXp);

        // 해당 티어 퀘스트 로드
        const { data: quests, error } = await SupabaseMode._client.from('quests')
          .select('*').eq('tier_id', tier.tierId).eq('is_active', true)
          .order('sort_order', { ascending: true });

        if (error || !quests || quests.length === 0) {
          // DB에 퀘스트가 없으면 fallback
          _renderFallbackQuest(container);
          return;
        }

        _myQuests = quests;
        _myTierBonusXp = quests.reduce((max, q) => Math.max(max, q.bonus_xp || 0), 0);
        _questTierLabel = tier.emoji + ' ' + (lang === 'en' ? tier.titleEn : lang === 'vi' ? tier.titleVn : tier.titleKo);

        // 완료 상태 로드
        const { data: completions } = await SupabaseMode._client.from('quest_completions')
          .select('quest_id, xp_claimed').eq('employee_id', empId);
        _myQuestCompletions = {};
        (completions || []).forEach(c => { _myQuestCompletions[c.quest_id] = c; });

        // 자동 감지 실행
        await _autoDetectQuests(empId);

        // 렌더링
        _renderDynamicQuests(container);
      } catch (e) {
        console.warn('[Quest] Load error:', e);
        _renderFallbackQuest(container);
      }
    }

    // 퀘스트 자동 감지
    async function _autoDetectQuests(empId) {
      for (const q of _myQuests) {
        if (_myQuestCompletions[q.id]) continue; // 이미 완료
        const count = q.quest_condition?.count || 1;
        let done = false;

        try {
          switch (q.quest_type) {
            case 'profile': {
              const pd = localStorage.getItem('sop_profile_' + (user?.email || ''));
              if (pd) { const p = JSON.parse(pd); if ((p.intro && p.intro.trim()) || (p.avatarType && p.avatarType !== 'initial')) done = true; }
              break;
            }
            case 'study_scenes': {
              const progress = Progress.getAllResults();
              const watched = (progress.completedVideos || []).length;
              if (watched >= count) done = true;
              break;
            }
            case 'quiz_pass': {
              const progress = Progress.getAllResults();
              let quizCount = Object.keys(progress.chapterResults || {}).length;
              // 미니퀴즈도 카운트
              for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('sop_miniquiz_score_')) quizCount++;
              }
              if (quizCount >= count) done = true;
              break;
            }
            case 'boost_send': {
              const { data } = await SupabaseMode._client.from('praise_logs')
                .select('id').eq('from_employee_id', empId).limit(count);
              if (data && data.length >= count) done = true;
              break;
            }
            case 'team_task': {
              const { data: members } = await SupabaseMode._client.from('team_task_members')
                .select('id').eq('employee_id', empId);
              const { data: created } = await SupabaseMode._client.from('team_tasks')
                .select('id').eq('creator_id', empId);
              const total = (members?.length || 0) + (created?.length || 0);
              if (total >= count) done = true;
              break;
            }
            case 'attendance_days': {
              const { data } = await SupabaseMode._client.from('xp_transactions')
                .select('id').eq('employee_id', empId).eq('source', 'daily_mission').like('source_id', 'dm_attendance_%');
              if (data && data.length >= count) done = true;
              break;
            }
            case 'total_xp': {
              const { data: emp } = await SupabaseMode._client.from('employees')
                .select('total_xp').eq('id', empId).maybeSingle();
              if ((emp?.total_xp || 0) >= count) done = true;
              break;
            }
          }
        } catch (e) { console.warn('[Quest] Auto-detect error for', q.quest_type, e); }

        if (done) {
          try {
            await SupabaseMode._client.from('quest_completions')
              .upsert({ employee_id: empId, quest_id: q.id, xp_claimed: false }, { onConflict: 'employee_id,quest_id' });
            _myQuestCompletions[q.id] = { quest_id: q.id, xp_claimed: false };
          } catch (e) { console.warn('[Quest] Completion save error:', e); }
        }
      }
    }

    // 퀘스트 XP 수령
    async function claimQuestXp(questId, xpAmount) {
      if (_myQuestCompletions[questId]?.xp_claimed) return;
      const empId = await getEmployeeId();
      if (!empId) return;
      try {
        const result = await XpService.addXp(empId, xpAmount, 'quest', 'quest_' + questId, t.questTitle);
        if (result) {
          showXpToast(xpAmount);
          if (result.leveledUp) showLevelUpCelebration(result.oldTier, result.newTier, lang);
        }
        await SupabaseMode._client.from('quest_completions')
          .update({ xp_claimed: true, claimed_at: new Date().toISOString() })
          .eq('employee_id', empId).eq('quest_id', questId);
        _myQuestCompletions[questId] = { quest_id: questId, xp_claimed: true };
        _renderDynamicQuests(document.getElementById('rookieQuestCard'));
      } catch (e) { console.warn('[Quest] Claim error:', e); }
    }

    // 티어 클리어 보너스 수령
    async function claimQuestBonus() {
      const empId = await getEmployeeId();
      if (!empId || !_myTierBonusXp) return;
      const bonusKey = 'quest_tier_bonus_' + (_myQuests[0]?.tier_id || 'iron');
      try {
        const result = await XpService.addXp(empId, _myTierBonusXp, 'quest', bonusKey, t.questTitle + ' 클리어 보너스');
        if (result) {
          showXpToast(_myTierBonusXp, true);
          if (result.leveledUp) showLevelUpCelebration(result.oldTier, result.newTier, lang);
        }
        // 보너스 수령 기록을 localStorage에 저장 (간단한 중복 방지)
        localStorage.setItem('sop_quest_bonus_' + bonusKey + '_' + (user?.email || ''), 'true');
        _renderDynamicQuests(document.getElementById('rookieQuestCard'));
      } catch (e) { console.warn('[Quest] Bonus claim error:', e); }
    }

    function dismissQuest() {
      localStorage.setItem('sop_quest_dismissed_' + (_myQuests[0]?.tier_id || '') + '_' + (user?.email || ''), 'true');
      document.getElementById('rookieQuestCard').innerHTML = '';
    }

    // 동적 퀘스트 렌더링
    function _renderDynamicQuests(container) {
      if (!container || _myQuests.length === 0) return;

      const tierId = _myQuests[0]?.tier_id || 'iron';
      const dismissed = localStorage.getItem('sop_quest_dismissed_' + tierId + '_' + (user?.email || ''));
      if (dismissed) { container.innerHTML = ''; return; }

      const doneCount = _myQuests.filter(q => _myQuestCompletions[q.id]).length;
      const allDone = doneCount === _myQuests.length;
      const allClaimed = _myQuests.every(q => _myQuestCompletions[q.id]?.xp_claimed);
      const pct = Math.round((doneCount / _myQuests.length) * 100);
      const bonusKey = 'sop_quest_bonus_quest_tier_bonus_' + tierId + '_' + (user?.email || '');
      const bonusClaimed = localStorage.getItem(bonusKey) === 'true';

      const qTitle = _questTierLabel + ' ' + t.questTitle;

      let questsHtml = '';
      _myQuests.forEach(q => {
        const comp = _myQuestCompletions[q.id];
        const done = !!comp;
        const claimed = !!comp?.xp_claimed;
        const title = lang === 'en' ? (q.title_en || q.title_ko) : lang === 'vi' ? (q.title_vi || q.title_ko) : q.title_ko;
        const desc = lang === 'en' ? (q.desc_en || q.desc_ko) : lang === 'vi' ? (q.desc_vi || q.desc_ko) : q.desc_ko;
        const first = chapters[0];
        const link = q.link || (first ? 'chapter.html?id=' + first.id : '#');

        let actionBtn;
        if (done && claimed) {
          actionBtn = '<span class="quest-badge-done">' + t.questClaimed + '</span>';
        } else if (done && !claimed) {
          actionBtn = '<button class="quest-claim-btn" onclick="event.stopPropagation();claimQuestXp(\'' + q.id + '\',' + q.xp_reward + ')">' + t.questClaim + ' +' + q.xp_reward + '</button>';
        } else {
          actionBtn = '<a href="' + link + '" class="quest-go-btn">' + t.questGo + '</a>';
        }

        questsHtml += '<div class="quest-item ' + (done ? 'quest-done' : '') + '">'
          + '<div class="quest-icon ' + (done ? 'quest-icon-done' : '') + '">' + (done ? '✅' : q.icon) + '</div>'
          + '<div class="quest-info"><div class="quest-name">' + title + '</div><div class="quest-desc">' + desc + '</div></div>'
          + '<div class="quest-action">' + actionBtn + '</div></div>';
      });

      let bonusHtml = '';
      if (allDone && _myTierBonusXp > 0) {
        if (bonusClaimed) {
          bonusHtml = '<div class="quest-bonus quest-bonus-claimed"><span>🏆 ' + t.questCompleteDesc + '</span>'
            + '<button class="quest-dismiss-btn" onclick="dismissQuest()">✕</button></div>';
        } else {
          bonusHtml = '<div class="quest-bonus quest-bonus-ready"><span>' + t.questComplete.replace('+100', '+' + _myTierBonusXp) + '</span>'
            + '<button class="quest-claim-btn quest-claim-bonus" onclick="claimQuestBonus()">' + t.questBonusClaim + '</button></div>';
        }
      } else if (allDone && allClaimed) {
        bonusHtml = '<div class="quest-bonus quest-bonus-claimed"><span>🏆 ' + t.questCompleteDesc + '</span>'
          + '<button class="quest-dismiss-btn" onclick="dismissQuest()">✕</button></div>';
      }

      container.innerHTML = '<div class="quest-card">'
        + '<div class="quest-header"><div>'
        + '<div class="quest-title">' + qTitle + '</div>'
        + '<div class="quest-subtitle">' + t.questSubtitle + '</div>'
        + '</div><div class="quest-progress-ring">'
        + '<svg viewBox="0 0 36 36" class="quest-ring-svg">'
        + '<path class="quest-ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>'
        + '<path class="quest-ring-fill" stroke-dasharray="' + pct + ', 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>'
        + '</svg><div class="quest-ring-text">' + doneCount + '/' + _myQuests.length + '</div>'
        + '</div></div><div class="quest-list">' + questsHtml + '</div>' + bonusHtml + '</div>';
    }

    // Fallback: Supabase 미연결 시 하드코딩 퀘스트
    function _renderFallbackQuest(container) {
      const quests = t.quests || [];
      if (!quests || quests.length === 0) { container.innerHTML = ''; return; }
      const storeKey = 'sop_rookie_quest_' + (user?.email || 'demo');
      let state = {};
      try { state = JSON.parse(localStorage.getItem(storeKey) || '{}'); } catch {}
      if (state.allDismissed) { container.innerHTML = ''; return; }

      // 간단한 자동 감지
      const profileData = localStorage.getItem('sop_profile_' + (user?.email || ''));
      if (profileData) { try { const p = JSON.parse(profileData); if (p.intro?.trim() || (p.avatarType && p.avatarType !== 'initial')) state.profile = true; } catch {} }
      const progress = Progress.getAllResults();
      if ((progress.completedVideos || []).length > 0) state.video = true;
      if (Object.keys(progress.chapterResults || {}).length > 0) state.quiz = true;
      localStorage.setItem(storeKey, JSON.stringify(state));

      const doneCount = quests.filter(q => state[q.id]).length;
      const pct = Math.round((doneCount / quests.length) * 100);

      let questsHtml = '';
      quests.forEach(q => {
        const done = !!state[q.id];
        const claimed = !!state['claimed_' + q.id];
        const first = chapters[0];
        const link = q.link || (first ? 'chapter.html?id=' + first.id : '#');
        let actionBtn;
        if (done && claimed) actionBtn = '<span class="quest-badge-done">' + t.questClaimed + '</span>';
        else if (done) actionBtn = '<button class="quest-claim-btn" onclick="event.stopPropagation();_fallbackClaimXp(\'' + q.id + '\',' + q.xp + ')">' + t.questClaim + ' +' + q.xp + '</button>';
        else actionBtn = '<a href="' + link + '" class="quest-go-btn">' + t.questGo + '</a>';
        questsHtml += '<div class="quest-item ' + (done ? 'quest-done' : '') + '">'
          + '<div class="quest-icon ' + (done ? 'quest-icon-done' : '') + '">' + (done ? '✅' : q.icon) + '</div>'
          + '<div class="quest-info"><div class="quest-name">' + q.title + '</div><div class="quest-desc">' + q.desc + '</div></div>'
          + '<div class="quest-action">' + actionBtn + '</div></div>';
      });

      container.innerHTML = '<div class="quest-card"><div class="quest-header"><div>'
        + '<div class="quest-title">' + t.questTitle + '</div>'
        + '<div class="quest-subtitle">' + t.questSubtitle + '</div>'
        + '</div><div class="quest-progress-ring">'
        + '<svg viewBox="0 0 36 36" class="quest-ring-svg">'
        + '<path class="quest-ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>'
        + '<path class="quest-ring-fill" stroke-dasharray="' + pct + ', 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>'
        + '</svg><div class="quest-ring-text">' + doneCount + '/' + quests.length + '</div>'
        + '</div></div><div class="quest-list">' + questsHtml + '</div></div>';
    }

    window._fallbackClaimXp = async function(questId, xpAmount) {
      const storeKey = 'sop_rookie_quest_' + (user?.email || 'demo');
      let state = {};
      try { state = JSON.parse(localStorage.getItem(storeKey) || '{}'); } catch {}
      if (state['claimed_' + questId]) return;
      const empId = await getEmployeeId();
      if (empId && SupabaseMode._ready) {
        try {
          const result = await XpService.addXp(empId, xpAmount, 'quest', 'rookie_' + questId, t.questTitle);
          if (result) { showXpToast(xpAmount); if (result.leveledUp) showLevelUpCelebration(result.oldTier, result.newTier, lang); }
        } catch {}
      }
      state['claimed_' + questId] = true;
      localStorage.setItem(storeKey, JSON.stringify(state));
      _renderFallbackQuest(document.getElementById('rookieQuestCard'));
    };

    // ===== XP 혜택 시스템 =====
    let xpRewardsOpen = true;
    function toggleXpRewards() {
      xpRewardsOpen = !xpRewardsOpen;
      document.getElementById('xpRewardsBody').style.display = xpRewardsOpen ? 'block' : 'none';
      document.getElementById('xpRewardsToggle').textContent = xpRewardsOpen ? (t.lbCollapse || '접기 ▲') : (t.lbExpand || '펼치기 ▼');
    }

    async function renderXpRewards() {
      const card = document.getElementById('xpRewardsCard');
      const body = document.getElementById('xpRewardsBody');
      document.getElementById('xpRewardsTitle').textContent = t.xpRewards || '🎁 XP 혜택';

      // 1) 혜택 데이터 로드 (Supabase app_config → localStorage 폴백)
      let rewards = [];
      try {
        if (SupabaseMode._ready) {
          const { data } = await SupabaseMode._client
            .from('app_config').select('value').eq('key', 'xp_rewards').maybeSingle();
          if (data?.value) rewards = JSON.parse(data.value);
        }
      } catch(e) { console.warn('[XpRewards] Supabase load:', e.message); }
      if (rewards.length === 0) {
        try { rewards = JSON.parse(localStorage.getItem('sop_xp_rewards') || '[]'); } catch(e) {}
      }
      // 활성화된 혜택만
      rewards = rewards.filter(r => r.active !== false);

      if (rewards.length === 0) {
        card.style.display = 'none';
        return;
      }

      // localStorage에 캐시
      try { localStorage.setItem('sop_xp_rewards', JSON.stringify(rewards)); } catch(e) {}

      card.style.display = 'block';

      // 2) 내 XP 가져오기
      let myXp = 0;
      try {
        if (SupabaseMode._ready && user?.id) {
          const empId = typeof getEmployeeId === 'function' ? await getEmployeeId() : user.id;
          const { data } = await SupabaseMode._client
            .from('user_gamification').select('total_xp').eq('employee_id', empId).maybeSingle();
          if (data) myXp = data.total_xp || 0;
        }
        if (myXp === 0 && typeof XpService !== 'undefined') {
          myXp = XpService.getXp?.() || 0;
        }
      } catch(e) {}

      // 3) 렌더링
      let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 12px;border-radius:10px;background:rgba(245,158,11,0.08);">
        <span style="font-size:13px;color:var(--text-secondary);">${t.xpRewardsMyXp || '내 XP'}</span>
        <span style="font-size:18px;font-weight:800;color:#F59E0B;">${myXp.toLocaleString()} XP</span>
      </div>`;

      rewards.sort((a, b) => a.required_xp - b.required_xp);

      rewards.forEach(reward => {
        const pct = Math.min(100, Math.round((myXp / reward.required_xp) * 100));
        const unlocked = myXp >= reward.required_xp;
        const needed = reward.required_xp - myXp;

        html += `
        <div style="padding:12px;border-radius:12px;margin-bottom:8px;
          background:${unlocked ? 'rgba(16,185,129,0.08)' : 'var(--bg-card)'};
          border:1px solid ${unlocked ? 'rgba(16,185,129,0.3)' : 'rgba(255,255,255,0.06)'};
          ${unlocked ? 'box-shadow:0 0 12px rgba(16,185,129,0.1);' : ''}">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <span style="font-size:24px;">${reward.icon || '🎁'}</span>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:700;color:var(--text-primary);">${reward.name}</div>
              <div style="font-size:12px;color:var(--text-secondary);margin-top:1px;">${reward.description || ''}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:13px;font-weight:700;color:${unlocked ? 'var(--primary)' : '#F59E0B'};">
                ${unlocked ? (t.xpRewardsUnlocked || '달성!') : reward.required_xp.toLocaleString() + ' XP'}
              </div>
              ${!unlocked ? `<div style="font-size:11px;color:var(--gray-500);">${t.xpRewardsNeeded ? t.xpRewardsNeeded(needed.toLocaleString()) : needed + ' XP 더 필요'}</div>` : ''}
            </div>
          </div>
          <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;border-radius:3px;background:${unlocked ? 'linear-gradient(90deg,#10B981,#059669)' : 'linear-gradient(90deg,#F59E0B,#EAB308)'};transition:width 0.5s;"></div>
          </div>
        </div>`;
      });

      body.innerHTML = html;
    }

    // ===== 알림 시스템 (변수 선언을 먼저 — onclick 핸들러가 접근 가능하도록) =====
    const notifKey = 'sop_notif_enabled_' + (user?.email || '');
    let notifEnabled = localStorage.getItem(notifKey) === 'true';
    let notifInterval = null;

    // ===== 초기화 =====
    try { updateProgress(); } catch(e) { console.warn('[Init] updateProgress:', e.message); }
    try { updateNextAction(); } catch(e) { console.warn('[Init] updateNextAction:', e.message); }
    try { renderChapters(); } catch(e) { console.warn('[Init] renderChapters:', e.message); }
    try { renderMbtiCard(); } catch(e) { console.warn('[Init] renderMbtiCard:', e.message); }
    try { loadAndRenderQuests(); } catch(e) { console.warn('[Init] loadAndRenderQuests:', e.message); }
    try { renderXpGuide(); } catch(e) { console.warn('[Init] renderXpGuide:', e.message); }
    try { renderXpRewards(); } catch(e) { console.warn('[Init] renderXpRewards:', e.message); }
    // 아래 카드들은 Supabase 동기화 완료 후 1회만 렌더링 (깜박임 방지)
    // Supabase 연결 안 되면 여기서 렌더
    if (!SupabaseMode._ready) {
      try { renderTierCard(); } catch(e) { console.warn('[Init] renderTierCard:', e.message); }
      try { renderLeaderboard(); } catch(e) { console.warn('[Init] renderLeaderboard:', e.message); }
      try { renderCompetitiveRanking(); } catch(e) { console.warn('[Init] renderCompetitiveRanking:', e.message); }
    }

    function updateNotifUI() {
      const bell = document.getElementById('notifBell');
      bell.title = notifEnabled ? t.notifOn : t.notifOff;
      bell.style.opacity = notifEnabled ? '1' : '0.4';
    }

    function toggleNotifications() {
      if (!notifEnabled) {
        requestNotificationPermission();
      } else {
        notifEnabled = false;
        localStorage.setItem(notifKey, 'false');
        if (notifInterval) { clearInterval(notifInterval); notifInterval = null; }
        updateNotifUI();
        showToast(t.notifOff);
      }
    }

    async function requestNotificationPermission() {
      if (!('Notification' in window)) { showToast(lang === 'en' ? 'This browser does not support notifications' : lang === 'vi' ? 'Trình duyệt không hỗ trợ thông báo' : '이 브라우저는 알림을 지원하지 않습니다'); return; }
      let perm = Notification.permission;
      if (perm === 'default') perm = await Notification.requestPermission();
      if (perm === 'granted') {
        notifEnabled = true;
        localStorage.setItem(notifKey, 'true');
        updateNotifUI();
        showToast(t.notifOn);
        startNotifChecks();
      } else {
        showToast(t.notifOff);
      }
    }

    function showLocalNotification(title, body, url) {
      if (!notifEnabled || Notification.permission !== 'granted') return;
      if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(title, {
            body, icon: '/assets/icon-192.svg', badge: '/assets/icon-192.svg',
            data: { url: url || '/app.html' }
          });
        });
      } else {
        new Notification(title, { body, icon: '/assets/icon-192.svg' });
      }
    }

    function checkAndNotify() {
      if (!notifEnabled || !user) return;
      const now = Date.now();
      const lastCheck = parseInt(localStorage.getItem('sop_notif_last_' + user.email) || '0');
      if (now - lastCheck < 3600000) return; // 1시간에 1번만
      localStorage.setItem('sop_notif_last_' + user.email, '' + now);

      // 미완료 챕터 확인
      const incomplete = chapters.some(ch => !Progress.isChapterPassed(ch.id));
      if (incomplete) {
        showLocalNotification('SOP Training', t.notifIncomplete, '/app.html');
        return;
      }

      // 마감일 확인
      const deadlines = JSON.parse(localStorage.getItem('sop_deadlines') || '[]');
      for (const dl of deadlines) {
        const days = Math.ceil((new Date(dl.deadlineAt) - new Date()) / 86400000);
        if (days > 0 && days <= 3) {
          showLocalNotification('SOP Training', t.notifDeadline(days), '/app.html');
          return;
        }
      }
    }

    function startNotifChecks() {
      if (notifInterval) clearInterval(notifInterval);
      checkAndNotify();
      notifInterval = setInterval(checkAndNotify, 3600000); // 매 1시간
    }

    // 관리자가 보낸 대기 중 알림 확인
    function checkPendingNotifications() {
      if (!user) return;
      const pending = JSON.parse(localStorage.getItem('sop_pending_notifications') || '[]');
      const shown = JSON.parse(localStorage.getItem('sop_notif_shown_' + user.email) || '[]');
      const newNotifs = pending.filter(n => {
        if (shown.includes(n.id)) return false;
        if (n.target === 'all') return true;
        if (n.target === 'incomplete') return chapters.some(ch => !Progress.isChapterPassed(ch.id));
        if (n.target === 'specific' && n.targetEmails) return n.targetEmails.includes(user.email);
        return false;
      });
      newNotifs.forEach(n => {
        showLocalNotification(n.title || 'SOP Training', n.message, '/app.html');
        shown.push(n.id);
      });
      if (newNotifs.length > 0) {
        localStorage.setItem('sop_notif_shown_' + user.email, JSON.stringify(shown));
        document.getElementById('notifDot').style.display = 'block';
        setTimeout(() => { document.getElementById('notifDot').style.display = 'none'; }, 5000);
      }
    }

    // 초기화
    updateNotifUI();
    if (notifEnabled && Notification.permission === 'granted') {
      startNotifChecks();
    }
    checkPendingNotifications();

    // 로그아웃 (설정 아이콘 길게 클릭 or change-password에서 처리)
    // 아바타는 프로필 링크로 변경됨
  </script>

</body>
</html>
