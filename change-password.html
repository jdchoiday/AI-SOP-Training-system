<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - 비밀번호 변경</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="assets/icon-192.svg">
  <style>
    .pw-container {
      max-width: 440px;
      margin: 0 auto;
      padding: 20px 16px 120px;
    }
    .pw-card {
      background: white;
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow);
    }
    .pw-icon {
      text-align: center;
      font-size: 48px;
      margin-bottom: 8px;
    }
    .pw-card h2 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--gray-700);
      margin-bottom: 4px;
    }
    .pw-card .pw-desc {
      text-align: center;
      font-size: 13px;
      color: var(--gray-500);
      margin-bottom: 24px;
    }
    .pw-field {
      margin-bottom: 16px;
    }
    .pw-field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    .pw-input-wrap {
      position: relative;
    }
    .pw-input-wrap input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .pw-input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .pw-input-wrap input.input-error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--gray-400);
      padding: 4px;
    }
    .pw-toggle:hover {
      color: var(--gray-600);
    }
    .field-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: 4px;
      display: none;
    }
    .pw-strength {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .pw-strength-bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--gray-100);
      transition: background 0.3s;
    }
    .pw-strength-text {
      font-size: 11px;
      color: var(--gray-500);
      margin-top: 4px;
    }
    .pw-submit {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .pw-submit:hover {
      background: #1d4ed8;
    }
    .pw-submit:disabled {
      background: var(--gray-300);
      cursor: not-allowed;
    }
    .pw-back {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
    }
    .pw-back:hover {
      text-decoration: underline;
    }
    .lang-switch {
      text-align: center;
      margin-top: 20px;
    }
    .lang-switch button {
      padding: 6px 14px;
      font-size: 12px;
      margin: 0 2px;
    }
  </style>
</head>
<body>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <a href="app.html">
      <span class="nav-icon">&#127968;</span> <span data-i18n="navHome">홈</span>
    </a>
    <a href="ai-chat.html">
      <span class="nav-icon">&#129302;</span> <span data-i18n="navChat">AI 질문</span>
    </a>
    <a href="my-results.html">
      <span class="nav-icon">&#127942;</span> <span data-i18n="navResults">내 결과</span>
    </a>
  </div>

  <div class="pw-container">

    <!-- Header -->
    <div class="app-header">
      <h2>SOP Training</h2>
      <div class="user-avatar" id="userAvatar" title="Back" onclick="location.href='app.html'" style="cursor:pointer;">?</div>
    </div>

    <div class="pw-card">
      <div class="pw-icon">&#128274;</div>
      <h2 id="pageTitle">비밀번호 변경</h2>
      <p class="pw-desc" id="pageDesc">안전한 비밀번호로 계정을 보호하세요</p>

      <form id="pwForm" autocomplete="off">
        <!-- Current Password -->
        <div class="pw-field">
          <label for="currentPw" id="labelCurrent">현재 비밀번호</label>
          <div class="pw-input-wrap">
            <input type="password" id="currentPw" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('currentPw', this)">&#128065;</button>
          </div>
          <div class="field-error" id="errorCurrent"></div>
        </div>

        <!-- New Password -->
        <div class="pw-field">
          <label for="newPw" id="labelNew">새 비밀번호</label>
          <div class="pw-input-wrap">
            <input type="password" id="newPw" autocomplete="new-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('newPw', this)">&#128065;</button>
          </div>
          <div class="pw-strength" id="strengthBars">
            <div class="pw-strength-bar"></div>
            <div class="pw-strength-bar"></div>
            <div class="pw-strength-bar"></div>
            <div class="pw-strength-bar"></div>
          </div>
          <div class="pw-strength-text" id="strengthText"></div>
          <div class="field-error" id="errorNew"></div>
        </div>

        <!-- Confirm New Password -->
        <div class="pw-field">
          <label for="confirmPw" id="labelConfirm">새 비밀번호 확인</label>
          <div class="pw-input-wrap">
            <input type="password" id="confirmPw" autocomplete="new-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('confirmPw', this)">&#128065;</button>
          </div>
          <div class="field-error" id="errorConfirm"></div>
        </div>

        <button type="submit" class="pw-submit" id="submitBtn">비밀번호 변경</button>
      </form>

      <a href="app.html" class="pw-back" id="backLink">&#8592; 홈으로 돌아가기</a>

      <!-- Language switch -->
      <div class="lang-switch">
        <button onclick="setLang('ko')" class="btn btn-outline">한국어</button>
        <button onclick="setLang('en')" class="btn btn-outline">English</button>
        <button onclick="setLang('vi')" class="btn btn-outline">Tiếng Việt</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // ===== Auth check =====
    const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
    if (!user) {
      window.location.href = 'index.html';
    } else {
      document.getElementById('userAvatar').textContent = (user.name || '?')[0];
    }

    // ===== Multi-language =====
    const TEXTS = {
      ko: {
        pageTitle: '비밀번호 변경',
        pageDesc: '안전한 비밀번호로 계정을 보호하세요',
        labelCurrent: '현재 비밀번호',
        labelNew: '새 비밀번호 (최소 4자)',
        labelConfirm: '새 비밀번호 확인',
        submit: '비밀번호 변경',
        backLink: '\u2190 홈으로 돌아가기',
        navHome: '홈',
        navChat: 'AI 질문',
        navResults: '내 결과',
        errCurrentRequired: '현재 비밀번호를 입력하세요',
        errCurrentWrong: '현재 비밀번호가 올바르지 않습니다',
        errNewRequired: '새 비밀번호를 입력하세요',
        errNewMin: '비밀번호는 최소 4자 이상이어야 합니다',
        errNewSame: '현재 비밀번호와 다른 비밀번호를 사용하세요',
        errConfirmRequired: '비밀번호 확인을 입력하세요',
        errConfirmMismatch: '새 비밀번호가 일치하지 않습니다',
        successMsg: '비밀번호가 성공적으로 변경되었습니다!',
        errorNetwork: '오류가 발생했습니다. 다시 시도해주세요.',
        strengthWeak: '약함',
        strengthFair: '보통',
        strengthGood: '좋음',
        strengthStrong: '강함',
        processing: '변경 중...',
      },
      en: {
        pageTitle: 'Change Password',
        pageDesc: 'Keep your account secure with a strong password',
        labelCurrent: 'Current Password',
        labelNew: 'New Password (min 4 chars)',
        labelConfirm: 'Confirm New Password',
        submit: 'Change Password',
        backLink: '\u2190 Back to Home',
        navHome: 'Home',
        navChat: 'AI Chat',
        navResults: 'Results',
        errCurrentRequired: 'Please enter your current password',
        errCurrentWrong: 'Current password is incorrect',
        errNewRequired: 'Please enter a new password',
        errNewMin: 'Password must be at least 4 characters',
        errNewSame: 'New password must be different from current password',
        errConfirmRequired: 'Please confirm your new password',
        errConfirmMismatch: 'Passwords do not match',
        successMsg: 'Password changed successfully!',
        errorNetwork: 'An error occurred. Please try again.',
        strengthWeak: 'Weak',
        strengthFair: 'Fair',
        strengthGood: 'Good',
        strengthStrong: 'Strong',
        processing: 'Changing...',
      },
      vi: {
        pageTitle: 'Đổi mật khẩu',
        pageDesc: 'Bảo vệ tài khoản của bạn bằng mật khẩu mạnh',
        labelCurrent: 'Mật khẩu hiện tại',
        labelNew: 'Mật khẩu mới (tối thiểu 4 ký tự)',
        labelConfirm: 'Xác nhận mật khẩu mới',
        submit: 'Đổi mật khẩu',
        backLink: '\u2190 Quay lại trang chủ',
        navHome: 'Trang chủ',
        navChat: 'Hỏi AI',
        navResults: 'Kết quả',
        errCurrentRequired: 'Vui lòng nhập mật khẩu hiện tại',
        errCurrentWrong: 'Mật khẩu hiện tại không đúng',
        errNewRequired: 'Vui lòng nhập mật khẩu mới',
        errNewMin: 'Mật khẩu phải có ít nhất 4 ký tự',
        errNewSame: 'Mật khẩu mới phải khác mật khẩu hiện tại',
        errConfirmRequired: 'Vui lòng xác nhận mật khẩu mới',
        errConfirmMismatch: 'Mật khẩu không khớp',
        successMsg: 'Mật khẩu đã được thay đổi thành công!',
        errorNetwork: 'Đã xảy ra lỗi. Vui lòng thử lại.',
        strengthWeak: 'Yếu',
        strengthFair: 'Trung bình',
        strengthGood: 'Tốt',
        strengthStrong: 'Mạnh',
        processing: 'Đang đổi...',
      }
    };

    let currentLang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;

    function T(key) {
      return (TEXTS[currentLang] || TEXTS.ko)[key] || key;
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('sop_lang', lang);
      updateTexts();
    }

    function updateTexts() {
      document.getElementById('pageTitle').textContent = T('pageTitle');
      document.getElementById('pageDesc').textContent = T('pageDesc');
      document.getElementById('labelCurrent').textContent = T('labelCurrent');
      document.getElementById('labelNew').textContent = T('labelNew');
      document.getElementById('labelConfirm').textContent = T('labelConfirm');
      document.getElementById('submitBtn').textContent = T('submit');
      document.getElementById('backLink').textContent = T('backLink');
      // Nav labels
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (T(key) !== key) el.textContent = T(key);
      });
    }

    updateTexts();

    // ===== Toggle password visibility =====
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '&#128064;';
      } else {
        input.type = 'password';
        btn.innerHTML = '&#128065;';
      }
    }

    // ===== Password strength meter =====
    const newPwInput = document.getElementById('newPw');
    newPwInput.addEventListener('input', () => {
      const val = newPwInput.value;
      const bars = document.querySelectorAll('.pw-strength-bar');
      const textEl = document.getElementById('strengthText');
      let score = 0;

      if (val.length >= 4) score++;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) score++;

      const colors = ['#ef4444', '#f59e0b', '#22c55e', '#16a34a'];
      const labels = ['strengthWeak', 'strengthFair', 'strengthGood', 'strengthStrong'];

      bars.forEach((bar, i) => {
        bar.style.background = i < score ? colors[Math.min(score - 1, 3)] : 'var(--gray-100)';
      });

      if (val.length > 0) {
        textEl.textContent = T(labels[Math.min(score - 1, 3)] || labels[0]);
        textEl.style.color = colors[Math.min(score - 1, 3)];
      } else {
        textEl.textContent = '';
      }

      // Clear error on typing
      clearFieldError('newPw', 'errorNew');
    });

    // ===== Field error helpers =====
    function showFieldError(inputId, errorId, msg) {
      document.getElementById(inputId).classList.add('input-error');
      const errEl = document.getElementById(errorId);
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    function clearFieldError(inputId, errorId) {
      document.getElementById(inputId).classList.remove('input-error');
      document.getElementById(errorId).style.display = 'none';
    }

    function clearAllErrors() {
      clearFieldError('currentPw', 'errorCurrent');
      clearFieldError('newPw', 'errorNew');
      clearFieldError('confirmPw', 'errorConfirm');
    }

    // Clear errors on input
    document.getElementById('currentPw').addEventListener('input', () => clearFieldError('currentPw', 'errorCurrent'));
    document.getElementById('confirmPw').addEventListener('input', () => clearFieldError('confirmPw', 'errorConfirm'));

    // ===== Toast notification =====
    function showToast(msg, isError) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed; bottom:80px; left:50%; transform:translateX(-50%); padding:14px 28px; border-radius:12px; font-size:14px; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; text-align:center; max-width:85%; font-weight:500;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.background = isError ? '#ef4444' : '#16a34a';
      toast.style.color = 'white';
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }

    // ===== Verify current password =====
    async function verifyCurrentPassword(password) {
      // Try Supabase first
      if (SupabaseMode._ready && user.id && !user.id.startsWith('demo-')) {
        try {
          const { data, error } = await SupabaseMode.client
            .from('employees')
            .select('id')
            .eq('id', user.id)
            .eq('password_hash', password)
            .single();
          return !error && data;
        } catch (e) {
          console.error('[PW] Supabase verify error:', e);
        }
      }

      // Fallback: check localStorage employees list
      const employees = JSON.parse(localStorage.getItem('sop_employees') || '[]');
      const emp = employees.find(e => e.id === user.id || e.email === user.email);
      // For demo accounts, check default password
      if (user.id === 'demo-admin' || user.id === 'demo-staff') {
        const storedPw = localStorage.getItem('sop_pw_' + user.email);
        return password === (storedPw || '1234');
      }
      // For localStorage-only accounts, check stored password
      const storedPw = localStorage.getItem('sop_pw_' + user.email);
      if (storedPw) return password === storedPw;

      // If no stored password found, assume default
      return password === '1234';
    }

    // ===== Update password =====
    async function updatePassword(newPassword) {
      // Update in localStorage
      localStorage.setItem('sop_pw_' + user.email, newPassword);

      // Update in Supabase
      if (SupabaseMode._ready && user.id && !user.id.startsWith('demo-')) {
        try {
          const { error } = await SupabaseMode.client
            .from('employees')
            .update({ password_hash: newPassword })
            .eq('id', user.id);
          if (error) {
            console.error('[PW] Supabase update error:', error);
            throw error;
          }
          console.log('[PW] Supabase password updated');
        } catch (e) {
          console.error('[PW] Supabase update failed:', e);
          // localStorage was already updated, so partial success
        }
      }
    }

    // ===== Form submission =====
    document.getElementById('pwForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAllErrors();

      const currentPw = document.getElementById('currentPw').value;
      const newPw = document.getElementById('newPw').value;
      const confirmPw = document.getElementById('confirmPw').value;
      const btn = document.getElementById('submitBtn');

      // Validate current password field
      if (!currentPw) {
        showFieldError('currentPw', 'errorCurrent', T('errCurrentRequired'));
        return;
      }

      // Validate new password field
      if (!newPw) {
        showFieldError('newPw', 'errorNew', T('errNewRequired'));
        return;
      }
      if (newPw.length < 4) {
        showFieldError('newPw', 'errorNew', T('errNewMin'));
        return;
      }
      if (newPw === currentPw) {
        showFieldError('newPw', 'errorNew', T('errNewSame'));
        return;
      }

      // Validate confirm password
      if (!confirmPw) {
        showFieldError('confirmPw', 'errorConfirm', T('errConfirmRequired'));
        return;
      }
      if (newPw !== confirmPw) {
        showFieldError('confirmPw', 'errorConfirm', T('errConfirmMismatch'));
        return;
      }

      // Show loading
      btn.disabled = true;
      btn.textContent = T('processing');

      try {
        // Initialize Supabase if not done
        if (!SupabaseMode._ready && SupabaseMode.isEnabled()) {
          await SupabaseMode.init();
        }

        // Verify current password
        const isValid = await verifyCurrentPassword(currentPw);
        if (!isValid) {
          showFieldError('currentPw', 'errorCurrent', T('errCurrentWrong'));
          return;
        }

        // Update password
        await updatePassword(newPw);

        // Success
        showToast(T('successMsg'), false);

        // Clear form
        document.getElementById('pwForm').reset();
        document.querySelectorAll('.pw-strength-bar').forEach(bar => {
          bar.style.background = 'var(--gray-100)';
        });
        document.getElementById('strengthText').textContent = '';

        // Redirect after delay
        setTimeout(() => {
          window.location.href = 'app.html';
        }, 2000);

      } catch (err) {
        console.error('[PW] Error:', err);
        showToast(T('errorNetwork'), true);
      } finally {
        btn.disabled = false;
        btn.textContent = T('submit');
      }
    });

    // ===== Init Supabase =====
    SupabaseMode.init();
  </script>

</body>
</html>
