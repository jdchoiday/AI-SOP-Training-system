<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - 성과제</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link rel="icon" href="assets/icon-192.svg">
  <style>
    .task-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--gray-200); }
    .task-tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--gray-500); transition: all 0.2s; }
    .task-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .task-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .summary-card { background: var(--bg-card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; }
    .summary-value { font-size: 24px; font-weight: 800; color: var(--primary); }
    .summary-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
    .summary-card.points .summary-value { color: #f59e0b; }

    .task-item { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 8px; transition: all 0.2s; }
    .task-item.completed { opacity: 0.6; }
    .task-icon { font-size: 28px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--gray-50); border-radius: 10px; flex-shrink: 0; }
    .task-info { flex: 1; min-width: 0; }
    .task-title { font-weight: 600; font-size: 15px; color: var(--gray-900); }
    .task-reward { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .task-check { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--gray-300); background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .task-check:hover { border-color: var(--primary); background: var(--primary-light); }
    .task-check.done { border-color: var(--success); background: var(--success); color: white; }

    .points-card { background: linear-gradient(135deg, rgba(245,158,11,0.15) 0%, rgba(245,158,11,0.25) 100%); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; text-align: center; }
    .points-big { font-size: 36px; font-weight: 800; color: #F59E0B; }
    .points-label { font-size: 13px; color: #FBBF24; opacity: 0.8; margin-top: 4px; }
    .points-sub { font-size: 11px; color: #FBBF24; opacity: 0.6; margin-top: 8px; }

    .date-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
    .date-nav button { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px; color: var(--gray-500); }
    .date-nav button:hover { color: var(--primary); }
    .date-display { font-size: 15px; font-weight: 600; color: var(--gray-700); min-width: 140px; text-align: center; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-500); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

    /* 학습 미션 섹션 */
    .section-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 24px 0 14px; font-size: 15px; font-weight: 700; color: var(--gray-700);
    }
    .section-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--gray-200);
    }
    .study-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; background: var(--bg-card); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 8px;
      text-decoration: none; color: inherit; transition: transform 0.15s;
    }
    .study-item:hover { transform: translateY(-1px); }
    .study-item.locked { opacity: 0.5; pointer-events: none; }
    .study-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .study-icon.done { background: rgba(16,185,129,0.15); }
    .study-icon.active { background: rgba(59,130,246,0.15); }
    .study-icon.lock { background: rgba(255,255,255,0.05); }
    .study-info { flex: 1; min-width: 0; }
    .study-title { font-weight: 600; font-size: 14px; }
    .study-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .study-badge {
      padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
    }
    .study-badge.done { background: rgba(16,185,129,0.15); color: var(--success); }
    .study-badge.progress { background: rgba(59,130,246,0.15); color: #3B82F6; }
    .study-badge.locked { background: rgba(255,255,255,0.05); color: var(--gray-500); }
    .study-progress-bar {
      height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px;
      margin-top: 6px; overflow: hidden;
    }
    .study-progress-bar .fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, #3B82F6, #10B981);
    }

    /* ===== 3대 미션 섹션 ===== */
    .mission-section {
      background: var(--bg-card, #1E293B);
      border-radius: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .mission-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .mission-section-header:hover {
      background: rgba(255,255,255,0.03);
    }
    .mission-section-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: rgba(16,185,129,0.1);
      flex-shrink: 0;
    }
    #dailyMissionSection .mission-section-icon { background: rgba(59,130,246,0.12); }
    #studyMissionSection .mission-section-icon { background: rgba(168,85,247,0.12); }
    #taskMissionSection .mission-section-icon { background: rgba(245,158,11,0.12); }
    .mission-section-info { flex: 1; min-width: 0; }
    .mission-section-title {
      font-size: 15px; font-weight: 700;
      color: var(--text-primary, #F1F5F9);
    }
    .mission-section-sub {
      font-size: 12px; color: var(--gray-500);
      margin-top: 2px;
    }
    .mission-section-badge {
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 12px; font-weight: 700;
      background: rgba(16,185,129,0.15);
      color: #10B981;
      flex-shrink: 0;
    }
    #dailyMissionSection .mission-section-badge { background: rgba(59,130,246,0.15); color: #3B82F6; }
    #studyMissionSection .mission-section-badge { background: rgba(168,85,247,0.15); color: #A855F7; }
    #taskMissionSection .mission-section-badge { background: rgba(245,158,11,0.15); color: #F59E0B; }
    .mission-section-arrow {
      font-size: 12px; color: var(--gray-500);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .mission-section-body {
      display: none;
      padding: 0 16px 16px;
    }
    .mission-section-body.open {
      display: block;
    }
    .mission-section-header.collapsed .mission-section-arrow {
      transform: rotate(-90deg);
    }

    /* 테스크 미션 카드 (간략) */
    .team-task-mini {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 8px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .team-task-mini:hover { background: rgba(255,255,255,0.07); }
    .team-task-mini-status {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .team-task-mini-status.open { background: #3B82F6; }
    .team-task-mini-status.in_progress { background: #10B981; }
    .team-task-mini-status.review { background: #F59E0B; }
    .team-task-mini-status.completed { background: #22C55E; }
    .team-task-mini-title {
      flex: 1; font-size: 14px; font-weight: 600;
      color: var(--text-primary, #F1F5F9);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .team-task-mini-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 600;
      white-space: nowrap;
    }

    /* ===== 일일 미션 자동감지 카드 ===== */
    .dm-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 8px;
      transition: all 0.25s;
    }
    .dm-card.completed {
      background: rgba(16,185,129,0.08);
      border-color: rgba(16,185,129,0.2);
    }
    .dm-icon {
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      background: rgba(255,255,255,0.06);
    }
    .dm-card.completed .dm-icon {
      background: rgba(16,185,129,0.15);
    }
    .dm-info { flex: 1; min-width: 0; }
    .dm-title { font-weight: 600; font-size: 14px; color: var(--text-primary, #F1F5F9); }
    .dm-desc { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .dm-xp {
      display: inline-block; margin-top: 4px;
      font-size: 11px; font-weight: 700; color: #10B981;
      padding: 2px 8px; border-radius: 6px;
      background: rgba(16,185,129,0.1);
    }
    .dm-status { flex-shrink: 0; }
    .dm-check-btn {
      padding: 8px 16px; border-radius: 10px;
      background: linear-gradient(135deg, #10B981, #059669);
      color: white; border: none;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(16,185,129,0.3);
    }
    .dm-check-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .dm-check-btn:active { transform: scale(0.97); }
    .dm-done-badge {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(16,185,129,0.15); color: #10B981;
      font-size: 18px; font-weight: 700;
    }
    .dm-pending-badge {
      min-width: 48px; height: 28px; border-radius: 14px;
      border: 1.5px dashed rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--gray-500); font-size: 10px; padding: 0 6px;
      white-space: nowrap;
    }
    .dm-card.completed .dm-title { color: #10B981; }
    .dm-card.completed .dm-xp { background: rgba(16,185,129,0.2); color: #34D399; }
  </style>
</head>
<body>

  <div class="bottom-nav">
    <a href="app.html">
      <span class="nav-icon">&#127968;</span> <span class="nav-label-home">홈</span>

      <span class="nav-icon">&#128100;</span> <span class="nav-label-results">내 프로필</span>
    </a>

  <div class="app-container">

    <!-- 상단 헤더 -->
    <div class="app-header">
      <h2 id="pageTitle">미션</h2>
      <div style="display:flex; align-items:center; gap:10px;">
        <a href="app.html" style="text-decoration:none; font-size:20px; line-height:1; padding:4px; cursor:pointer;">&#127968;</a>
        <a href="profile.html" class="user-avatar" id="userAvatar" title="내 프로필" style="text-decoration:none; overflow:hidden;">?</a>
      </div>
    </div>

    <!-- 포인트 현황 카드 -->
    <div class="points-card" id="pointsCard">
      <div class="points-big" id="quarterPoints">0 P</div>
      <div class="points-label" id="quarterLabel">이번 분기 포인트</div>
      <div class="points-sub" id="totalPointsLabel">누적: 0 P</div>
    </div>

    <!-- 요약 -->
    <div class="task-summary" id="taskSummary">
      <div class="summary-card">
        <div class="summary-value" id="todayCompleted">0</div>
        <div class="summary-label" id="todayLabel">오늘 완료</div>
      </div>
      <div class="summary-card points">
        <div class="summary-value" id="todayPoints">+0 P</div>
        <div class="summary-label" id="todayPointsLabel">오늘 획득</div>
      </div>
    </div>

    <!-- ======================== -->
    <!-- 1. 일일 미션 섹션 -->
    <!-- ======================== -->
    <div class="mission-section" id="dailyMissionSection">
      <div class="mission-section-header" onclick="toggleMissionSection('daily')">
        <div class="mission-section-icon">&#9989;</div>
        <div class="mission-section-info">
          <div class="mission-section-title" id="dailyMissionTitle">일일 미션</div>
          <div class="mission-section-sub" id="dailyMissionSub">매일 해야 할 기본 업무</div>
        </div>
        <div class="mission-section-badge" id="dailyMissionBadge">0/0</div>
        <div class="mission-section-arrow" id="dailyArrow">&#9660;</div>
      </div>
      <div class="mission-section-body open" id="dailyMissionBody">
        <div id="dailyMissionList"></div>
      </div>
    </div>

    <!-- ======================== -->
    <!-- 2. 학습 미션 섹션 -->
    <!-- ======================== -->
    <div class="mission-section" id="studyMissionSection">
      <div class="mission-section-header" onclick="toggleMissionSection('study')">
        <div class="mission-section-icon">&#128218;</div>
        <div class="mission-section-info">
          <div class="mission-section-title" id="studySectionTitle">학습 미션</div>
          <div class="mission-section-sub" id="studyMissionSub">SOP 교육 과정 학습</div>
        </div>
        <div class="mission-section-badge" id="studyMissionBadge">0/0</div>
        <div class="mission-section-arrow" id="studyArrow">&#9660;</div>
      </div>
      <div class="mission-section-body" id="studyMissionBody">
        <div id="studyList"></div>
      </div>
    </div>

    <!-- ======================== -->
    <!-- 3. 테스크 미션 섹션 -->
    <!-- ======================== -->
    <div class="mission-section" id="taskMissionSection">
      <div class="mission-section-header" onclick="toggleMissionSection('teamTask')">
        <div class="mission-section-icon">&#128640;</div>
        <div class="mission-section-info">
          <div class="mission-section-title" id="teamTaskTitle">테스크 미션</div>
          <div class="mission-section-sub" id="teamTaskSub">팀 챌린지 & 특별 업무</div>
        </div>
        <div class="mission-section-badge" id="teamTaskBadge">0</div>
        <div class="mission-section-arrow" id="teamTaskArrow">&#9660;</div>
      </div>
      <div class="mission-section-body" id="teamTaskBody">
        <div id="teamTaskList"></div>
        <a href="team-tasks.html" id="linkTeamTasks" style="display:block;text-align:center;padding:12px;margin-top:8px;border-radius:10px;font-size:13px;font-weight:600;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:var(--primary);text-decoration:none;">
          &#128279; 전체 보기 &rarr;
        </a>
      </div>
    </div>

  </div>

  <script src="js/image-db.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/scene-prompts.js"></script>
  <script src="js/ai-provider.js"></script>
  <script src="js/sop-content-kids.js"></script>
  <script src="js/demo-data.js"></script>
  <script src="js/xp-system.js"></script>
  <script>
    // ===== 다국어 =====
    const T = {
      ko: {
        pageTitle: '미션',
        home: '홈', tasks: '미션', praise: '부스트', results: '내 프로필',
        quarterPoints: '이번 분기 포인트',
        totalPoints: (n) => `누적: ${n} P`,
        todayCompleted: '미션 완료', todayPoints: '오늘 XP',
        complete: '완료!',
        xpGained: (xp) => `+${xp} XP`,
        teamTasks: '👥 전체 보기',
        dailyMission: '일일 미션', dailyMissionDesc: '자동 감지 데일리 미션',
        studyMission: '학습 미션', studyMissionDesc: 'SOP 교육 과정 학습',
        taskMission: '테스크 미션', taskMissionDesc: '팀 챌린지 & 특별 업무',
        viewAll: '전체 보기',
        studyDone: '완료',
        studyProgress: (pct) => `${pct}%`,
        studyLocked: '잠김',
        studyNotStarted: '시작하기',
        studyScenes: (n) => `${n}개 영상`,
        studyReward: '+50 XP',
        studyAllDone: '모든 학습을 완료했어요! 🎉',
        // 일일 미션 자동감지
        dmAttendance: '출근 체크인',
        dmAttendanceDesc: '오늘의 출근을 기록하세요',
        dmStudy: '학습 완료',
        dmStudyDesc: (n) => `오늘 ${n}개 이상 씬 학습`,
        dmQuiz: '퀴즈 만점',
        dmQuizDesc: '퀴즈에서 100점을 달성하세요',
        dmBoost: '부스트 전송',
        dmBoostDesc: '동료에게 부스트를 보내세요',
        dmCheckIn: '체크인',
        dmAutoDetect: '자동 감지',
      },
      en: {
        pageTitle: 'Missions',
        home: 'Home', tasks: 'Tasks', praise: 'Boost', results: 'Profile',
        quarterPoints: 'Quarter Points',
        totalPoints: (n) => `Total: ${n} P`,
        todayCompleted: 'Missions', todayPoints: 'Today XP',
        complete: 'Done!',
        xpGained: (xp) => `+${xp} XP`,
        teamTasks: '👥 View All',
        dailyMission: 'Daily Missions', dailyMissionDesc: 'Auto-detect daily missions',
        studyMission: 'Study Missions', studyMissionDesc: 'SOP training courses',
        taskMission: 'Task Missions', taskMissionDesc: 'Team challenges & projects',
        viewAll: 'View All',
        studyDone: 'Done',
        studyProgress: (pct) => `${pct}%`,
        studyLocked: 'Locked',
        studyNotStarted: 'Start',
        studyScenes: (n) => `${n} videos`,
        studyReward: '+50 XP',
        studyAllDone: 'All studies completed! 🎉',
        dmAttendance: 'Check In',
        dmAttendanceDesc: 'Record your attendance today',
        dmStudy: 'Study Complete',
        dmStudyDesc: (n) => `Complete ${n}+ scenes today`,
        dmQuiz: 'Perfect Quiz',
        dmQuizDesc: 'Score 100% on any quiz',
        dmBoost: 'Send Boost',
        dmBoostDesc: 'Send a boost to a colleague',
        dmCheckIn: 'Check In',
        dmAutoDetect: 'Auto',
      },
      vi: {
        pageTitle: 'Nhiệm vụ',
        home: 'Trang chủ', tasks: 'Nhiệm vụ', praise: 'Khen', results: 'Hồ sơ',
        quarterPoints: 'Điểm quý này',
        totalPoints: (n) => `Tổng: ${n} P`,
        todayCompleted: 'Nhiệm vụ', todayPoints: 'XP hôm nay',
        complete: 'Xong!',
        xpGained: (xp) => `+${xp} XP`,
        teamTasks: '👥 Xem tất cả',
        dailyMission: 'Nhiệm vụ hàng ngày', dailyMissionDesc: 'Tự động phát hiện hàng ngày',
        studyMission: 'Nhiệm vụ học tập', studyMissionDesc: 'Khóa đào tạo SOP',
        taskMission: 'Nhiệm vụ nhóm', taskMissionDesc: 'Thử thách nhóm & dự án',
        viewAll: 'Xem tất cả',
        studyDone: 'Xong',
        studyProgress: (pct) => `${pct}%`,
        studyLocked: 'Khóa',
        studyNotStarted: 'Bắt đầu',
        studyScenes: (n) => `${n} video`,
        studyReward: '+50 XP',
        studyAllDone: 'Hoàn thành tất cả bài học! 🎉',
        dmAttendance: 'Điểm danh',
        dmAttendanceDesc: 'Ghi nhận đi làm hôm nay',
        dmStudy: 'Hoàn thành học',
        dmStudyDesc: (n) => `Học ${n}+ bài hôm nay`,
        dmQuiz: 'Điểm tuyệt đối',
        dmQuizDesc: 'Đạt 100 điểm bài kiểm tra',
        dmBoost: 'Gửi khen',
        dmBoostDesc: 'Gửi lời khen cho đồng nghiệp',
        dmCheckIn: 'Điểm danh',
        dmAutoDetect: 'Tự động',
      }
    };
    const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
    const t = T[lang] || T.ko;

    // ===== 로그인 확인 =====
    const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
    const loginTime = parseInt(localStorage.getItem('sop_login_time') || '0');
    if (Date.now() - loginTime > 24 * 60 * 60 * 1000 || !user) {
      localStorage.removeItem('sop_user');
      localStorage.removeItem('sop_login_time');
      window.location.href = 'index.html';
    }

    // 아바타
    const avatarEl = document.getElementById('userAvatar');
    if (user.avatarType === 'photo' && user.avatarData) {
      avatarEl.innerHTML = `<img src="${user.avatarData}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    } else if (user.avatarType === 'emoji' && user.avatarData) {
      avatarEl.textContent = user.avatarData;
      avatarEl.style.fontSize = '20px';
    } else {
      avatarEl.textContent = (user.name || '?')[0];
    }

    // ===== 상태 변수 =====
    let _resolvedEmpId = null;
    let dailyMissionConfig = { attendance_xp: 3, study_xp: 5, study_required: 3, quiz_xp: 3, boost_xp: 2 };
    let dailyMissionStatus = { attendance: false, study: false, quiz: false, boost: false };
    let _dmChecking = false;

    // employees 테이블에서 실제 ID를 찾는 헬퍼
    async function getEmployeeId() {
      if (_resolvedEmpId) return _resolvedEmpId;
      if (!SupabaseMode._ready || !user?.id) return user?.id;
      // 먼저 user.id로 직접 조회
      const { data: d1 } = await SupabaseMode._client
        .from('employees').select('id').eq('id', user.id).maybeSingle();
      if (d1) { _resolvedEmpId = d1.id; return _resolvedEmpId; }
      // 없으면 email로 조회
      if (user.email) {
        const { data: d2 } = await SupabaseMode._client
          .from('employees').select('id').eq('email', user.email).maybeSingle();
        if (d2) { _resolvedEmpId = d2.id; return _resolvedEmpId; }
      }
      return user.id; // 못 찾으면 원래 ID 사용
    }

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    // ===== 일일 미션 설정 로드 (app_config) =====
    async function loadDailyMissionConfig() {
      try {
        const { data } = await SupabaseMode._client
          .from('app_config').select('value').eq('key', 'daily_mission_config').maybeSingle();
        if (data?.value) {
          dailyMissionConfig = { ...dailyMissionConfig, ...data.value };
          console.log('[DM] Config loaded:', dailyMissionConfig);
        }
      } catch (e) { console.warn('[DM] Config load error:', e); }
    }

    // ===== 미션 자동 감지 + XP 보상 =====
    async function checkDailyMissions() {
      if (!SupabaseMode._ready || _dmChecking) return;
      _dmChecking = true;
      const empId = await getEmployeeId();
      const today = formatDate(new Date());
      const todayStart = new Date();
      todayStart.setHours(0, 0, 0, 0);

      try {
        // 1) 이미 지급된 미션 확인 (xp_transactions)
        const { data: xpLogs } = await SupabaseMode._client
          .from('xp_transactions').select('source_id')
          .eq('employee_id', empId).eq('source', 'daily_mission');

        const grantedIds = new Set(
          (xpLogs || []).filter(x => x.source_id && x.source_id.endsWith('_' + today)).map(x => x.source_id)
        );
        dailyMissionStatus.attendance = grantedIds.has('dm_attendance_' + today);
        dailyMissionStatus.study     = grantedIds.has('dm_study_' + today);
        dailyMissionStatus.quiz      = grantedIds.has('dm_quiz_' + today);
        dailyMissionStatus.boost     = grantedIds.has('dm_boost_' + today);

        // 2) 미완료 미션 자동 감지

        // 📺 학습: 오늘 완료 씬 수
        if (!dailyMissionStatus.study) {
          try {
            const { data } = await SupabaseMode._client
              .from('training_progress').select('id')
              .eq('employee_id', empId).eq('completed', true)
              .gte('completed_at', todayStart.toISOString());
            if ((data?.length || 0) >= dailyMissionConfig.study_required) {
              await claimMissionXp('study');
            }
          } catch (e) { console.warn('[DM] Study check:', e); }
        }

        // 💯 퀴즈 만점
        if (!dailyMissionStatus.quiz) {
          try {
            const { data } = await SupabaseMode._client
              .from('chapter_results').select('id')
              .eq('employee_id', empId).eq('score', 100)
              .gte('completed_at', todayStart.toISOString());
            if (data?.length > 0) await claimMissionXp('quiz');
          } catch (e) { console.warn('[DM] Quiz check:', e); }
        }

        // 🙌 부스트 전송
        if (!dailyMissionStatus.boost) {
          try {
            const { data } = await SupabaseMode._client
              .from('praise_logs').select('id')
              .eq('from_employee_id', empId)
              .gte('created_at', todayStart.toISOString());
            if (data?.length > 0) await claimMissionXp('boost');
          } catch (e) { console.warn('[DM] Boost check:', e); }
        }
      } catch (e) {
        console.warn('[DM] Check error:', e);
      } finally {
        _dmChecking = false;
      }
      renderDailyMissions();
      updateSummary();
      updatePointsCard();
    }

    // ===== XP 보상 지급 =====
    async function claimMissionXp(type) {
      const empId = await getEmployeeId();
      const today = formatDate(new Date());
      const sourceId = 'dm_' + type + '_' + today;
      const xpMap = { attendance: dailyMissionConfig.attendance_xp, study: dailyMissionConfig.study_xp, quiz: dailyMissionConfig.quiz_xp, boost: dailyMissionConfig.boost_xp };
      const reasonMap = { attendance: t.dmAttendance, study: t.dmStudy, quiz: t.dmQuiz, boost: t.dmBoost };

      try {
        const result = await XpService.addXp(empId, xpMap[type], 'daily_mission', sourceId, reasonMap[type]);
        dailyMissionStatus[type] = true;
        console.log('[DM] ✅ ' + type + ' +' + xpMap[type] + ' XP');
        if (result?.leveledUp) {
          setTimeout(() => {
            if (typeof showLevelUpCelebration === 'function') showLevelUpCelebration(result.oldTier, result.newTier, lang);
          }, 500);
        }
        return true;
      } catch (e) {
        dailyMissionStatus[type] = true;
        return false;
      }
    }

    // ===== ☀️ 출근 체크인 =====
    async function checkInAttendance() {
      if (dailyMissionStatus.attendance) return;
      if (!SupabaseMode._ready) { showToast('DB 연결 필요'); return; }
      const btn = document.querySelector('.dm-check-btn');
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      const ok = await claimMissionXp('attendance');
      if (ok) showToast(t.complete + ' ' + t.xpGained(dailyMissionConfig.attendance_xp));
      renderDailyMissions();
      updateSummary();
    }

    // ===== 일일 미션 렌더링 =====
    function renderDailyMissions() {
      const container = document.getElementById('dailyMissionList');
      if (!container) return;
      const missions = [
        { type: 'attendance', icon: '☀️', title: t.dmAttendance, desc: t.dmAttendanceDesc, xp: dailyMissionConfig.attendance_xp, manual: true },
        { type: 'study', icon: '📺', title: t.dmStudy, desc: t.dmStudyDesc(dailyMissionConfig.study_required), xp: dailyMissionConfig.study_xp },
        { type: 'quiz', icon: '💯', title: t.dmQuiz, desc: t.dmQuizDesc, xp: dailyMissionConfig.quiz_xp },
        { type: 'boost', icon: '🙌', title: t.dmBoost, desc: t.dmBoostDesc, xp: dailyMissionConfig.boost_xp },
      ];
      container.innerHTML = missions.map(m => {
        const done = dailyMissionStatus[m.type];
        let statusHtml;
        if (done) {
          statusHtml = '<div class="dm-done-badge">✓</div>';
        } else if (m.manual) {
          statusHtml = '<button class="dm-check-btn" onclick="checkInAttendance()">' + t.dmCheckIn + '</button>';
        } else {
          statusHtml = '<div class="dm-pending-badge"><span style="font-size:9px;">' + t.dmAutoDetect + '</span></div>';
        }
        return '<div class="dm-card ' + (done ? 'completed' : '') + '">'
          + '<div class="dm-icon">' + m.icon + '</div>'
          + '<div class="dm-info"><div class="dm-title">' + m.title + '</div>'
          + '<div class="dm-desc">' + m.desc + '</div>'
          + '<div class="dm-xp">+' + m.xp + ' XP</div></div>'
          + '<div class="dm-status">' + statusHtml + '</div></div>';
      }).join('');
      document.getElementById('dailyMissionBadge').textContent = Object.values(dailyMissionStatus).filter(Boolean).length + '/4';
    }

    function updateSummary() {
      const doneCount = Object.values(dailyMissionStatus).filter(Boolean).length;
      const xpEarned = (dailyMissionStatus.attendance ? dailyMissionConfig.attendance_xp : 0)
        + (dailyMissionStatus.study ? dailyMissionConfig.study_xp : 0)
        + (dailyMissionStatus.quiz ? dailyMissionConfig.quiz_xp : 0)
        + (dailyMissionStatus.boost ? dailyMissionConfig.boost_xp : 0);
      document.getElementById('todayCompleted').textContent = doneCount + '/4';
      document.getElementById('todayPoints').textContent = '+' + xpEarned + ' XP';
    }

    async function updatePointsCard() {
      if (!SupabaseMode._ready || !user?.id) {
        document.getElementById('quarterPoints').textContent = '0 P';
        document.getElementById('totalPointsLabel').textContent = t.totalPoints(0);
        return;
      }
      try {
        const empId = await getEmployeeId();
        const { data } = await SupabaseMode._client.from('employees')
          .select('quarter_points, total_points').eq('id', empId).maybeSingle();
        const qp = data?.quarter_points || 0;
        const tp = data?.total_points || 0;
        document.getElementById('quarterPoints').textContent = qp + ' P';
        document.getElementById('totalPointsLabel').textContent = t.totalPoints(tp);
      } catch (e) { console.warn('[Tasks] 포인트 조회 오류:', e); }
    }


    // ===== Toast =====
    function showToast(msg) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:12px 24px; border-radius:10px; font-size:14px; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; text-align:center; max-width:80%;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    // ===== 학습 미션 렌더링 =====
    function renderStudyMissions() {
      const container = document.getElementById('studyList');
      if (typeof SopStore === 'undefined' || typeof Progress === 'undefined') {
        container.innerHTML = '';
        return;
      }

      const _chRes = SopStore.getChapters();
      const allChapters = Array.isArray(_chRes) ? _chRes : (_chRes.chapters || []);
      // orphanSections도 학습 대상에 포함
      if (_chRes.orphanSections) _chRes.orphanSections.forEach(s => allChapters.push(s));
      // 지점별 학습 경로 필터
      const emp = typeof EmployeeStore !== 'undefined' ? EmployeeStore.getCurrentEmployee() : null;
      const branch = emp?.branch || user.branch;
      const paths = JSON.parse(localStorage.getItem('sop_learning_paths') || '{}');
      const assigned = paths[branch];
      const chapters = (!assigned || assigned.length === 0) ? allChapters : allChapters.filter(ch => assigned.includes(ch.id));

      if (chapters.length === 0) {
        container.innerHTML = '';
        document.getElementById('studySectionTitle').style.display = 'none';
        return;
      }

      const allDone = chapters.every(ch => Progress.isChapterPassed(ch.id));
      let html = '';

      chapters.forEach((ch, index) => {
        const unlocked = Progress.isChapterUnlocked(index);
        const passed = Progress.isChapterPassed(ch.id);
        const videoProgress = Progress.getChapterVideoProgress(ch.id);
        const videos = SopStore.getVideos(ch.id);
        const title = typeof getLocalizedText === 'function' ? getLocalizedText(ch, 'title') : ch.title;

        let iconClass, statusBadge, link;

        if (passed) {
          iconClass = 'done';
          statusBadge = `<span class="study-badge done">✓ ${t.studyDone}</span>`;
          link = `chapter.html?id=${ch.id}`;
        } else if (!unlocked) {
          iconClass = 'lock';
          statusBadge = `<span class="study-badge locked">🔒 ${t.studyLocked}</span>`;
          link = '#';
        } else if (videoProgress > 0) {
          iconClass = 'active';
          statusBadge = `<span class="study-badge progress">${t.studyProgress(videoProgress)}</span>`;
          link = `chapter.html?id=${ch.id}`;
        } else {
          iconClass = 'active';
          statusBadge = `<span class="study-badge progress">▶ ${t.studyNotStarted}</span>`;
          link = `chapter.html?id=${ch.id}`;
        }

        const progressBar = unlocked && !passed && videoProgress > 0
          ? `<div class="study-progress-bar"><div class="fill" style="width:${videoProgress}%"></div></div>`
          : '';

        html += `
          <a class="study-item ${!unlocked ? 'locked' : ''}" href="${link}" ${!unlocked ? 'onclick="return false;"' : ''}>
            <div class="study-icon ${iconClass}">
              ${passed ? '✅' : !unlocked ? '🔒' : '📖'}
            </div>
            <div class="study-info">
              <div class="study-title">${index + 1}. ${title}</div>
              <div class="study-sub">${t.studyScenes(videos.length)} · ${t.studyReward}</div>
              ${progressBar}
            </div>
            ${statusBadge}
          </a>`;
      });

      if (allDone) {
        html += `<div style="text-align:center; padding:16px; color:var(--success); font-size:14px; font-weight:600;">${t.studyAllDone}</div>`;
      }

      container.innerHTML = html;
    }

    // ===== 섹션 토글 =====
    function toggleMissionSection(section) {
      const bodyMap = { daily: 'dailyMissionBody', study: 'studyMissionBody', teamTask: 'teamTaskBody' };
      const arrowMap = { daily: 'dailyArrow', study: 'studyArrow', teamTask: 'teamTaskArrow' };
      const body = document.getElementById(bodyMap[section]);
      const header = body?.previousElementSibling;
      if (!body) return;
      body.classList.toggle('open');
      if (header) header.classList.toggle('collapsed', !body.classList.contains('open'));
    }

    // ===== 테스크 미션 (간략 목록) =====
    const teamStatusLabels = {
      ko: { open: '모집중', in_progress: '진행중', review: '검토중', completed: '완료' },
      en: { open: 'Open', in_progress: 'Active', review: 'Review', completed: 'Done' },
      vi: { open: 'Mở', in_progress: 'Đang làm', review: 'Xét duyệt', completed: 'Xong' },
    };
    const teamStatusColors = { open: '#3B82F6', in_progress: '#10B981', review: '#F59E0B', completed: '#22C55E' };

    async function loadTeamTasksSummary() {
      if (!SupabaseMode._ready) {
        document.getElementById('teamTaskList').innerHTML = '<div style="text-align:center;padding:12px;color:var(--gray-500);font-size:13px;">-</div>';
        return;
      }
      try {
        const empId = user?.id || '';
        const myBranch = user?.branch || '';
        const { data: tasks } = await SupabaseMode._client
          .from('team_tasks').select('id,title,status,branch,creator_id,xp_reward,deadline')
          .order('created_at', { ascending: false }).limit(10);

        const myTasks = (tasks || []).filter(tk =>
          tk.status !== 'cancelled' && (tk.branch === myBranch || tk.branch === '' || !tk.branch)
        );

        const statusLbl = teamStatusLabels[lang] || teamStatusLabels.ko;
        const container = document.getElementById('teamTaskList');

        if (myTasks.length === 0) {
          container.innerHTML = '<div style="text-align:center;padding:12px;color:var(--gray-500);font-size:13px;">-</div>';
          document.getElementById('teamTaskBadge').textContent = '0';
          return;
        }

        const activeTasks = myTasks.filter(tk => tk.status !== 'completed');
        document.getElementById('teamTaskBadge').textContent = activeTasks.length > 0 ? activeTasks.length : myTasks.length;

        container.innerHTML = myTasks.slice(0, 5).map(tk => `
          <a class="team-task-mini" href="team-tasks.html" style="text-decoration:none;">
            <div class="team-task-mini-status ${tk.status}"></div>
            <div class="team-task-mini-title">${tk.title}</div>
            <span class="team-task-mini-badge" style="background:${teamStatusColors[tk.status]}22;color:${teamStatusColors[tk.status]};">${statusLbl[tk.status] || tk.status}</span>
            <span style="font-size:11px;color:var(--gray-500);">+${tk.xp_reward} XP</span>
          </a>`).join('');
      } catch (e) {
        console.error('[Tasks] Team task summary error:', e);
      }
    }

    // ===== 학습 미션 배지 업데이트 =====
    function updateStudyBadge() {
      try {
        const _chRes = SopStore.getChapters();
        const chapters = Array.isArray(_chRes) ? _chRes : [...(_chRes.chapters || []), ...(_chRes.orphanSections || [])];
        const done = chapters.filter(ch => Progress.isChapterPassed(ch.id)).length;
        document.getElementById('studyMissionBadge').textContent = `${done}/${chapters.length}`;
      } catch(e) {}
    }

    // ===== 다국어 적용 =====
    document.getElementById('studySectionTitle').textContent = t.studyMission;
    document.getElementById('studyMissionSub').textContent = t.studyMissionDesc;
    document.getElementById('dailyMissionTitle').textContent = t.dailyMission;
    document.getElementById('dailyMissionSub').textContent = t.dailyMissionDesc;
    document.getElementById('teamTaskTitle').textContent = t.taskMission;
    document.getElementById('teamTaskSub').textContent = t.taskMissionDesc;
    document.getElementById('pageTitle').textContent = t.pageTitle;
    document.querySelector('.nav-label-home').textContent = t.home;
    document.querySelector('.nav-label-tasks').textContent = t.tasks;
    document.querySelector('.nav-label-praise').textContent = t.praise;
    document.querySelector('.nav-label-results').textContent = t.results;
    const linkTeamEl = document.getElementById('linkTeamTasks');
    if (linkTeamEl) linkTeamEl.innerHTML = `&#128279; ${t.viewAll} &rarr;`;
    document.getElementById('quarterLabel').textContent = t.quarterPoints;
    document.getElementById('todayLabel').textContent = t.todayCompleted;
    document.getElementById('todayPointsLabel').textContent = t.todayPoints;

    // ===== 초기화 =====
    // 초기 렌더 (로딩 상태)
    renderDailyMissions();
    updateSummary();

    SupabaseMode.init().then(connected => {
      if (connected) {
        SupabaseMode.syncAll().then(async () => {
          await loadDailyMissionConfig();
          checkDailyMissions();
          renderStudyMissions();
          updateStudyBadge();
          loadTeamTasksSummary();
        });
      } else {
        renderDailyMissions();
        renderStudyMissions();
        updateStudyBadge();
      }
    });
  </script>

</body>
</html>
