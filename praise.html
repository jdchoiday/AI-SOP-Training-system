<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - 칭찬</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link rel="icon" href="assets/icon-192.svg">
  <style>
    .praise-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--gray-200); }
    .praise-tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--gray-500); transition: all 0.2s; }
    .praise-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .praise-stack-card { background: var(--bg-card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; text-align: center; }
    .praise-stack-dots { display: flex; justify-content: center; gap: 8px; margin: 12px 0; }
    .praise-stack-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .praise-stack-dot.filled { background: #fef3c7; border: 2px solid #f59e0b; }
    .praise-stack-dot.empty { background: var(--gray-100); border: 2px solid var(--gray-300); }

    .emp-select-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .emp-select-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); cursor: pointer; transition: transform 0.15s, border-color 0.2s; border: 2px solid transparent; }
    .emp-select-item:hover { transform: translateY(-1px); }
    .emp-select-item.selected { border-color: var(--primary); background: var(--primary-light); }
    .emp-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }

    .category-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .category-btn { padding: 10px 16px; border-radius: 20px; border: 2px solid var(--gray-200); background: var(--bg-card); font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .category-btn:hover { border-color: var(--primary); }
    .category-btn.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 600; }

    .send-btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .send-btn:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
    .send-btn:not(:disabled) { background: linear-gradient(135deg, var(--primary) 0%, #059669 100%); color: white; }
    .send-btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(16,185,129,0.3); }

    .praise-history-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 8px; }
    .praise-history-emoji { font-size: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--gray-50); border-radius: 10px; flex-shrink: 0; }

    .daily-limit-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

    /* 프로필 미리보기 모달 */
    .profile-modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 1000;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .profile-modal-overlay.show { display: flex; }
    .profile-modal {
      background: var(--bg-main, #0F172A);
      border-radius: 24px;
      width: 92%; max-width: 400px;
      max-height: 85vh; overflow-y: auto;
      border: 1px solid rgba(16,185,129,0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: modalSlideUp 0.3s ease;
    }
    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pm-hero {
      position: relative;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
      border-radius: 24px 24px 0 0;
      padding: 28px 20px 20px;
      overflow: hidden;
    }
    .pm-hero::before {
      content: '';
      position: absolute; top: -40%; right: -20%;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .pm-hero * { position: relative; z-index: 1; }
    .pm-close {
      position: absolute; top: 12px; right: 14px; z-index: 2;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none;
      color: #94A3B8; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .pm-close:hover { background: rgba(255,255,255,0.2); color: white; }
    .pm-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      border: 3px solid var(--primary);
      background: rgba(16,185,129,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: white;
      margin: 0 auto 12px;
      box-shadow: 0 0 20px rgba(16,185,129,0.3);
    }
    .pm-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .pm-name { text-align: center; font-size: 20px; font-weight: 800; color: #F1F5F9; }
    .pm-branch { text-align: center; font-size: 13px; color: #94A3B8; margin-top: 2px; }
    .pm-intro { text-align: center; font-size: 13px; color: #CBD5E1; font-style: italic; margin-top: 8px; }
    .pm-tier {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 10px;
    }
    .pm-tier-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 16px; font-size: 12px; font-weight: 700;
      color: white; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .pm-xp-text { font-size: 11px; color: #64748B; }

    .pm-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .pm-stat-item { display: flex; align-items: center; gap: 6px; }
    .pm-stat-icon { font-size: 14px; width: 18px; text-align: center; }
    .pm-stat-name { font-size: 11px; color: #94A3B8; width: 40px; }
    .pm-stat-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .pm-stat-bar .fill { height: 100%; border-radius: 3px; }
    .pm-stat-val { font-size: 10px; color: #64748B; width: 16px; text-align: right; font-weight: 600; }

    .pm-body { padding: 16px 20px; }
    .pm-section { margin-bottom: 14px; }
    .pm-section-title { font-size: 12px; color: #64748B; margin-bottom: 6px; font-weight: 600; }
    .pm-motto {
      font-size: 14px; color: #E2E8F0; font-style: italic;
      padding: 10px 14px; background: rgba(16,185,129,0.06);
      border-radius: 10px; border-left: 3px solid var(--primary);
      text-align: center;
    }
    .pm-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .pm-tag {
      padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 500;
      background: rgba(16,185,129,0.1); color: var(--primary);
    }
    .pm-tag.warn { background: rgba(245,158,11,0.1); color: #F59E0B; }
    .pm-info-row {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px;
    }
    .pm-info-row:last-child { border-bottom: none; }
    .pm-info-label { color: #64748B; }
    .pm-info-value { color: #E2E8F0; font-weight: 600; }
    .pm-empty { text-align: center; padding: 20px; color: #64748B; font-size: 13px; }

    .pm-boost-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: calc(100% - 40px); margin: 0 20px 20px;
      padding: 14px; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, var(--primary) 0%, #059669 100%);
      color: white; transition: all 0.2s;
    }
    .pm-boost-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(16,185,129,0.3); }
    .pm-boost-btn:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body>

  <div class="bottom-nav">
    <a href="app.html">
      <span class="nav-icon">&#127968;</span> <span class="nav-label-home">홈</span>
    </a>
    <a href="tasks.html">
      <span class="nav-icon">&#9989;</span> <span class="nav-label-tasks">미션</span>
    </a>
    <a href="praise.html" class="active">
      <span class="nav-icon">&#128588;</span> <span class="nav-label-praise">부스트</span>
    </a>
    <a href="my-results.html">
      <span class="nav-icon">&#128100;</span> <span class="nav-label-results">내 프로필</span>
    </a>
  </div>

  <div class="app-container">
    <div class="app-header">
      <h2 id="pageTitle">🤝 칭찬</h2>
      <div id="dailyLimitBadge" class="daily-limit-badge" style="background:#dcfce7;color:var(--success);">0/2</div>
    </div>

    <!-- 탭 -->
    <div class="praise-tabs">
      <div class="praise-tab active" onclick="showPraiseTab('send')" id="tabSendLabel">칭찬 보내기</div>
      <div class="praise-tab" onclick="showPraiseTab('received')" id="tabReceivedLabel">받은 칭찬</div>
    </div>

    <!-- ===== 탭1: 칭찬 보내기 ===== -->
    <div id="tabSend">
      <h3 id="whoPraiseLabel" style="font-size:15px; color:var(--gray-700); margin-bottom:12px;">누구에게 칭찬할까요?</h3>
      <div id="empList" class="emp-select-list"></div>

      <div id="categoryArea" style="display:none;">
        <h3 id="whatGreatLabel" style="font-size:15px; color:var(--gray-700); margin-bottom:8px;">어떤 점이 좋았나요?</h3>
        <div id="categoryGrid" class="category-grid"></div>
        <div id="reasonArea" style="display:none; margin-top:12px;">
          <h3 style="font-size:15px; color:var(--gray-700); margin-bottom:8px;" id="reasonLabel">칭찬 이유 <span style="font-size:12px; color:var(--gray-400); font-weight:400;" id="optionalLabel">(선택)</span></h3>
          <textarea id="praiseReason" rows="2" maxlength="100" placeholder="" style="width:100%; padding:12px; border:1px solid var(--gray-300); border-radius:10px; font-size:14px; resize:none; font-family:inherit; outline:none; transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--gray-300)'"></textarea>
          <div style="text-align:right; font-size:11px; color:var(--gray-400); margin-top:4px;"><span id="reasonCount">0</span>/100</div>
        </div>
        <button id="sendBtn" class="send-btn" disabled onclick="doSendPraise()">칭찬 보내기</button>
      </div>
    </div>

    <!-- ===== 탭2: 받은 칭찬 ===== -->
    <div id="tabReceived" style="display:none;">
      <!-- 스택 진행 카드 -->
      <div class="praise-stack-card">
        <div style="font-size:13px; color:var(--gray-500);" id="untilNextXpLabel">다음 XP 전환까지</div>
        <div id="stackDots" class="praise-stack-dots"></div>
        <div id="stackLabel" style="font-size:14px; font-weight:600; color:var(--primary);"></div>
      </div>

      <!-- 월간 통계 -->
      <div class="card" style="display:flex; justify-content:space-around; text-align:center; margin-bottom:16px;">
        <div>
          <div style="font-size:24px; font-weight:800; color:var(--primary);" id="monthTotal">0</div>
          <div style="font-size:12px; color:var(--gray-500);" id="monthPraiseLabel">이번 달 받은 칭찬</div>
        </div>
        <div>
          <div style="font-size:24px; font-weight:800; color:var(--success);" id="monthXp">0</div>
          <div style="font-size:12px; color:var(--gray-500);" id="convertedXpLabel">전환된 XP</div>
        </div>
      </div>

      <!-- 받은 칭찬 리스트 -->
      <h3 style="font-size:15px; color:var(--gray-700); margin-bottom:12px;" id="recentPraiseLabel">최근 받은 칭찬</h3>
      <div id="receivedList"></div>
    </div>
  </div>

  <!-- 프로필 미리보기 모달 -->
  <div class="profile-modal-overlay" id="profileModal" onclick="if(event.target===this)closeProfileModal()">
    <div class="profile-modal">
      <div class="pm-hero">
        <button class="pm-close" onclick="closeProfileModal()">&times;</button>
        <div class="pm-avatar" id="pmAvatar">?</div>
        <div class="pm-name" id="pmName">-</div>
        <div class="pm-branch" id="pmBranch">-</div>
        <div class="pm-intro" id="pmIntro"></div>
        <div class="pm-tier">
          <span class="pm-tier-badge" id="pmTier">🌱 새싹</span>
          <span class="pm-xp-text" id="pmXp">0 EXP</span>
        </div>
      </div>
      <div class="pm-stats" id="pmStats"></div>
      <div class="pm-body" id="pmBody"></div>
      <button class="pm-boost-btn" id="pmBoostBtn" onclick="boostFromModal()">
        🙌 부스트 보내기
      </button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/demo-data.js"></script>
  <script src="js/xp-system.js"></script>
  <script src="js/xp-ui.js"></script>
  <script>
    // ===== 로그인 체크 =====
    const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
    if (!user) { location.href = 'index.html'; }
    const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;

    // ===== i18n TEXTS =====
    const T = {
      ko: {
        home: '홈', tasks: '미션', praise: '부스트', myResults: '내 프로필',
        sendPraise: '칭찬 보내기', received: '받은 칭찬',
        whoPraise: '누구에게 칭찬할까요?',
        myTeam: '우리 팀', otherTeams: '같은 지점 · 다른 팀',
        whatGreat: '어떤 점이 좋았나요?',
        reason: '칭찬 이유', optional: '선택',
        sendBtn: '칭찬 보내기', sending: '보내는 중...',
        sent: '보냄',
        untilNextXp: '다음 XP 전환까지',
        moreForXp: (n, m) => `${n}개 더 받으면 +${m} XP!`,
        xpConvertDone: 'XP 전환 완료!',
        monthPraise: '이번 달 받은 칭찬',
        convertedXp: '전환된 XP',
        recentPraise: '최근 받은 칭찬',
        noPraise: '아직 받은 칭찬이 없어요',
        noColleagues: '같은 지점에 칭찬할 동료가 없습니다',
        justNow: '방금 전',
        minAgo: (n) => `${n}분 전`,
        hrsAgo: (n) => `${n}시간 전`,
        daysAgo: (n) => `${n}일 전`,
        praiseSent: '칭찬을 보냈습니다!',
        sendFail: '칭찬 보내기 실패',
        dailyLimitReached: '오늘 칭찬 한도에 도달했습니다',
        anonymous: '익명',
        placeholder: '예: 오늘 바쁜 시간에 정말 많이 도와줘서 고마워요!',
      },
      en: {
        home: 'Home', tasks: 'Tasks', praise: 'Boost', myResults: 'Profile',
        sendPraise: 'Send Praise', received: 'Received',
        whoPraise: 'Who do you want to praise?',
        myTeam: 'My Team', otherTeams: 'Same Branch · Other Teams',
        whatGreat: 'What was great?',
        reason: 'Reason', optional: 'Optional',
        sendBtn: 'Send Praise', sending: 'Sending...',
        sent: 'sent',
        untilNextXp: 'Until next XP conversion',
        moreForXp: (n, m) => `${n} more for +${m} XP!`,
        xpConvertDone: 'XP conversion complete!',
        monthPraise: "This month's praise",
        convertedXp: 'Converted XP',
        recentPraise: 'Recent praise received',
        noPraise: 'No praise received yet',
        noColleagues: 'No colleagues in your branch',
        justNow: 'just now',
        minAgo: (n) => `${n} min ago`,
        hrsAgo: (n) => `${n} hrs ago`,
        daysAgo: (n) => `${n} days ago`,
        praiseSent: 'Praise sent!',
        sendFail: 'Failed to send praise',
        dailyLimitReached: 'Daily praise limit reached',
        anonymous: 'Anonymous',
        placeholder: 'e.g., Thanks for helping so much during the busy hours today!',
      },
      vi: {
        home: 'Trang chủ', tasks: 'Nhiệm vụ', praise: 'Khen', myResults: 'Hồ sơ',
        sendPraise: 'Gửi lời khen', received: 'Đã nhận',
        whoPraise: 'Bạn muốn khen ai?',
        myTeam: 'Đội của tôi', otherTeams: 'Cùng chi nhánh · Đội khác',
        whatGreat: 'Điều gì tốt?',
        reason: 'Lý do', optional: 'Tùy chọn',
        sendBtn: 'Gửi lời khen', sending: 'Đang gửi...',
        sent: 'đã gửi',
        untilNextXp: 'Đến chuyển đổi XP tiếp theo',
        moreForXp: (n, m) => `Thêm ${n} để +${m} XP!`,
        xpConvertDone: 'Chuyển đổi XP hoàn tất!',
        monthPraise: 'Lời khen tháng này',
        convertedXp: 'XP đã chuyển đổi',
        recentPraise: 'Lời khen gần đây',
        noPraise: 'Chưa nhận được lời khen nào',
        noColleagues: 'Không có đồng nghiệp trong chi nhánh',
        justNow: 'vừa xong',
        minAgo: (n) => `${n} phút trước`,
        hrsAgo: (n) => `${n} giờ trước`,
        daysAgo: (n) => `${n} ngày trước`,
        praiseSent: 'Đã gửi lời khen!',
        sendFail: 'Gửi lời khen thất bại',
        dailyLimitReached: 'Đã đạt giới hạn khen ngợi hôm nay',
        anonymous: 'Ẩn danh',
        placeholder: 'VD: Cảm ơn bạn đã giúp đỡ rất nhiều trong giờ cao điểm hôm nay!',
      }
    };
    const t = T[lang] || T.ko;

    let selectedEmpId = null;
    let selectedCategory = null;
    let dailyLimitExceeded = false;

    // ===== Apply nav + static i18n =====
    function applyI18n() {
      document.querySelector('.nav-label-home').textContent = t.home;
      document.querySelector('.nav-label-tasks').textContent = t.tasks;
      document.querySelector('.nav-label-praise').textContent = t.praise;
      document.querySelector('.nav-label-results').textContent = t.myResults;
      document.title = `SOP Training - ${t.praise}`;

      document.getElementById('pageTitle').textContent = `🤝 ${t.praise}`;
      document.getElementById('tabSendLabel').textContent = t.sendPraise;
      document.getElementById('tabReceivedLabel').textContent = t.received;
      document.getElementById('whoPraiseLabel').textContent = t.whoPraise;
      document.getElementById('whatGreatLabel').textContent = t.whatGreat;
      document.getElementById('reasonLabel').innerHTML = `${t.reason} <span style="font-size:12px; color:var(--gray-400); font-weight:400;">(${t.optional})</span>`;
      document.getElementById('praiseReason').placeholder = t.placeholder;
      document.getElementById('sendBtn').textContent = t.sendBtn;
      document.getElementById('untilNextXpLabel').textContent = t.untilNextXp;
      document.getElementById('monthPraiseLabel').textContent = t.monthPraise;
      document.getElementById('convertedXpLabel').textContent = t.convertedXp;
      document.getElementById('recentPraiseLabel').textContent = t.recentPraise;
    }

    // ===== 탭 전환 =====
    function showPraiseTab(tab) {
      document.getElementById('tabSend').style.display = tab === 'send' ? 'block' : 'none';
      document.getElementById('tabReceived').style.display = tab === 'received' ? 'block' : 'none';
      document.querySelectorAll('.praise-tab').forEach((ti, i) => {
        ti.classList.toggle('active', (i === 0 && tab === 'send') || (i === 1 && tab === 'received'));
      });
      if (tab === 'received') loadReceivedTab();
    }

    // ===== 직원 목록 렌더링 (같은 지점만, 우리 팀 → 다른 팀) =====
    function renderEmployeeList() {
      const list = document.getElementById('empList');

      // If daily limit reached, show message instead of employee list
      if (dailyLimitExceeded) {
        list.innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger); font-weight:600;">
          <div style="font-size:32px; margin-bottom:8px;">🚫</div>
          ${t.dailyLimitReached}
        </div>`;
        document.getElementById('categoryArea').style.display = 'none';
        return;
      }

      const me = EmployeeStore.getById(user.id) || { branch: user.branch || '', team: user.team || '' };
      const myBranch = me.branch;
      const myTeam = me.team;

      // 같은 지점 직원만 (다른 지점은 표시 안 함)
      const branchEmps = EmployeeStore.getAll().filter(e =>
        e.id !== user.id && e.role !== 'admin' && e.branch && e.branch === myBranch
      );

      // 우리 팀 / 다른 팀 분리
      const myTeamList = myTeam ? branchEmps.filter(e => e.team === myTeam) : [];
      const otherTeamList = myTeam ? branchEmps.filter(e => e.team !== myTeam) : branchEmps;

      let html = '';

      // 우리 팀
      if (myTeamList.length > 0) {
        html += `<div style="font-size:12px; font-weight:700; color:var(--primary); margin:8px 0 6px; display:flex; align-items:center; gap:6px;">
          <span style="font-size:14px;">👥</span> ${t.myTeam} · ${myTeam}
        </div>`;
        html += myTeamList.map(e => renderEmpItem(e, true)).join('');
      }

      // 같은 지점 다른 팀
      if (otherTeamList.length > 0) {
        const otherLabel = myTeamList.length > 0 ? t.otherTeams : myBranch;
        html += `<div style="font-size:12px; font-weight:700; color:var(--gray-400); margin:${myTeamList.length > 0 ? '16' : '8'}px 0 6px; display:flex; align-items:center; gap:6px;">
          <span style="font-size:14px;">🏢</span> ${otherLabel}
        </div>`;
        html += otherTeamList.map(e => renderEmpItem(e, false)).join('');
      }

      list.innerHTML = html;

      if (branchEmps.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:20px; color:var(--gray-500);">${t.noColleagues}</div>`;
      }
    }

    function renderEmpItem(e, isMyTeam) {
      const border = isMyTeam ? 'border-left:3px solid var(--primary);' : '';
      const teamBadge = e.team
        ? `<span style="font-size:10px; background:${isMyTeam ? 'var(--primary-light)' : 'var(--gray-100)'}; color:${isMyTeam ? 'var(--primary)' : 'var(--gray-500)'}; padding:2px 8px; border-radius:10px; font-weight:600;">${e.team}</span>`
        : '';
      return `
        <div class="emp-select-item" style="${border}" onclick="selectEmployee('${e.id}', this)">
          <div class="emp-avatar" onclick="event.stopPropagation(); showProfileModal('${e.id}')" style="cursor:pointer; transition:transform 0.2s;" onmouseenter="this.style.transform='scale(1.15)'" onmouseleave="this.style.transform='scale(1)'">${(e.name || '?')[0]}</div>
          <div style="flex:1; cursor:pointer;" onclick="event.stopPropagation(); showProfileModal('${e.id}')">
            <div style="font-weight:600; font-size:14px;">${e.name}</div>
            <div style="font-size:12px; color:var(--gray-500);">${e.team || e.branch || ''}</div>
          </div>
          ${teamBadge}
        </div>`;
    }

    async function selectEmployee(empId, el) {
      if (dailyLimitExceeded) {
        renderEmployeeList(); // 혹시 UI가 안 바뀌었을 경우 강제 리렌더
        return;
      }
      // 선택 시 실시간 한도 재확인 (다른 탭에서 보냈을 수 있음)
      const currentSent = await PraiseService.getDailySentCount(user.id);
      if (currentSent >= XP_CONFIG.PRAISE_DAILY_LIMIT) {
        dailyLimitExceeded = true;
        await updateDailyBadge();
        renderEmployeeList();
        return;
      }
      selectedEmpId = empId;
      selectedCategory = null;
      document.querySelectorAll('.emp-select-item').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('categoryArea').style.display = 'block';
      renderCategories();
      updateSendBtn();
    }

    // ===== 카테고리 렌더링 =====
    function renderCategories() {
      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = PRAISE_CATEGORIES.map(c => {
        const label = lang === 'en' ? c.en : lang === 'vi' ? c.vn : c.ko;
        return `<button class="category-btn" onclick="selectCategory('${c.id}', this)">${c.emoji} ${label}</button>`;
      }).join('');
    }

    function selectCategory(catId, el) {
      selectedCategory = catId;
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('reasonArea').style.display = 'block';
      updateSendBtn();
    }

    // 글자수 카운터
    document.getElementById('praiseReason')?.addEventListener('input', function() {
      document.getElementById('reasonCount').textContent = this.value.length;
    });

    function updateSendBtn() {
      document.getElementById('sendBtn').disabled = !(selectedEmpId && selectedCategory);
    }

    // ===== 칭찬 보내기 =====
    async function doSendPraise() {
      if (!selectedEmpId || !selectedCategory || dailyLimitExceeded) return;
      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      btn.textContent = t.sending;

      const reason = (document.getElementById('praiseReason')?.value || '').trim();
      const result = await PraiseService.sendPraise(user.id, selectedEmpId, selectedCategory, reason);

      if (result?.success) {
        showXpToast(XP_CONFIG.PRAISE_SEND_XP);

        if (result.stackConverted) {
          // 받는 사람 XP 전환 알림은 받는 사람이 볼 때 표시
        }

        // 리셋
        selectedEmpId = null;
        selectedCategory = null;
        document.querySelectorAll('.emp-select-item').forEach(e => e.classList.remove('selected'));
        document.getElementById('categoryArea').style.display = 'none';
        document.getElementById('reasonArea').style.display = 'none';
        document.getElementById('praiseReason').value = '';
        document.getElementById('reasonCount').textContent = '0';

        // 성공 토스트
        showToast(t.praiseSent + ' 🎉');
        await updateDailyBadge();
        // Re-render employee list in case limit was just reached
        renderEmployeeList();
      } else {
        // 한도 초과 등 실패 시에도 배지 업데이트 + 목록 리렌더
        await updateDailyBadge();
        renderEmployeeList();
        if (dailyLimitExceeded) {
          // 이미 한도 초과 UI 표시됨 — alert 불필요
          showToast(t.dailyLimitReached + ' 🚫');
        } else {
          showToast(result?.reason || t.sendFail);
        }
      }

      btn.disabled = false;
      btn.textContent = t.sendBtn;
      updateSendBtn();
    }

    // ===== 일일 한도 배지 =====
    async function updateDailyBadge() {
      const sent = await PraiseService.getDailySentCount(user.id);
      const badge = document.getElementById('dailyLimitBadge');
      const limit = XP_CONFIG.PRAISE_DAILY_LIMIT;
      badge.textContent = `${sent}/${limit} ${t.sent}`;
      if (sent >= limit) {
        badge.style.background = '#fef2f2';
        badge.style.color = 'var(--danger)';
        dailyLimitExceeded = true;
      } else {
        badge.style.background = '#dcfce7';
        badge.style.color = 'var(--success)';
        dailyLimitExceeded = false;
      }
      return sent;
    }

    // ===== 받은 칭찬 탭 =====
    async function loadReceivedTab() {
      // 스택 진행
      const stack = await PraiseService.getStackProgress(user.id);
      const dotsEl = document.getElementById('stackDots');
      let dots = '';
      for (let i = 0; i < stack.needed; i++) {
        dots += i < stack.current
          ? '<div class="praise-stack-dot filled">⭐</div>'
          : '<div class="praise-stack-dot empty">☆</div>';
      }
      dotsEl.innerHTML = dots;

      const remaining = stack.needed - stack.current;
      document.getElementById('stackLabel').textContent =
        remaining > 0
          ? t.moreForXp(remaining, XP_CONFIG.PRAISE_XP_PER_STACK)
          : `${t.xpConvertDone} 🎉`;

      // 월간 통계
      const now = new Date();
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
      const history = await PraiseService.getReceivedHistory(user.id, 50);
      const monthPraises = history.filter(h => h.created_at >= monthStart);
      document.getElementById('monthTotal').textContent = monthPraises.length;
      document.getElementById('monthXp').textContent = `+${stack.totalConverted * XP_CONFIG.PRAISE_XP_PER_STACK}`;

      // 최근 리스트
      const listEl = document.getElementById('receivedList');
      const catMap = {};
      PRAISE_CATEGORIES.forEach(c => { catMap[c.id] = c; });

      if (history.length === 0) {
        listEl.innerHTML = `<div style="text-align:center; padding:30px; color:var(--gray-500);">${t.noPraise}</div>`;
        return;
      }

      listEl.innerHTML = history.slice(0, 20).map(h => {
        const cat = catMap[h.category] || { emoji: '🤝', ko: h.category };
        const label = lang === 'en' ? (cat.en || cat.ko) : lang === 'vi' ? (cat.vn || cat.ko) : cat.ko;
        const d = new Date(h.created_at);
        const ago = getTimeAgo(d);
        const reasonHtml = h.reason
          ? `<div style="font-size:13px; color:var(--gray-600); margin-top:4px; padding:6px 10px; background:var(--gray-50); border-radius:8px; font-style:italic;">"${h.reason}"</div>`
          : '';
        return `
          <div class="praise-history-item" style="flex-wrap:wrap;">
            <div class="praise-history-emoji">${cat.emoji}</div>
            <div style="flex:1; min-width:0;">
              <div style="font-weight:600; font-size:14px;">${label}</div>
              <div style="font-size:12px; color:var(--gray-500);">${t.anonymous} · ${ago}</div>
              ${reasonHtml}
            </div>
          </div>
        `;
      }).join('');
    }

    function getTimeAgo(date) {
      const diff = Date.now() - date.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return t.justNow;
      if (mins < 60) return t.minAgo(mins);
      const hours = Math.floor(mins / 60);
      if (hours < 24) return t.hrsAgo(hours);
      const days = Math.floor(hours / 24);
      return t.daysAgo(days);
    }

    function showToast(msg) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:12px 24px; border-radius:10px; font-size:14px; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; text-align:center; max-width:80%;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    // ===== 프로필 모달 =====
    let modalTargetEmpId = null;

    async function showProfileModal(empId) {
      modalTargetEmpId = empId;
      const emp = EmployeeStore.getById(empId);
      if (!emp) return;

      // Avatar
      const avatarEl = document.getElementById('pmAvatar');
      avatarEl.innerHTML = (emp.name || '?')[0];
      avatarEl.style.fontSize = '28px';

      // Name, branch
      document.getElementById('pmName').textContent = emp.name || '?';
      document.getElementById('pmBranch').textContent = [emp.team, emp.branch].filter(Boolean).join(' · ');

      // Clear previous data
      document.getElementById('pmIntro').textContent = '';
      document.getElementById('pmStats').innerHTML = '';
      document.getElementById('pmBody').innerHTML = '<div class="pm-empty">⏳</div>';

      // Boost button
      const boostBtn = document.getElementById('pmBoostBtn');
      const boostLabel = lang === 'en' ? '🙌 Send Boost' : lang === 'vi' ? '🙌 Gửi Boost' : '🙌 부스트 보내기';
      boostBtn.textContent = boostLabel;
      boostBtn.disabled = dailyLimitExceeded;

      // Show modal
      document.getElementById('profileModal').classList.add('show');
      document.body.style.overflow = 'hidden';

      // XP & Tier
      let totalXp = 0;
      try {
        if (typeof XpService !== 'undefined') {
          totalXp = await XpService.getTotal(empId) || 0;
        }
      } catch (e) {}
      const tier = calculateTier(totalXp);
      const tierTitle = getTierTitle(tier, lang);
      document.getElementById('pmTier').innerHTML = `${tier.emoji} ${tierTitle} ${tier.subLabel}`;
      document.getElementById('pmTier').style.borderColor = tier.color + '60';
      document.getElementById('pmXp').textContent = `${totalXp.toLocaleString()} EXP`;

      // Fetch profile from Supabase
      let profile = null;
      if (SupabaseMode._ready && SupabaseMode._client) {
        try {
          const { data } = await SupabaseMode._client
            .from('employee_profiles')
            .select('*')
            .eq('employee_id', empId)
            .single();
          if (data) {
            profile = {
              intro: data.intro || '',
              bio: data.bio || '',
              mbti: data.mbti || '',
              hobbies: data.hobbies || [],
              likes: data.likes || [],
              motto: data.motto || '',
              skills: data.skills || '',
              strengths: data.strengths || [],
              weaknesses: data.weaknesses || [],
              workStyles: data.work_styles || [],
              goal: data.goal || '',
              specialAbility: data.special_ability || '',
              avatarType: data.avatar_type || 'initial',
              avatar: data.avatar_type === 'photo' ? data.avatar : data.avatar_type === 'emoji' ? data.avatar_emoji : null,
              stats: data.stats || null,
            };
          }
        } catch (e) {}
      }

      // Update avatar from profile
      if (profile?.avatarType === 'photo' && profile.avatar) {
        avatarEl.innerHTML = `<img src="${profile.avatar}" alt="">`;
      } else if (profile?.avatarType === 'emoji' && profile.avatar) {
        avatarEl.textContent = profile.avatar;
        avatarEl.style.fontSize = '32px';
      }

      // Intro
      if (profile?.intro) {
        document.getElementById('pmIntro').textContent = `"${profile.intro}"`;
      }

      // Stats
      if (profile?.stats) {
        const statDefs = [
          { key: 'communication', alt: 'comm', icon: '💬', label: lang === 'en' ? 'Comm' : lang === 'vi' ? 'Giao tiếp' : '소통', color: '#10B981' },
          { key: 'focus', alt: 'focus', icon: '🎯', label: lang === 'en' ? 'Focus' : lang === 'vi' ? 'Tập trung' : '집중', color: '#3B82F6' },
          { key: 'teamwork', alt: 'team', icon: '🤝', label: lang === 'en' ? 'Team' : lang === 'vi' ? 'Đồng đội' : '팀워크', color: '#F59E0B' },
          { key: 'creativity', alt: 'creative', icon: '💡', label: lang === 'en' ? 'Create' : lang === 'vi' ? 'Sáng tạo' : '창의', color: '#EC4899' },
          { key: 'execution', alt: 'speed', icon: '⚡', label: lang === 'en' ? 'Action' : lang === 'vi' ? 'Hành động' : '실행', color: '#EF4444' },
          { key: 'service', alt: 'service', icon: '❤️', label: lang === 'en' ? 'Service' : lang === 'vi' ? 'Phục vụ' : '서비스', color: '#8B5CF6' },
        ];
        document.getElementById('pmStats').innerHTML = statDefs.map(s => {
          const val = profile.stats[s.key] || profile.stats[s.alt] || 0;
          return `<div class="pm-stat-item">
            <span class="pm-stat-icon">${s.icon}</span>
            <span class="pm-stat-name">${s.label}</span>
            <div class="pm-stat-bar"><div class="fill" style="width:${val*10}%;background:${s.color};"></div></div>
            <span class="pm-stat-val">${val}</span>
          </div>`;
        }).join('');
      } else {
        document.getElementById('pmStats').style.display = 'none';
      }

      // Body
      let bodyHtml = '';

      if (!profile) {
        const noProfileMsg = lang === 'en' ? 'This person hasn\'t set up their profile yet.' : lang === 'vi' ? 'Người này chưa tạo hồ sơ.' : '아직 프로필을 등록하지 않았어요.';
        bodyHtml = `<div class="pm-empty">🎭<br>${noProfileMsg}</div>`;
      } else {
        // Motto
        if (profile.motto) {
          bodyHtml += `<div class="pm-section"><div class="pm-motto">"${profile.motto}"</div></div>`;
        }

        // Bio
        if (profile.bio) {
          bodyHtml += `<div class="pm-section"><div class="pm-section-title">📝 ${lang === 'en' ? 'About' : lang === 'vi' ? 'Giới thiệu' : '소개'}</div>
            <p style="font-size:13px; color:#CBD5E1; line-height:1.6; margin:0;">${profile.bio}</p></div>`;
        }

        // MBTI, Hobbies, Likes
        if (profile.mbti || profile.hobbies?.length || profile.likes?.length) {
          bodyHtml += `<div class="pm-section"><div class="pm-section-title">🎨 ${lang === 'en' ? 'About Me' : lang === 'vi' ? 'Về tôi' : '나에 대해'}</div>`;
          if (profile.mbti) bodyHtml += `<div class="pm-info-row"><span class="pm-info-label">MBTI</span><span class="pm-info-value">${profile.mbti}</span></div>`;
          if (profile.hobbies?.length) {
            bodyHtml += `<div style="margin-top:8px;"><span style="font-size:11px;color:#64748B;">${lang === 'en' ? 'Hobbies' : lang === 'vi' ? 'Sở thích' : '취미'}</span>
              <div class="pm-tags" style="margin-top:4px;">${profile.hobbies.map(h => `<span class="pm-tag">${h}</span>`).join('')}</div></div>`;
          }
          if (profile.likes?.length) {
            bodyHtml += `<div style="margin-top:8px;"><span style="font-size:11px;color:#64748B;">${lang === 'en' ? 'Likes' : lang === 'vi' ? 'Yêu thích' : '좋아하는 것'}</span>
              <div class="pm-tags" style="margin-top:4px;">${profile.likes.map(l => `<span class="pm-tag">${l}</span>`).join('')}</div></div>`;
          }
          bodyHtml += `</div>`;
        }

        // Strengths / Weaknesses
        if (profile.strengths?.length || profile.weaknesses?.length) {
          bodyHtml += `<div class="pm-section"><div class="pm-section-title">💪 ${lang === 'en' ? 'Strengths & Growth' : lang === 'vi' ? 'Điểm mạnh' : '장점 & 개선점'}</div>`;
          if (profile.strengths?.length) bodyHtml += `<div class="pm-tags">${profile.strengths.map(s => `<span class="pm-tag">${s}</span>`).join('')}</div>`;
          if (profile.weaknesses?.length) bodyHtml += `<div class="pm-tags" style="margin-top:6px;">${profile.weaknesses.map(w => `<span class="pm-tag warn">${w}</span>`).join('')}</div>`;
          bodyHtml += `</div>`;
        }

        // Extra info
        const extras = [];
        if (profile.skills) extras.push([lang === 'en' ? 'Skills' : lang === 'vi' ? 'Kỹ năng' : '특기', profile.skills]);
        if (profile.goal) extras.push([lang === 'en' ? 'Goal' : lang === 'vi' ? 'Mục tiêu' : '목표', profile.goal]);
        if (profile.specialAbility) extras.push([lang === 'en' ? 'Hidden Talent' : lang === 'vi' ? 'Tài năng ẩn' : '숨겨진 재능', profile.specialAbility]);
        if (extras.length) {
          bodyHtml += `<div class="pm-section"><div class="pm-section-title">✨ ${lang === 'en' ? 'Extra' : lang === 'vi' ? 'Thêm' : '추가 정보'}</div>`;
          extras.forEach(([label, value]) => {
            bodyHtml += `<div class="pm-info-row"><span class="pm-info-label">${label}</span><span class="pm-info-value">${value}</span></div>`;
          });
          bodyHtml += `</div>`;
        }

        if (!bodyHtml) {
          const minimalMsg = lang === 'en' ? 'Profile is minimal.' : lang === 'vi' ? 'Hồ sơ tối giản.' : '간단한 프로필이에요.';
          bodyHtml = `<div class="pm-empty">${minimalMsg}</div>`;
        }
      }

      document.getElementById('pmBody').innerHTML = bodyHtml;
    }

    function closeProfileModal() {
      document.getElementById('profileModal').classList.remove('show');
      document.body.style.overflow = '';
    }

    function boostFromModal() {
      const empId = modalTargetEmpId;
      closeProfileModal();
      if (!empId || dailyLimitExceeded) return;
      // Find and click the employee item
      const items = document.querySelectorAll('.emp-select-item');
      for (const item of items) {
        if (item.getAttribute('onclick')?.includes(empId)) {
          selectEmployee(empId, item);
          break;
        }
      }
    }

    // ===== 초기화 =====
    async function init() {
      applyI18n();
      // 로딩 표시 — Supabase 연결 전 직원 목록 비활성화
      const empList = document.getElementById('empList');
      empList.innerHTML = '<div style="text-align:center; padding:30px; color:var(--gray-400);">⏳ 로딩 중...</div>';

      await SupabaseMode.init();
      // Supabase 직원 동기화 후 목록 렌더링
      if (SupabaseMode._ready) {
        await SupabaseMode.syncEmployees();
      }
      // 칭찬 설정 동기화 (관리자 변경사항 반영)
      if (typeof syncPraiseConfigFromSupabase === 'function') {
        await syncPraiseConfigFromSupabase();
      }
      // Check daily limit before rendering employee list
      const dailySent = await updateDailyBadge();
      if (dailySent >= XP_CONFIG.PRAISE_DAILY_LIMIT) {
        dailyLimitExceeded = true;
        // Add visual indicator to send tab
        const sendTab = document.querySelectorAll('.praise-tab')[0];
        if (sendTab) sendTab.innerHTML = `${t.sendPraise} <span style="font-size:11px; color:var(--danger);">🚫</span>`;
      }
      renderEmployeeList();
      renderCategories();
    }
    init();
  </script>
</body>
</html>
