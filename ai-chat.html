<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Training - AI 질문</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link rel="icon" href="assets/icon-192.svg">
  <style>
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 140px); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 12px; }
    .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.5; word-break: break-word; }
    .chat-bubble.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .chat-bubble.ai { align-self: flex-start; background: rgba(30,41,59,0.85); color: #F1F5F9; border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
    .chat-bubble.ai .ai-label { font-size: 11px; color: var(--primary); font-weight: 600; margin-bottom: 4px; }
    .chat-input-area { display: flex; gap: 8px; padding: 12px 0; border-top: 1px solid var(--gray-200); }
    .chat-input-area input { flex: 1; padding: 12px 16px; border: 1px solid var(--gray-300); border-radius: 24px; font-size: 15px; outline: none; background: var(--bg-surface, #1E293B); color: var(--text-primary, #F1F5F9); }
    .chat-input-area input:focus { border-color: var(--primary); }
    .chat-send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-usage-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px 0; font-size: 12px; color: var(--gray-500); }
    .chat-usage-bar .usage-count { font-weight: 600; color: var(--primary); }
    .chat-usage-bar .usage-note { color: var(--gray-400); font-style: italic; }
    .chat-limit-msg { text-align: center; padding: 16px; color: var(--danger, #e53e3e); font-weight: 600; font-size: 14px; }
    .quick-questions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .quick-q { padding: 8px 14px; background: rgba(30,41,59,0.85); border: 1px solid rgba(148,163,184,0.12); border-radius: 20px; font-size: 13px; color: #94A3B8; cursor: pointer; transition: all 0.15s; }
    .quick-q:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
    .typing-indicator span { width: 8px; height: 8px; background: var(--gray-300); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    @media (min-width: 768px) {
      .chat-container { height: calc(100vh - 180px); }
    }
  </style>
</head>
<body>

  <div class="bottom-nav">
    <a href="app.html"><span class="nav-icon">&#127968;</span> <span class="nav-label-home">홈</span></a>
    <a href="tasks.html"><span class="nav-icon">&#9989;</span> <span class="nav-label-tasks">미션</span></a>
    <a href="praise.html"><span class="nav-icon">&#128588;</span> <span class="nav-label-praise">부스트</span></a>
    <a href="my-results.html"><span class="nav-icon">&#128100;</span> <span class="nav-label-results">내 프로필</span></a>
  </div>

  <div class="app-container">
    <div class="app-header">
      <h2 id="pageTitle">AI SOP 도우미</h2>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>

    <div class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-bubble ai">
          <div class="ai-label" id="aiLabelInit">AI 도우미</div>
          <span id="welcomeText">안녕하세요! SOP에 대해 궁금한 것을 질문해주세요.<br>
          등록된 SOP 내용을 기반으로 답변해드립니다.</span>
        </div>
        <div class="quick-questions" id="quickQuestions"></div>
      </div>

      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="" onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="chat-send-btn" onclick="sendMessage()">&#10148;</button>
      </div>
      <div class="chat-usage-bar">
        <span class="usage-count" id="usageCounter"></span>
        <span class="usage-note" id="usageNote"></span>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/scene-prompts.js"></script>
  <script src="js/ai-provider.js"></script>
  <script src="js/sop-content-kids.js"></script>
  <script src="js/demo-data.js"></script>
  <script>
    // ===== 다국어 텍스트 =====
    const T = {
      ko: {
        home: '홈', aiChat: 'AI 질문', myResults: '내 결과',
        pageTitle: 'AI SOP 도우미', aiLabel: 'AI 도우미',
        welcome: '안녕하세요! SOP에 대해 궁금한 것을 질문해주세요.<br>등록된 SOP 내용을 기반으로 답변해드립니다.',
        placeholder: 'SOP에 대해 질문하세요...',
        noMatch: '해당 질문에 맞는 SOP를 찾지 못했습니다.',
        sopList: '등록된 SOP 목록:',
        askAbove: '위 주제에 대해 질문해보세요!',
        logoutConfirm: '로그아웃 하시겠습니까?',
        askProcedure: (title) => `${title} 절차를 알려줘`,
        dailyLimitReached: '오늘의 질문 횟수를 모두 사용했습니다. 내일 다시 이용해주세요.',
        remainingQuestions: (r, m) => `오늘 남은 질문: ${r}/${m}`,
        workOnlyNote: '업무 관련 질문만 가능합니다',
      },
      en: {
        home: 'Home', aiChat: 'AI Q&A', myResults: 'Results',
        pageTitle: 'AI SOP Assistant', aiLabel: 'AI Assistant',
        welcome: 'Hello! Ask me anything about SOPs.<br>I\'ll answer based on the registered SOP content.',
        placeholder: 'Ask about SOPs...',
        noMatch: 'No matching SOP found for your question.',
        sopList: 'Available SOPs:',
        askAbove: 'Try asking about one of the topics above!',
        logoutConfirm: 'Are you sure you want to log out?',
        askProcedure: (title) => `Tell me about the ${title} procedure`,
        dailyLimitReached: 'You have used all your questions for today. Please try again tomorrow.',
        remainingQuestions: (r, m) => `Questions remaining today: ${r}/${m}`,
        workOnlyNote: 'Work-related questions only',
      },
      vi: {
        home: 'Trang chủ', aiChat: 'Hỏi AI', myResults: 'Kết quả',
        pageTitle: 'Trợ lý AI SOP', aiLabel: 'Trợ lý AI',
        welcome: 'Xin chào! Hãy hỏi bất cứ điều gì về SOP.<br>Tôi sẽ trả lời dựa trên nội dung SOP đã đăng ký.',
        placeholder: 'Hỏi về SOP...',
        noMatch: 'Không tìm thấy SOP phù hợp với câu hỏi của bạn.',
        sopList: 'Danh sách SOP:',
        askAbove: 'Hãy thử hỏi về một trong các chủ đề trên!',
        logoutConfirm: 'Bạn có chắc muốn đăng xuất?',
        askProcedure: (title) => `Cho tôi biết quy trình ${title}`,
        dailyLimitReached: 'Bạn đã sử dụng hết số câu hỏi hôm nay. Vui lòng thử lại vào ngày mai.',
        remainingQuestions: (r, m) => `Câu hỏi còn lại hôm nay: ${r}/${m}`,
        workOnlyNote: 'Chỉ câu hỏi liên quan đến công việc',
      }
    };
    const lang = localStorage.getItem('sop_lang') || CONFIG.DEFAULT_LANG;
    const t = T[lang] || T.ko;

    // Apply static labels
    document.querySelector('.nav-label-home').textContent = t.home;
    if (document.querySelector('.nav-label-tasks')) document.querySelector('.nav-label-tasks').textContent = lang === 'en' ? 'Tasks' : lang === 'vi' ? 'Nhiệm vụ' : '미션';
    if (document.querySelector('.nav-label-praise')) document.querySelector('.nav-label-praise').textContent = lang === 'en' ? 'Praise' : lang === 'vi' ? 'Khen ngợi' : '부스트';
    document.querySelector('.nav-label-results').textContent = t.myResults;
    document.getElementById('pageTitle').textContent = t.pageTitle;
    document.getElementById('aiLabelInit').textContent = t.aiLabel;
    document.getElementById('welcomeText').innerHTML = t.welcome;
    document.getElementById('chatInput').placeholder = t.placeholder;

    const user = JSON.parse(localStorage.getItem('sop_user') || 'null');
    const loginTime = parseInt(localStorage.getItem('sop_login_time') || '0');
    if (Date.now() - loginTime > 24 * 60 * 60 * 1000) {
      localStorage.removeItem('sop_user');
      localStorage.removeItem('sop_login_time');
      window.location.href = 'index.html';
    }
    if (!user) { window.location.href = 'index.html'; }
    document.getElementById('userAvatar').textContent = (user.name || '?')[0];

    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');

    // ===== Daily usage limit =====
    const DAILY_LIMIT = 50;
    function getTodayKey() {
      const d = new Date();
      const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      return `sop_chat_count_${user.email || 'unknown'}_${dateStr}`;
    }
    function getDailyCount() { return parseInt(localStorage.getItem(getTodayKey()) || '0', 10); }
    function incrementDailyCount() {
      const c = getDailyCount() + 1;
      localStorage.setItem(getTodayKey(), c);
      updateUsageUI();
      return c;
    }
    function getRemainingQuestions() { return Math.max(0, DAILY_LIMIT - getDailyCount()); }
    function updateUsageUI() {
      const remaining = getRemainingQuestions();
      document.getElementById('usageCounter').textContent = t.remainingQuestions(remaining, DAILY_LIMIT);
      document.getElementById('usageNote').textContent = t.workOnlyNote;
      // Disable input when limit reached
      const inp = document.getElementById('chatInput');
      if (remaining <= 0) {
        inp.disabled = true;
        inp.placeholder = t.dailyLimitReached;
      }
    }
    updateUsageUI();

    // ===== 대화 히스토리 (세션 내) =====
    const chatHistory = [];

    // ===== Conversation logging =====
    const CHAT_LOGS_KEY = 'sop_chat_logs';
    const MAX_LOGS = 500;
    function saveChatLog(question, answer) {
      const logs = JSON.parse(localStorage.getItem(CHAT_LOGS_KEY) || '[]');
      const entry = {
        email: user.email || '',
        name: user.name || '',
        timestamp: new Date().toISOString(),
        question: question,
        answer: answer,
        flagged: false
      };
      logs.push(entry);
      // Keep only last MAX_LOGS entries
      while (logs.length > MAX_LOGS) logs.shift();
      localStorage.setItem(CHAT_LOGS_KEY, JSON.stringify(logs));

      // Sync to Supabase if available
      syncLogToSupabase(entry);
    }
    async function syncLogToSupabase(entry) {
      try {
        if (typeof SupabaseMode !== 'undefined' && SupabaseMode._ready) {
          await SupabaseMode.client.from('chat_logs').insert([entry]);
        }
      } catch(e) { /* silent fail - Supabase may not have the table */ }
    }

    // ===== SOP 데이터에서 동적 KB 생성 =====
    function buildKnowledgeBase() {
      const sops = SopStore.getPublished();
      return sops.map(sop => {
        // HTML에서 텍스트 추출
        const div = document.createElement('div');
        div.innerHTML = sop.content;
        const text = div.textContent;

        // 제목에서 키워드 추출
        const titleWords = sop.title.toLowerCase().split(/[\s·,]+/).filter(w => w.length > 1);
        const categoryWords = (sop.category || '').toLowerCase().split(/[\s/]+/).filter(w => w.length > 1);

        // 콘텐츠에서 핵심 단어 추출 (h3 제목들)
        const headings = Array.from(div.querySelectorAll('h3')).map(h => h.textContent.replace(/^\d+\.\s*/, '').toLowerCase());

        const keywords = [...new Set([...titleWords, ...categoryWords, ...headings.flatMap(h => h.split(/[\s,]+/).filter(w => w.length > 1))])];

        // 구조화된 답변 생성
        const sections = [];
        div.querySelectorAll('h3').forEach(h => {
          const items = [];
          let next = h.nextElementSibling;
          while (next && next.tagName !== 'H3') {
            if (next.tagName === 'OL' || next.tagName === 'UL') {
              next.querySelectorAll('li').forEach(li => items.push(li.textContent));
            } else if (next.textContent.trim()) {
              items.push(next.textContent.trim());
            }
            next = next.nextElementSibling;
          }
          sections.push({ title: h.textContent, items });
        });

        let answer = `**${sop.title}**\n\n`;
        sections.forEach(s => {
          answer += `**${s.title}**\n`;
          s.items.forEach((item, i) => {
            answer += `${i + 1}. ${item}\n`;
          });
          answer += '\n';
        });

        return { keywords, answer: answer.trim(), title: sop.title };
      });
    }

    const KB = buildKnowledgeBase();

    // 빠른 질문 버튼을 SOP 기반으로 동적 생성
    const quickDiv = document.getElementById('quickQuestions');
    const allSops = SopStore.getAll();
    if (allSops.length > 0) {
      // SOP별 추천 질문
      allSops.slice(0, 5).forEach(sop => {
        const shortTitle = sop.title.replace(/^Ch\d+_Sec\d+_/, '').replace(/_/g, ' ').replace(/한글.*$/, '').trim();
        const btn = document.createElement('button');
        btn.className = 'quick-q';
        btn.textContent = shortTitle || sop.title;
        btn.onclick = () => askQuick(`${shortTitle || sop.title}에 대해 알려줘`);
        quickDiv.appendChild(btn);
      });
      // 일반적인 추천 질문 추가
      const generalQuestions = ['오늘 학습할 내용은?', '핵심 내용 요약해줘'];
      generalQuestions.forEach(q => {
        const btn = document.createElement('button');
        btn.className = 'quick-q';
        btn.textContent = q;
        btn.onclick = () => askQuick(q);
        quickDiv.appendChild(btn);
      });
    }

    // ===== 메시지 =====
    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      // Check daily limit
      if (getRemainingQuestions() <= 0) {
        addBubble(t.dailyLimitReached, 'ai');
        return;
      }

      document.getElementById('quickQuestions').style.display = 'none';
      addBubble(text, 'user');
      chatInput.value = '';

      // Increment usage count
      incrementDailyCount();

      const typing = document.createElement('div');
      typing.className = 'chat-bubble ai';
      typing.innerHTML = `<div class="ai-label">${t.aiLabel}</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
      chatMessages.appendChild(typing);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // AI Provider 시도 → 실패 시 로컬 KB 폴백
      (async () => {
        let answer = null;
        let usedAI = false;
        try {
          // SOP 문서 (published + draft 모두 포함하여 학습 범위 확대)
          const allSops = SopStore.getAll ? SopStore.getAll() : SopStore.getPublished();
          answer = await AI.chat(text, allSops, chatHistory);
          if (answer && answer.length > 10) usedAI = true;
        } catch(e) {
          console.warn('AI chat error:', e.message);
        }

        chatMessages.removeChild(typing);
        let finalAnswer;
        if (usedAI) {
          finalAnswer = answer;
        } else {
          finalAnswer = findAnswer(text);
          // 로컬 매칭이 부족하면 안내 메시지 추가
          if (finalAnswer === t.noMatch) {
            finalAnswer = '죄송합니다. AI 서버 연결에 문제가 있어 상세 답변이 어렵습니다.\n\n' + findAnswer(text);
          }
        }
        addBubble(finalAnswer, 'ai');

        // 대화 히스토리에 추가
        chatHistory.push({ question: text, answer: finalAnswer });

        // Log conversation
        saveChatLog(text, finalAnswer);
      })();
    }

    function askQuick(q) { chatInput.value = q; sendMessage(); }

    function addBubble(text, type) {
      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble ' + type;
      if (type === 'ai') {
        let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        bubble.innerHTML = `<div class="ai-label">${t.aiLabel}</div>` + html;
      } else {
        bubble.textContent = text;
      }
      chatMessages.appendChild(bubble);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function findAnswer(query) {
      const q = query.toLowerCase();

      let bestMatch = null;
      let bestScore = 0;

      for (const item of KB) {
        let score = 0;
        // 키워드 매칭
        item.keywords.forEach(kw => { if (q.includes(kw)) score += 2; });
        // 제목 매칭 (부분)
        if (q.includes(item.title.toLowerCase().slice(0, 4))) score += 3;

        if (score > bestScore) {
          bestScore = score;
          bestMatch = item;
        }
      }

      if (bestMatch && bestScore >= 2) {
        return bestMatch.answer;
      }

      // 매칭 안 되면 등록된 SOP 목록 안내
      const sopList = SopStore.getPublished().map(s => `- ${s.title}`).join('\n');
      return `${t.noMatch}\n\n**${t.sopList}**\n${sopList}\n\n${t.askAbove}`;
    }

    // 로그아웃
    document.getElementById('userAvatar').addEventListener('click', () => {
      if (confirm(t.logoutConfirm)) {
        localStorage.removeItem('sop_user');
        localStorage.removeItem('sop_login_time');
        sessionStorage.removeItem('sb_synced');
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
